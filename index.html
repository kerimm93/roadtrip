<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roadtrip</title>
  <style>
    :root {
      --bg: #12151c;
      --bg-mid: #171b23;
      --surface: #1d2330;
      --surface-2: #222a38;
      --surface-3: #2a3445;
      --border: #39465c;
      --border-light: #586a87;
      --ink: #eef2f7;
      --ink-light: #b8c3d4;
      --ink-dim: #7f8da3;
      --accent: #b8a06e;
      --accent-2: #8ea6d9;
      --green: #7db88f;
      --yellow: #c5ab63;
      --red: #c57b7b;
      --blue: #7ea2d1;
      --radius: 14px;
      --shadow: 0 12px 30px rgba(0,0,0,.25);
      --font-ui: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
      --font-mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
      --touch: 42px;
    }

    body.theme-light {
      --bg: #f4f5f7;
      --bg-mid: #eceef1;
      --surface: #ffffff;
      --surface-2: #f8f9fb;
      --surface-3: #eef1f5;
      --border: #d5dbe5;
      --border-light: #bcc7d6;
      --ink: #18202b;
      --ink-light: #4d5c70;
      --ink-dim: #788699;
      --accent: #8b6c2f;
      --accent-2: #46679f;
      --shadow: 0 8px 22px rgba(10,15,20,.08);
    }

    body.theme-eink {
      --bg: #f7f7f2;
      --bg-mid: #efefe9;
      --surface: #ffffff;
      --surface-2: #f8f8f4;
      --surface-3: #f1f1eb;
      --border: #979797;
      --border-light: #666666;
      --ink: #111111;
      --ink-light: #333333;
      --ink-dim: #666666;
      --accent: #111111;
      --accent-2: #111111;
      --green: #111111;
      --yellow: #333333;
      --red: #111111;
      --blue: #111111;
      --shadow: none;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-ui);
      line-height: 1.4;
    }
    body.font-serif { font-family: var(--font-serif); }

    .app {
      max-width: 1480px;
      margin: 0 auto;
      padding: 14px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1.25fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .hero, .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .eyebrow {
      color: var(--ink-dim);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: .14em;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -.02em;
    }

    .subline {
      color: var(--ink-light);
      max-width: 80ch;
    }

    .hero-actions, .toolbar, .segmented, .stack-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .panel { padding: 14px; }
    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .panel-title h2,
    .panel-title h3,
    .section h2,
    .section h3 { margin: 0; font-size: 15px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .stat {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .stat .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--ink-dim);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .stat .value {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0,1fr);
      gap: 12px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .main {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .btn, button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--ink);
      border-radius: 12px;
      min-height: var(--touch);
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      transition: .14s ease;
    }

    .btn:hover, button:hover { border-color: var(--border-light); transform: translateY(-1px); }
    .btn:active, button:active { transform: translateY(0); }

    .btn-primary { background: var(--accent); color: #111; border-color: transparent; font-weight: 700; }
    body.theme-eink .btn-primary { color: #fff; }
    .btn-soft { background: var(--surface-2); }
    .btn-danger { background: var(--red); color: #fff; border-color: transparent; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--ink-light);
      font-size: 12px;
      white-space: nowrap;
    }

    .segmented .seg {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      min-height: 36px;
      color: var(--ink-light);
    }
    .segmented .seg.active { background: var(--surface-3); color: var(--ink); border-color: var(--border-light); font-weight: 700; }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--ink);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
    }

    textarea { min-height: 100px; resize: vertical; }
    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--ink-dim);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .field { margin-bottom: 10px; }

    .mini {
      color: var(--ink-dim);
      font-size: 12px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item .row-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
    }

    .item-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
    }

    .item-desc {
      color: var(--ink-light);
      font-size: 14px;
      white-space: pre-wrap;
    }

    .meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .grid-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .kanban {
      display: grid;
      grid-template-columns: repeat(6, minmax(220px, 1fr));
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px;
      min-height: 300px;
    }

    .column h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--ink-light);
      margin: 0 0 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    th { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-dim); }

    details {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
    }

    summary {
      cursor: pointer;
      font-weight: 700;
    }

    .hidden { display: none !important; }

    .notice {
      background: var(--surface-2);
      border: 1px dashed var(--border-light);
      border-radius: 12px;
      padding: 10px 12px;
      color: var(--ink-light);
      font-size: 14px;
    }

    .dropzone {
      border: 1px dashed var(--border-light);
      border-radius: 14px;
      padding: 12px;
      background: var(--surface-2);
    }

    .footer-note { color: var(--ink-dim); font-size: 12px; }

    @media (max-width: 1080px) {
      .topbar, .layout { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 680px) {
      .app { padding: 10px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .kanban { grid-template-columns: repeat(6, 260px); }
      h1 { font-size: 24px; }
    }

    .workspace {
      max-width: 100%;
      padding: 20px;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 16px;
      min-height: 100vh;
      background: var(--bg);
    }
    .workspace-sidebar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      position: sticky;
      top: 16px;
      height: calc(100vh - 40px);
    }
    .workspace-main { display:flex; flex-direction:column; gap:16px; min-width:0; }
    .sidebar-project {
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 14px;
    }
    .sidebar-project.active { background: var(--surface-3); border-color: var(--border-light); }
    .db-toolbar { display:grid; grid-template-columns:2fr repeat(3, minmax(130px,1fr)) auto; gap:8px; margin-bottom:12px; }
    @media (max-width: 1080px) {
      .workspace { grid-template-columns: 1fr; }
      .workspace-sidebar { position: static; height: auto; }
      .db-toolbar { grid-template-columns:1fr; }
    }
  </style>
</head>
<body class="theme-light">
  <div class="app workspace" id="app">
    <aside class="workspace-sidebar panel">
      <h1 style="font-size:20px;margin:0 0 12px;">Roadtrip</h1>
      <div class="segmented" id="navTabs"></div>
      <div class="panel" style="margin-top:16px; box-shadow:none;">
        <div class="panel-title"><h3>Projects</h3></div>
        <div class="list" id="sidebarProjects"></div>
      </div>
      <div class="stack-row" style="margin-top:auto;">
        <button class="btn" id="btnSeed">Demo</button>
        <button class="btn" id="btnExport">Export</button>
        <button class="btn" id="btnBackupRaw">Raw Backup</button>
        <label class="btn" for="importJsonInput">Import</label>
      </div>
      <input id="importJsonInput" type="file" accept="application/json" class="hidden" />
    </aside>
    <main class="workspace-main">
      <section class="panel">
        <div class="panel-title">
          <h2 id="viewTitle">Database</h2>
          <div class="mini" id="lastSavedLabel">—</div>
        </div>
        <div class="stats" id="stats"></div>
      </section>
      <section class="panel" id="viewContainer"></section>
    </main>
  </div>

  <script>
    (function() {
      const LKEY = 'roadtrip_v0_1';
      const CONFIG_KEY = 'roadtrip_v0_1_config';
      const ALL_PROJECTS_KEY = 'all';
      const VIEWS = ['database', 'project', 'import', 'settings'];
      const APP_TYPES = ['Daily Log', 'Braindump', 'Review', 'Tracker', 'Writing', 'Learning', 'Meta-App', 'Sonstiges'];
      const PROJECT_STATUS = ['aktiv', 'pausiert', 'archiviert'];
      const FEATURE_STATUS = ['Idee', 'geprüft', 'geplant', 'in Arbeit', 'teilweise umgesetzt', 'umgesetzt'];
      const FEATURE_CATEGORIES = ['UI', 'Workflow', 'Sync', 'KI', 'Import/Export', 'Darstellung', 'Datenmodell', 'Ansicht', 'Sonstiges'];
      const PRIORITIES = ['niedrig', 'mittel', 'hoch', 'kritisch'];
      const FEATURE_COLUMNS = FEATURE_STATUS;
      const TRELLO_LABEL_PREFIX = { project: 'P: ', category: 'C: ', priority: 'Prio: ' };
      const TRELLO_SYNC_START = '--- ROADTRIP_SYNC ---';
      const TRELLO_SYNC_END = '--- /ROADTRIP_SYNC ---';

      let S = defaultState();
      let C = defaultConfig();
      let ui = {
        view: 'database',
        editingProjectId: null,
        analysisDraftFeatures: [],
        activeProjectId: ALL_PROJECTS_KEY,
        filters: { status: 'alle', category: 'alle', search: '' },
        showKanban: false,
        importDraft: { html: '', prompt: '', projectId: '' },
        noteReview: { proposals: [], projectId: '', rawText: '', visible: false }
      };

      const $ = (id) => document.getElementById(id);
      const q = (sel, el = document) => el.querySelector(sel);
      const qq = (sel, el = document) => Array.from(el.querySelectorAll(sel));

      init();

      function defaultState() {
        return {
          version: 1,
          createdAt: new Date().toISOString(),
          _lastExported: new Date().toISOString(),
          projects: [],
          features: [],
          notes: [],
          analyses: []
        };
      }

      function defaultConfig() {
        return {
          theme: 'theme-dark',
          font: 'ui',
          gistId: '',
          gistToken: '',
          rawGistId: '',
          rawGistToken: '',
          openAiModel: 'gpt-5.4',
          trelloKey: '',
          trelloToken: '',
          trelloBoardId: ''
        };
      }

      function init() {
        load();
        wireBasics();
        renderAll();
      }

      function load() {
        try {
          const raw = localStorage.getItem(LKEY);
          if (raw) S = Object.assign(defaultState(), JSON.parse(raw));
        } catch (e) { console.warn('load state failed', e); }
        try {
          const raw = localStorage.getItem(CONFIG_KEY);
          if (raw) C = Object.assign(defaultConfig(), JSON.parse(raw));
        } catch (e) { console.warn('load config failed', e); }
        ensureDefaults();
      }

      function ensureDefaults() {
        if (!Array.isArray(S.projects)) S.projects = [];
        if (!Array.isArray(S.features)) S.features = [];
        if (!Array.isArray(S.notes)) S.notes = [];
        if (!Array.isArray(S.analyses)) S.analyses = [];
        S.features = S.features.map(ensureFeatureDefaults);
      }

      function save() {
        S._lastExported = new Date().toISOString();
        localStorage.setItem(LKEY, JSON.stringify(S));
        localStorage.setItem(CONFIG_KEY, JSON.stringify(C));
        $('lastSavedLabel').textContent = 'Gespeichert: ' + formatDateTime(S._lastExported);
        renderStats();
        renderSidebarProjects();
      }

      function wireBasics() {
        renderNav();
        $('btnSeed').addEventListener('click', seedDemo);
        $('btnExport').addEventListener('click', exportJson);
        $('btnBackupRaw').addEventListener('click', exportRawNotes);
        $('importJsonInput').addEventListener('change', importJson);
      }

      function renderAll() {
        applyTheme();
        if (!ui.activeProjectId) ui.activeProjectId = ALL_PROJECTS_KEY;
        renderNav();
        renderSidebarProjects();
        renderProjectSelects();
        renderStats();
        renderView();
        $('lastSavedLabel').textContent = 'Gespeichert: ' + formatDateTime(S._lastExported);
      }

      function applyTheme() {
        document.body.className = C.theme + (C.font === 'serif' ? ' font-serif' : '');
      }

      function renderNav() {
        const wrap = $('navTabs');
        wrap.innerHTML = '';
        VIEWS.forEach(v => {
          const b = document.createElement('button');
          b.className = 'seg' + (ui.view === v ? ' active' : '');
          b.textContent = ({database:'Database',project:'Project',import:'Import',settings:'Settings'})[v];
          b.addEventListener('click', () => { ui.view = v; renderNav(); renderView(); });
          wrap.appendChild(b);
        });
      }

      function renderStats() {
        const stats = {
          Projekte: S.projects.filter(p => p.status !== 'archiviert').length,
          Features: S.features.length,
          Offene: S.features.filter(f => ['Idee','geprüft','geplant','in Arbeit','teilweise umgesetzt'].includes(f.status)).length,
          Notizen: S.notes.filter(n => !n.processed).length
        };
        const el = $('stats');
        el.innerHTML = Object.entries(stats).map(([k,v]) => `
          <div class="stat">
            <div class="label">${escapeHtml(k)}</div>
            <div class="value">${v}</div>
          </div>
        `).join('');
      }

      function renderProjectSelects() {
        const options = [{value:'', label:'— Kein Projekt —'}].concat(S.projects.map(p => ({ value:p.id, label:p.title })));
        fillSelect($('htmlProjectSelect'), options, true);
        fillSelect($('projectType'), APP_TYPES);
        fillSelect($('projectStatus'), PROJECT_STATUS);
        if ($('htmlProjectSelect')) $('htmlProjectSelect').value = ui.importDraft.projectId || '';
        const typeCurrent = $('projectType')?.dataset.currentValue || APP_TYPES[0];
        const statusCurrent = $('projectStatus')?.dataset.currentValue || PROJECT_STATUS[0];
        if ($('projectType')) $('projectType').value = typeCurrent;
        if ($('projectStatus')) $('projectStatus').value = statusCurrent;
      }

      function renderView() {
        const c = $('viewContainer');
        if (ui.view === 'database') c.innerHTML = renderDatabaseView();
        if (ui.view === 'project') c.innerHTML = renderProjectWorkspace();
        if (ui.view === 'import') c.innerHTML = renderImportWorkspace();
        if (ui.view === 'settings') c.innerHTML = renderSettingsWorkspace();
        renderProjectSelects();
        if ($('themeSelect')) $('themeSelect').value = C.theme;
        if ($('fontSelect')) $('fontSelect').value = C.font;
        $('viewTitle').textContent = ({database:'Database',project:'Project',import:'Import',settings:'Settings'})[ui.view];
        wireDynamicView();
      }

      function wireDynamicView() {
        qq('[data-open-project]').forEach(btn => btn.addEventListener('click', () => {
          ui.activeProjectId = btn.dataset.openProject;
          renderSidebarProjects();
          renderView();
        }));
        const statusFilter = $('filterStatus');
        const catFilter = $('filterCategory');
        const search = $('filterSearch');
        const kanbanToggle = $('toggleKanban');
        if (statusFilter) statusFilter.addEventListener('change', e => { ui.filters.status = e.target.value; renderView(); });
        if (catFilter) catFilter.addEventListener('change', e => { ui.filters.category = e.target.value; renderView(); });
        if (search) search.addEventListener('input', e => { ui.filters.search = e.target.value; renderView(); });
        if (kanbanToggle) kanbanToggle.addEventListener('change', e => { ui.showKanban = e.target.checked; renderView(); });

        if ($('themeSelect')) $('themeSelect').addEventListener('change', e => { C.theme = e.target.value; applyTheme(); save(); });
        if ($('fontSelect')) $('fontSelect').addEventListener('change', e => { C.font = e.target.value; applyTheme(); save(); });
        if ($('gistId')) $('gistId').addEventListener('input', e => { C.gistId = e.target.value; save(); });
        if ($('gistToken')) $('gistToken').addEventListener('input', e => { C.gistToken = e.target.value; save(); });
        if ($('rawGistId')) $('rawGistId').addEventListener('input', e => { C.rawGistId = e.target.value; save(); });
        if ($('rawGistToken')) $('rawGistToken').addEventListener('input', e => { C.rawGistToken = e.target.value; save(); });
        if ($('openAiModel')) $('openAiModel').addEventListener('input', e => { C.openAiModel = e.target.value; save(); });
        if ($('trelloKey')) $('trelloKey').addEventListener('input', e => { C.trelloKey = e.target.value; save(); });
        if ($('trelloToken')) $('trelloToken').addEventListener('input', e => { C.trelloToken = e.target.value; save(); });
        if ($('trelloBoardId')) $('trelloBoardId').addEventListener('input', e => { C.trelloBoardId = e.target.value; save(); });
        if ($('btnTestTrello')) $('btnTestTrello').addEventListener('click', testTrelloConnection);
        if ($('btnSaveProject')) $('btnSaveProject').addEventListener('click', saveProjectFromForm);
        if ($('btnDeleteProject')) $('btnDeleteProject').addEventListener('click', deleteProjectFromForm);
        if ($('btnResetProjectForm')) $('btnResetProjectForm').addEventListener('click', resetProjectForm);
        if ($('btnStartNewProject')) $('btnStartNewProject').addEventListener('click', startNewProjectFromProjectView);
        if ($('btnStartNewProjectImport')) $('btnStartNewProjectImport').addEventListener('click', startNewProjectFromImportView);
        if ($('btnAddNote')) $('btnAddNote').addEventListener('click', addQuickNote);
        if ($('btnAnalyzeNote')) $('btnAnalyzeNote').addEventListener('click', buildNotePrompt);
        if ($('btnBuildReviewPrompt')) $('btnBuildReviewPrompt').addEventListener('click', buildNoteReviewPrompt);
        if ($('btnLoadNoteReview')) $('btnLoadNoteReview').addEventListener('click', loadNoteReviewProposals);
        if ($('btnClearNoteReview')) $('btnClearNoteReview').addEventListener('click', clearNoteReview);
        qq('[data-review-accept-new]').forEach(btn => btn.addEventListener('click', () => acceptNoteProposalAsNew(+btn.dataset.reviewAcceptNew)));
        qq('[data-review-accept-update]').forEach(btn => btn.addEventListener('click', () => acceptNoteProposalAsUpdate(+btn.dataset.reviewAcceptUpdate)));
        qq('[data-review-ignore]').forEach(btn => btn.addEventListener('click', () => ignoreNoteProposal(+btn.dataset.reviewIgnore)));
        if ($('htmlFileInput')) $('htmlFileInput').addEventListener('change', onHtmlFilePicked);
        if ($('htmlTextarea')) $('htmlTextarea').addEventListener('input', e => { ui.importDraft.html = e.target.value; });
        if ($('promptOutput')) $('promptOutput').addEventListener('input', e => { ui.importDraft.prompt = e.target.value; });
        if ($('htmlProjectSelect')) $('htmlProjectSelect').addEventListener('change', e => { ui.importDraft.projectId = e.target.value; });
        if ($('btnAnalyzeHtml')) $('btnAnalyzeHtml').addEventListener('click', analyzeHtmlLocal);
        if ($('btnBuildHtmlPrompt')) $('btnBuildHtmlPrompt').addEventListener('click', buildHtmlPrompt);
        if ($('btnImportJsonResult')) $('btnImportJsonResult').addEventListener('click', importFeatureLinesFromPrompt);
        if ($('btnCopyPrompt')) $('btnCopyPrompt').addEventListener('click', copyPrompt);
        if ($('btnFeatureFromPrompt')) $('btnFeatureFromPrompt').addEventListener('click', importFeatureLinesFromPrompt);

        qq('[data-edit-project]').forEach(btn => btn.addEventListener('click', () => editProject(btn.dataset.editProject)));
        qq('[data-delete-project]').forEach(btn => btn.addEventListener('click', () => deleteProject(btn.dataset.deleteProject)));
        qq('[data-delete-note]').forEach(btn => btn.addEventListener('click', () => deleteNote(btn.dataset.deleteNote)));
        qq('[data-mark-note]').forEach(btn => btn.addEventListener('click', () => markNoteProcessed(btn.dataset.markNote)));

      function fillSelect(el, values, objectsMode) {
        if (!el) return;
        let items = values;
        if (!objectsMode) items = values.map(v => ({ value:v, label:v }));
        el.innerHTML = items.map(item => `<option value="${escapeAttr(item.value)}">${escapeHtml(item.label)}</option>`).join('');
      }

      function getFilteredFeatures() {
        const p = ui.activeProjectId || ALL_PROJECTS_KEY;
        const st = ui.filters.status || 'alle';
        const cat = ui.filters.category || 'alle';
        const term = (ui.filters.search || '').trim().toLowerCase();
        return S.features.filter(f => {
          if (p !== ALL_PROJECTS_KEY && f.projectId !== p) return false;
          if (st !== 'alle' && f.status !== st) return false;
          if (cat !== 'alle' && f.category !== cat) return false;
          if (term) {
            const blob = [f.title, f.description, f.category, f.priority, getProjectTitle(f.projectId)].join(' ').toLowerCase();
            if (!blob.includes(term)) return false;
          }
          return true;
        }).sort((a,b) => (b.updatedAt||'').localeCompare(a.updatedAt||''));
      }

      function getFilteredNotes() {
        const p = ui.activeProjectId || ALL_PROJECTS_KEY;
        const term = (ui.filters.search || '').trim().toLowerCase();
        return S.notes.filter(n => {
          if (p !== ALL_PROJECTS_KEY && n.projectId !== p) return false;
          if (term) {
            const blob = [n.text, getProjectTitle(n.projectId)].join(' ').toLowerCase();
            if (!blob.includes(term)) return false;
          }
          return true;
        }).sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
      }

      function saveProjectFromForm() {
        const title = $('projectTitle').value.trim();
        if (!title) return alert('Bitte einen Projekttitel eintragen.');
        const data = {
          title,
          type: $('projectType').value,
          status: $('projectStatus').value,
          summary: $('projectSummary').value.trim(),
          tags: splitTags($('projectTags').value)
        };
        let savedProjectId = ui.editingProjectId || '';
        if (ui.editingProjectId) {
          const now = new Date().toISOString();
          const p = S.projects.find(x => x.id === ui.editingProjectId);
          if (!p) return;
          Object.assign(p, data, { updatedAt: now });
        } else {
          const created = createProjectFromData(data);
          savedProjectId = created.id;
        }
        ui.activeProjectId = savedProjectId;
        ui.editingProjectId = savedProjectId;
        ui.importDraft.projectId = savedProjectId;
        save();
        renderSidebarProjects();
        renderProjectSelects();
        renderView();
      }

      function createProjectFromData(data) {
        const now = new Date().toISOString();
        const created = Object.assign({ id: uid('p'), createdAt: now, lastHtmlImportedAt: '', lastAnalyzedAt: '' }, data, { updatedAt: now });
        S.projects.push(created);
        return created;
      }

      function editProject(id) {
        const p = S.projects.find(x => x.id === id);
        if (!p) return;
        ui.editingProjectId = id;
        $('projectTitle').value = p.title || '';
        $('projectType').value = p.type || APP_TYPES[0];
        $('projectStatus').value = p.status || PROJECT_STATUS[0];

      function heuristicsFromHtml(html) {
        const lower = html.toLowerCase();
        const title = matchGroup(html, /<title>(.*?)<\/title>/i) || 'Unbekannte App';
        const featureSet = new Set();

        const rules = [
          ['dark mode', 'Dark Mode'],
          ['light mode', 'Light Mode'],
          ['e-ink', 'E-Ink Modus'],
          ['eink', 'E-Ink Modus'],
          ['gist', 'GitHub Gist Synchronisation'],
          ['localstorage', 'Lokaler Datenspeicher'],
          ['csv', 'CSV Export/Import'],
          ['json', 'JSON Export/Import'],
          ['canvas', 'Canvas / Kartenansicht'],
          ['kanban', 'Kanban-Ansicht'],
          ['table', 'Tabellenansicht'],
          ['card', 'Kartenansicht'],
          ['prompt', 'Prompt-Weitergabe / Prompt-Builder'],
          ['openai', 'OpenAI API Integration'],
          ['fetch(', 'Externe Requests / Sync oder API'],
          ['serviceworker', 'PWA / Offline-Komponente'],
          ['manifest', 'PWA Manifest-Unterstützung'],
          ['textarea', 'Freitext- / Eingabefeld'],
          ['filereader', 'Dateiimport'],
          ['drag', 'Drag & Drop / direkte Interaktion'],
          ['theme', 'Theme-Umschaltung']
        ];
        rules.forEach(([needle, feature]) => { if (lower.includes(needle)) featureSet.add(feature); });

        const appType = (() => {
          if (lower.includes('daily') || lower.includes('journal')) return 'Daily Log';
          if (lower.includes('brain') || lower.includes('braindump')) return 'Braindump';
          if (lower.includes('review')) return 'Review';
          if (lower.includes('track')) return 'Tracker';
          if (lower.includes('story') || lower.includes('prosa')) return 'Writing';
          return 'Meta-App';
        })();

        const projectSummary = `${title} wirkt wie eine ${appType}-App. Lokal erkannt wurden ${featureSet.size ? Array.from(featureSet).slice(0,6).join(', ') : 'noch keine klaren Module'}. Diese Erstfassung ist heuristisch und sollte mit einer KI-Analyse gegen die echte HTML-Struktur geprüft werden.`;
        return { appType, projectSummary, features: Array.from(featureSet) };
      }

      function loadNoteReviewProposals() {
        const raw = $('noteReviewJsonInput') ? $('noteReviewJsonInput').value.trim() : '';

          targetFeatureTitle: String(p.targetFeatureTitle || '').trim(),

        S.features.push(ensureFeatureDefaults({

      function acceptNoteProposalAsUpdate(idx) {
        const proposal = ui.noteReview.proposals.find(p => p._idx === idx);
        if (!proposal || proposal._done) return;
        const targetId = proposal.targetFeatureId;
        const feature = targetId ? S.features.find(x => x.id === targetId) : null;
        if (!feature) return alert('Ziel-Feature nicht gefunden. Bitte manuell zuordnen.');
        // Defensive: only update if value is non-empty and meaningfully different
        if (proposal.suggestedTitle && proposal.suggestedTitle !== feature.title) {
          if (confirm('Titel ändern von:\n"' + feature.title + '"\nauf:\n"' + proposal.suggestedTitle + '"?')) {
            feature.title = proposal.suggestedTitle;
          }
        }
        if (proposal.suggestedDescription) {
          const existingDesc = String(feature.description || '').trim();
          if (!existingDesc || isGenericFeatureDescription(existingDesc)) {
            feature.description = proposal.suggestedDescription;
          } else if (existingDesc !== proposal.suggestedDescription) {
            if (confirm('Beschreibung ersetzen?\nAlt: ' + shorten(existingDesc, 80) + '\nNeu: ' + shorten(proposal.suggestedDescription, 80))) {
              feature.description = proposal.suggestedDescription;
            }
          }
        }
        if (proposal.suggestedCategory && proposal.suggestedCategory !== 'Sonstiges' && feature.category === 'Sonstiges') {
          feature.category = proposal.suggestedCategory;
        }
        if (proposal.suggestedStatus && FEATURE_STATUS.includes(proposal.suggestedStatus)) {
          if (getFeatureStatusRank(proposal.suggestedStatus) > getFeatureStatusRank(feature.status)) {
            if (confirm('Status anheben auf "' + proposal.suggestedStatus + '"?')) {
              feature.status = proposal.suggestedStatus;
            }
          }
        }
        feature.updatedAt = new Date().toISOString();
        proposal._done = true;
        save();
        renderView();
      }

        const htmlSelect = $('htmlProjectSelect');

      function mapJsonAnalysisStatus(status) {
        const normalized = String(status || '').trim().toLowerCase();
        if (normalized === 'umgesetzt') return 'umgesetzt';
        if (normalized === 'teilweise umgesetzt') return 'teilweise umgesetzt';
        if (normalized === 'vorbereitet') return 'geprüft';
        return 'geprüft';
      }

      function getFeatureStatusRank(status) {
        const order = ['Idee', 'geprüft', 'geplant', 'in Arbeit', 'teilweise umgesetzt', 'umgesetzt'];
        const idx = order.indexOf(status);
        return idx === -1 ? 0 : idx;
      }

      function isGenericFeatureDescription(description) {
        const normalized = normalizeText(description);
        if (!normalized) return true;
        const generic = [
          'aus analyse-json übernommen.',
          'aus prompt-/analyseblock übernommen.',
          'aus analyse json übernommen.',
          'aus analyse übernommen.'
        ];
        return generic.includes(normalized);
      }

      function getMatchingProjectFeature(projectId, title) {
        const normalizedTitle = normalizeText(title);
        if (!normalizedTitle) return null;
        return S.features.find(x => x.projectId === projectId && normalizeText(x.title) === normalizedTitle) || null;
      }

      function reconcileImportedFeature(existing, imported, nowIso) {
        const importedStatus = mapJsonAnalysisStatus(imported.status);
        const importedDescription = String(imported.description || '').trim();
        const importedCategory = FEATURE_CATEGORIES.includes(imported.category) ? imported.category : 'Sonstiges';
        const changes = [];

        if (importedStatus === 'umgesetzt' && getFeatureStatusRank(existing.status) < getFeatureStatusRank('umgesetzt')) {
          existing.status = 'umgesetzt';
          changes.push('status');
        } else if (importedStatus === 'teilweise umgesetzt' && getFeatureStatusRank(existing.status) < getFeatureStatusRank('teilweise umgesetzt')) {
          existing.status = 'teilweise umgesetzt';
          changes.push('status');
        }

        const existingDescription = String(existing.description || '').trim();
        const allowDescriptionUpdate = importedDescription && (!existingDescription || isGenericFeatureDescription(existingDescription));
        if (allowDescriptionUpdate && existingDescription !== importedDescription) {
          existing.description = importedDescription;
          changes.push('description');
        }

        if (importedCategory !== 'Sonstiges' && existing.category === 'Sonstiges' && existing.category !== importedCategory) {
          existing.category = importedCategory;
          changes.push('category');
        }

        if (changes.length) existing.updatedAt = nowIso;
        return changes;
      }

      function reconcileImportedFeaturesForProject(projectId, featureSource, nowIso) {
        const report = {
          created: [],
          updated: [],
          unchanged: [],
          possibleStaleFeatures: []
        };
        const matchedFeatureIds = new Set();

        featureSource.forEach(item => {
          if (!item || typeof item !== 'object') return;
          const title = String(item.title || '').trim();
          if (!title) return;

          const existing = getMatchingProjectFeature(projectId, title);
          if (existing) {
            matchedFeatureIds.add(existing.id);
            const changes = reconcileImportedFeature(existing, item, nowIso);
            if (changes.length) {
              report.updated.push({ id: existing.id, title: existing.title, changes });
            } else {
              report.unchanged.push({ id: existing.id, title: existing.title });
            }
            return;
          }

          const description = String(item.description || '').trim() || 'Aus Analyse-JSON übernommen.';
          const category = FEATURE_CATEGORIES.includes(item.category) ? item.category : 'Sonstiges';
          const created = ensureFeatureDefaults({
            id: uid('f'),
            projectId,
            title,
            description,
            category,
            status: mapJsonAnalysisStatus(item.status),
            priority: 'mittel',
            sourceType: 'html-analysis',
            sourceNoteIds: [],
            createdAt: nowIso,
            updatedAt: nowIso
          });
          S.features.push(created);
          matchedFeatureIds.add(created.id);
          report.created.push({ id: created.id, title: created.title });
        });

        report.possibleStaleFeatures = S.features
          .filter(f => f.projectId === projectId && !matchedFeatureIds.has(f.id))
          .map(f => ({ id: f.id, title: f.title, status: f.status }));

        return report;
      }

      function extractJsonObjectFromText(text) {
        const source = String(text || '').trim();
        if (!source) throw new Error('invalid-json-not-found');

        const unfenced = source
          .replace(/^```(?:json)?\s*/i, '')
          .replace(/\s*```$/i, '')
          .trim();

        const starts = [];
        for (let i = 0; i < unfenced.length; i++) {
          if (unfenced[i] === '{') starts.push(i);
        }
        if (!starts.length) throw new Error('invalid-json-not-found');

        for (const start of starts) {
          let depth = 0;
          let inString = false;
          let escaped = false;
          for (let i = start; i < unfenced.length; i++) {
            const ch = unfenced[i];
            if (inString) {
              if (escaped) {
                escaped = false;
              } else if (ch === '\\') {
                escaped = true;
              } else if (ch === '"') {
                inString = false;
              }
              continue;
            }
            if (ch === '"') {
              inString = true;
              continue;
            }
            if (ch === '{') depth++;
            if (ch === '}') {
              depth--;
              if (depth === 0) {
                const candidate = unfenced.slice(start, i + 1).trim();
                try {
                  JSON.parse(candidate);
                  return candidate;
                } catch (err) {
                  break;
                }
              }
            }
          }
        }

        throw new Error('invalid-json-not-found');
      }

      function importJsonAnalysisFromPrompt(text, projectId) {
        let parsed;
        try {
          parsed = JSON.parse(String(text || '{}'));
        } catch (err) {
          throw new Error('invalid-analysis-json');
        }
        if (!parsed || typeof parsed !== 'object') throw new Error('unsupported-top-level-structure');
        if (Array.isArray(parsed)) throw new Error('unsupported-top-level-structure');
        const p = S.projects.find(x => x.id === projectId);
        if (!p) throw new Error('project-not-found');

        const now = new Date().toISOString();
        if (typeof parsed.projectSummary === 'string' && parsed.projectSummary.trim()) p.summary = parsed.projectSummary.trim();
        if (typeof parsed.appType === 'string' && parsed.appType.trim()) p.type = parsed.appType.trim();
        p.lastAnalyzedAt = now;
        p.updatedAt = now;

        const featureSource = Array.isArray(parsed.features) ? parsed.features
          : Array.isArray(parsed.featureCandidates) ? parsed.featureCandidates
          : Array.isArray(parsed.detectedFeatures) ? parsed.detectedFeatures
          : null;
        const hasFeatureKey = Object.prototype.hasOwnProperty.call(parsed, 'features')
          || Object.prototype.hasOwnProperty.call(parsed, 'featureCandidates')
          || Object.prototype.hasOwnProperty.call(parsed, 'detectedFeatures');
        if (!hasFeatureKey || !featureSource) throw new Error('missing-features-array');
        if (featureSource.length === 0) throw new Error('empty-features-array');
        const reconciliation = reconcileImportedFeaturesForProject(projectId, featureSource, now);

        const views = Array.isArray(parsed.views) ? parsed.views.map(x => String(x || '').trim()).filter(Boolean) : [];
        const technicalNotes = Array.isArray(parsed.technicalNotes) ? parsed.technicalNotes.map(x => String(x || '').trim()).filter(Boolean) : [];
        const unclearPoints = Array.isArray(parsed.unclearPoints) ? parsed.unclearPoints.map(x => String(x || '').trim()).filter(Boolean) : [];
        const hasStructuredAnalysis = views.length || technicalNotes.length || unclearPoints.length;
        const hasReconciliationResults = reconciliation.created.length || reconciliation.updated.length || reconciliation.unchanged.length || reconciliation.possibleStaleFeatures.length;
        if (hasStructuredAnalysis || hasReconciliationResults) {
          S.analyses.push({
            id: uid('a'),
            type: 'html-project-analysis',
            projectId,
            createdAt: now,
            resultRaw: text,
            resultParsed: {
              appType: typeof parsed.appType === 'string' ? parsed.appType : '',
              projectSummary: typeof parsed.projectSummary === 'string' ? parsed.projectSummary : '',
              views,
              technicalNotes,
              unclearPoints,
              reconciliation: hasReconciliationResults ? reconciliation : undefined
            }
          });
        }

        return reconciliation;
      }

      function parseRoadtripSyncBlock(desc) {
        const source = String(desc || '');
        const start = source.indexOf(TRELLO_SYNC_START);
        const end = source.indexOf(TRELLO_SYNC_END);
        if (start === -1 || end === -1 || end < start) {
          return { meta: null, body: source.trim() };
        }
        const block = source.slice(start + TRELLO_SYNC_START.length, end).trim();
        const body = source.slice(end + TRELLO_SYNC_END.length).replace(/^\s+/, '');
        const meta = {};
        block.split(/\n+/).forEach(line => {
          const idx = line.indexOf(':');
          if (idx === -1) return;
          const key = line.slice(0, idx).trim();
          const value = line.slice(idx + 1).trim();
          if (key) meta[key] = value;
        });
        return { meta, body };
      }

      async function trelloRequest(path, options) {
        validateTrelloConfig();
        const method = (options && options.method) || 'GET';
        const params = new URLSearchParams({
          key: C.trelloKey,
          token: C.trelloToken
        });
        const rawQuery = options && options.query ? options.query : {};
        Object.keys(rawQuery).forEach(key => {
          const value = rawQuery[key];
          if (value === undefined || value === null || value === '') return;
          params.set(key, value);
        });

        const url = 'https://api.trello.com/1' + path + '?' + params.toString();
        const fetchOptions = { method, headers: {} };
        if (options && options.body) {
          fetchOptions.headers['Content-Type'] = 'application/json';
          fetchOptions.body = JSON.stringify(options.body);
        }
        const res = await fetch(url, fetchOptions);
        const text = await res.text();
        let data = null;
        try { data = text ? JSON.parse(text) : null; } catch (e) { data = text; }
        if (!res.ok) {
          const msg = data && data.message ? data.message : (typeof data === 'string' ? data : ('HTTP ' + res.status));
          throw new Error(msg);
        }
        return data;
      }

      // ─── TRELLO PULL & MERGE ──────────────────────────────────────────────────

      function parseTrelloLabels(idLabels, allLabels) {
        // Returns { project: [...], category: [...], priority: [...], other: [] }
        const result = { project: [], category: [], priority: [], other: [] };
        (idLabels || []).forEach(id => {
          const label = (allLabels || []).find(l => l.id === id);
          if (!label || !label.name) return;
          const name = label.name;
          if (name.startsWith(TRELLO_LABEL_PREFIX.project)) {
            result.project.push(name.slice(TRELLO_LABEL_PREFIX.project.length).trim());
          } else if (name.startsWith(TRELLO_LABEL_PREFIX.category)) {
            result.category.push(name.slice(TRELLO_LABEL_PREFIX.category.length).trim());
          } else if (name.startsWith(TRELLO_LABEL_PREFIX.priority)) {
            result.priority.push(name.slice(TRELLO_LABEL_PREFIX.priority.length).trim());
          } else {
            result.other.push(name);
          }
        });
        return result;
      }

      function mergeTrelloIntoFeature(feature, card, allLabels, allLists) {
        // Returns { changed: boolean, conflicts: string[] }
        const snap = feature.trello.lastSyncedSnapshot || {};
        const changed = [];
        const conflicts = [];

        const parsed = parseRoadtripSyncBlock(card.desc || '');
        if (!parsed.meta) {
          feature.trello.syncState = 'conflict';
          feature.trello.syncBlockedReason = 'invalid-sync-block';
          return { changed: false, conflicts: ['invalid-sync-block'] };
        }

        // Validate feature ID in block
        if (parsed.meta.roadtripFeatureId && parsed.meta.roadtripFeatureId !== feature.id) {
          feature.trello.syncState = 'conflict';
          feature.trello.syncBlockedReason = 'feature-id-mismatch';
          return { changed: false, conflicts: ['feature-id-mismatch'] };
        }

        const trelloTitle = (card.name || '').trim();
        const trelloDesc = (parsed.body || '').trim();

        // Resolve list name → status
        const list = (allLists || []).find(l => l.id === card.idList);
        const trelloStatus = list ? list.name.trim() : '';

        // Parse labels
        const labelGroups = parseTrelloLabels(card.idLabels || [], allLabels);

        const localTitle = String(feature.title || '').trim();
        const snapTitle = String(snap.title || '').trim();
        const localDesc = String(feature.description || '').trim();
        const snapDesc = String(snap.description || '').trim();
        const localStatus = String(feature.status || '').trim();
        const snapStatus = String(snap.status || '').trim();
        const localPriority = String(feature.priority || '').trim();
        const snapPriority = String(snap.priority || '').trim();
        const localCategory = String(feature.category || '').trim();
        const snapCategory = String(snap.category || '').trim();

        // ── title ──
        const titleChangedTrello = trelloTitle !== snapTitle;
        const titleChangedLocal = localTitle !== snapTitle;
        if (titleChangedTrello && !titleChangedLocal) {
          feature.title = trelloTitle;
          changed.push('title');
        } else if (titleChangedTrello && titleChangedLocal) {
          conflicts.push('title');
        }

        // ── description ──
        const descChangedTrello = trelloDesc !== snapDesc;
        const descChangedLocal = localDesc !== snapDesc;
        if (descChangedTrello && !descChangedLocal) {
          feature.description = trelloDesc;
          changed.push('description');
        } else if (descChangedTrello && descChangedLocal) {
          conflicts.push('description');
        }

        // ── status: Trello wins when changed ──
        if (trelloStatus && FEATURE_STATUS.includes(trelloStatus)) {
          if (trelloStatus !== snapStatus) {
            feature.status = trelloStatus;
            changed.push('status');
          }
        }

        // ── priority: same 3-way logic as title/description ──
        if (labelGroups.priority.length > 1) {
          conflicts.push('priority-multiple-labels');
        } else if (labelGroups.priority.length === 1) {
          const tp = labelGroups.priority[0];
          if (PRIORITIES.includes(tp)) {
            const prioChangedTrello = tp !== snapPriority;
            const prioChangedLocal = localPriority !== snapPriority;
            if (prioChangedTrello && !prioChangedLocal) {
              feature.priority = tp;
              changed.push('priority');
            } else if (prioChangedTrello && prioChangedLocal) {
              conflicts.push('priority');
            }
          }
        }

        // ── category: same 3-way logic as title/description ──
        if (labelGroups.category.length > 1) {
          conflicts.push('category-multiple-labels');
        } else if (labelGroups.category.length === 1) {
          const tc = labelGroups.category[0];
          if (FEATURE_CATEGORIES.includes(tc)) {
            const catChangedTrello = tc !== snapCategory;
            const catChangedLocal = localCategory !== snapCategory;
            if (catChangedTrello && !catChangedLocal) {
              feature.category = tc;
              changed.push('category');
            } else if (catChangedTrello && catChangedLocal) {
              conflicts.push('category');
            }
          }
        }

        // ── project: never overwritten, validate only ──
        if (labelGroups.project.length > 1) {
          conflicts.push('project-multiple-labels');
        } else if (labelGroups.project.length === 1) {
          const expectedProjectTitle = String(getProjectTitle(feature.projectId) || '').trim();
          if (normalizeText(labelGroups.project[0]) !== normalizeText(expectedProjectTitle)) {
            conflicts.push('project-label-mismatch');
          }
        }

        return { changed: changed.length > 0, changedFields: changed, conflicts };
      }

      async function pullFeatureFromTrello(featureId, options) {
        const silent = !!(options && options.silent);
        const feature = S.features.find(x => x.id === featureId);
        if (!feature) return { ok: false, error: 'feature-not-found', featureId };
        ensureFeatureDefaults(feature);

        if (!feature.trello || !feature.trello.cardId) {
          if (!silent) alert('Dieses Feature hat noch keine Trello-Verknüpfung. Erst nach Trello pushen.');
          return { ok: false, error: 'not-linked', featureId };
        }

        try {
          validateTrelloConfig();
          const [card, allLabels, allLists] = await Promise.all([
            trelloRequest('/cards/' + encodeURIComponent(feature.trello.cardId), {
              query: { fields: 'id,name,desc,idList,idLabels,url,shortUrl' }
            }),
            getBoardLabels(),
            getBoardLists()
          ]);

          const mergeResult = mergeTrelloIntoFeature(feature, card, allLabels, allLists);
          const hardFail = mergeResult.conflicts.length > 0 &&
            (mergeResult.conflicts[0] === 'invalid-sync-block' || mergeResult.conflicts[0] === 'feature-id-mismatch');

          const now = new Date().toISOString();

          if (hardFail) {
            // syncState already set inside mergeTrelloIntoFeature, timestamps NOT updated
            save();
            renderView();
            if (!silent) alert('Pull abgebrochen: ' + mergeResult.conflicts[0]);
            return { ok: false, error: mergeResult.conflicts[0], featureId };
          }

          if (mergeResult.conflicts.length > 0) {
            // Soft conflicts: state is conflict, but no timestamps (not a successful sync)
            feature.trello.syncState = 'conflict';
            feature.trello.syncBlockedReason = 'merge-conflicts: ' + mergeResult.conflicts.join(', ');
            save();
            renderView();
            if (!silent) alert('Pull mit Konflikten:\n' + mergeResult.conflicts.join('\n') + '\nBitte manuell prüfen.');
            return { ok: 'conflict', conflicts: mergeResult.conflicts, featureId };
          }

          // Clean pull/merge — set timestamps only now
          feature.trello.lastPulledAt = now;
          feature.trello.lastSyncedAt = now;
          feature.trello.syncState = 'linked';
          feature.trello.syncBlockedReason = '';
          feature.trello.lastSyncDirection = mergeResult.changed ? 'merge' : 'pull';
          feature.trello.lastSyncedSnapshot = getFeatureSnapshot(feature);
          if (mergeResult.changed) feature.updatedAt = now;

          save();
          renderView();

          if (!silent) {
            if (mergeResult.changed) {
              alert('Pull erfolgreich. Geänderte Felder: ' + (mergeResult.changedFields || []).join(', '));
            } else {
              alert('Pull erfolgreich. Keine Änderungen.');
            }
          }
          return { ok: true, changed: mergeResult.changed, changedFields: mergeResult.changedFields, featureId };

        } catch (err) {
          feature.trello.syncState = 'conflict';
          feature.trello.lastSyncError = err.message;
          feature.trello.syncBlockedReason = 'pull-failed';
          save();
          renderView();
          if (!silent) alert('Trello-Pull fehlgeschlagen: ' + err.message);
          return { ok: false, error: err.message, featureId };
        }
      }

      async function pullActiveProjectFromTrello() {
        const projectId = ui.editingProjectId || ui.activeProjectId;
        if (!projectId || projectId === ALL_PROJECTS_KEY) return alert('Kein konkretes Projekt ausgewählt.');
        const features = S.features.filter(f => f.projectId === projectId && f.trello && f.trello.cardId);
        if (!features.length) return alert('Keine verknüpften Trello-Karten in diesem Projekt.');
        if (!confirm(features.length + ' Trello-Karten pullen?')) return;
        let countOk = 0, countConflict = 0;
        const failed = [];
        for (const feature of features) {
          const result = await pullFeatureFromTrello(feature.id, { silent: true });
          if (!result || result.ok === false) {
            failed.push(feature.title);
          } else if (result.ok === 'conflict') {
            countConflict++;
          } else {
            countOk++;
          }
        }
        const parts = ['Projekt-Pull abgeschlossen.', 'Erfolgreich: ' + countOk];
        if (countConflict) parts.push('Mit Konflikten: ' + countConflict);
        if (failed.length) parts.push('Fehlgeschlagen: ' + failed.join(', '));
        alert(parts.join('\n'));
      }

      // ─────────────────────────────────────────────────────────────────────────

      async function syncFeatureToTrello(featureId, options) {
        const silent = !!(options && options.silent);
        const feature = S.features.find(x => x.id === featureId);
        if (!feature) return;
        ensureFeatureDefaults(feature);

        try {
          validateTrelloConfig();
          const projectTitle = getProjectTitle(feature.projectId);
          const [list, projectLabel, categoryLabel, priorityLabel] = await Promise.all([
            ensureTrelloListByName(feature.status || 'Idee'),
            ensureTrelloLabelByName(getProjectLabelName(projectTitle), 'blue'),
            ensureTrelloLabelByName(getCategoryLabelName(feature.category), 'green'),
            ensureTrelloLabelByName(getPriorityLabelName(feature.priority), 'red')
          ]);

          feature.trello.boardId = C.trelloBoardId;
          feature.trello.listId = list.id;
          feature.trello.projectLabelId = projectLabel.id;
          feature.trello.categoryLabelId = categoryLabel.id;
          feature.trello.priorityLabelId = priorityLabel.id;
          feature.trello.enabled = true;
          feature.trello.lastSyncError = '';
          feature.trello.syncBlockedReason = '';
          feature.trello.syncState = feature.trello.cardId ? 'dirty-roadtrip' : 'unlinked';

          const desc = buildTrelloCardDescription(feature);
          let card = null;

          if (feature.trello.cardId) {
            card = await trelloRequest('/cards/' + encodeURIComponent(feature.trello.cardId), {
              method: 'PUT',
              query: {
                name: feature.title,
                desc: desc,
                idList: list.id,
                pos: 'bottom'
              }
            });
          } else {
            card = await trelloRequest('/cards', {
              method: 'POST',
              query: {
                idList: list.id,
                name: feature.title,
                desc: desc,
                pos: 'bottom'
              }
            });
          }

          feature.trello.cardId = card.id;
          feature.trello.cardUrl = card.url || card.shortUrl || feature.trello.cardUrl || '';
          feature.trello.listId = list.id;

          await assignLabelsToCard(card.id, [projectLabel.id, categoryLabel.id, priorityLabel.id]);
          if (!feature.trello.cardUrl) {
            const freshCard = await fetchTrelloCard(card.id);
            feature.trello.cardUrl = freshCard && (freshCard.url || freshCard.shortUrl) || '';
          }

          const now = new Date().toISOString();
          feature.trello.syncState = 'linked';
          feature.trello.lastSyncDirection = 'push';
          feature.trello.lastSyncedAt = now;
          feature.trello.lastPushedAt = now;
          feature.trello.lastSyncedSnapshot = getFeatureSnapshot(feature);
          feature.updatedAt = now;

          save();
          renderView();
          if (!silent) alert('Feature nach Trello synchronisiert: ' + feature.title);
        } catch (err) {
          feature.trello.syncState = 'conflict';
          feature.trello.lastSyncError = err.message;
          feature.trello.syncBlockedReason = 'push-failed';
          save();
          renderView();
          if (!silent) alert('Trello-Sync fehlgeschlagen: ' + err.message);
          throw err;
        }
      }

      async function syncActiveProjectToTrello() {
        const projectId = ui.editingProjectId || ui.activeProjectId;
        if (!projectId || projectId === ALL_PROJECTS_KEY) return alert('Kein konkretes Projekt ausgewählt.');
        const features = S.features.filter(f => f.projectId === projectId);
        if (!features.length) return alert('Dieses Projekt hat keine Features.');
        if (!confirm(features.length + ' Features nach Trello synchronisieren?')) return;
        let ok = 0;
        const failed = [];
        for (const feature of features) {
          try {
            await syncFeatureToTrello(feature.id, { silent: true });
            ok++;
          } catch (err) {
            failed.push(feature.title);
          }
        }
        if (failed.length) {
          alert('Projekt-Sync abgeschlossen. Erfolgreich: ' + ok + '\nFehlgeschlagen: ' + failed.join(', '));
        } else {
          alert('Projekt-Sync abgeschlossen. Erfolgreich: ' + ok);
        }
      }

      function openTrelloCard(featureId) {
        const feature = S.features.find(x => x.id === featureId);
        if (!feature || !feature.trello || !feature.trello.cardId) return;
        const url = feature.trello.cardUrl || getTrelloCardUrl(feature.trello.cardId);
        if (url) window.open(url, '_blank', 'noopener');
      }

      function uid(prefix) {
        return prefix + '_' + Math.random().toString(36).slice(2, 10);
      }

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }
      function escapeAttr(s) { return escapeHtml(s); }

      function normalizeText(s) {
        return String(s || '').toLowerCase().replace(/\s+/g, ' ').trim();
      }

      function matchGroup(text, re) {
        const m = text.match(re);
        return m && m[1] ? m[1].trim() : '';
      }

      function formatDateTime(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        if (isNaN(d)) return iso;
        return d.toLocaleString('de-DE', { dateStyle:'short', timeStyle:'short' });
      }

      function shorten(s, n) {
        s = String(s || '');
        return s.length > n ? s.slice(0, n - 1) + '…' : s;
      }

      function downloadJson(filename, data) {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 800);
      }
    })();
  </script>
