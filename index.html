      function buildCleanupPromptFromPromptOutput() {
        const text = $('promptOutput') ? $('promptOutput').value.trim() : '';
        if (!text) return alert('Kein JSON/Prompt-Text vorhanden.');
        const projectId = getImportTargetProjectId();
        if (!projectId) return alert('Bitte zuerst ein Projekt auswählen.');
        let extractedJson = null;
        try { extractedJson = extractJsonObjectFromText(text); } catch (err) { extractedJson = null; }
        if (!extractedJson) return alert('Kein Analyse-JSON erkannt. Für Cleanup wird ein JSON mit Features benötigt.');
        try {
          const prepared = parseAnalysisJsonForCleanup(extractedJson, projectId);
          startCleanupReview(projectId, prepared.parsedFeatures, extractedJson, 'import-cleanup');
        } catch (err) {
          if (err && err.message === 'missing-features-array') return alert("Analyse-JSON erkannt, aber es enthält kein 'features'-Array.");
          if (err && err.message === 'empty-features-array') return alert("Analyse-JSON erkannt, aber es wurden keine Features zurückgegeben.");
          if (err && err.message === 'unsupported-top-level-structure') return alert('Analyse-JSON erkannt, aber die Top-Level-Struktur wird nicht unterstützt.');
          if (err && err.message === 'invalid-analysis-json') return alert('Kein gültiges Analyse-JSON erkannt.');
          throw err;
        }
      }

      function buildProjectDedupePrompt() {
        const projectId = ui.activeProjectId !== ALL_PROJECTS_KEY ? ui.activeProjectId : (ui.importDraft.projectId || '');
        if (!projectId) return alert('Bitte ein konkretes Projekt auswählen.');
        const currentFeatures = getVisibleFeatures(S.features)
          .filter(f => f.projectId === projectId)
          .map(f => normalizeImportedFeature(f))
          .filter(Boolean);
        if (!currentFeatures.length) return alert('Dieses Projekt hat noch keine Features für Dedupe.');
        startCleanupReview(projectId, currentFeatures, '', 'project-dedupe');
      }

      function startImportCleanupFromPrompt() {
        const text = $('promptOutput').value.trim();
        if (!text) return alert('Kein Text vorhanden.');
        const projectId = getImportTargetProjectId();
        if (!projectId) return alert('Bitte zuerst ein Projekt auswählen (HTML-Analyse oder Quick-Notiz).');
        let extractedJson = null;
        try { extractedJson = extractJsonObjectFromText(text); } catch (err) { extractedJson = null; }
        if (!extractedJson) return alert('Kein Analyse-JSON erkannt. Für direkten Import nutze bei Bedarf den Fallback-Button.');
        try {
          const prepared = parseAnalysisJsonForCleanup(extractedJson, projectId);
          startCleanupReview(projectId, prepared.parsedFeatures, extractedJson, 'import-cleanup');
        } catch (err) {
          if (err && err.message === 'missing-features-array') return alert("Analyse-JSON erkannt, aber es enthält kein 'features'-Array.");
          if (err && err.message === 'empty-features-array') return alert("Analyse-JSON erkannt, aber es wurden keine Features zurückgegeben.");
          if (err && err.message === 'unsupported-top-level-structure') return alert('Analyse-JSON erkannt, aber die Top-Level-Struktur wird nicht unterstützt.');
          if (err && err.message === 'invalid-analysis-json') return alert('Kein gültiges Analyse-JSON erkannt.');
          throw err;
        }
      }

      function loadCleanupReviewProposals() {
        const raw = $('cleanupReviewJsonInput') ? $('cleanupReviewJsonInput').value.trim() : '';
        if (!raw) return alert('Bitte Cleanup-JSON einfügen.');
        let parsed;
        try { parsed = JSON.parse(extractJsonObjectFromText(raw)); } catch (e) {
          return alert('Kein gültiges JSON erkannt: ' + e.message);
        }
        const proposals = Array.isArray(parsed.proposals) ? parsed.proposals : [];
        if (!proposals.length) return alert('Keine Vorschläge im JSON gefunden (Schlüssel: "proposals").');
        const validTypes = ['match-existing', 'update-existing', 'new-feature', 'duplicate-of', 'probably-stale'];
        const validConfidence = ['hoch', 'mittel', 'niedrig'];
        const fallbackType = ui.cleanupReview.mode === 'project-dedupe' ? 'update-existing' : 'new-feature';
        ui.cleanupReview.proposals = proposals.map((p, i) => ({
          _idx: i,
          type: validTypes.includes(p.type) ? p.type : fallbackType,
          targetFeatureId: String(p.targetFeatureId || '').trim(),
          duplicateFeatureId: String(p.duplicateFeatureId || '').trim(),
          incomingTitle: String(p.incomingTitle || '').trim(),
          resolvedTitle: String(p.resolvedTitle || '').trim(),
          resolvedDescription: String(p.resolvedDescription || '').trim(),
          resolvedCategory: FEATURE_CATEGORIES.includes(p.resolvedCategory) ? p.resolvedCategory : 'Sonstiges',
          resolvedStatus: FEATURE_STATUS.includes(p.resolvedStatus) ? p.resolvedStatus : 'Idee',
          confidence: validConfidence.includes(String(p.confidence || '').trim()) ? String(p.confidence || '').trim() : 'mittel',
          rationale: String(p.rationale || '').trim(),
          _done: false
        }));
        ui.cleanupReview.summary = String(parsed.summary || '').trim();
        ui.cleanupReview.visible = true;
        if (
          !ui.cleanupReview.versionLogged &&
          ui.cleanupReview.mode === 'import-cleanup' &&
          ui.cleanupReview.projectId &&
          ui.cleanupReview.rawAnalysisJson &&
          ui.cleanupReview.proposals.length
        ) {
          try {
            const parsedAnalysis = JSON.parse(ui.cleanupReview.rawAnalysisJson);
            const comparisonToPrevious = compareFeaturesToPreviousVersion(ui.cleanupReview.projectId, ui.cleanupReview.incomingFeatures || []);
            S.importVersions.push(createImportVersionEntry(
              ui.cleanupReview.projectId,
              'analysis-json-cleanup',
              'Cleanup Review gestartet',
              ui.cleanupReview.rawAnalysisJson,
              parsedAnalysis,
              ui.cleanupReview.incomingFeatures || [],
              comparisonToPrevious
            ));
            ui.cleanupReview.versionLogged = true;
            save();
          } catch (err) {
            console.warn('Import-Version für Cleanup konnte nicht gespeichert werden:', err);
          }
        }
        renderView();
      }

      function resolveCleanupTargetFeature(proposal) {
        if (!proposal) return null;
        const pid = ui.cleanupReview.projectId || '';
        if (proposal.targetFeatureId) {
          const byId = S.features.find(x => x.id === proposal.targetFeatureId && (!pid || x.projectId === pid));
          if (byId) return byId;
        }
        if (proposal.resolvedTitle) {
          return getMatchingProjectFeature(pid, proposal.resolvedTitle);
        }
        if (proposal.incomingTitle) {
          return getMatchingProjectFeature(pid, proposal.incomingTitle);
        }
        return null;
      }

      function applyCleanupProposalToFeature(feature, proposal) {
        const changes = [];
        const nextTitle = proposal.resolvedTitle || proposal.incomingTitle;
        if (nextTitle && nextTitle !== feature.title) {
          if (confirm('Titel ändern von:\n"' + feature.title + '"\nauf:\n"' + nextTitle + '"?')) {
            feature.title = nextTitle;
            changes.push('title');
          }
        }
        const nextDescription = String(proposal.resolvedDescription || '').trim();
        const existingDescription = String(feature.description || '').trim();
        if (nextDescription && nextDescription !== existingDescription) {
          if (confirm('Beschreibung ersetzen?\nAlt: ' + shorten(existingDescription || '—', 120) + '\nNeu: ' + shorten(nextDescription, 120))) {
            feature.description = nextDescription;
            changes.push('description');
          }
        }
        const nextCategory = proposal.resolvedCategory;
        if (nextCategory && FEATURE_CATEGORIES.includes(nextCategory) && nextCategory !== feature.category) {
          if (confirm('Kategorie ändern von "' + feature.category + '" auf "' + nextCategory + '"?')) {
            feature.category = nextCategory;
            changes.push('category');
          }
        }
        const nextStatus = proposal.resolvedStatus;
        if (nextStatus && FEATURE_STATUS.includes(nextStatus) && nextStatus !== feature.status) {
          if (confirm('Status ändern von "' + feature.status + '" auf "' + nextStatus + '"?')) {
            feature.status = nextStatus;
            changes.push('status');
          }
        }
        if (changes.length) feature.updatedAt = new Date().toISOString();
        return changes;
      }

      function acceptCleanupProposalAsUpdate(idx) {
        const proposal = ui.cleanupReview.proposals.find(p => p._idx === idx);
        if (!proposal || proposal._done) return;
        const feature = resolveCleanupTargetFeature(proposal);
        if (!feature) return alert('Ziel-Feature nicht gefunden. Bitte als "neu" übernehmen oder ignorieren.');
        applyCleanupProposalToFeature(feature, proposal);
        proposal._done = true;
        save();
        renderView();
      }

      function acceptCleanupProposalAsNew(idx) {
        const proposal = ui.cleanupReview.proposals.find(p => p._idx === idx);
        if (!proposal || proposal._done) return;
        const projectId = ui.cleanupReview.projectId || '';
        const title = proposal.resolvedTitle || proposal.incomingTitle;
        if (!title) return alert('Kein Titel vorhanden.');
        S.features.push(ensureFeatureDefaults({
          id: uid('f'),
          projectId,
          title,
          description: proposal.resolvedDescription || 'Aus Cleanup-Review übernommen.',
          category: proposal.resolvedCategory || 'Sonstiges',
          status: proposal.resolvedStatus || 'geprüft',
          priority: 'mittel',
          sourceType: 'cleanup-review',
          sourceNoteIds: [],
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        }));
        proposal._done = true;
        save();
        renderView();
      }

      function markCleanupProposalAsDuplicate(idx) {
        const proposal = ui.cleanupReview.proposals.find(p => p._idx === idx);
        if (!proposal || proposal._done) return;
        const targetFeature = resolveCleanupTargetFeature(proposal);
        const duplicateFeatureId = String(proposal.duplicateFeatureId || '').trim();
        const duplicateFeature = duplicateFeatureId ? S.features.find(f => f.id === duplicateFeatureId) : null;
        if (duplicateFeature) {
          const keepTitle = targetFeature ? targetFeature.title : (proposal.targetFeatureId || '—');
          const duplicateTitle = duplicateFeature.title || duplicateFeature.id;
          const ok = confirm(
            'Feature als Dublette in den Papierkorb verschieben?\n' +
            'Behalten: ' + keepTitle + '\n' +
            'Verschieben: ' + duplicateTitle
          );
          if (!ok) return;
          moveFeatureToTrash(duplicateFeature.id, {
            reason: proposal.rationale || 'Als Dublette markiert',
            workflow: ui.cleanupReview.mode || 'cleanup-review',
            mergedIntoFeatureId: proposal.targetFeatureId || ''
          });
        } else {
          if (targetFeature) {
            const marker = `[Dup-Hinweis] ${proposal.incomingTitle || proposal.resolvedTitle || 'Ähnliches Feature'}${proposal.rationale ? ' – ' + proposal.rationale : ''}`;
            const existingDescription = String(targetFeature.description || '').trim();
            if (!existingDescription.includes(marker)) {
              targetFeature.description = existingDescription ? (existingDescription + '\n\n' + marker) : marker;
              targetFeature.updatedAt = new Date().toISOString();
            }
          }
          alert('Kein duplicateFeatureId vorhanden oder Feature nicht gefunden. Es wurde nichts in den Papierkorb verschoben.');
        }
        proposal._done = true;
        save();
        renderView();
      }

      function ignoreCleanupProposal(idx) {
        const proposal = ui.cleanupReview.proposals.find(p => p._idx === idx);
        if (!proposal) return;
        proposal._done = true;
        renderView();
      }

      function clearCleanupReview() {
        ui.cleanupReview = { proposals: [], projectId: '', incomingFeatures: [], rawAnalysisJson: '', mode: '', summary: '', visible: false, versionLogged: false };
        renderView();
      }

      function renderCleanupReviewSection() {
        if (!ui.cleanupReview.visible) return '';
        const proposals = ui.cleanupReview.proposals || [];
        const typeLabel = { 'match-existing': 'Match', 'update-existing': 'Update', 'new-feature': 'Neu', 'duplicate-of': 'Dublette?', 'probably-stale': 'Veraltet?' };
        const typeColor = { 'match-existing': 'var(--blue)', 'update-existing': 'var(--accent-2)', 'new-feature': 'var(--green)', 'duplicate-of': 'var(--yellow)', 'probably-stale': 'var(--ink-dim)' };
        const modeLabel = ui.cleanupReview.mode === 'project-dedupe' ? 'Feature-Bereinigung' : 'Import-Cleanup';
        return `
          <details open style="margin-top:10px;">
            <summary style="font-weight:700;">Cleanup-Review (${modeLabel}) · ${proposals.filter(p=>!p._done).length} offen</summary>

              <label for="cleanupReviewJsonInput">Cleanup-JSON einfügen</label>
              <textarea id="cleanupReviewJsonInput" style="min-height:100px;font-family:var(--font-mono);font-size:12px;" placeholder='{"proposals":[...]}'></textarea>
              <div class="stack-row" style="margin-top:6px;">

                <button class="btn" id="btnClearCleanupReview">Cleanup schließen</button>

              ${ui.cleanupReview.summary ? `<div class="mini" style="margin-top:8px;">Summary: ${escapeHtml(ui.cleanupReview.summary)}</div>` : ''}
            </div>
            ${proposals.length ? `
              <div class="list" style="margin-top:10px;">
                ${proposals.map(p => `
                  <div class="item" style="${p._done ? 'opacity:0.45;' : ''}border-left:3px solid ${typeColor[p.type] || 'var(--border)'}">
                    <div class="row-top">
                      <strong>${escapeHtml(p.resolvedTitle || p.incomingTitle || '—')}</strong>
                      <span class="pill">${typeLabel[p.type] || p.type}</span>

                    ${p.duplicateFeatureId ? `<div class="mini">Duplikat-ID: ${escapeHtml(p.duplicateFeatureId)}</div>` : ''}
                    ${p.duplicateFeatureId ? `<div class="mini">Duplikat-Titel: ${escapeHtml(((S.features.find(f => f.id === p.duplicateFeatureId) || {}).title) || '—')}</div>` : ''}
                    ${p.resolvedDescription ? `<div class="item-desc">${escapeHtml(p.resolvedDescription)}</div>` : ''}
                    <div class="mini">Confidence: ${escapeHtml(p.confidence)}</div>
                    ${p.rationale ? `<div class="mini" style="color:var(--ink-dim)">Grund: ${escapeHtml(p.rationale)}</div>` : ''}
                    ${p._done ? '<div class="mini">✓ erledigt</div>' : `
                      <div class="stack-row">
                        <button class="btn" data-cleanup-accept-update="${p._idx}">Bestehendes aktualisieren</button>
                        <button class="btn" data-cleanup-accept-new="${p._idx}">Als neues Feature</button>
                        ${p.type === 'duplicate-of' ? `<button class="btn" data-cleanup-mark-duplicate="${p._idx}">Dublette in Papierkorb</button>` : ''}
                        <button class="btn" data-cleanup-ignore="${p._idx}">Ignorieren</button>

                  </div>

      // ─────────────────────────────────────────────────────────────────────────

      function copyPrompt(textareaId) {
        const field = $(textareaId || 'promptOutput');
        if (!field) return;
        const text = field.value;
        if (!text.trim()) return;
        if (textareaId === 'analysisPromptOutput') ui.importDraft.analysisPrompt = text;
        else if (textareaId === 'cleanupPromptOutput') ui.importDraft.cleanupPrompt = text;
        else if (textareaId === 'chatWorkflowPromptOutput') {
          const projectId = ui.activeProjectId && ui.activeProjectId !== ALL_PROJECTS_KEY ? ui.activeProjectId : (ui.chatWorkflow && ui.chatWorkflow.projectId) || '';
          if (projectId) getChatWorkflowState(projectId).prompt = text;
        }
        else ui.importDraft.prompt = text;
        navigator.clipboard.writeText(text).then(() => alert('Text kopiert.'));
      }

      function getImportTargetProjectId() {
        const htmlSelect = $('htmlProjectSelect');
        const quickSelect = $('quickProject');
        return (htmlSelect && htmlSelect.value) || (quickSelect && quickSelect.value) || '';
      }

      function mapJsonAnalysisStatus(status) {
        const normalized = String(status || '').trim().toLowerCase();
        if (normalized === 'umgesetzt') return 'umgesetzt';
        if (normalized === 'teilweise umgesetzt') return 'teilweise umgesetzt';
        if (normalized === 'vorbereitet') return 'geprüft';
        return 'geprüft';
      }

      function getFeatureStatusRank(status) {
        const order = ['Idee', 'geprüft', 'geplant', 'in Arbeit', 'teilweise umgesetzt', 'umgesetzt'];
        const idx = order.indexOf(status);
        return idx === -1 ? 0 : idx;
      }

      function isGenericFeatureDescription(description) {
        const normalized = normalizeText(description);
        if (!normalized) return true;
        const generic = [
          'aus analyse-json übernommen.',
          'aus prompt-/analyseblock übernommen.',
          'aus analyse json übernommen.',
          'aus analyse übernommen.'
        ];
        return generic.includes(normalized);
      }

      function getMatchingProjectFeature(projectId, title) {
        const normalizedTitle = normalizeText(title);
        if (!normalizedTitle) return null;
        return S.features.find(x => x.projectId === projectId && normalizeText(x.title) === normalizedTitle) || null;
      }

      function normalizeImportedFeature(item) {
        if (!item || typeof item !== 'object') return null;
        const title = String(item.title || '').trim();
        if (!title) return null;
        const description = String(item.description || '').trim();
        const category = FEATURE_CATEGORIES.includes(item.category) ? item.category : 'Sonstiges';
        const status = mapJsonAnalysisStatus(item.status);
        return { title, description, category, status };
      }

      function featureVersionSignature(featureLike) {
        const normalized = normalizeImportedFeature(featureLike);
        if (!normalized) return '';
        return [
          normalizeText(normalized.description),
          normalizeText(normalized.category),
          normalizeText(normalized.status)
        ].join('||');
      }

      function findPossibleRelevantNotes(projectId, changedTitles) {
        const relevant = [];
        const seen = new Set();
        const titleTokens = changedTitles
          .map(t => normalizeText(t).split(/\s+/).filter(Boolean))
          .flat()
          .filter(tok => tok.length >= 4);

        S.notes
          .filter(n => n.projectId === projectId && !n.processed)
          .forEach(note => {
            const textNorm = normalizeText(note.text || '');
            if (!textNorm) return;
            const hitsTitle = changedTitles.some(t => normalizeText(t) && textNorm.includes(normalizeText(t)));
            const hitsToken = titleTokens.some(tok => textNorm.includes(tok));
            if (!hitsTitle && !hitsToken) return;
            if (seen.has(note.id)) return;
            seen.add(note.id);
            relevant.push({ id: note.id, text: note.text, createdAt: note.createdAt || '' });
          });

        return relevant.slice(0, 5);
      }

      function compareFeaturesToPreviousVersion(projectId, parsedFeatures) {
        const previous = getProjectImportVersions(projectId)[0] || null;
        const previousFeatures = Array.isArray(previous && previous.parsedFeatures) ? previous.parsedFeatures : [];
        const prevByTitle = new Map();
        previousFeatures.forEach(item => {
          const normalized = normalizeImportedFeature(item);
          if (!normalized) return;
          prevByTitle.set(normalizeText(normalized.title), normalized);
        });

        const newByTitle = new Map();
        parsedFeatures.forEach(item => {
          const normalized = normalizeImportedFeature(item);
          if (!normalized) return;
          newByTitle.set(normalizeText(normalized.title), normalized);
        });

        const addedFeatures = [];
        const updatedFeatures = [];
        const unchangedFeatures = [];
        const missingFromNewVersion = [];

        newByTitle.forEach((current, key) => {
          const prev = prevByTitle.get(key);
          if (!prev) {
            addedFeatures.push({ title: current.title });
            return;
          }
          if (featureVersionSignature(prev) === featureVersionSignature(current)) {
            unchangedFeatures.push({ title: current.title });
          } else {
            updatedFeatures.push({ title: current.title });
          }
        });

        prevByTitle.forEach((prev, key) => {
          if (newByTitle.has(key)) return;
          missingFromNewVersion.push({ title: prev.title });
        });

        const noteRefs = findPossibleRelevantNotes(
          projectId,
          addedFeatures.concat(updatedFeatures, missingFromNewVersion).map(x => x.title)
        );

        return {
          previousImportId: previous ? previous.id : null,
          addedFeatures,
          updatedFeatures,
          unchangedFeatures,
          missingFromNewVersion,
          possibleRelevantNotes: noteRefs
        };
      }

      function createImportVersionEntry(projectId, sourceType, sourceName, rawAnalysisText, parsed, parsedFeatures, comparison) {
        return {
          id: uid('iv'),
          projectId,
          createdAt: new Date().toISOString(),
          sourceType: sourceType || 'analysis-json',
          sourceName: sourceName || '',
          rawAnalysisText: String(rawAnalysisText || ''),
          parsedSummary: {
            appType: typeof parsed.appType === 'string' ? parsed.appType : '',
            projectSummary: typeof parsed.projectSummary === 'string' ? parsed.projectSummary : '',
            viewsCount: Array.isArray(parsed.views) ? parsed.views.length : 0,
            technicalNotesCount: Array.isArray(parsed.technicalNotes) ? parsed.technicalNotes.length : 0,
            unclearPointsCount: Array.isArray(parsed.unclearPoints) ? parsed.unclearPoints.length : 0
          },
          parsedFeatures,
          comparisonToPrevious: comparison
        };
      }

      function reconcileImportedFeature(existing, imported, nowIso) {
        const importedStatus = mapJsonAnalysisStatus(imported.status);
        const importedDescription = String(imported.description || '').trim();
        const importedCategory = FEATURE_CATEGORIES.includes(imported.category) ? imported.category : 'Sonstiges';
        const changes = [];

        if (importedStatus === 'umgesetzt' && getFeatureStatusRank(existing.status) < getFeatureStatusRank('umgesetzt')) {
          existing.status = 'umgesetzt';
          changes.push('status');
        } else if (importedStatus === 'teilweise umgesetzt' && getFeatureStatusRank(existing.status) < getFeatureStatusRank('teilweise umgesetzt')) {
          existing.status = 'teilweise umgesetzt';
          changes.push('status');
        }

        const existingDescription = String(existing.description || '').trim();
        const allowDescriptionUpdate = importedDescription && (!existingDescription || isGenericFeatureDescription(existingDescription));
        if (allowDescriptionUpdate && existingDescription !== importedDescription) {
          existing.description = importedDescription;
          changes.push('description');
        }

        if (importedCategory !== 'Sonstiges' && existing.category === 'Sonstiges' && existing.category !== importedCategory) {
          existing.category = importedCategory;
          changes.push('category');
        }

        if (changes.length) existing.updatedAt = nowIso;
        return changes;
      }

      function reconcileImportedFeaturesForProject(projectId, featureSource, nowIso) {
        const report = {
          created: [],
          updated: [],
          unchanged: [],
          possibleStaleFeatures: []
        };
        const matchedFeatureIds = new Set();

        featureSource.forEach(item => {
          if (!item || typeof item !== 'object') return;
          const title = String(item.title || '').trim();
          if (!title) return;

          const existing = getMatchingProjectFeature(projectId, title);
          if (existing) {
            matchedFeatureIds.add(existing.id);
            const changes = reconcileImportedFeature(existing, item, nowIso);
            if (changes.length) {
              report.updated.push({ id: existing.id, title: existing.title, changes });
            } else {
              report.unchanged.push({ id: existing.id, title: existing.title });
            }
            return;
          }

          const description = String(item.description || '').trim() || 'Aus Analyse-JSON übernommen.';
          const category = FEATURE_CATEGORIES.includes(item.category) ? item.category : 'Sonstiges';
          const created = ensureFeatureDefaults({
            id: uid('f'),
            projectId,
            title,
            description,
            category,
            status: mapJsonAnalysisStatus(item.status),
            priority: 'mittel',
            sourceType: 'html-analysis',
            sourceNoteIds: [],
            createdAt: nowIso,
            updatedAt: nowIso
          });
          S.features.push(created);
          matchedFeatureIds.add(created.id);
          report.created.push({ id: created.id, title: created.title });
        });

        report.possibleStaleFeatures = S.features
          .filter(f => f.projectId === projectId && !matchedFeatureIds.has(f.id))
          .map(f => ({ id: f.id, title: f.title, status: f.status }));

        return report;
      }

      function extractJsonObjectFromText(text) {
        const source = String(text || '').trim();
        if (!source) throw new Error('invalid-json-not-found');

        const unfenced = source
          .replace(/^```(?:json)?\s*/i, '')
          .replace(/\s*```$/i, '')
          .trim();

        const starts = [];
        for (let i = 0; i < unfenced.length; i++) {
          if (unfenced[i] === '{') starts.push(i);
        }
        if (!starts.length) throw new Error('invalid-json-not-found');

        for (const start of starts) {
          let depth = 0;
          let inString = false;
          let escaped = false;
          for (let i = start; i < unfenced.length; i++) {
            const ch = unfenced[i];
            if (inString) {
              if (escaped) {
                escaped = false;
              } else if (ch === '\\') {
                escaped = true;
              } else if (ch === '"') {
                inString = false;
              }
              continue;
            }
            if (ch === '"') {
              inString = true;
              continue;
            }
            if (ch === '{') depth++;
            if (ch === '}') {
              depth--;
              if (depth === 0) {
                const candidate = unfenced.slice(start, i + 1).trim();
                try {
                  JSON.parse(candidate);
                  return candidate;
                } catch (err) {
                  break;
                }
              }
            }
          }
        }

        throw new Error('invalid-json-not-found');
      }

      function importJsonAnalysisFromPrompt(text, projectId) {
        let parsed;
        try {
          parsed = JSON.parse(String(text || '{}'));
        } catch (err) {
          throw new Error('invalid-analysis-json');
        }
        if (!parsed || typeof parsed !== 'object') throw new Error('unsupported-top-level-structure');
        if (Array.isArray(parsed)) throw new Error('unsupported-top-level-structure');
        const p = S.projects.find(x => x.id === projectId);
        if (!p) throw new Error('project-not-found');

        const now = new Date().toISOString();
        if (typeof parsed.projectSummary === 'string' && parsed.projectSummary.trim()) p.summary = parsed.projectSummary.trim();
        if (typeof parsed.appType === 'string' && parsed.appType.trim()) p.type = parsed.appType.trim();
        p.lastAnalyzedAt = now;
        p.updatedAt = now;

        const featureSource = Array.isArray(parsed.features) ? parsed.features
          : Array.isArray(parsed.featureCandidates) ? parsed.featureCandidates
          : Array.isArray(parsed.detectedFeatures) ? parsed.detectedFeatures
          : null;
        const hasFeatureKey = Object.prototype.hasOwnProperty.call(parsed, 'features')
          || Object.prototype.hasOwnProperty.call(parsed, 'featureCandidates')
          || Object.prototype.hasOwnProperty.call(parsed, 'detectedFeatures');
        if (!hasFeatureKey || !featureSource) throw new Error('missing-features-array');
        if (featureSource.length === 0) throw new Error('empty-features-array');
        const parsedFeatures = featureSource.map(normalizeImportedFeature).filter(Boolean);
        const comparisonToPrevious = compareFeaturesToPreviousVersion(projectId, parsedFeatures);
        const reconciliation = reconcileImportedFeaturesForProject(projectId, featureSource, now);

        const views = Array.isArray(parsed.views) ? parsed.views.map(x => String(x || '').trim()).filter(Boolean) : [];
        const technicalNotes = Array.isArray(parsed.technicalNotes) ? parsed.technicalNotes.map(x => String(x || '').trim()).filter(Boolean) : [];
        const unclearPoints = Array.isArray(parsed.unclearPoints) ? parsed.unclearPoints.map(x => String(x || '').trim()).filter(Boolean) : [];
        const hasStructuredAnalysis = views.length || technicalNotes.length || unclearPoints.length;
        const hasReconciliationResults = reconciliation.created.length || reconciliation.updated.length || reconciliation.unchanged.length || reconciliation.possibleStaleFeatures.length;
        if (hasStructuredAnalysis || hasReconciliationResults) {
          S.analyses.push({
            id: uid('a'),
            type: 'html-project-analysis',
            projectId,
            createdAt: now,
            resultRaw: text,
            resultParsed: {
              appType: typeof parsed.appType === 'string' ? parsed.appType : '',
              projectSummary: typeof parsed.projectSummary === 'string' ? parsed.projectSummary : '',
              views,
              technicalNotes,
              unclearPoints,
              reconciliation: hasReconciliationResults ? reconciliation : undefined
            }
          });
        }

        const importVersion = createImportVersionEntry(
          projectId,
          'analysis-json',
          'JSON Result Import',
          text,
          parsed,
          parsedFeatures,
          comparisonToPrevious
        );
        S.importVersions.push(importVersion);

        return { reconciliation, comparisonToPrevious };
      }

      // ─── GITHUB GIST SYNC ────────────────────────────────────────────────────

      const GIST_FILE = 'roadtrip_data.json';
      let _gistStatus = { lastPush: '', lastPull: '', lastError: '' };

      function githubHeaders(token, includeContentType) {
        const h = {
          'Authorization': 'token ' + token,
          'Accept': 'application/vnd.github+json'
        };
        if (includeContentType) h['Content-Type'] = 'application/json';
        return h;
      }

      function buildGistPayload() {
        return { version: 1, exported: new Date().toISOString(), state: S };
      }

      function updateGistStatusUI() {
        const el = $('gistStatusInfo');
        if (!el) return;
        let txt = '';
        if (S._lastLocalSaveAt) txt += 'Lokal gespeichert: ' + formatDateTime(S._lastLocalSaveAt) + ' ';
        const lastPush = _gistStatus.lastPush || S._lastGistPushAt;
        const lastPull = _gistStatus.lastPull || S._lastGistPullAt;
        if (lastPush) txt += '| Gist Push: ' + formatDateTime(lastPush) + ' ';
        if (lastPull) txt += '| Gist Pull: ' + formatDateTime(lastPull) + ' ';
        if (_gistStatus.lastError) txt += '| Fehler: ' + _gistStatus.lastError;
        el.textContent = txt || 'Noch kein Sync durchgeführt.';
      }

      async function readGistFileJson(gist, preferredFileName) {
        const fileObj = gist.files && (gist.files[preferredFileName] || Object.values(gist.files)[0]);
        if (!fileObj) throw new Error('Keine Datei im Gist gefunden.');
        let content = fileObj.content;
        if ((!content || fileObj.truncated) && fileObj.raw_url) {
          const rawResp = await fetch(fileObj.raw_url, { headers: { 'Accept': 'application/json,text/plain,*/*' } });
          if (!rawResp.ok) throw new Error('Raw-Datei nicht lesbar (HTTP ' + rawResp.status + ')');
          content = await rawResp.text();
        }
        if (!content || !String(content).trim()) throw new Error('Gist-Datei ist leer.');
        try {
          return JSON.parse(content);
        } catch (e) {
          throw new Error('Gist-Inhalt ist kein gültiges JSON.');
        }
      }

      async function gistPush() {
        if (!C.gistId || !C.gistToken) {
          return alert('Bitte zuerst Gist ID und GitHub Token in den Settings eintragen.');
        }
        try {
          const syncTs = new Date().toISOString();
          S._lastExported = syncTs;
          S._lastGistPushAt = syncTs;
          const payload = buildGistPayload();
          payload.exported = syncTs;
          const r = await fetch('https://api.github.com/gists/' + C.gistId, {
            method: 'PATCH',
            headers: githubHeaders(C.gistToken, true),
            body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(payload, null, 2) } } })
          });
          if (!r.ok) {
            const errText = await r.text().catch(() => '');
            throw new Error('HTTP ' + r.status + (errText ? ': ' + errText.slice(0, 120) : ''));
          }
          const body = await r.json().catch(() => null);
          if (!body || !body.files || !body.files[GIST_FILE]) throw new Error('Antwort ohne erwartete Gist-Datei.');
          _gistStatus.lastPush = syncTs;
          _gistStatus.lastError = '';
          save();
          updateGistStatusUI();
          alert('Zum Gist gespeichert: ' + formatDateTime(syncTs));
        } catch (e) {
          _gistStatus.lastError = e.message.slice(0, 80);
          updateGistStatusUI();
          alert('Gist-Push fehlgeschlagen: ' + e.message);
        }
      }

      async function gistPull() {
        if (!C.gistId || !C.gistToken) {
          return alert('Bitte zuerst Gist ID und GitHub Token in den Settings eintragen.');
        }
        try {
          const r = await fetch('https://api.github.com/gists/' + C.gistId, {
            headers: githubHeaders(C.gistToken, false)
          });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          const gist = await r.json();
          const remote = await readGistFileJson(gist, GIST_FILE);
          const remoteState = remote.state || remote; // handle both wrapped and legacy
          if (!remoteState || typeof remoteState !== 'object' || Array.isArray(remoteState)) throw new Error('Ungültiger Gist-State.');
          const remoteTs = remote.exported || remoteState._lastGistPushAt || remoteState._lastExported || '';
          const localTs = S._lastGistPushAt || S._lastExported || '';
          const remoteNewer = remoteTs > localTs;
          const localHasData = S.projects.length > 0 || S.features.length > 0 || S.notes.length > 0;

          let action;
          if (!localHasData) {
            action = 'replace';
          } else {
            const msg = 'Gist-Daten gefunden.\n\n'
              + 'Gist-Stand: ' + (remoteTs ? formatDateTime(remoteTs) : '?') + '\n'
              + 'Lokal: ' + (localTs ? formatDateTime(localTs) : '?') + '\n'
              + (remoteNewer ? '(Gist ist neuer)' : '(Lokal ist aktueller oder gleich)') + '\n\n'
              + 'Was soll passieren?\n'
              + 'OK = Ersetzen (Gist überschreibt lokalen Stand)\n'
              + 'Abbrechen = Nichts tun';
            if (!confirm(msg)) return;
            action = 'replace';
          }

          if (action === 'replace') {
            const newState = Object.assign(defaultState(), remoteState);
            S = newState;
            ensureDefaults();
            const pullTs = new Date().toISOString();
            S._lastGistPullAt = pullTs;
            _gistStatus.lastPull = pullTs;
            _gistStatus.lastError = '';
            save();
            renderAll();
            updateGistStatusUI();
            alert('Vom Gist geladen (' + S.projects.length + ' Projekte, ' + S.features.length + ' Features, ' + S.notes.length + ' Notizen).');
          }
        } catch (e) {
          _gistStatus.lastError = e.message.slice(0, 80);
          updateGistStatusUI();
          alert('Gist-Pull fehlgeschlagen: ' + e.message);
        }
      }

      // ─── MERGE IMPORT LOGIC ──────────────────────────────────────────────────

      let _importDraftData = null;

      function mergeArrayById(local, incoming, idKey, titleKey) {
        // Merge incoming into local: add new items, keep existing items (by id or title)
        const result = local.slice();
        const localIds = new Set(result.map(x => x[idKey]));
        const localTitles = new Set(result.map(x => normalizeText(x[titleKey] || '')));
        incoming.forEach(item => {
          if (!item) return;
          if (item[idKey] && localIds.has(item[idKey])) return; // id collision → skip
          if (titleKey && localTitles.has(normalizeText(item[titleKey] || ''))) return; // title collision → skip
          result.push(item);
          if (item[idKey]) localIds.add(item[idKey]);
          if (titleKey) localTitles.add(normalizeText(item[titleKey] || ''));
        });
        return result;
      }

      function mergeFeaturesByProjectAndTitle(local, incoming) {
        const result = local.slice();
        const localIds = new Set(result.map(f => f.id));
        const localKeys = new Set(result.map(f => f.projectId + '||' + normalizeText(f.title)));
        incoming.forEach(f => {
          if (!f) return;
          if (f.id && localIds.has(f.id)) return;
          const key = (f.projectId || '') + '||' + normalizeText(f.title || '');
          if (localKeys.has(key)) return;
          result.push(f);
          if (f.id) localIds.add(f.id);
          localKeys.add(key);
        });
        return result;
      }

      function applySelectiveMerge(incomingState, selections) {
        if (selections.projects) {
          S.projects = mergeArrayById(S.projects, incomingState.projects || [], 'id', 'title');
        }
        if (selections.features) {
          S.features = mergeFeaturesByProjectAndTitle(S.features, incomingState.features || []);
          S.features = S.features.map(ensureFeatureDefaults);
        }
        if (selections.notes) {
          S.notes = mergeArrayById(S.notes, incomingState.notes || [], 'id', null);
        }
        if (selections.analyses) {
          S.analyses = mergeArrayById(S.analyses, incomingState.analyses || [], 'id', null);
        }
        if (selections.chats) {
          S.chats = mergeArrayById(S.chats, incomingState.chats || [], 'id', null);
        }
        if (selections.importVersions) {
          S.importVersions = mergeArrayById(S.importVersions || [], incomingState.importVersions || [], 'id', null);
        }
        ensureDefaults();
        save();
        renderAll();
      }

      function normalizeImportedState(raw) {
        if (!raw || typeof raw !== 'object' || Array.isArray(raw)) return null;
        const candidate = raw.state && typeof raw.state === 'object' && !Array.isArray(raw.state) ? raw.state : raw;
        const normalized = Object.assign(defaultState(), candidate);
        if (!Array.isArray(normalized.projects) || !Array.isArray(normalized.features) || !Array.isArray(normalized.notes) || !Array.isArray(normalized.analyses)) {
          return null;
        }
        if (!Array.isArray(normalized.chats)) normalized.chats = [];
        if (!Array.isArray(normalized.importVersions)) normalized.importVersions = [];
        return normalized;
      }

        };

      function parseRoadtripSyncBlock(desc) {
        const source = String(desc || '');
        const start = source.indexOf(TRELLO_SYNC_START);
        const end = source.indexOf(TRELLO_SYNC_END);
        if (start === -1 || end === -1 || end < start) {
          return { meta: null, body: source.trim() };
        }
        const block = source.slice(start + TRELLO_SYNC_START.length, end).trim();
        const body = source.slice(end + TRELLO_SYNC_END.length).replace(/^\s+/, '');
        const meta = {};
        block.split(/\n+/).forEach(line => {
          const idx = line.indexOf(':');
          if (idx === -1) return;
          const key = line.slice(0, idx).trim();
          const value = line.slice(idx + 1).trim();
          if (key) meta[key] = value;
        });
        return { meta, body };
      }

      function buildRoadtripSyncBlock(feature) {
        ensureFeatureDefaults(feature);
        const lines = [
          TRELLO_SYNC_START,
          'schemaVersion: 1',
          'roadtripFeatureId: ' + feature.id,
          'roadtripProjectId: ' + (feature.projectId || ''),
          'roadtripProjectTitle: ' + (getProjectTitle(feature.projectId) || ''),
          'syncState: ' + (feature.trello.syncState || 'linked'),
          'lastSyncedAt: ' + (feature.trello.lastSyncedAt || ''),
          'sourceType: ' + (feature.sourceType || 'manual'),
          TRELLO_SYNC_END
        ];
        return lines.join('\n');
      }

        }

      async function trelloRequest(path, options) {
        validateTrelloConfig();
        const method = (options && options.method) || 'GET';
        const params = new URLSearchParams({
          key: C.trelloKey,
          token: C.trelloToken
        });
        const rawQuery = options && options.query ? options.query : {};
        Object.keys(rawQuery).forEach(key => {
          const value = rawQuery[key];
          if (value === undefined || value === null || value === '') return;
          params.set(key, value);
        });

        const url = 'https://api.trello.com/1' + path + '?' + params.toString();
        const fetchOptions = { method, headers: {} };
        if (options && options.body) {
          fetchOptions.headers['Content-Type'] = 'application/json';
          fetchOptions.body = JSON.stringify(options.body);
        }
        const res = await fetch(url, fetchOptions);
        const text = await res.text();
        let data = null;
        try { data = text ? JSON.parse(text) : null; } catch (e) { data = text; }
        if (!res.ok) {
          const msg = data && data.message ? data.message : (typeof data === 'string' ? data : ('HTTP ' + res.status));
          throw new Error(msg);
        }
        return data;
      }

      // ─── TRELLO PULL & MERGE ──────────────────────────────────────────────────

      function parseTrelloLabels(idLabels, allLabels) {
        // Returns { project: [...], category: [...], priority: [...], other: [] }
        const result = { project: [], category: [], priority: [], other: [] };
        (idLabels || []).forEach(id => {
          const label = (allLabels || []).find(l => l.id === id);
          if (!label || !label.name) return;
          const name = label.name;
          if (name.startsWith(TRELLO_LABEL_PREFIX.project)) {
            result.project.push(name.slice(TRELLO_LABEL_PREFIX.project.length).trim());
          } else if (name.startsWith(TRELLO_LABEL_PREFIX.category)) {
            result.category.push(name.slice(TRELLO_LABEL_PREFIX.category.length).trim());
          } else if (name.startsWith(TRELLO_LABEL_PREFIX.priority)) {
            result.priority.push(name.slice(TRELLO_LABEL_PREFIX.priority.length).trim());
          } else {
            result.other.push(name);
          }
        });
        return result;
      }

      function mergeTrelloIntoFeature(feature, card, allLabels, allLists) {
        // Returns { changed: boolean, conflicts: string[] }
        const snap = feature.trello.lastSyncedSnapshot || {};
        const changed = [];
        const conflicts = [];

        const parsed = parseRoadtripSyncBlock(card.desc || '');
        if (!parsed.meta) {
          feature.trello.syncState = 'conflict';
          feature.trello.syncBlockedReason = 'invalid-sync-block';
          return { changed: false, conflicts: ['invalid-sync-block'] };
        }

        // Validate feature ID in block
        if (parsed.meta.roadtripFeatureId && parsed.meta.roadtripFeatureId !== feature.id) {
          feature.trello.syncState = 'conflict';
          feature.trello.syncBlockedReason = 'feature-id-mismatch';
          return { changed: false, conflicts: ['feature-id-mismatch'] };
        }

        const trelloTitle = (card.name || '').trim();
        const trelloDesc = (parsed.body || '').trim();

        // Resolve list name → status
        const list = (allLists || []).find(l => l.id === card.idList);
        const trelloStatus = list ? list.name.trim() : '';

        // Parse labels
        const labelGroups = parseTrelloLabels(card.idLabels || [], allLabels);

        const localTitle = String(feature.title || '').trim();
        const snapTitle = String(snap.title || '').trim();
        const localDesc = String(feature.description || '').trim();
        const snapDesc = String(snap.description || '').trim();
        const localStatus = String(feature.status || '').trim();
        const snapStatus = String(snap.status || '').trim();
        const localPriority = String(feature.priority || '').trim();
        const snapPriority = String(snap.priority || '').trim();
        const localCategory = String(feature.category || '').trim();
        const snapCategory = String(snap.category || '').trim();

        // ── title ──
        const titleChangedTrello = trelloTitle !== snapTitle;
        const titleChangedLocal = localTitle !== snapTitle;
        if (titleChangedTrello && !titleChangedLocal) {
          feature.title = trelloTitle;
          changed.push('title');
        } else if (titleChangedTrello && titleChangedLocal) {
          conflicts.push('title');
        }

        // ── description ──
        const descChangedTrello = trelloDesc !== snapDesc;
        const descChangedLocal = localDesc !== snapDesc;
        if (descChangedTrello && !descChangedLocal) {
          feature.description = trelloDesc;
          changed.push('description');
        } else if (descChangedTrello && descChangedLocal) {
          conflicts.push('description');
        }

        // ── status: Trello wins when changed ──
        if (trelloStatus && FEATURE_STATUS.includes(trelloStatus)) {
          if (trelloStatus !== snapStatus) {
            feature.status = trelloStatus;
            changed.push('status');
          }
        }

        // ── priority: same 3-way logic as title/description ──
        if (labelGroups.priority.length > 1) {
          conflicts.push('priority-multiple-labels');
        } else if (labelGroups.priority.length === 1) {
          const tp = labelGroups.priority[0];
          if (PRIORITIES.includes(tp)) {
            const prioChangedTrello = tp !== snapPriority;
            const prioChangedLocal = localPriority !== snapPriority;
            if (prioChangedTrello && !prioChangedLocal) {
              feature.priority = tp;
              changed.push('priority');
            } else if (prioChangedTrello && prioChangedLocal) {
              conflicts.push('priority');
            }
          }
        }

        // ── category: same 3-way logic as title/description ──
        if (labelGroups.category.length > 1) {
          conflicts.push('category-multiple-labels');
        } else if (labelGroups.category.length === 1) {
          const tc = labelGroups.category[0];
          if (FEATURE_CATEGORIES.includes(tc)) {
            const catChangedTrello = tc !== snapCategory;
            const catChangedLocal = localCategory !== snapCategory;
            if (catChangedTrello && !catChangedLocal) {
              feature.category = tc;
              changed.push('category');
            } else if (catChangedTrello && catChangedLocal) {
              conflicts.push('category');
            }
          }
        }

        // ── project: never overwritten, validate only ──
        if (labelGroups.project.length > 1) {
          conflicts.push('project-multiple-labels');
        } else if (labelGroups.project.length === 1) {
          const expectedProjectTitle = String(getProjectTitle(feature.projectId) || '').trim();
          if (normalizeText(labelGroups.project[0]) !== normalizeText(expectedProjectTitle)) {
            conflicts.push('project-label-mismatch');
          }
        }

        return { changed: changed.length > 0, changedFields: changed, conflicts };
      }

      async function pullFeatureFromTrello(featureId, options) {
        const silent = !!(options && options.silent);
        const feature = S.features.find(x => x.id === featureId);
        if (!feature) return { ok: false, error: 'feature-not-found', featureId };
        ensureFeatureDefaults(feature);

        if (!feature.trello || !feature.trello.cardId) {
          if (!silent) alert('Dieses Feature hat noch keine Trello-Verknüpfung. Erst nach Trello pushen.');
          return { ok: false, error: 'not-linked', featureId };
        }

        try {
          validateTrelloConfig();
          const [card, allLabels, allLists] = await Promise.all([
            trelloRequest('/cards/' + encodeURIComponent(feature.trello.cardId), {
              query: { fields: 'id,name,desc,idList,idLabels,url,shortUrl' }
            }),
            getBoardLabels(),
            getBoardLists()
          ]);

          const mergeResult = mergeTrelloIntoFeature(feature, card, allLabels, allLists);
          const hardFail = mergeResult.conflicts.length > 0 &&
            (mergeResult.conflicts[0] === 'invalid-sync-block' || mergeResult.conflicts[0] === 'feature-id-mismatch');

          const now = new Date().toISOString();

          if (hardFail) {
            // syncState already set inside mergeTrelloIntoFeature, timestamps NOT updated
            save();
            renderView();
            if (!silent) alert('Pull abgebrochen: ' + mergeResult.conflicts[0]);
            return { ok: false, error: mergeResult.conflicts[0], featureId };
          }

          if (mergeResult.conflicts.length > 0) {
            // Soft conflicts: state is conflict, but no timestamps (not a successful sync)
            feature.trello.syncState = 'conflict';
            feature.trello.syncBlockedReason = 'merge-conflicts: ' + mergeResult.conflicts.join(', ');
            save();
            renderView();
            if (!silent) alert('Pull mit Konflikten:\n' + mergeResult.conflicts.join('\n') + '\nBitte manuell prüfen.');
            return { ok: 'conflict', conflicts: mergeResult.conflicts, featureId };
          }

          // Clean pull/merge — set timestamps only now
          feature.trello.lastPulledAt = now;
          feature.trello.lastSyncedAt = now;
          feature.trello.syncState = 'linked';
          feature.trello.syncBlockedReason = '';
          feature.trello.lastSyncDirection = mergeResult.changed ? 'merge' : 'pull';
          feature.trello.lastSyncedSnapshot = getFeatureSnapshot(feature);
          if (mergeResult.changed) feature.updatedAt = now;

          save();
          renderView();

          if (!silent) {
            if (mergeResult.changed) {
              alert('Pull erfolgreich. Geänderte Felder: ' + (mergeResult.changedFields || []).join(', '));
            } else {
              alert('Pull erfolgreich. Keine Änderungen.');
            }
          }
          return { ok: true, changed: mergeResult.changed, changedFields: mergeResult.changedFields, featureId };

        } catch (err) {
          feature.trello.syncState = 'conflict';
          feature.trello.lastSyncError = err.message;
          feature.trello.syncBlockedReason = 'pull-failed';
          save();
          renderView();
          if (!silent) alert('Trello-Pull fehlgeschlagen: ' + err.message);
          return { ok: false, error: err.message, featureId };
        }
      }

      async function pullActiveProjectFromTrello() {
        const projectId = ui.editingProjectId || ui.activeProjectId;
        if (!projectId || projectId === ALL_PROJECTS_KEY) return alert('Kein konkretes Projekt ausgewählt.');
        const features = S.features.filter(f => f.projectId === projectId && f.trello && f.trello.cardId);
        if (!features.length) return alert('Keine verknüpften Trello-Karten in diesem Projekt.');
        if (!confirm(features.length + ' Trello-Karten pullen?')) return;
        let countOk = 0, countConflict = 0;
        const failed = [];
        for (const feature of features) {
          const result = await pullFeatureFromTrello(feature.id, { silent: true });
          if (!result || result.ok === false) {
            failed.push(feature.title);
          } else if (result.ok === 'conflict') {
            countConflict++;
          } else {
            countOk++;
          }
        }
        const parts = ['Projekt-Pull abgeschlossen.', 'Erfolgreich: ' + countOk];
        if (countConflict) parts.push('Mit Konflikten: ' + countConflict);
        if (failed.length) parts.push('Fehlgeschlagen: ' + failed.join(', '));
        alert(parts.join('\n'));
      }

      // ─────────────────────────────────────────────────────────────────────────

      async function syncFeatureToTrello(featureId, options) {
        const silent = !!(options && options.silent);
        const feature = S.features.find(x => x.id === featureId);
        if (!feature) return;
        ensureFeatureDefaults(feature);

        try {
          validateTrelloConfig();
          const projectTitle = getProjectTitle(feature.projectId);
          const [list, projectLabel, categoryLabel, priorityLabel] = await Promise.all([
            ensureTrelloListByName(feature.status || 'Idee'),
            ensureTrelloLabelByName(getProjectLabelName(projectTitle), 'blue'),
            ensureTrelloLabelByName(getCategoryLabelName(feature.category), 'green'),
            ensureTrelloLabelByName(getPriorityLabelName(feature.priority), 'red')
          ]);

          feature.trello.boardId = C.trelloBoardId;
          feature.trello.listId = list.id;
          feature.trello.projectLabelId = projectLabel.id;
          feature.trello.categoryLabelId = categoryLabel.id;
          feature.trello.priorityLabelId = priorityLabel.id;
          feature.trello.enabled = true;
          feature.trello.lastSyncError = '';
          feature.trello.syncBlockedReason = '';
          feature.trello.syncState = feature.trello.cardId ? 'dirty-roadtrip' : 'unlinked';

          const desc = buildTrelloCardDescription(feature);
          let card = null;

          if (feature.trello.cardId) {
            card = await trelloRequest('/cards/' + encodeURIComponent(feature.trello.cardId), {
              method: 'PUT',
              query: {
                name: feature.title,
                desc: desc,
                idList: list.id,
                pos: 'bottom'
              }
            });
          } else {
            card = await trelloRequest('/cards', {
              method: 'POST',
              query: {
                idList: list.id,
                name: feature.title,
                desc: desc,
                pos: 'bottom'
              }
            });
          }

          feature.trello.cardId = card.id;
          feature.trello.cardUrl = card.url || card.shortUrl || feature.trello.cardUrl || '';
          feature.trello.listId = list.id;

          await assignLabelsToCard(card.id, [projectLabel.id, categoryLabel.id, priorityLabel.id]);
          if (!feature.trello.cardUrl) {
            const freshCard = await fetchTrelloCard(card.id);
            feature.trello.cardUrl = freshCard && (freshCard.url || freshCard.shortUrl) || '';
          }

          const now = new Date().toISOString();
          feature.trello.syncState = 'linked';
          feature.trello.lastSyncDirection = 'push';
          feature.trello.lastSyncedAt = now;
          feature.trello.lastPushedAt = now;
          feature.trello.lastSyncedSnapshot = getFeatureSnapshot(feature);
          feature.updatedAt = now;

          save();
          renderView();
          if (!silent) alert('Feature nach Trello synchronisiert: ' + feature.title);
        } catch (err) {
          feature.trello.syncState = 'conflict';
          feature.trello.lastSyncError = err.message;
          feature.trello.syncBlockedReason = 'push-failed';
          save();
          renderView();
          if (!silent) alert('Trello-Sync fehlgeschlagen: ' + err.message);
          throw err;
        }
      }

      async function syncActiveProjectToTrello() {
        const projectId = ui.editingProjectId || ui.activeProjectId;
        if (!projectId || projectId === ALL_PROJECTS_KEY) return alert('Kein konkretes Projekt ausgewählt.');
        const features = getVisibleFeatures(S.features).filter(f => f.projectId === projectId);
        if (!features.length) return alert('Dieses Projekt hat keine Features.');
        if (!confirm(features.length + ' Features nach Trello synchronisieren?')) return;
        let ok = 0;
        const failed = [];
        for (const feature of features) {
          try {
            await syncFeatureToTrello(feature.id, { silent: true });
            ok++;
          } catch (err) {
            failed.push(feature.title);
          }
        }
        if (failed.length) {
          alert('Projekt-Sync abgeschlossen. Erfolgreich: ' + ok + '\nFehlgeschlagen: ' + failed.join(', '));
        } else {
          alert('Projekt-Sync abgeschlossen. Erfolgreich: ' + ok);
        }
      }

      function openTrelloCard(featureId) {
        const feature = S.features.find(x => x.id === featureId);
        if (!feature || !feature.trello || !feature.trello.cardId) return;
        const url = feature.trello.cardUrl || getTrelloCardUrl(feature.trello.cardId);
        if (url) window.open(url, '_blank', 'noopener');
      }

      function uid(prefix) {
        return prefix + '_' + Math.random().toString(36).slice(2, 10);
      }

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }
      function escapeAttr(s) { return escapeHtml(s); }

      function normalizeText(s) {
        return String(s || '').toLowerCase().replace(/\s+/g, ' ').trim();
      }

      function matchGroup(text, re) {
        const m = text.match(re);
        return m && m[1] ? m[1].trim() : '';
      }

      function formatDateTime(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        if (isNaN(d)) return iso;
        return d.toLocaleString('de-DE', { dateStyle:'short', timeStyle:'short' });
      }

      function shorten(s, n) {
        s = String(s || '');
        return s.length > n ? s.slice(0, n - 1) + '…' : s;
      }

      function downloadJson(filename, data) {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 800);
      }
    })();
  </script>
