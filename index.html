<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap">
  <title>Roadtrip</title>
  <style>
    :root {
      --paper: #F4ECDC;
      --paper-edge: #EADFC9;
      --surface: #FCF8EF;
      --surface-2: #F6EFE0;
      --surface-3: #EFE6D2;
      --ink: #2C2419;
      --ink-mid: #6C6051;
      --ink-dim: #9A8B73;
      --ink-quiet: #BCAC90;
      --on-accent: #FBF4E8;
      --rule: #E3D8C1;
      --rule-strong: #CFC0A3;
      --rule-faint: #ECE3D1;
      --accent: #C24A2B;
      --accent-hi: #D45B3A;
      --accent-deep: #9F3A1E;
      --accent-soft: rgba(194,74,43,0.10);
      --accent-line: rgba(194,74,43,0.30);
      --hue-sage: #6F7E63;
      --hue-slate: #5C748A;
      --hue-plum: #7E6A88;
      --hue-ochre: #A9823F;
      --hue-teal: #4E8079;
      --ok: #4F7A52;
      --ok-soft: rgba(79,122,82,0.12);
      --warn: #A9772B;
      --warn-soft: rgba(169,119,43,0.13);
      --danger: #A8432B;
      --danger-soft: rgba(168,67,43,0.12);
      --info: #4F6E89;
      --info-soft: rgba(79,110,137,0.12);
      --neutral-soft: rgba(120,108,88,0.10);
      --r-xs: 4px;
      --r-sm: 7px;
      --r-md: 11px;
      --r-lg: 16px;
      --r-xl: 22px;
      --r-pill: 999px;
      --s-1: 4px;
      --s-2: 8px;
      --s-3: 12px;
      --s-4: 16px;
      --s-5: 24px;
      --s-6: 32px;
      --s-7: 48px;
      --s-8: 64px;
      --sh-0: none;
      --sh-1: 0 1px 2px rgba(70,52,24,0.05);
      --sh-2: 0 10px 30px -16px rgba(70,52,24,0.28);
      --sh-3: 0 24px 60px -22px rgba(70,52,24,0.40);
      --ring: 0 0 0 3px rgba(194,74,43,0.28);
      --rt-bg: #F4ECDC;
      --rt-bg-elevated: #EADFC9;
      --rt-surface: #FCF8EF;
      --rt-surface-2: #F6EFE0;
      --rt-surface-3: #EFE6D2;
      --rt-surface-quiet: #F6EFE0;
      --rt-border-line: #E3D8C1;
      --rt-border-strong: #CFC0A3;
      --rt-ink: #2C2419;
      --rt-ink-mid: #6C6051;
      --rt-ink-dim: #9A8B73;
      --rt-on-accent: #FBF4E8;
      --rt-gold: #C24A2B;
      --rt-gold-soft: rgba(194,74,43,0.10);
      --rt-indigo: #4F6E89;
      --rt-indigo-soft: rgba(79,110,137,0.12);
      --rt-success: #4F7A52;
      --rt-warning: #A9772B;
      --rt-danger: #A8432B;
      --rt-info: #4F6E89;
      --rt-success-soft: rgba(79,122,82,0.12);
      --rt-warning-soft: rgba(169,119,43,0.13);
      --rt-danger-soft: rgba(168,67,43,0.12);
      --rt-info-soft: rgba(79,110,137,0.12);
      --rt-neutral-soft: rgba(120,108,88,0.10);
      --bg: var(--paper);
      --bg-mid: var(--paper-edge);
      --border: var(--rule);
      --border-light: var(--rule-strong);
      --ink-light: var(--ink-mid);
      --accent-2: var(--info);
      --green: var(--ok);
      --yellow: var(--warn);
      --red: var(--danger);
      --blue: var(--info);
      --radius: var(--r-lg);
      --shadow: var(--sh-1);
      --font-display: "Cormorant Garamond", "Iowan Old Style", Georgia, serif;
      --font-ui: "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif;
      --font-serif: "Cormorant Garamond", "Iowan Old Style", Georgia, serif;
      --font-mono: "IBM Plex Mono", ui-monospace, Consolas, monospace;
      --touch: 42px;
    }

    body.theme-light,
    body.theme-dark {
      --paper: #F4ECDC;
      --paper-edge: #EADFC9;
      --surface: #FCF8EF;
      --surface-2: #F6EFE0;
      --surface-3: #EFE6D2;
      --ink: #2C2419;
      --ink-mid: #6C6051;
      --ink-dim: #9A8B73;
      --ink-quiet: #BCAC90;
      --on-accent: #FBF4E8;
      --rule: #E3D8C1;
      --rule-strong: #CFC0A3;
      --rule-faint: #ECE3D1;
      --accent: #C24A2B;
      --accent-hi: #D45B3A;
      --accent-deep: #9F3A1E;
      --accent-soft: rgba(194,74,43,0.10);
      --accent-line: rgba(194,74,43,0.30);
      --info: #4F6E89;
      --info-soft: rgba(79,110,137,0.12);
      --bg: var(--paper);
      --bg-mid: var(--paper-edge);
      --border: var(--rule);
      --border-light: var(--rule-strong);
      --ink-light: var(--ink-mid);
      --accent-2: var(--info);
      --green: var(--ok);
      --yellow: var(--warn);
      --red: var(--danger);
      --blue: var(--info);
      --shadow: var(--sh-1);
      --rt-bg: var(--paper);
      --rt-bg-elevated: var(--paper-edge);
      --rt-surface: var(--surface);
      --rt-surface-2: var(--surface-2);
      --rt-surface-3: var(--surface-3);
      --rt-surface-quiet: var(--surface-2);
      --rt-border-line: var(--rule);
      --rt-border-strong: var(--rule-strong);
      --rt-ink: var(--ink);
      --rt-ink-mid: var(--ink-mid);
      --rt-ink-dim: var(--ink-dim);
      --rt-on-accent: var(--on-accent);
      --rt-gold: var(--accent);
      --rt-gold-soft: var(--accent-soft);
      --rt-indigo: var(--info);
      --rt-indigo-soft: var(--info-soft);
    }

    body.theme-eink {
      --paper: #F4ECDC;
      --paper-edge: #EADFC9;
      --surface: #FCF8EF;
      --surface-2: #F6EFE0;
      --surface-3: #EFE6D2;
      --ink: #1F1A13;
      --ink-mid: #4C4337;
      --ink-dim: #766B5A;
      --ink-quiet: #9A8B73;
      --on-accent: #F4ECDC;
      --rule: #CFC0A3;
      --rule-strong: #8F806A;
      --rule-faint: #E3D8C1;
      --accent: var(--ink);
      --accent-hi: var(--ink-mid);
      --accent-deep: var(--ink);
      --accent-soft: transparent;
      --accent-line: var(--rule-strong);
      --ok: var(--ink);
      --ok-soft: transparent;
      --warn: var(--ink-mid);
      --warn-soft: transparent;
      --danger: var(--ink);
      --danger-soft: transparent;
      --info: var(--ink-mid);
      --info-soft: transparent;
      --neutral-soft: transparent;
      --bg: var(--paper);
      --bg-mid: var(--paper-edge);
      --border: var(--rule);
      --border-light: var(--rule-strong);
      --ink-light: var(--ink-mid);
      --accent-2: var(--ink-mid);
      --green: var(--ink);
      --yellow: var(--ink-mid);
      --red: var(--ink);
      --blue: var(--ink-mid);
      --shadow: none;
      --rt-bg: var(--paper);
      --rt-bg-elevated: var(--paper-edge);
      --rt-surface: var(--surface);
      --rt-surface-2: var(--surface-2);
      --rt-surface-3: var(--surface-3);
      --rt-surface-quiet: var(--surface-2);
      --rt-border-line: var(--rule);
      --rt-border-strong: var(--rule-strong);
      --rt-ink: var(--ink);
      --rt-ink-mid: var(--ink-mid);
      --rt-ink-dim: var(--ink-dim);
      --rt-on-accent: var(--on-accent);
      --rt-gold: var(--accent);
      --rt-gold-soft: var(--accent-soft);
      --rt-indigo: var(--info);
      --rt-indigo-soft: var(--info-soft);
      --rt-success: var(--ok);
      --rt-warning: var(--warn);
      --rt-danger: var(--danger);
      --rt-info: var(--info);
      --rt-success-soft: var(--ok-soft);
      --rt-warning-soft: var(--warn-soft);
      --rt-danger-soft: var(--danger-soft);
      --rt-info-soft: var(--info-soft);
      --rt-neutral-soft: var(--neutral-soft);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-ui);
      font-size: 15px;
      font-weight: 400;
      line-height: 1.55;
    }
    body.font-serif { font-family: var(--font-serif); }

    .app {
      max-width: 1480px;
      margin: 0 auto;
      padding: 14px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1.25fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .hero, .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .display,
    h1,
    h2,
    h3,
    .panel-title h2,
    .panel-title h3,
    .section h2,
    .section h3,
    .panel-title strong,
    .item-title,
    .flow-step-title,
    .row-top > strong,
    summary {
      font-family: var(--font-display);
      font-weight: 600;
      color: var(--ink);
    }

    .display,
    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.08;
      letter-spacing: -.01em;
    }

    h2,
    .panel-title h2,
    .section h2 {
      font-size: 25px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    h3,
    .panel-title h3,
    .section h3,
    .item-title,
    .flow-step-title,
    .row-top > strong,
    summary {
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .eyebrow,
    .section-label {
      color: var(--ink-dim);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      line-height: 1.2;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .mono,
    .num,
    code,
    pre,
    kbd,
    samp,
    .pill,
    .meta,
    .meta *,
    .mini time,
    #lastSavedLabel,
    .stat .value {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
    }

    body.font-serif .mono,
    body.font-serif .num,
    body.font-serif code,
    body.font-serif pre,
    body.font-serif kbd,
    body.font-serif samp,
    body.font-serif .pill,
    body.font-serif .meta,
    body.font-serif .meta *,
    body.font-serif .mini time,
    body.font-serif #lastSavedLabel,
    body.font-serif .stat .value,
    body.font-serif .eyebrow,
    body.font-serif .section-label,
    body.font-serif .stat .label,
    body.font-serif label,
    body.font-serif th,
    body.font-serif .flow-step-kicker,
    body.font-serif .momentum-next-step .label,
    body.font-serif .sidebar-project .mini,
    body.font-serif .notice .mini {
      font-family: var(--font-mono);
    }

    .subline {
      color: var(--ink-light);
      max-width: 80ch;
    }

    .hero-actions, .toolbar, .segmented, .stack-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .panel { padding: 14px; }
    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .panel-title h2,
    .panel-title h3,
    .section h2,
    .section h3 { margin: 0; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .stat {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .stat .label {
      color: var(--ink-dim);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .18em;
      line-height: 1.2;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .stat .value {
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -.01em;
      line-height: 1.12;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0,1fr);
      gap: 12px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .main {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .btn, button {
      align-items: center;
      appearance: none;
      background: var(--surface);
      border: 1px solid var(--rule-strong);
      border-radius: var(--r-sm);
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      font: inherit;
      font-weight: 500;
      justify-content: center;
      min-height: var(--touch);
      padding: 0 16px;
      text-decoration: none;
      transition: background-color .14s ease, border-color .14s ease;
    }

    .btn:hover, button:hover { background: var(--surface-2); border-color: var(--rule-strong); }
    .btn:active, button:active { opacity: .95; }
    .btn:focus-visible, button:focus-visible { box-shadow: var(--ring); outline: none; }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: var(--on-accent); font-weight: 600; }
    .btn-primary:hover { background: var(--accent-hi); border-color: var(--accent-hi); }
    .btn-secondary { background: transparent; border-color: var(--rule-strong); color: var(--ink); }
    .btn-secondary:hover { background: var(--surface-2); border-color: var(--rule-strong); }
    .btn-ghost { background: transparent; border-color: transparent; color: var(--ink-mid); }
    .btn-ghost:hover { background: var(--surface-2); border-color: transparent; }
    .btn-soft { background: var(--surface-2); border-color: var(--rule); }
    .btn-soft:hover { background: var(--surface-3); border-color: var(--rule-strong); }
    .btn-danger { background: transparent; border-color: rgba(168,67,43,0.40); color: var(--danger); }
    .btn-danger:hover { background: transparent; border-color: rgba(168,67,43,0.55); }
    body.theme-eink .btn-primary { background: var(--ink); border-color: var(--ink); color: var(--on-accent); }
    body.theme-eink .btn-primary:hover { background: var(--ink-mid); border-color: var(--ink-mid); }
    body.theme-eink .btn-danger { border-color: var(--rule-strong); color: var(--danger); }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 4px 10px;
      border-radius: var(--r-pill);
      border: 1px solid transparent;
      background: var(--rt-neutral-soft);
      color: var(--ink-light);
      font-size: 11.5px;
      font-weight: 500;
      line-height: 1.2;
      white-space: nowrap;
    }
    .pill-success { background: var(--rt-success-soft); color: var(--rt-success); }
    .pill-warning { background: var(--rt-warning-soft); color: var(--rt-warning); }
    .pill-danger { background: var(--rt-danger-soft); color: var(--rt-danger); }
    .pill-info { background: var(--rt-info-soft); color: var(--rt-info); }
    .pill-gold { background: var(--rt-gold-soft); color: var(--rt-gold); }
    .pill-outline { background: transparent; border-color: var(--border); }

    .segmented .seg {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      min-height: 36px;
      color: var(--ink-light);
    }
    .segmented .seg.active { background: var(--surface-3); color: var(--ink); border-color: var(--border-light); font-weight: 700; }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--ink);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
    }

    textarea { min-height: 100px; resize: vertical; }
    label {
      display: block;
      color: var(--ink-dim);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .18em;
      line-height: 1.2;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    label.btn,
    label.pill {
      color: inherit;
      font-size: inherit;
      letter-spacing: normal;
      margin-bottom: 0;
      text-transform: none;
    }

    label.btn { font-family: inherit; line-height: inherit; }
    label.pill { font-family: var(--font-mono); line-height: 1.2; }

    .field { margin-bottom: 10px; }

    .mini {
      color: var(--ink-dim);
      font-size: 12px;
    }

    .sidebar-project .mini,
    .notice .mini {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item .row-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
    }

    .item-title {
      margin: 0;
    }

    .item-desc {
      color: var(--ink-light);
      font-size: 14px;
      white-space: pre-wrap;
    }

    .meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .grid-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
    }
    .momentum-dashboard-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .momentum-row {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      min-height: 44px;
    }
    .momentum-main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(260px, .8fr);
      gap: 12px;
      margin-top: 10px;
    }
    .momentum-focus {
      color: var(--ink-light);
      font-size: 13px;
      line-height: 1.45;
    }
    .momentum-next-step {
      background: var(--rt-gold-soft, var(--surface-3));
      border-left: 3px solid var(--accent);
      border-radius: 10px;
      padding: 10px 12px;
      margin-top: 8px;
    }
    .momentum-next-step .label {
      color: var(--ink-dim);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .18em;
      line-height: 1.2;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .momentum-next-step .value {
      color: var(--ink);
      font-weight: 700;
      line-height: 1.45;
    }
    .momentum-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    @media (max-width: 860px) {
      .momentum-main-grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .kanban {
      display: grid;
      grid-template-columns: repeat(6, minmax(220px, 1fr));
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px;
      min-height: 300px;
    }

    .column h3 {
      color: var(--ink);
      margin: 0 0 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--ink-dim);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    details {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
    }

    summary {
      cursor: pointer;
    }

    .hidden { display: none !important; }

    .notice {
      background: var(--rt-warning-soft);
      border-left: 2px solid var(--rt-warning);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      padding: 10px 12px;
      color: var(--ink-light);
      font-size: 14px;
    }
    .chat-card { border-left-width: 2px !important; }
    .chat-card.type-main { border-left-color: var(--rt-gold) !important; }
    .chat-card.type-sprint { border-left-color: var(--rt-indigo) !important; }
    .chat-card.type-branch, .chat-card.type-execution { border-left-color: var(--border-light) !important; }
    .chat-card.is-done { opacity: .55; }

    .dropzone {
      border: 1px dashed var(--border-light);
      border-radius: 14px;
      padding: 12px;
      background: var(--surface-2);
    }

    .footer-note { color: var(--ink-dim); font-size: 12px; }

    @media (max-width: 1080px) {
      .topbar, .layout { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 680px) {
      .app { padding: 10px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .kanban { grid-template-columns: repeat(6, 260px); }
      h1 { font-size: 24px; }
    }

    .workspace {
      max-width: 100%;
      padding: 20px;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 16px;
      min-height: 100vh;
      background: var(--bg);
    }
    .workspace-sidebar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      position: sticky;
      top: 16px;
      height: calc(100vh - 40px);
      min-height: 0;
      overflow: hidden;
    }
    .sidebar-projects-panel {
      margin-top: 16px;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1 1 auto;
      overflow: hidden;
    }
    #sidebarProjects { min-height: 0; overflow-y: auto; padding-right: 4px; }
    .workspace-sidebar > .stack-row { flex: 0 0 auto; }
    .flow-steps { display:flex; flex-direction:column; gap:10px; margin-top:10px; }
    .flow-step { background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; }
    .flow-step-head { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .flow-step-kicker { color:var(--ink-dim); font-family:var(--font-mono); font-size:11px; font-weight:500; line-height:1.2; text-transform:uppercase; letter-spacing:.18em; }
    .flow-step-title { font-weight:600; }
    .workspace-main { display:flex; flex-direction:column; gap:16px; min-width:0; }
    .sidebar-project {
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      text-align: left;
      width: 100%;
      gap: 5px;
      font-size: 14px;
      line-height: 1.3;
      white-space: normal;
    }
    .sidebar-project > div:first-child {
      display: block;
      width: 100%;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--ink);
    }
    .sidebar-project > .mini {
      display: block;
      width: 100%;
      color: var(--ink-dim);
      font-size: 11px;
      line-height: 1.3;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .sidebar-project > div:first-child .mini {
      display: inline;
      font-size: .75em;
      line-height: inherit;
    }
    .sidebar-project.active { background: var(--surface-3); border-color: var(--border-light); }
    .db-toolbar { display:grid; grid-template-columns:2fr repeat(3, minmax(130px,1fr)) auto; gap:8px; margin-bottom:12px; }
    @media (max-width: 1080px) {
      .workspace { grid-template-columns: 1fr; }
      .workspace-sidebar { position: static; height: auto; overflow: visible; }
      .sidebar-projects-panel { max-height: 55vh; }
      #sidebarProjects { max-height: 45vh; }
      .db-toolbar { grid-template-columns:1fr; }
    }
  </style>
</head>
<body class="theme-light">
  <div class="app workspace" id="app">
    <aside class="workspace-sidebar panel">
      <h1 style="font-size:20px;margin:0 0 12px;">Roadtrip</h1>
      <div class="segmented" id="navTabs"></div>
      <div class="panel sidebar-projects-panel" style="margin-top:16px; box-shadow:none;">
        <div class="panel-title"><h3>Projects</h3></div>
        <div class="list" id="sidebarProjects"></div>
      </div>
      <div class="stack-row" style="margin-top:auto;">
        <button class="btn" id="btnSeed">Demo</button>
        <button class="btn" id="btnExport">Export</button>
        <button class="btn" id="btnBackupRaw">Raw Backup</button>
        <label class="btn" for="importJsonInput">Import</label>
      </div>
      <input id="importJsonInput" type="file" accept="application/json" class="hidden" />
    </aside>
    <main class="workspace-main">
      <section class="panel">
        <div class="panel-title">
          <h2 id="viewTitle">Database</h2>
          <div class="mini" id="lastSavedLabel">—</div>
        </div>
        <div class="stats" id="stats"></div>
      </section>
      <section class="panel" id="viewContainer"></section>
    </main>
  </div>

  <script>
    (function() {
      const LKEY = 'roadtrip_v0_1';
      const CONFIG_KEY = 'roadtrip_v0_1_config';
      const STORAGE_META_KEY = 'roadtrip_v0_1_storage_meta';
      const ROADTRIP_DB_NAME = 'roadtrip_db_v1';
      const ROADTRIP_DB_STORE = 'state';
      const ROADTRIP_DB_MAIN_KEY = 'main';
      const UI_SPRINT_VIS_KEY = 'roadtrip.ui.showCompletedSprintsByProject';
      const UI_MOMENTUM_COLLAPSED_KEY = 'roadtrip.ui.projectMomentumCollapsedByProject';
      const ALL_PROJECTS_KEY = 'all';
      const VIEWS = ['database', 'momentum', 'project', 'notes', 'learning', 'import', 'settings'];
      const APP_TYPES = ['Daily Log', 'Braindump', 'Review', 'Tracker', 'Writing', 'Learning', 'Meta-App', 'Sonstiges'];
      const PROJECT_STATUS = ['aktiv', 'pausiert', 'archiviert'];
      const FEATURE_CATEGORIES = ['UI', 'Workflow', 'Sync', 'KI', 'Import/Export', 'Darstellung', 'Datenmodell', 'Ansicht', 'Sonstiges'];
      const PRIORITIES = ['niedrig', 'mittel', 'hoch', 'kritisch'];
      const FEATURE_POOLS = ['planned', 'implemented'];
      const FEATURE_REVIEW_STATUS = ['needs-review', 'reviewed'];
      const FEATURE_STATUS_BY_POOL = {
        planned: ['idea', 'planned', 'selected-for-sprint', 'in-progress', 'blocked', 'deferred'],
        implemented: ['detected', 'confirmed', 'manually-added', 'needs-review', 'obsolete']
      };
      const FEATURE_STATUS_LABELS = {
        idea: 'Idee',
        planned: 'Geplant',
        'selected-for-sprint': 'Für Sprint ausgewählt',
        'in-progress': 'In Arbeit',
        blocked: 'Blockiert',
        deferred: 'Zurückgestellt',
        detected: 'Erkannt',
        confirmed: 'Bestätigt',
        'manually-added': 'Manuell ergänzt',
        'needs-review': 'Review nötig',
        obsolete: 'Veraltet'
      };
      const FEATURE_POOL_LABELS = {
        planned: 'Geplante Features',
        implemented: 'Umgesetzte Features'
      };
      const LEGACY_STATUS_TO_PLANNED = {
        idee: 'idea',
        geprüft: 'planned',
        geplant: 'planned',
        'in arbeit': 'in-progress',
        begonnen: 'in-progress',
        offen: 'planned',
        backlog: 'planned'
      };
      const LEGACY_IMPLEMENTED_STATUS_TO_STATUS = {
        erledigt: 'confirmed',
        umgesetzt: 'confirmed',
        done: 'confirmed',
        complete: 'confirmed',
        completed: 'confirmed',
        fertig: 'confirmed',
        'teilweise umgesetzt': 'detected',
        vorbereitet: 'detected',
        implemented: 'confirmed',
        confirmed: 'confirmed',
        detected: 'detected'
      };
      const TRELLO_LABEL_PREFIX = { project: 'P: ', category: 'C: ', priority: 'Prio: ' };
      const TRELLO_SYNC_START = '--- ROADTRIP_SYNC ---';
      const TRELLO_SYNC_END = '--- /ROADTRIP_SYNC ---';
      const CHAT_TYPES = ['project-main', 'sprint', 'execution', 'branch'];
      const CHAT_STATUS = ['aktiv', 'pausiert', 'abgeschlossen', 'referenz'];
      const NOTE_TYPES = ['note', 'idea', 'bug', 'question', 'decision', 'feature-candidate'];
      const NOTE_STATUSES = ['open', 'processed', 'archived'];
      const SPRINT_EXECUTION_MODES = { codexControl: 'codex-control', direct: 'direct' };

      let S = defaultState();
      let C = defaultConfig();
      let ui = {
        view: 'database',
        editingProjectId: null,
        analysisDraftFeatures: [],
        activeProjectId: ALL_PROJECTS_KEY,
        filters: { pool: 'alle', status: 'alle', category: 'alle', search: '' },
        showKanban: false,
        showAllProjects: false,
        projectEditMode: false,
        importDraft: { html: '', prompt: '', analysisPrompt: '', cleanupPrompt: '', projectId: '' },
        chatWorkflow: { projectId: '', sourceChatId: '', sprintGoal: '', sprintStartPrompt: '', sprintHandoffPrompt: '', sprintStartJson: '', mainChatBootstrapJson: '', prompt: '', mode: '', sprintExecutionMode: SPRINT_EXECUTION_MODES.codexControl },
        chatWorkflowByProject: {},
        chatWorkflowHandoff: { projectId: '', sourceChatId: '', rawJson: '' },
        chatWorkflowHandoffByProject: {},
        dailyLogQuery: { prompt: '' },
        multiProjectImport: { rawText: '', prompt: '', resultJson: '', summary: '', updates: [], unmatchedNotes: [], visible: false },
        noteReview: { proposals: [], projectId: '', rawText: '', visible: false },
        noteFeaturePipelineByProject: {},
        cleanupReview: { proposals: [], projectId: '', incomingFeatures: [], rawAnalysisJson: '', mode: '', summary: '', visible: false, versionLogged: false },
        showCompletedSprintsByProject: {},
        projectMomentumCollapsedByProject: {},
        projectMomentumPromptByProject: {},
        momentumSort: 'updated',
        momentumQuickNoteByProject: {},
        learningTracker: { projectId: 'all', scope: 'completed', filter: 'open', search: '' },
        notesWorkspace: { projectId: 'all', status: 'open', type: 'all', search: '', editingNoteId: '' },
        learningPromptByChatId: {}
      };

      const $ = (id) => document.getElementById(id);
      const q = (sel, el = document) => el.querySelector(sel);
      const qq = (sel, el = document) => Array.from(el.querySelectorAll(sel));

      function normalizeFeaturePool(value) {
        const pool = String(value || '').trim().toLowerCase();
        return FEATURE_POOLS.includes(pool) ? pool : 'planned';
      }

      function getFeatureStatusesForPool(pool) {
        const safePool = normalizeFeaturePool(pool);
        return FEATURE_STATUS_BY_POOL[safePool] || FEATURE_STATUS_BY_POOL.planned;
      }

      function isValidFeatureStatus(status, pool) {
        return getFeatureStatusesForPool(pool).includes(String(status || '').trim());
      }

      function normalizeFeatureStatus(status, pool) {
        const safePool = normalizeFeaturePool(pool);
        const raw = String(status || '').trim();
        const normalized = normalizeText(raw);
        if (safePool === 'planned') {
          const migrated = LEGACY_STATUS_TO_PLANNED[normalized] || raw;
          if (isValidFeatureStatus(migrated, safePool)) return migrated;
          return FEATURE_STATUS_BY_POOL.planned[0];
        }
        if (LEGACY_IMPLEMENTED_STATUS_TO_STATUS[normalized]) return LEGACY_IMPLEMENTED_STATUS_TO_STATUS[normalized];
        if (isValidFeatureStatus(raw, safePool)) return raw;
        return FEATURE_STATUS_BY_POOL.implemented[0];
      }

      function resolveStatusForPool(status, pool) {
        const safePool = normalizeFeaturePool(pool);
        const raw = String(status || '').trim();
        if (!raw) return '';
        if (isValidFeatureStatus(raw, safePool)) return raw;
        const normalized = normalizeText(raw);
        if (safePool === 'planned') {
          const migrated = LEGACY_STATUS_TO_PLANNED[normalized];
          return migrated && isValidFeatureStatus(migrated, safePool) ? migrated : '';
        }
        if (LEGACY_IMPLEMENTED_STATUS_TO_STATUS[normalized]) return LEGACY_IMPLEMENTED_STATUS_TO_STATUS[normalized];
        return '';
      }

      function resolveLegacyImplementedStatus(status) {
        const normalized = normalizeText(status);
        return LEGACY_IMPLEMENTED_STATUS_TO_STATUS[normalized] || '';
      }

      function normalizeFeaturePoolAndStatus(pool, status) {
        let nextPool = normalizeFeaturePool(pool);
        const legacyImplementedStatus = resolveLegacyImplementedStatus(status);
        if (legacyImplementedStatus) nextPool = 'implemented';
        const nextStatus = legacyImplementedStatus || normalizeFeatureStatus(status, nextPool);
        return { pool: nextPool, status: nextStatus };
      }

      function getFeatureStatusLabel(status) {
        const key = String(status || '').trim();
        return FEATURE_STATUS_LABELS[key] || key || '—';
      }

      function getFeaturePoolLabel(pool) {
        const key = normalizeFeaturePool(pool);
        return FEATURE_POOL_LABELS[key] || key;
      }

      function isImplementedFeature(feature) {
        return normalizeFeaturePool((feature || {}).pool) === 'implemented';
      }

      function isPlannedFeature(feature) {
        return normalizeFeaturePool((feature || {}).pool) === 'planned';
      }

      function getAllFeatureStatuses() {
        return FEATURE_POOLS.flatMap(pool => getFeatureStatusesForPool(pool));
      }

      function getStatusFilterOptionsForPool(pool) {
        const selectedPool = String(pool || '').trim().toLowerCase();
        if (selectedPool === 'alle') return getAllFeatureStatuses();
        return getFeatureStatusesForPool(selectedPool);
      }

      function ensureValidStatusFilterForPool(pool) {
        const currentStatus = String(ui.filters.status || 'alle').trim();
        if (currentStatus === 'alle') return;
        if (!getStatusFilterOptionsForPool(pool).includes(currentStatus)) ui.filters.status = 'alle';
      }

      function applyFeatureDefaults(feature) {
        if (!feature || typeof feature !== 'object') return ensureFeatureDefaults(feature);
        Object.assign(feature, ensureFeatureDefaults(feature));
        return feature;
      }

      let roadtripDbPromise = null;
      let indexedDbUnavailable = false;
      let storageMeta = { storageMode: 'localStorage', lastIndexedDbSaveAt: '', lastLocalStorageFallbackAt: '', hasLocalBackup: false, lastGistSyncFingerprint: '' };
      let roadtripSaveQueue = Promise.resolve();

      init();

      function defaultState() {
        return {
          version: 1,
          createdAt: new Date().toISOString(),
          _lastLocalSaveAt: '',
          _lastExported: '',
          _lastGistPushAt: '',
          _lastGistPullAt: '',
          projects: [],
          features: [],
          notes: [],
          analyses: [],
          chats: [],
          importVersions: [],
          unmatchedNotes: [],
          deletedIds: {}
        };
      }

      function defaultConfig() {
        return {
          theme: 'theme-dark',
          font: 'ui',
          gistId: '',
          gistToken: '',
          rawGistId: '',
          rawGistToken: '',
          openAiModel: 'gpt-5.4',
          trelloKey: '',
          trelloToken: '',
          trelloBoardId: ''
        };
      }

      async function init() {
        await load();
        wireBasics();
        renderAll();
      }

      function loadStorageMeta() {
        try {
          const raw = localStorage.getItem(STORAGE_META_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === 'object') {
            storageMeta = Object.assign(storageMeta, parsed);
          }
        } catch (_) {}
      }
      function persistStorageMeta() {
        try { localStorage.setItem(STORAGE_META_KEY, JSON.stringify(storageMeta)); } catch (_) {}
      }

      function openRoadtripDb() {
        if (indexedDbUnavailable) return Promise.resolve(null);
        if (!('indexedDB' in window)) {
          indexedDbUnavailable = true;
          return Promise.resolve(null);
        }
        if (roadtripDbPromise) return roadtripDbPromise;
        roadtripDbPromise = new Promise((resolve) => {
          try {
            const req = indexedDB.open(ROADTRIP_DB_NAME, 1);
            req.onupgradeneeded = () => {
              const db = req.result;
              if (!db.objectStoreNames.contains(ROADTRIP_DB_STORE)) db.createObjectStore(ROADTRIP_DB_STORE);
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => { indexedDbUnavailable = true; resolve(null); };
          } catch (_) { indexedDbUnavailable = true; resolve(null); }
        });
        return roadtripDbPromise;
      }

      async function idbGet(key) {
        const db = await openRoadtripDb();
        if (!db) return null;
        return new Promise((resolve, reject) => {
          try {
            const tx = db.transaction(ROADTRIP_DB_STORE, 'readonly');
            const req = tx.objectStore(ROADTRIP_DB_STORE).get(key);
            req.onsuccess = () => resolve(req.result == null ? null : req.result);
            req.onerror = () => reject(req.error || new Error('idb get failed'));
          } catch (e) { reject(e); }
        });
      }
      async function idbSet(key, value) {
        const db = await openRoadtripDb();
        if (!db) throw new Error('indexeddb-unavailable');
        return new Promise((resolve, reject) => {
          try {
            const tx = db.transaction(ROADTRIP_DB_STORE, 'readwrite');
            tx.objectStore(ROADTRIP_DB_STORE).put(value, key);
            tx.oncomplete = () => resolve(true);
            tx.onerror = () => reject(tx.error || new Error('idb set failed'));
          } catch (e) { reject(e); }
        });
      }
      async function idbDelete(key) {
        const db = await openRoadtripDb();
        if (!db) return false;
        return new Promise((resolve, reject) => {
          try {
            const tx = db.transaction(ROADTRIP_DB_STORE, 'readwrite');
            tx.objectStore(ROADTRIP_DB_STORE).delete(key);
            tx.oncomplete = () => resolve(true);
            tx.onerror = () => reject(tx.error || new Error('idb delete failed'));
          } catch (e) { reject(e); }
        });
      }
      async function loadStateFromIndexedDb() { return idbGet(ROADTRIP_DB_MAIN_KEY); }
      async function saveStateToIndexedDb(state) { return idbSet(ROADTRIP_DB_MAIN_KEY, state); }

      function loadUiMap(key) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return {};
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
        } catch (_) { return {}; }
      }
      function saveUiMap(key, map) {
        try { localStorage.setItem(key, JSON.stringify(map || {})); } catch (_) {}
      }

      async function load() {
        loadStorageMeta();
        let loadedFromIndexedDb = false;
        try {
          const idbState = await loadStateFromIndexedDb();
          if (idbState && typeof idbState === 'object' && !Array.isArray(idbState)) {
            S = Object.assign(defaultState(), idbState);
            loadedFromIndexedDb = true;
            storageMeta.storageMode = 'indexedDB';
          }
        } catch (e) { console.warn('[load] IndexedDB state load failed:', e); }
        try {
          if (!loadedFromIndexedDb) {
            const raw = localStorage.getItem(LKEY);
            if (raw) {
              const parsed = JSON.parse(raw);
              const parsedState = parsed && parsed.state && typeof parsed.state === 'object' ? parsed.state : parsed;
              if (parsedState && typeof parsedState === 'object' && !Array.isArray(parsedState)) {
                S = Object.assign(defaultState(), parsedState);
                const db = await openRoadtripDb();
                if (db) {
                  try {
                    await saveStateToIndexedDb(S);
                    storageMeta.storageMode = 'indexedDB';
                    storageMeta.lastIndexedDbSaveAt = new Date().toISOString();
                    storageMeta.hasLocalBackup = true;
                  } catch (migrateErr) {
                    console.warn('[load] IndexedDB migration failed:', migrateErr);
                    storageMeta.storageMode = 'localStorage';
                  }
                } else {
                  storageMeta.storageMode = 'localStorage';
                }
              } else {
                console.warn('[load] Unexpected state shape, using defaults');
              }
            }
          }
        } catch (e) { console.warn('[load] State load failed, using defaults:', e); }
        try {
          const raw = localStorage.getItem(CONFIG_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            if (parsed && typeof parsed === 'object') {
              C = Object.assign(defaultConfig(), parsed);
            }
          }
        } catch (e) { console.warn('[load] Config load failed, using defaults:', e); }
        ui.showCompletedSprintsByProject = loadUiMap(UI_SPRINT_VIS_KEY);
        ui.projectMomentumCollapsedByProject = loadUiMap(UI_MOMENTUM_COLLAPSED_KEY);
        persistStorageMeta();
        ensureDefaults();
      }

      function ensureDefaults() {
        if (!Array.isArray(S.projects)) S.projects = [];
        if (!Array.isArray(S.features)) S.features = [];
        if (!Array.isArray(S.notes)) S.notes = [];
        if (!Array.isArray(S.analyses)) S.analyses = [];
        if (!Array.isArray(S.chats)) S.chats = [];
        if (!Array.isArray(S.importVersions)) S.importVersions = [];
        if (!Array.isArray(S.unmatchedNotes)) S.unmatchedNotes = [];
        if (!S.deletedIds || typeof S.deletedIds !== 'object' || Array.isArray(S.deletedIds)) S.deletedIds = {};
        if (!S._lastLocalSaveAt && S._lastExported) S._lastLocalSaveAt = S._lastExported;
        if (!S._lastGistPushAt && S._lastExported) S._lastGistPushAt = S._lastExported;
        S.projects = S.projects.map(ensureProjectDefaults);
        S.features = S.features.map(ensureFeatureDefaults);
        S.notes = S.notes.map(ensureNoteDefaults);
        S.chats = S.chats.map(ensureChatDefaults);
        if (!ui.filters || typeof ui.filters !== 'object') ui.filters = { pool: 'alle', status: 'alle', category: 'alle', search: '' };
        if (!ui.filters.pool) ui.filters.pool = 'alle';
        if (!ui.multiProjectImport || typeof ui.multiProjectImport !== 'object') ui.multiProjectImport = { rawText: '', prompt: '', resultJson: '', summary: '', updates: [], unmatchedNotes: [], visible: false };
        if (!ui.learningTracker || typeof ui.learningTracker !== 'object') ui.learningTracker = { projectId: 'all', scope: 'completed', filter: 'open', search: '' };
        if (!ui.learningTracker.projectId) ui.learningTracker.projectId = 'all';
        if (!ui.learningTracker.scope) ui.learningTracker.scope = 'completed';
        if (!ui.learningTracker.filter) ui.learningTracker.filter = 'open';
        if (typeof ui.learningTracker.search !== 'string') ui.learningTracker.search = '';
        if (!ui.learningPromptByChatId || typeof ui.learningPromptByChatId !== 'object') ui.learningPromptByChatId = {};
        if (!ui.notesWorkspace || typeof ui.notesWorkspace !== 'object') ui.notesWorkspace = { projectId: 'all', status: 'open', type: 'all', search: '', editingNoteId: '' };
        if (!ui.notesWorkspace.projectId) ui.notesWorkspace.projectId = 'all';
        if (!['open', 'processed', 'archived', 'all'].includes(ui.notesWorkspace.status)) ui.notesWorkspace.status = 'open';
        if (!['all'].concat(NOTE_TYPES).includes(ui.notesWorkspace.type)) ui.notesWorkspace.type = 'all';
        if (typeof ui.notesWorkspace.search !== 'string') ui.notesWorkspace.search = '';
        if (typeof ui.notesWorkspace.editingNoteId !== 'string') ui.notesWorkspace.editingNoteId = '';
      }

      function ensureNoteDefaults(note) {
        const n = note && typeof note === 'object' && !Array.isArray(note) ? note : {};
        if (!n.id) n.id = uid('n');
        if (typeof n.text !== 'string') n.text = String(n.text || n.title || '');
        return n;
      }

      function getNoteType(note) {
        const type = String((note && note.type) || '').trim();
        return NOTE_TYPES.includes(type) ? type : 'note';
      }

      function getNoteStatus(note) {
        const status = String((note && note.status) || '').trim();
        if (NOTE_STATUSES.includes(status)) return status;
        return note && note.processed ? 'processed' : 'open';
      }

      function setNoteStatus(note, status) {
        if (!note) return;
        const normalized = NOTE_STATUSES.includes(status) ? status : 'open';
        note.status = normalized;
        if (normalized === 'processed' || normalized === 'archived') note.processed = true;
        if (normalized === 'open') note.processed = false;
        if (normalized === 'processed' && !note.processedAt) note.processedAt = new Date().toISOString();
        note.updatedAt = new Date().toISOString();
      }

      function isOpenNote(note) {
        return getNoteStatus(note) === 'open';
      }

      function getNoteText(note) {
        return String((note && (note.text || note.title)) || '').trim();
      }

      function save() {
        if (!window.__roadtripSaveAlertState || typeof window.__roadtripSaveAlertState !== 'object') {
          window.__roadtripSaveAlertState = { lastType: '', lastAt: 0 };
        }
        const classifySaveError = (err, stage) => {
          const message = String((err && err.message) || '');
          const lowered = message.toLowerCase();
          const code = Number((err && err.code) || 0);
          const quotaLike =
            (err && err.name === 'QuotaExceededError') ||
            code === 22 || code === 1014 ||
            /quota|quota exceeded|exceeded the quota|storage full|disk full|not enough space/.test(lowered);
          if (quotaLike) return 'quota-exceeded';
          if (stage === 'verify-parse') return 'invalid-json-after-write';
          if (stage === 'verify-read') return 'write-verify-failed';
          return 'save-failed-unknown';
        };
        const maybeShowSaveAlert = (type) => {
          const now = Date.now();
          const cooldownMs = 12000;
          const last = window.__roadtripSaveAlertState || { lastType: '', lastAt: 0 };
          if (last.lastType === type && now - last.lastAt < cooldownMs) return;
          window.__roadtripSaveAlertState = { lastType: type, lastAt: now };
          if (type === 'quota-exceeded') {
            alert('Browser-Speicher voll. Bitte sofort Notfall-Export erstellen.');
          } else {
            alert('Lokales Speichern fehlgeschlagen. Ursache unklar. Bitte Notfall-Export erstellen, bevor du neu lädst.');
          }
        };
        S._lastLocalSaveAt = new Date().toISOString();
        ensureDefaults();
        let stateSaved = false;
        const prevSaveError = {
          type: S._lastSaveError,
          at: S._lastSaveErrorAt,
          message: S._lastSaveErrorMessage
        };
        S._lastSaveError = '';
        S._lastSaveErrorAt = '';
        S._lastSaveErrorMessage = '';
        const stateSnapshot = JSON.parse(JSON.stringify(S));
        const saveToLocalStorage = () => {
          const payload = JSON.stringify(stateSnapshot);
          if (!payload || payload.length < 10) throw new Error('suspiciously small payload');
          localStorage.setItem(LKEY, payload);
          const verifyRaw = localStorage.getItem(LKEY);
          if (!verifyRaw) throw new Error('localStorage write verification failed');
          try { JSON.parse(verifyRaw); } catch (verifyParseErr) { verifyParseErr._roadtripStage = 'verify-parse'; throw verifyParseErr; }
          stateSaved = true;
          storageMeta.storageMode = 'localStorage';
          storageMeta.lastLocalStorageFallbackAt = new Date().toISOString();
          persistStorageMeta();
        };
        const queueIndexedDbSave = () => {
          roadtripSaveQueue = roadtripSaveQueue.then(async () => {
            await saveStateToIndexedDb(stateSnapshot);
            storageMeta.storageMode = 'indexedDB';
            storageMeta.lastIndexedDbSaveAt = new Date().toISOString();
            persistStorageMeta();
            if (typeof updateStorageDisplay === 'function') updateStorageDisplay();
          }).catch((err) => {
            console.error('[save] IndexedDB save failed:', err);
            indexedDbUnavailable = true;
            const errorType = classifySaveError(err, 'save');
            S._lastSaveError = errorType;
            S._lastSaveErrorAt = new Date().toISOString();
            S._lastSaveErrorMessage = String((err && err.message) || '');
            maybeShowSaveAlert(errorType);
            try { saveToLocalStorage(); } catch (fallbackErr) { console.error('[save] localStorage fallback after idb failure also failed:', fallbackErr); }
          });
        };
        try {
          if (!indexedDbUnavailable && ('indexedDB' in window)) {
            queueIndexedDbSave();
            stateSaved = true;
          } else {
            saveToLocalStorage();
          }
        } catch (e) {
          console.error('[save] State save failed:', e);
          S._lastSaveError = prevSaveError.type || '';
          S._lastSaveErrorAt = prevSaveError.at || '';
          S._lastSaveErrorMessage = prevSaveError.message || '';
          const stage = (e && e._roadtripStage) || ((e && e.message === 'localStorage write verification failed') ? 'verify-read' : 'save');
          const errorType = classifySaveError(e, stage);
          const msg = String((e && e.message) || '');
          S._lastSaveError = errorType;
          S._lastSaveErrorAt = new Date().toISOString();
          S._lastSaveErrorMessage = msg;
          maybeShowSaveAlert(errorType);
        }
        try {
          localStorage.setItem(CONFIG_KEY, JSON.stringify(C));
        } catch (e) {
          console.error('[save] Config save failed:', e);
        }
        if (stateSaved) {
          const lbl = $('lastSavedLabel');
          if (lbl) lbl.textContent = 'Gespeichert: ' + formatDateTime(S._lastLocalSaveAt);
        }
        if (typeof updateStorageDisplay === 'function') updateStorageDisplay();
        renderStats();
        renderSidebarProjects();
        return stateSaved;
      }

      function getByteSize(value) {
        try {
          const payload = typeof value === 'string' ? value : JSON.stringify(value);
          return new Blob([payload]).size;
        } catch (err) {
          return String(value == null ? '' : value).length * 2;
        }
      }

      function getRoadtripStorageReport(targetState) {
        const base = targetState || S || {};
        const json = JSON.stringify(base || {});
        const totalBytes = getByteSize(json);
        const keys = ['projects', 'features', 'notes', 'chats', 'importVersions', 'analyses', 'appVersions', 'imports'];
        const areas = keys
          .filter(key => Object.prototype.hasOwnProperty.call(base, key))
          .map(key => {
            const bytes = getByteSize(base[key]);
            return { key, bytes, mb: bytes / (1024 * 1024) };
          })
          .sort((a, b) => b.bytes - a.bytes);
        return { totalBytes, totalMb: totalBytes / (1024 * 1024), areas };
      }

      function updateStorageDisplay() {
        try {
          const wrap = $('storageDiagWrap');
          const total = $('storageDiagTotal');
          const bar = $('storageDiagBar');
          const top = $('storageDiagTop');
          const warn = $('storageDiagWarn');
          if (!wrap || !total || !bar || !top || !warn) return;
          const report = getRoadtripStorageReport();
          const limitBytes = 5 * 1024 * 1024;
          const ratio = Math.max(0, Math.min(1, report.totalBytes / limitBytes));
          const pct = ratio * 100;
          total.textContent = `Gesamtgröße: ${report.totalMb.toFixed(2)} MB`;
          bar.style.width = pct.toFixed(1) + '%';
          bar.style.background = pct < 50 ? '#22c55e' : (pct <= 80 ? '#f59e0b' : '#ef4444');
          top.innerHTML = report.areas.slice(0, 5).map(a => `<div class="mini">${escapeHtml(a.key)}: ${a.mb.toFixed(2)} MB</div>`).join('') || '<div class="mini">Keine Bereiche gefunden.</div>';
          const explain = 'Hinweis: 5 MB sind eine grobe Anzeigeannahme. Browser-/Origin-Quota kann abweichen; auch bei niedriger angezeigter Größe sind Save-Fehler möglich.';
          const modeLine = `Aktiver Speichermodus: ${storageMeta.storageMode === 'indexedDB' ? 'IndexedDB' : 'localStorage Fallback'}.`;
          const idbLine = `Letzter erfolgreicher IndexedDB-Save: ${storageMeta.lastIndexedDbSaveAt ? formatDateTime(storageMeta.lastIndexedDbSaveAt) : '—'}.`;
          const localFallbackLine = `Letzter localStorage-Fallback-Save: ${storageMeta.lastLocalStorageFallbackAt ? formatDateTime(storageMeta.lastLocalStorageFallbackAt) : '—'}.`;
          const backupLine = 'Hinweis: Bestehende localStorage-Altdaten bleiben zunächst als Sicherheitskopie erhalten.';
          const saveErrType = String(S._lastSaveError || '').trim();
          const saveErrAt = String(S._lastSaveErrorAt || '').trim();
          const saveErrMsg = String(S._lastSaveErrorMessage || '').trim();
          const saveErrExplain =
            saveErrType === 'quota-exceeded' ? 'Quota/Speicherlimit erreicht.' :
            saveErrType === 'invalid-json-after-write' ? 'Verify-Parse schlug nach dem Schreiben fehl.' :
            saveErrType === 'write-verify-failed' ? 'Verify-Read aus localStorage schlug nach dem Schreiben fehl.' :
            (saveErrType ? 'Unbekannter Save-Fehler.' : '');
          const saveErrLine = saveErrType
            ? `\nLetzter Save-Fehler: ${saveErrType}${saveErrAt ? ` (${formatDateTime(saveErrAt)})` : ''}. ${saveErrExplain}${saveErrMsg ? ` Detail: ${saveErrMsg}.` : ''} Empfehlung: Notfall-Export erstellen, bevor neu geladen wird.`
            : '';
          warn.textContent = (pct > 80 ? '⚠ Speicher fast voll. Bitte JSON exportieren oder Rohdaten komprimieren.' : '') + '\n' + modeLine + '\n' + idbLine + '\n' + localFallbackLine + '\n' + backupLine + '\n' + explain + saveErrLine;
          wrap.style.display = 'block';
        } catch (err) {
          console.warn('[updateStorageDisplay] failed:', err);
        }
      }

      function renderSidebarProjects() {
        const wrap = $('sidebarProjects');
        const isAll = ui.activeProjectId === ALL_PROJECTS_KEY;
        const featureCountByProjectId = getVisibleFeatures(S.features).reduce((acc, f) => {
          const pid = f.projectId || '';
          acc[pid] = (acc[pid] || 0) + 1;
          return acc;
        }, {});
        const allBtn = `
          <button class="sidebar-project ${isAll ? 'active' : ''}" data-open-project="${ALL_PROJECTS_KEY}" style="${isAll ? 'border-left:3px solid var(--accent-2);' : ''}">⊕ Alle Projekte</button>
        `;
        wrap.innerHTML = allBtn + S.projects.filter(p => p.status !== 'archiviert').map(p => {
          const isActive = ui.activeProjectId === p.id;
          const featureCount = featureCountByProjectId[p.id] || 0;
          const updatedAt = p.updatedAt || p.lastAnalyzedAt || p.lastHtmlImportedAt || p.createdAt || '';
          const updatedLabel = `aktualisiert: ${updatedAt ? formatDateTime(updatedAt) : '—'}`;
          const emptyHint = featureCount === 0 ? ' · noch keine Features' : '';
          const chatStructure = getProjectChatStructure(p.id);
          const chatIcons = `${chatStructure.hasMainChat ? '🧭' : '🕸️'}${chatStructure.hasSprintChat ? '🏃' : ''}`;
          const mainChatLabel = chatStructure.hasMainChat ? 'Hauptchat vorhanden' : 'Kein Hauptchat';
          const sprintLabel = `${chatStructure.sprintCount} ${chatStructure.sprintCount === 1 ? 'Sprint' : 'Sprints'}`;
          const chatStatusLabel = `${mainChatLabel} · ${sprintLabel}`;
          return `<button class="sidebar-project ${isActive ? 'active' : ''}" data-open-project="${escapeAttr(p.id)}" title="${escapeAttr(chatStatusLabel)}" style="${isActive ? 'border-left:3px solid var(--accent);font-weight:700;' : ''}text-align:left;">
            <div>${escapeHtml(chatIcons)} ${escapeHtml(p.title)} (${featureCount})${p.status === 'archiviert' ? '<span class="mini"> (arch.)</span>' : ''}</div>
            <div class="mini">${escapeHtml(updatedLabel + ' · ' + chatStatusLabel + emptyHint)}</div>
          </button>`;
        }).join('');
        // Re-wire after DOM update
        qq('[data-open-project]', wrap).forEach(btn => btn.addEventListener('click', () => {
          const pid = btn.dataset.openProject;
          ui.activeProjectId = pid;
          ui.projectEditMode = false;
          ui.editingProjectId = pid === ALL_PROJECTS_KEY ? null : pid;
          // Sync import draft project
          if (pid !== ALL_PROJECTS_KEY) ui.importDraft.projectId = pid;
          if (ui.view === 'database' || ui.view === 'project') {
            // Stay in current view but re-render with new context
          } else {
            ui.view = 'project';
          }
          renderNav();
          renderSidebarProjects();
          renderView();
        }));
      }

        if (isAll) {
          return `<div style="background:var(--surface-3);border:1px solid var(--border);border-radius:10px;padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px;">

        </div>`;
      }

        return `
