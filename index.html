            <h3>Feature Database</h3>
            <label class="pill" style="cursor:pointer;">
              <input id="toggleAllProjects" type="checkbox" ${ui.showAllProjects?'checked':''} />
              Alle Projekte
            </label>
          </div>
          <div class="db-toolbar">
            <input id="filterSearch" type="text" value="${escapeAttr(ui.filters.search)}" placeholder="Search features..." />
            <select id="filterPool">${['alle'].concat(FEATURE_POOLS).map(s => `<option value="${s}" ${ui.filters.pool===s?'selected':''}>${s === 'alle' ? 'alle' : getFeaturePoolLabel(s)}</option>`).join('')}</select>
            <select id="filterStatus">${statusOptions.map(s => `<option value="${s}" ${ui.filters.status===s?'selected':''}>${s === 'alle' ? 'alle' : getFeatureStatusLabel(s)}</option>`).join('')}</select>
            <select id="filterCategory">${['alle'].concat(FEATURE_CATEGORIES).map(s => `<option ${ui.filters.category===s?'selected':''}>${s}</option>`).join('')}</select>
            <label class="pill"><input id="toggleKanban" type="checkbox" ${ui.showKanban?'checked':''} /> Kanban</label>
          </div>
          ${ui.showKanban
            ? (renderKanban(plannedFeatures, { title: getFeaturePoolLabel('planned'), pool: 'planned' }) + renderKanban(implementedFeatures, { title: getFeaturePoolLabel('implemented'), pool: 'implemented' }))
            : (renderTable(plannedFeatures, { title: getFeaturePoolLabel('planned') }) + renderTable(implementedFeatures, { title: getFeaturePoolLabel('implemented') }))}
        `;
      }

      function getProjectChats(projectId) {
        if (!projectId) return [];
        return (S.chats || [])
          .filter(c => c && c.projectId === projectId)
          .map(ensureChatDefaults)
          .sort((a, b) => String(b.updatedAt || b.startedAt || '').localeCompare(String(a.updatedAt || a.startedAt || '')));
      }

      function getProjectChatStructure(projectId) {
        const project = (S.projects || []).find(p => p && p.id === projectId) || null;
        const chats = (S.chats || []).filter(c => c && c.projectId === projectId);
        const mainChatById = project && project.mainChatId
          ? chats.find(c => c && c.id === project.mainChatId)
          : null;
        const mainChatByType = chats.find(c => c && c.type === 'project-main') || null;
        const sprintCount = chats.filter(c => c && c.type === 'sprint').length;

        return {
          hasMainChat: !!(mainChatById || mainChatByType),
          hasSprintChat: sprintCount > 0,
          sprintCount
        };
      }

      function getChatLearningMeta(chat) {
        return ensureChatDefaults(chat).learningMeta;
      }

      function isChatLearningDone(chat) {
        const meta = getChatLearningMeta(chat);
        return !!(meta.learningsExtracted && meta.ankiCreated && meta.notionDevDbUpdated && meta.reviewed);
      }

      function getChatLearningOpenCount(chat) {
        const meta = getChatLearningMeta(chat);
        return [meta.learningsExtracted, meta.ankiCreated, meta.notionDevDbUpdated, meta.reviewed].filter(v => !v).length;
      }

      function getLearningTrackerChats() {
        const tracker = ui.learningTracker || { projectId: 'all', scope: 'completed', filter: 'open', search: '' };
        const isCompleted = (chat) => chat.status === 'abgeschlossen' || !!chat.completedAt;
        return (S.chats || [])
          .map(ensureChatDefaults)
          .filter(chat => tracker.scope === 'all' ? true : isCompleted(chat))
          .filter(chat => tracker.projectId === 'all' ? true : chat.projectId === tracker.projectId)
          .filter(chat => {
            if (tracker.filter === 'all') return true;
            const meta = getChatLearningMeta(chat);
            if (tracker.filter === 'open') return !isChatLearningDone(chat);
            if (tracker.filter === 'anki-open') return !meta.ankiCreated;
            if (tracker.filter === 'learnings-open') return !meta.learningsExtracted;
            if (tracker.filter === 'devdb-open') return !meta.notionDevDbUpdated;
            if (tracker.filter === 'done') return isChatLearningDone(chat);
            return true;
          })
          .filter(chat => {
            const qText = normalizeText(tracker.search || '');
            if (!qText) return true;
            const project = S.projects.find(p => p.id === chat.projectId);
            const blob = normalizeText([project ? project.title : '', chat.title, chat.summary].join(' '));
            return blob.includes(qText);
          })
          .sort((a, b) => String(b.completedAt || b.handoffImportedAt || b.updatedAt || b.startedAt || '').localeCompare(String(a.completedAt || a.handoffImportedAt || a.updatedAt || a.startedAt || '')));
      }

      function updateChatLearningMeta(chatId, patch) {
        const idx = (S.chats || []).findIndex(c => c && c.id === chatId);
        if (idx < 0) return;
        const chat = ensureChatDefaults(S.chats[idx]);
        chat.learningMeta = Object.assign({}, chat.learningMeta, patch || {});
        chat.learningMeta.learningsExtracted = !!chat.learningMeta.learningsExtracted;
        chat.learningMeta.ankiCreated = !!chat.learningMeta.ankiCreated;
        chat.learningMeta.notionDevDbUpdated = !!chat.learningMeta.notionDevDbUpdated;
        chat.learningMeta.reviewed = !!chat.learningMeta.reviewed;
        chat.learningMeta.notes = String(chat.learningMeta.notes || '');
        chat.updatedAt = new Date().toISOString();
        S.chats[idx] = chat;
        save();
        renderView();
      }

      function buildChatLearningPrompt(chatId) {
        const chat = ensureChatDefaults((S.chats || []).find(c => c && c.id === chatId) || null);
        if (!chat || !chat.id) return '';
        const project = S.projects.find(p => p.id === chat.projectId) || {};
        const prompt = [
          'Du bist mein Learning-Reviewer für einen abgeschlossenen Roadtrip-Chat/Sprint.',
          '',
          '## Projektkontext',
          `- Projekttitel: ${project.title || '—'}`,
          `- Projektsummary: ${project.summary || '—'}`,
          `- Aktueller Fokus: ${project.currentFocus || '—'}`,
          `- Nächster Projektschritt: ${project.nextStep || '—'}`,
          '',
          '## Chatkontext',
          `- Chattitel: ${chat.title || '—'}`,
          `- Chattyp: ${chat.type || '—'}`,
          `- Status: ${chat.status || '—'}`,
          `- URL: ${chat.url || '—'}`,
          `- startedAt: ${chat.startedAt || '—'}`,
          `- completedAt: ${chat.completedAt || '—'}`,
          `- updatedAt: ${chat.updatedAt || '—'}`,
          `- Summary: ${chat.summary || '—'}`,
          `- Next Step: ${chat.nextStep || '—'}`,
          '',
          '### rawReportText',
          chat.rawReportText || '—',
          '',
          '### rawHandoffText',
          chat.rawHandoffText || '—',
          '',
          '## Aufgabe',
          '- Dev-Learnings extrahieren',
          '- Fehler / Stolperstellen extrahieren',
          '- Architektur- und Code-Entscheidungen extrahieren',
          '- Workflow-Learnings extrahieren',
          '- Anki-Kandidaten formulieren',
          '- Dev-/Notion-DB-Eintrag formulieren',
          '- offene Fragen notieren',
          '',
          '## Ausgabeformat (Markdown)',
          '# Dev-Learnings',
          '- ...',
          '',
          '# Fehler / Stolperstellen',
          '- ...',
          '',
          '# Architektur- und Code-Entscheidungen',
          '- ...',
          '',
          '# Workflow-Learnings',
          '- ...',
          '',
          '# Anki-Kandidaten',
          '| Frage | Antwort | Tags |',
          '|---|---|---|',
          '',
          '# Dev-/Notion-DB-Eintrag',
          'Titel:',
          'Projekt:',
          'Kurzsummary:',
          'Wichtige Entscheidungen:',
          'Nächste Wiederverwendung:',
          '',
          '# Offene Fragen',
          '- ...'
        ].join('\n');
        ui.learningPromptByChatId[chatId] = prompt;
        return prompt;
      }

      function findProjectMainChatCandidate(projectId) {
        if (!projectId) return null;
        return (S.chats || [])
          .filter(c => c && c.projectId === projectId && c.type === 'project-main')
          .sort((a, b) => String(b.updatedAt || b.startedAt || '').localeCompare(String(a.updatedAt || a.startedAt || '')))[0] || null;
      }

      function getProjectMainChat(projectId) {
        if (!projectId) return null;
        const project = S.projects.find(x => x.id === projectId);
        if (!project) return null;
        if (project.mainChatId) {
          const byId = (S.chats || []).find(c => c && c.id === project.mainChatId && c.projectId === projectId);
          if (byId) return ensureChatDefaults(byId);
        }
        const found = findProjectMainChatCandidate(projectId);
        if (!found) return null;
        project.mainChatId = found.id;
        found.mainChatId = found.id;
        if (!String(project.mainChatUrl || '').trim() && String(found.url || '').trim()) project.mainChatUrl = found.url.trim();
        return ensureChatDefaults(found);
      }

      function getProjectSourceChats(projectId) {
        return getProjectChats(projectId);
      }

      function getChatWorkflowState(projectId) {
        if (!projectId || projectId === ALL_PROJECTS_KEY) {
          ui.chatWorkflow = { projectId: projectId || '', sourceChatId: '', sprintGoal: '', sprintStartPrompt: '', sprintHandoffPrompt: '', sprintStartJson: '', mainChatBootstrapJson: '', prompt: '', mode: '', sprintExecutionMode: SPRINT_EXECUTION_MODES.codexControl };
          ui.chatWorkflowHandoff = { projectId: projectId || '', sourceChatId: '', rawJson: '' };
          return ui.chatWorkflow;
        }
        if (!ui.chatWorkflowByProject || typeof ui.chatWorkflowByProject !== 'object') ui.chatWorkflowByProject = {};
        const existingState = ui.chatWorkflowByProject[projectId];
        const state = (existingState && typeof existingState === 'object')
          ? existingState
          : { projectId, sourceChatId: '', sprintGoal: '', sprintStartPrompt: '', sprintHandoffPrompt: '', sprintStartJson: '', mainChatBootstrapJson: '', prompt: '', mode: '', sprintExecutionMode: SPRINT_EXECUTION_MODES.codexControl };
        state.projectId = projectId;
        if (typeof state.sprintStartPrompt !== 'string') state.sprintStartPrompt = '';
        if (typeof state.sprintHandoffPrompt !== 'string') state.sprintHandoffPrompt = '';
        if (typeof state.sprintStartJson !== 'string') state.sprintStartJson = '';
        if (typeof state.mainChatBootstrapJson !== 'string') state.mainChatBootstrapJson = '';
        if (!Object.values(SPRINT_EXECUTION_MODES).includes(state.sprintExecutionMode)) state.sprintExecutionMode = SPRINT_EXECUTION_MODES.codexControl;
        ui.chatWorkflowByProject[projectId] = state;
        ui.chatWorkflow = state;
        const sourceChats = getProjectSourceChats(projectId);
        if (!state.sourceChatId || !sourceChats.some(c => c.id === state.sourceChatId)) {
          state.sourceChatId = (sourceChats[0] || {}).id || '';
        }
        const handoff = getChatWorkflowHandoffState(projectId);
        if (handoff.sourceChatId !== state.sourceChatId) handoff.sourceChatId = state.sourceChatId || '';
        return state;
      }

      function getChatWorkflowHandoffState(projectId) {
        if (!projectId || projectId === ALL_PROJECTS_KEY) {
          ui.chatWorkflowHandoff = { projectId: projectId || '', sourceChatId: '', rawJson: '' };
          return ui.chatWorkflowHandoff;
        }
        if (!ui.chatWorkflowHandoffByProject || typeof ui.chatWorkflowHandoffByProject !== 'object') ui.chatWorkflowHandoffByProject = {};
        const existingState = ui.chatWorkflowHandoffByProject[projectId];
        const state = (existingState && typeof existingState === 'object')
          ? existingState
          : { projectId, sourceChatId: '', rawJson: '' };
        state.projectId = projectId;
        if (state.sourceChatId && !getProjectSourceChats(projectId).some(c => c.id === state.sourceChatId)) {
          state.sourceChatId = '';
          state.rawJson = '';
        }
        ui.chatWorkflowHandoffByProject[projectId] = state;
        ui.chatWorkflowHandoff = state;
        return state;
      }

      function getProjectMomentumPromptState(projectId) {
        if (!ui.projectMomentumPromptByProject || typeof ui.projectMomentumPromptByProject !== 'object') {
          ui.projectMomentumPromptByProject = {};
        }
        if (!ui.projectMomentumPromptByProject[projectId]) {
          ui.projectMomentumPromptByProject[projectId] = {
            prompt: '',
            resultJson: ''
          };
        }
        return ui.projectMomentumPromptByProject[projectId];
      }

      function setChatWorkflowSource(projectId, sourceChatId) {
        if (!projectId || projectId === ALL_PROJECTS_KEY) return;
        const project = S.projects.find(p => p.id === projectId);
        if (!project || project.status === 'archiviert') return;
        const st = getChatWorkflowState(projectId);
        const prevSourceChatId = st.sourceChatId || '';
        st.sourceChatId = sourceChatId || '';
        const handoff = getChatWorkflowHandoffState(projectId);
        if (prevSourceChatId && prevSourceChatId !== st.sourceChatId) handoff.rawJson = '';
        handoff.sourceChatId = st.sourceChatId;
      }

      function clearProjectMainChat(projectId) {
        if (!projectId) return;
        const project = S.projects.find(x => x.id === projectId);
        if (project) {
          project.mainChatId = '';
          project.mainChatUrl = '';
          project.updatedAt = new Date().toISOString();
        }
        (S.chats || []).forEach(c => {
          if (!c || c.projectId !== projectId) return;
          c.mainChatId = '';
        });
      }

      function setProjectMainChat(projectId, chatId) {
        const project = S.projects.find(x => x.id === projectId);
        const chat = S.chats.find(x => x.id === chatId && x.projectId === projectId);
        if (!project || !chat) return false;
        const now = new Date().toISOString();
        chat.type = 'project-main';
        chat.mainChatId = chat.id;
        project.mainChatId = chat.id;
        if (chat.url && chat.url.trim()) project.mainChatUrl = chat.url.trim();
        (S.chats || []).forEach(c => {
          if (!c || c.projectId !== projectId) return;
          c.mainChatId = chat.id;
        });
        project.updatedAt = now;
        chat.updatedAt = now;
        return true;
      }

      function markProjectNeedsCodeAnalysisAfterSprint(project, timestamp) {
        if (!project) return;
        const now = String(timestamp || new Date().toISOString());
        project.needsCodeAnalysisAfterSprint = true;
        project.lastSprintCompletedAt = now;
        project.updatedAt = now;
      }

      function markProjectCodeAnalysisCompleted(projectId, timestamp) {
        const project = (S.projects || []).find(p => p && p.id === projectId);
        if (!project) return;
        const now = String(timestamp || new Date().toISOString());
        project.lastAnalyzedAt = now;
        project.lastCodeAnalysisCompletedAt = now;
        project.needsCodeAnalysisAfterSprint = false;
        project.updatedAt = now;
      }

      function projectNeedsCodeAnalysisAfterSprint(project) {
        if (!project) return false;
        const sprintDoneAt = String(project.lastSprintCompletedAt || '').trim();
        const analyzedAt = String(project.lastAnalyzedAt || '').trim();
        if (analyzedAt && sprintDoneAt && analyzedAt >= sprintDoneAt) return false;
        if (project.needsCodeAnalysisAfterSprint === true) return true;
        if (!sprintDoneAt) return false;
        return !analyzedAt || analyzedAt < sprintDoneAt;
      }

      function renderPostSprintCodeAnalysisNotice(project) {
        if (!projectNeedsCodeAnalysisAfterSprint(project)) return '';
        const sprintDoneAt = String(project.lastSprintCompletedAt || '').trim();
        const analyzedAt = String(project.lastAnalyzedAt || '').trim();
        return `
          <div class="notice notice-warn" style="margin:8px 0 12px;">
            <div><strong>Seit dem letzten Sprintabschluss wurde noch keine neue Codeanalyse durchgeführt.</strong></div>
            <div class="mini" style="margin-top:6px;">
              Letzter Sprintabschluss: ${escapeHtml(sprintDoneAt ? formatDateTime(sprintDoneAt) : '—')} · Letzte Codeanalyse: ${escapeHtml(analyzedAt ? formatDateTime(analyzedAt) : '—')}
            </div>
            <div class="stack-row" style="margin-top:8px;">
              <button class="btn btn-secondary" data-open-code-analysis-import="${escapeAttr(project.id || '')}">Codeanalyse im Import öffnen</button>
            </div>
          </div>
        `;
      }

      function setSelectedChatAsMain(chatId) {
        const chat = S.chats.find(c => c && c.id === chatId);
        if (!chat) return alert('Chat nicht gefunden.');
        const project = S.projects.find(p => p.id === chat.projectId);
        if (!project) return alert('Projekt zum Chat nicht gefunden.');
        if (project.status === 'archiviert') return alert('Archivierte Projekte können nicht im Chat-Workflow geändert werden.');
        const needsTypeUpgrade = chat.type !== 'project-main';
        if (needsTypeUpgrade) {
          const ok = confirm('Dieser Chat ist kein "project-main". Soll der Typ auf "project-main" geändert werden?');
          if (!ok) return;
          chat.type = 'project-main';
        }
        if (!setProjectMainChat(project.id, chat.id)) return alert('Hauptchat konnte nicht gesetzt werden.');
        chat.mainChatId = chat.id;
        chat.updatedAt = new Date().toISOString();
        save();
        renderView();
      }

      function getFeaturePriorityRank(priority) {
        const rank = { kritisch: 0, hoch: 1, mittel: 2, niedrig: 3 };
        return Object.prototype.hasOwnProperty.call(rank, priority) ? rank[priority] : 4;
      }

      function getFeatureMomentumRank(feature) {
        const f = applyFeatureDefaults(Object.assign({}, feature || {}));
        const status = f.status;
        if (status === 'in-progress') return 0;
        if (status === 'selected-for-sprint') return 1;
        if (status === 'planned') return 2;
        if (status === 'idea') return 3;
        if (status === 'blocked') return 8;
        if (status === 'deferred') return 9;
        return 10;
      }

      function sortMomentumFeatures(features) {
        return (features || []).slice().sort((a, b) => {
          const momentum = getFeatureMomentumRank(a) - getFeatureMomentumRank(b);
          if (momentum !== 0) return momentum;
          const prio = getFeaturePriorityRank((a && a.priority) || '') - getFeaturePriorityRank((b && b.priority) || '');
          if (prio !== 0) return prio;
          const updated = String((b && b.updatedAt) || '').localeCompare(String((a && a.updatedAt) || ''));
          if (updated !== 0) return updated;
          return String((b && b.createdAt) || '').localeCompare(String((a && a.createdAt) || ''));
        });
      }

      function getProjectMomentumData(projectId, projectFeatures, projectNotes) {
        const plannedFeatures = getVisibleFeatures(projectFeatures || [])
          .filter(f => f && f.projectId === projectId)
          .map(f => applyFeatureDefaults(Object.assign({}, f)))
          .filter(isPlannedFeature);
        const sortedPlanned = sortMomentumFeatures(plannedFeatures);
        const activeFeatures = sortedPlanned.filter(f => ['selected-for-sprint', 'in-progress'].includes(f.status));
        const candidateFeatures = sortedPlanned.filter(f => ['planned', 'idea'].includes(f.status)).slice(0, 5);
        const blockedFeatures = sortedPlanned.filter(f => f.status === 'blocked');
        const deferredFeatures = sortedPlanned.filter(f => f.status === 'deferred');
        const openNotes = (projectNotes || [])
          .filter(n => n && n.projectId === projectId && isOpenNote(n) && String(n.text || '').trim())
          .slice(0, 3);
        return { plannedFeatures: sortedPlanned, activeFeatures, candidateFeatures, blockedFeatures, deferredFeatures, openNotes };
      }

      function getRelevantFeatureTitles(projectId, maxItems) {
        const projectFeatures = getVisibleFeatures(S.features).filter(f => f.projectId === projectId && isPlannedFeature(f));
        const sorted = sortMomentumFeatures(projectFeatures);
        return sorted.slice(0, Math.max(1, maxItems || 8)).map(f => `- ${f.title} (${getFeatureStatusLabel(f.status)})`);
      }

      function getRelevantUnprocessedNotes(projectId, maxItems) {
        return (S.notes || [])
          .filter(n => n && n.projectId === projectId && isOpenNote(n) && String(n.text || '').trim())
          .sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')))
          .slice(0, Math.max(0, maxItems || 5))
          .map(n => '- ' + shorten(String(n.text || '').trim(), 160));
      }

      function mapHandoffFeatureCategory(category) {
        const normalized = normalizeText(category);
        if (!normalized) return 'Workflow';
        const match = FEATURE_CATEGORIES.find(c => normalizeText(c) === normalized);
        if (match) return match;
        if (normalized.includes('workflow')) return 'Workflow';
        if (normalized.includes('ui')) return 'UI';
        if (normalized.includes('sync')) return 'Sync';
        if (normalized.includes('ki') || normalized.includes('ai')) return 'KI';
        if (normalized.includes('import') || normalized.includes('export')) return 'Import/Export';
        if (normalized.includes('ansicht') || normalized.includes('view')) return 'Ansicht';
        if (normalized.includes('darstellung')) return 'Darstellung';
        if (normalized.includes('datenmodell') || normalized.includes('modell')) return 'Datenmodell';
        return 'Sonstiges';
      }

      function mapHandoffFeaturePriority(priority) {
        const normalized = normalizeText(priority);
        if (!normalized) return 'mittel';
        const match = PRIORITIES.find(p => normalizeText(p) === normalized);
        if (match) return match;
        if (normalized.includes('krit')) return 'kritisch';
        if (normalized.includes('hoch') || normalized.includes('high')) return 'hoch';
        if (normalized.includes('niedrig') || normalized.includes('low')) return 'niedrig';
        return 'mittel';
      }

      function mapHandoffChatStatus(status) {
        const normalized = normalizeText(status);
        if (!normalized) return '';
        const match = CHAT_STATUS.find(s => normalizeText(s) === normalized);
        return match || '';
      }

      function appendHandoffToChat(chat, rawHandoffText, now) {
        if (!chat) return;
        if (!Array.isArray(chat.handoffHistory)) chat.handoffHistory = [];
        const raw = String(rawHandoffText || '');
        chat.rawHandoffText = raw || chat.rawHandoffText || '';
        chat.handoffImportedAt = now;
        chat.handoffHistory.push({ importedAt: now, raw });
        if (chat.handoffHistory.length > 10) chat.handoffHistory = chat.handoffHistory.slice(chat.handoffHistory.length - 10);
        if (!chat.rawReportText) chat.rawReportText = raw;
      }

      function ensureProjectMainChatForHandoff(projectId, sourceChatId, normalized, rawHandoffText, now) {
        const project = S.projects.find(p => p.id === projectId);
        if (!project) return null;
        const sourceChat = sourceChatId ? S.chats.find(c => c && c.id === sourceChatId && c.projectId === projectId) : null;
        let mainChat = getProjectMainChat(projectId);
        if (!mainChat) {
          mainChat = ensureChatDefaults({
            id: uid('ch'),
            projectId,
            title: project.title ? project.title + ' · Hauptchat' : 'Projekt-Hauptchat',
            type: 'project-main',
            status: 'aktiv',
            url: project.mainChatUrl || '',
            summary: normalized.summary || project.summary || '',
            nextStep: normalized.nextStep || project.nextStep || '',
            rawReportText: rawHandoffText || '',
            rawHandoffText: rawHandoffText || '',
            sourceChatId: sourceChat ? sourceChat.id : '',
            parentChatId: sourceChat ? sourceChat.id : '',
            startedAt: now,
            updatedAt: now
          });
          mainChat.mainChatId = mainChat.id;
          appendHandoffToChat(mainChat, rawHandoffText, now);
          S.chats.push(mainChat);
          project.mainChatId = mainChat.id;
          if (mainChat.url && mainChat.url.trim()) project.mainChatUrl = mainChat.url.trim();
          return mainChat;
        }
        mainChat.type = 'project-main';
        mainChat.status = mainChat.status || 'aktiv';
        mainChat.summary = normalized.summary || mainChat.summary || project.summary || '';
        mainChat.nextStep = normalized.nextStep || mainChat.nextStep || project.nextStep || '';
        mainChat.sourceChatId = sourceChat ? sourceChat.id : mainChat.sourceChatId || '';
        if (!mainChat.parentChatId && sourceChat) mainChat.parentChatId = sourceChat.id;
        mainChat.mainChatId = mainChat.id;
        appendHandoffToChat(mainChat, rawHandoffText, now);
        mainChat.updatedAt = now;
        project.mainChatId = mainChat.id;
        if (mainChat.url && mainChat.url.trim()) project.mainChatUrl = mainChat.url.trim();
        return mainChat;
      }

      function parseSprintHandoffJson(rawJson) {
        const extractedJson = extractJsonObjectFromText(rawJson || '');
        const parsed = JSON.parse(extractedJson);
        if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) throw new Error('invalid-handoff-object');
        const summary = String(parsed.summary || '').trim();
        const currentFocus = String(parsed.currentFocus || '').trim();
        const nextStep = String(parsed.nextStep || '').trim();
        const workMode = String(parsed.workMode || '').trim();
        const normalizedWorkMode = workMode && Object.values(CHAT_WORK_MODES).includes(workMode) ? workMode : '';
        if (!summary || !currentFocus || !nextStep) throw new Error('handoff-required-fields');

        let openQuestions = [];
        if (parsed.openQuestions != null) {
          if (!Array.isArray(parsed.openQuestions)) throw new Error('handoff-open-questions');
          openQuestions = parsed.openQuestions.map(x => String(x || '').trim()).filter(Boolean);
        }

        let proposedFeatures = [];
        if (parsed.proposedFeatures != null) {
          if (!Array.isArray(parsed.proposedFeatures)) throw new Error('handoff-proposed-features');
          proposedFeatures = parsed.proposedFeatures.map(item => {
            if (!item || typeof item !== 'object') return null;
            const title = String(item.title || '').trim();
            if (!title) return null;
            return {
              title,
              description: String(item.description || '').trim(),
              category: mapHandoffFeatureCategory(item.category),
              priority: mapHandoffFeaturePriority(item.priority),
              status: 'planned'
            };
          }).filter(Boolean);
        }
        const sourceChatTitle = String(parsed.sourceChatTitle || parsed.chatTitle || '').trim();
        const sourceChatUrl = String(parsed.sourceChatUrl || parsed.chatUrl || parsed.url || '').trim();
        const sourceChatType = normalizeText(parsed.sourceChatType || parsed.chatType) === 'sprint' ? 'sprint' : '';
        const sourceChatStatus = mapHandoffChatStatus(parsed.sourceChatStatus || parsed.status);
        return {
          parsed,
          normalized: {
            chatTitle: String(parsed.chatTitle || '').trim(),
            chatType: normalizeText(parsed.chatType) === 'sprint' ? 'sprint' : '',
            status: mapHandoffChatStatus(parsed.status),
            sourceChatTitle,
            sourceChatUrl,
            sourceChatType,
            sourceChatStatus,
            summary,
            currentFocus,
            nextStep,
            workMode: normalizedWorkMode,
            openQuestions,
            proposedFeatures
          }
        };
      }

      function importSprintHandoffFromJson(projectId, sourceChatId, rawJson) {
        const project = S.projects.find(p => p.id === projectId);
        if (!project) return alert('Projekt wurde nicht gefunden.');
        if (project.status === 'archiviert') return alert('Archivierte Projekte können keinen Sprint-Bericht importieren.');
        if (!String(rawJson || '').trim()) return alert('Bitte Sprint-Handoff-JSON einfügen.');
        let normalized;
        let extractedJson = '';
        try {
          const parsedResult = parseSprintHandoffJson(rawJson);
          normalized = parsedResult.normalized;
          extractedJson = extractJsonObjectFromText(rawJson || '');
        } catch (err) {
          if (err && err.message === 'invalid-json-not-found') return alert('Ungültiges JSON: Kein JSON-Objekt erkannt.');
          if (err && err.message === 'invalid-handoff-object') return alert('Ungültiges JSON: Erwartet wird ein JSON-Objekt.');
          if (err && err.message === 'handoff-required-fields') return alert('Ungültiges JSON: summary, currentFocus und nextStep sind Pflichtfelder.');
          if (err && err.message === 'handoff-open-questions') return alert('Ungültiges JSON: openQuestions muss ein Array aus Strings sein.');
          if (err && err.message === 'handoff-proposed-features') return alert('Ungültiges JSON: proposedFeatures muss ein Array aus Objekten sein.');
          return alert('Sprint-Bericht konnte nicht importiert werden: ' + (err && err.message ? err.message : 'Unbekannter Fehler'));
        }

        const now = new Date().toISOString();
        const sourceChat = ensureSourceChatForHandoff(projectId, sourceChatId, normalized, extractedJson, now);
        if (!sourceChat) return alert('Ausgangschat konnte nicht gefunden oder aus dem Handoff erzeugt werden.');

        sourceChat.summary = normalized.summary;
        sourceChat.nextStep = normalized.nextStep;
        sourceChat.rawReportText = extractedJson;
        sourceChat.rawHandoffText = extractedJson;
        sourceChat.updatedAt = now;
        if (normalized.sourceChatTitle && !sourceChat.title) sourceChat.title = normalized.sourceChatTitle;
        if (normalized.sourceChatUrl && !sourceChat.url) sourceChat.url = normalized.sourceChatUrl;
        if (normalized.sourceChatType) sourceChat.type = normalized.sourceChatType;
        if (normalized.sourceChatStatus) sourceChat.status = normalized.sourceChatStatus;
        else if (normalized.status) sourceChat.status = normalized.status;
        if (sourceChat.status === 'abgeschlossen' && !sourceChat.completedAt) sourceChat.completedAt = now;

        project.currentFocus = normalized.currentFocus;
        project.nextStep = normalized.nextStep;
        const mainChat = ensureProjectMainChatForHandoff(projectId, sourceChat.id, normalized, extractedJson, now);
        project.updatedAt = now;
        markProjectNeedsCodeAnalysisAfterSprint(project, now);

        const sourceChatTitle = sourceChat.title || normalized.sourceChatTitle || normalized.chatTitle || 'Sprint';
        let createdFeatures = 0;
        const existingByTitle = new Set(
          getVisibleFeatures(S.features)
            .filter(f => f.projectId === projectId)
            .map(f => normalizeText(f.title || ''))
            .filter(Boolean)
        );

        normalized.proposedFeatures.forEach(item => {
          const normalizedTitle = normalizeText(item.title);
          if (!normalizedTitle || existingByTitle.has(normalizedTitle)) return;
          const cleanDescription = String(item.description || '').trim();
          const originPrefix = `Aus Sprint: ${sourceChatTitle}`;
          const description = cleanDescription
            ? `${originPrefix}\n\n${cleanDescription}`
            : originPrefix;
          const created = ensureFeatureDefaults({
            id: uid('f'),
            projectId,
            title: item.title,
            description,
            category: item.category,
            priority: item.priority,
            status: 'planned',
            pool: 'planned',
            reviewStatus: 'needs-review',
            sourceType: 'chat-handoff',
            sourceChatId: sourceChat.id,
            sourceChatTitle,
            sourceNoteIds: [],
            createdAt: now,
            updatedAt: now
          });
          S.features.push(created);
          existingByTitle.add(normalizedTitle);
          createdFeatures++;
        });

        const st = getChatWorkflowState(projectId);
        st.sourceChatId = sourceChat.id;
        st.mode = 'sprint-handoff-import';
        st.prompt = buildReturnToMainChatPrompt(projectId, sourceChat.id) || buildMainChatBootstrapPrompt(projectId, sourceChat.id);
        const handoff = getChatWorkflowHandoffState(projectId);
        handoff.rawJson = extractedJson;
        handoff.sourceChatId = sourceChat.id;
        save();
        renderView();
        alert('Sprint-Bericht importiert. Projekt und Hauptchat-Kontext aktualisiert. Neue geplante Features: ' + createdFeatures + '.');
      }

      function importSprintStartJsonFromMainChat(projectId, rawJson) {
        const project = S.projects.find(p => p && p.id === projectId);
        if (!project) return alert('Projekt wurde nicht gefunden.');
        if (project.status === 'archiviert') return alert('Archivierte Projekte können keinen Sprintstart importieren.');
        const cleanRaw = String(rawJson || '').trim();
        if (!cleanRaw) return alert('Bitte Sprintstart-JSON aus dem Hauptchat einfügen.');
        let extractedJson = '';
        let parsed;
        try {
          extractedJson = extractJsonObjectFromText(cleanRaw);
          parsed = JSON.parse(extractedJson);
        } catch (err) {
          if (err && err.message === 'invalid-json-not-found') return alert('Ungültiges JSON: Kein JSON-Objekt erkannt.');
          return alert('Ungültiges JSON: ' + (err && err.message ? err.message : 'Parsing fehlgeschlagen.'));
        }
        if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) return alert('Ungültiges JSON: Erwartet wird ein JSON-Objekt.');
        if (String(parsed.type || '').trim() !== 'roadtrip-sprint-start') return alert('Dieses JSON ist kein Roadtrip-Sprintstart-JSON.');

        const missing = [];
        const chatTitle = String(parsed.chatTitle || '').trim();
        const chatType = String(parsed.chatType || '').trim();
        const status = String(parsed.status || '').trim();
        const summary = String(parsed.summary || '').trim();
        const currentFocus = String(parsed.currentFocus || '').trim();
        const nextStep = String(parsed.nextStep || '').trim();
        const workMode = String(parsed.workMode || '').trim();
        const normalizedWorkMode = workMode && Object.values(CHAT_WORK_MODES).includes(workMode) ? workMode : '';
        if (!chatTitle) missing.push('chatTitle');
        if (!chatType) missing.push('chatType');
        else if (chatType !== 'sprint') missing.push('chatType (muss "sprint" sein)');
        if (!status) missing.push('status');
        else if (status !== 'aktiv') missing.push('status (muss "aktiv" sein)');
        if (!summary) missing.push('summary');
        if (!currentFocus) missing.push('currentFocus');
        if (!nextStep) missing.push('nextStep');
        if (missing.length) return alert('Pflichtfelder fehlen oder sind ungültig: ' + missing.join(', '));

        const now = new Date().toISOString();
        const parsedChatId = String(parsed.chatId || '').trim();
        let sprintChat = parsedChatId
          ? S.chats.find(c => c && c.id === parsedChatId && c.projectId === projectId)
          : null;
        if (!sprintChat) {
          sprintChat = ensureChatDefaults({
            id: parsedChatId || uid('ch'),
            projectId,
            title: chatTitle,
            type: 'sprint',
            status: 'aktiv',
            summary,
            nextStep,
            rawReportText: extractedJson,
            rawHandoffText: extractedJson,
            mainChatId: project.mainChatId || '',
            workMode: normalizedWorkMode,
            startedAt: now,
            updatedAt: now
          });
          S.chats.push(sprintChat);
        } else {
          sprintChat.title = chatTitle;
          sprintChat.type = 'sprint';
          sprintChat.status = 'aktiv';
          sprintChat.summary = summary;
          sprintChat.nextStep = nextStep;
          sprintChat.rawReportText = extractedJson;
          sprintChat.rawHandoffText = extractedJson;
          if (normalizedWorkMode) sprintChat.workMode = normalizedWorkMode;
          if (project.mainChatId) sprintChat.mainChatId = project.mainChatId;
          if (!sprintChat.startedAt) sprintChat.startedAt = now;
          sprintChat.updatedAt = now;
          Object.assign(sprintChat, ensureChatDefaults(sprintChat));
        }

        project.currentFocus = currentFocus;
        project.nextStep = nextStep;
        project.updatedAt = now;

        const selectedFeatureIds = Array.isArray(parsed.selectedFeatureIds)
          ? parsed.selectedFeatureIds.map(id => String(id || '').trim()).filter(Boolean)
          : [];
        const selectedSet = new Set(selectedFeatureIds);
        S.features.forEach(f => {
          if (!f || f.projectId !== projectId) return;
          if (!selectedSet.has(f.id)) return;
          if (!isPlannedFeature(f)) return;
          f.status = 'selected-for-sprint';
          f.updatedAt = now;
        });

        const st = getChatWorkflowState(projectId);
        st.sourceChatId = sprintChat.id;
        st.mode = 'sprint-start-import';
        st.sprintStartJson = extractedJson;
        if (normalizedWorkMode) st.workMode = normalizedWorkMode;
        save();
        renderView();
        alert('Sprintstart-JSON importiert. Sprintchat wurde als aktiv gespeichert.');
      }

      function parseMainChatBootstrapJson(rawJson) {
        const extractedJson = extractJsonObjectFromText(rawJson || '');
        const parsed = JSON.parse(extractedJson);
        if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) throw new Error('invalid-mainchat-bootstrap-object');
        if (String(parsed.type || '').trim() !== 'roadtrip-mainchat-bootstrap') throw new Error('invalid-mainchat-bootstrap-type');
        if (String(parsed.chatType || '').trim() !== 'project-main') throw new Error('invalid-mainchat-bootstrap-chat-type');
        const chatTitle = String(parsed.chatTitle || '').trim();
        const projectSummary = String(parsed.projectSummary || '').trim();
        const currentFocus = String(parsed.currentFocus || '').trim();
        if (!chatTitle) throw new Error('mainchat-bootstrap-chat-title');
        if (!projectSummary && !currentFocus) throw new Error('mainchat-bootstrap-context-required');

        const toStringArray = (value, errorCode) => {
          if (value == null) return [];
          if (!Array.isArray(value)) throw new Error(errorCode);
          return value.map(x => String(x || '').trim()).filter(Boolean);
        };
        let proposedFeatures = [];
        if (parsed.proposedFeatures != null) {
          if (!Array.isArray(parsed.proposedFeatures)) throw new Error('mainchat-bootstrap-proposed-features');
          proposedFeatures = parsed.proposedFeatures.map(item => {
            if (!item || typeof item !== 'object') return null;
            const title = String(item.title || '').trim();
            if (!title) return null;
            return {
              title,
              description: String(item.description || '').trim(),
              category: mapHandoffFeatureCategory(item.category),
              priority: mapHandoffFeaturePriority(item.priority),
              status: 'planned'
            };
          }).filter(Boolean);
        }
        return {
          parsed,
          extractedJson,
          normalized: {
            type: 'roadtrip-mainchat-bootstrap',
            chatTitle,
            chatType: 'project-main',
            status: 'aktiv',
            projectSummary,
            currentFocus,
            nextStep: String(parsed.nextStep || '').trim(),
            mainChatPrompt: String(parsed.mainChatPrompt || '').trim(),
            knownContext: toStringArray(parsed.knownContext, 'mainchat-bootstrap-known-context'),
            recentWork: toStringArray(parsed.recentWork, 'mainchat-bootstrap-recent-work'),
            openQuestions: toStringArray(parsed.openQuestions, 'mainchat-bootstrap-open-questions'),
            legacySourceNotes: toStringArray(parsed.legacySourceNotes, 'mainchat-bootstrap-legacy-source-notes'),
            proposedFeatures
          }
        };
      }

      function importMainChatBootstrapJson(projectId, rawJson) {
        const project = S.projects.find(p => p && p.id === projectId);
        if (!project) return alert('Projekt wurde nicht gefunden.');
        if (project.status === 'archiviert') return alert('Archivierte Projekte können keinen Hauptchat-Bootstrap importieren.');
        if (!String(rawJson || '').trim()) return alert('Bitte roadtrip-mainchat-bootstrap JSON einfügen.');
        let result;
        try {
          result = parseMainChatBootstrapJson(rawJson);
        } catch (err) {
          if (err && err.message === 'invalid-json-not-found') return alert('Ungültiges JSON: Kein JSON-Objekt erkannt.');
          if (err && err.message === 'invalid-mainchat-bootstrap-object') return alert('Ungültiges JSON: Erwartet wird ein JSON-Objekt.');
          if (err && err.message === 'invalid-mainchat-bootstrap-type') return alert('Ungültiges JSON: type muss "roadtrip-mainchat-bootstrap" sein.');
          if (err && err.message === 'invalid-mainchat-bootstrap-chat-type') return alert('Ungültiges JSON: chatType muss "project-main" sein.');
          if (err && err.message === 'mainchat-bootstrap-chat-title') return alert('Ungültiges JSON: chatTitle fehlt.');
          if (err && err.message === 'mainchat-bootstrap-context-required') return alert('Ungültiges JSON: projectSummary oder currentFocus muss vorhanden sein.');
          if (err && err.message && err.message.startsWith('mainchat-bootstrap-')) return alert('Ungültiges JSON: Kontextfelder müssen Arrays aus Strings sein.');
          return alert('Hauptchat-Bootstrap konnte nicht importiert werden: ' + (err && err.message ? err.message : 'Unbekannter Fehler'));
        }

        const normalized = result.normalized;
        const now = new Date().toISOString();
        let mainChat = getProjectMainChat(projectId);
        if (mainChat) mainChat = S.chats.find(c => c && c.id === mainChat.id && c.projectId === projectId) || mainChat;
        if (!mainChat) {
          mainChat = ensureChatDefaults({
            id: uid('ch'),
            projectId,
            title: normalized.chatTitle,
            type: 'project-main',
            status: 'aktiv',
            url: project.mainChatUrl || '',
            startedAt: now,
            updatedAt: now
          });
          S.chats.push(mainChat);
        }
        mainChat.title = normalized.chatTitle;
        mainChat.type = 'project-main';
        mainChat.status = 'aktiv';
        mainChat.summary = normalized.projectSummary || mainChat.summary || project.summary || '';
        if (normalized.nextStep) mainChat.nextStep = normalized.nextStep;
        mainChat.mainChatId = mainChat.id;
        mainChat.rawReportText = result.extractedJson;
        mainChat.rawHandoffText = result.extractedJson;
        mainChat.mainChatPrompt = normalized.mainChatPrompt;
        mainChat.knownContext = normalized.knownContext;
        mainChat.recentWork = normalized.recentWork;
        mainChat.openQuestions = normalized.openQuestions;
        mainChat.legacySourceNotes = normalized.legacySourceNotes;
        mainChat.updatedAt = now;
        appendHandoffToChat(mainChat, result.extractedJson, now);

        project.mainChatId = mainChat.id;
        if (mainChat.url && mainChat.url.trim()) project.mainChatUrl = mainChat.url.trim();
        if (normalized.projectSummary) project.summary = normalized.projectSummary;
        if (normalized.currentFocus) project.currentFocus = normalized.currentFocus;
        if (normalized.nextStep) project.nextStep = normalized.nextStep;
        project.updatedAt = now;

        let createdFeatures = 0;
        const existingByTitle = new Set(
          getVisibleFeatures(S.features)
            .filter(f => f.projectId === projectId)
            .map(f => normalizeText(f.title || ''))
            .filter(Boolean)
        );
        normalized.proposedFeatures.forEach(item => {
          const normalizedTitle = normalizeText(item.title);
          if (!normalizedTitle || existingByTitle.has(normalizedTitle)) return;
          S.features.push(ensureFeatureDefaults({
            id: uid('f'),
            projectId,
            title: item.title,
            description: item.description || 'Aus Legacy-Hauptchat-Bootstrap abgeleitet.',
            category: item.category,
            priority: item.priority,
            status: 'planned',
            pool: 'planned',
            reviewStatus: 'needs-review',
            sourceType: 'mainchat-bootstrap',
            sourceChatId: mainChat.id,
            sourceNoteIds: [],
            createdAt: now,
            updatedAt: now
          }));
          existingByTitle.add(normalizedTitle);
          createdFeatures++;
        });

        const st = getChatWorkflowState(projectId);
        st.sourceChatId = mainChat.id;
        st.mode = 'legacy-mainchat-bootstrap-import';
        st.mainChatBootstrapJson = result.extractedJson;
        st.prompt = normalized.mainChatPrompt || st.prompt || '';
        save();
        renderView();
        alert('Hauptchat-Bootstrap importiert. project-main Chat aktualisiert. Neue geplante Features: ' + createdFeatures + '.');
      }

      function getSprintExecutionMode(projectId) {
        const state = getChatWorkflowState(projectId);
        const mode = state && state.sprintExecutionMode;
        return Object.values(SPRINT_EXECUTION_MODES).includes(mode) ? mode : SPRINT_EXECUTION_MODES.codexControl;
      }

      function isCodexControlMode(projectId) {
        return getSprintExecutionMode(projectId) !== SPRINT_EXECUTION_MODES.direct;
      }

      function buildSprintExecutionGuardrail(mode) {
        if (mode === SPRINT_EXECUTION_MODES.direct) return '';
        return [
          'Wichtig:',
          'Du sollst die App nicht selbst bearbeiten.',
          'Du sollst keine Dateien verändern.',
          'Du sollst stattdessen einen vollständigen Codex-Prompt formulieren.',
          'Dieser Sprintchat arbeitet als Steuerungs-/Planungschat, Reviewer und Prompt-Designer für Codex.'
        ].join('\n');
      }

      function appendSprintExecutionGuardrail(prompt, mode) {
        const cleanPrompt = String(prompt || '').trimEnd();
        const guardrail = buildSprintExecutionGuardrail(mode).trim();
        if (!guardrail) return cleanPrompt;
        return [cleanPrompt, '', guardrail].filter(Boolean).join('\n');
      }

      function compactPromptText(value, maxChars) {
        const text = String(value || '').replace(/\s+/g, ' ').trim();
        const limit = Number(maxChars) || 400;
        return text.length > limit ? text.slice(0, limit - 1).trimEnd() + '…' : text;
      }

      function getRecentDesignBriefingHandoffs(projectId, limit) {
        return getProjectChats(projectId)
          .filter(c => c && (c.rawHandoffText || c.summary || c.nextStep))
          .sort((a, b) => String(b.updatedAt || b.completedAt || b.startedAt || '').localeCompare(String(a.updatedAt || a.completedAt || a.startedAt || '')))
          .slice(0, limit || 5)
          .map(c => [
            `- ${c.title || 'Ohne Titel'} (${c.type || 'chat'} · ${c.status || '—'} · ${formatDateTime(c.updatedAt || c.completedAt || c.startedAt)})`,
            `  Summary: ${compactPromptText(c.summary || '—', 280)}`,
            `  Next Step: ${compactPromptText(c.nextStep || '—', 220)}`,
            c.rawHandoffText ? `  Handoff-Auszug: ${compactPromptText(c.rawHandoffText, 520)}` : ''
          ].filter(Boolean).join('\n'));
      }

      function normalizeUnmatchedNote(item) {
        const nowIso = new Date().toISOString();
        const text = String((item && item.text) || '').trim();
        if (!text) return null;
        const allowed = ['offen', 'erledigt', 'archiviert'];
        const rawStatus = String((item && item.status) || 'offen').trim().toLowerCase();
        const status = allowed.includes(rawStatus) ? rawStatus : 'offen';
        const createdAt = item && item.createdAt ? String(item.createdAt) : nowIso;
        const updatedAt = item && item.updatedAt ? String(item.updatedAt) : createdAt;
        return {
          id: (item && item.id) || uid('un'),
          text,
          reason: String((item && item.reason) || '').trim(),
          source: String((item && item.source) || 'multi-project-brainstorm').trim() || 'multi-project-brainstorm',
          status,
          createdAt,
          updatedAt,
          usedInPromptAt: String((item && item.usedInPromptAt) || '')
        };
      }

      function getOpenUnmatchedNotes(limit) {
        const max = Number.isFinite(limit) ? Math.max(0, limit) : 12;
        return (Array.isArray(S.unmatchedNotes) ? S.unmatchedNotes : [])
          .map(normalizeUnmatchedNote)
          .filter(item => item && item.status === 'offen' && item.text)
          .sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')))
          .slice(0, max);
      }

      function buildUnmatchedNotesMarkdown(items) {
        const rows = (items || []).map(item => {
          const note = normalizeUnmatchedNote(item);
          if (!note) return '';
          return [
            `- [ ] ${note.text}`,
            `  - Grund: ${note.reason || '—'}`,
            `  - Quelle: ${note.source || 'multi-project-brainstorm'}`,
            `  - Erstellt: ${note.createdAt || '—'}`
          ].join('\n');
        }).filter(Boolean);
        return ['# Roadtrip · Unmatched Notes', '', '## Offen', '', rows.join('\n') || '- [ ] —'].join('\n');
      }

      function saveCurrentUnmatchedNotes() {
        const current = Array.isArray(ui.multiProjectImport && ui.multiProjectImport.unmatchedNotes) ? ui.multiProjectImport.unmatchedNotes : [];
        const existingOpen = (Array.isArray(S.unmatchedNotes) ? S.unmatchedNotes : []).map(normalizeUnmatchedNote).filter(x => x && x.status === 'offen');
        const seen = new Set(existingOpen.map(item => normalizeText(`${item.text}|${item.reason}|${item.source}`)));
        const nowIso = new Date().toISOString();
        if (!Array.isArray(S.unmatchedNotes)) S.unmatchedNotes = [];
        let added = 0;
        current.forEach(item => {
          const normalized = normalizeUnmatchedNote(Object.assign({}, item || {}, { source: 'multi-project-brainstorm', status: 'offen', createdAt: nowIso, updatedAt: nowIso }));
          if (!normalized) return;
          const key = normalizeText(`${normalized.text}|${normalized.reason}|${normalized.source}`);
          if (seen.has(key)) return;
          seen.add(key);
          S.unmatchedNotes.push(normalized);
          added += 1;
        });
        save();
        renderView();
        alert(`${added} Unmatched Notes gespeichert.`);
      }

      function copyUnmatchedNotesMarkdown() {
        const openNotes = getOpenUnmatchedNotes(999);
        if (!openNotes.length) return alert('Keine offenen Unmatched Notes vorhanden.');
        const markdown = buildUnmatchedNotesMarkdown(openNotes);
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(markdown).then(() => {
            if (typeof toast === 'function') toast('Offene Unmatched Notes kopiert.');
          }).catch(() => alert('Kopieren fehlgeschlagen. Bitte manuell markieren.'));
        } else {
          alert('Clipboard API nicht verfügbar. Bitte manuell kopieren.');
        }
      }

      function downloadTextFile(filename, text, mimeType) {
        const blob = new Blob([String(text || '')], { type: mimeType || 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 800);
      }

      function downloadUnmatchedNotesMarkdown() {
        const openNotes = getOpenUnmatchedNotes(999);
        if (!openNotes.length) return alert('Keine offenen Unmatched Notes vorhanden.');
        const markdown = buildUnmatchedNotesMarkdown(openNotes);
        downloadTextFile(`roadtrip-unmatched-notes-${new Date().toISOString().slice(0, 10)}.md`, markdown, 'text/markdown;charset=utf-8');
      }

      function buildProjectNextStepPrompt(projectId) {
        const project = (S.projects || []).find(p => p && p.id === projectId);
        if (!project) return '';
        const projectFeatures = getVisibleFeatures(S.features).filter(f => f.projectId === projectId);
        const projectNotes = (S.notes || []).filter(n => n && n.projectId === projectId);
        const data = getProjectMomentumData(projectId, projectFeatures, projectNotes);
        const plannedForPrompt = sortMomentumFeatures(
          (projectFeatures || [])
            .map(f => applyFeatureDefaults(Object.assign({}, f || {})))
            .filter(isPlannedFeature)
        );
        const activeFeaturesForPrompt = plannedForPrompt
          .filter(f => ['selected-for-sprint', 'in-progress'].includes(f.status))
          .slice(0, 8);
        const candidateFeaturesForPrompt = plannedForPrompt
          .filter(f => ['planned', 'idea'].includes(f.status))
          .slice(0, 10);
        const blockedFeaturesForPrompt = plannedForPrompt
          .filter(f => f.status === 'blocked')
          .slice(0, 6);
        const deferredFeaturesForPrompt = plannedForPrompt
          .filter(f => f.status === 'deferred')
          .slice(0, 5);
        const openNotesForPrompt = (projectNotes || [])
          .filter(n => n && isOpenNote(n) && String(n.text || '').trim())
          .sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')))
          .slice(0, 12);
        function formatMomentumFeatureForPrompt(feature) {
          const f = applyFeatureDefaults(Object.assign({}, feature || {}));
          const parts = [
            `ID: ${f.id || '—'}`,
            `Titel: ${f.title || 'Ohne Titel'}`,
            `Status: ${getFeatureStatusLabel(f.status)}`,
            `Priorität: ${f.priority || 'mittel'}`,
            `Kategorie: ${f.category || 'Sonstiges'}`
          ];
          const desc = String(f.description || '').trim();
          if (desc) parts.push(`Beschreibung: ${shorten(desc, 420)}`);
          if (f.sourceType) parts.push(`Quelle: ${f.sourceType}`);
          if (f.updatedAt) parts.push(`Aktualisiert: ${f.updatedAt}`);
          return '- ' + parts.join(' | ');
        }
        function formatMomentumNoteForPrompt(note) {
          const n = note || {};
          const text = String(n.text || '').trim();
          const parts = [
            `ID: ${n.id || '—'}`,
            `Erstellt: ${n.createdAt || '—'}`
          ];
          if (n.sourceType) parts.push(`Quelle: ${n.sourceType}`);
          parts.push(`Text: ${shorten(text, 520)}`);
          return '- ' + parts.join(' | ');
        }
        const featureLines = (arr, limit) => {
          const rows = (arr || []).slice(0, limit || arr.length).map(formatMomentumFeatureForPrompt);
          return rows.length ? rows.join('\n') : '- —';
        };
        const noteLines = (arr, limit) => {
          const rows = (arr || []).slice(0, limit || arr.length).map(formatMomentumNoteForPrompt);
          return rows.length ? rows.join('\n') : '- —';
        };
        return [
          '# Roadtrip Momentum Review',
          '',
          'Du arbeitest mit einem Roadtrip-Projektkontext.',
          'Der Quellcode allein reicht für diese Entscheidung nicht aus.',
          'Nutze deshalb die folgenden Roadtrip-Daten als wichtigste Arbeitsgrundlage: Projektkontext, geplante Features und offene Notizen.',
          '',
          '## Projektkontext',
          `- Projekt: ${project.title || '—'}`,
          `- Summary: ${project.summary || '—'}`,
          `- Aktueller Fokus: ${project.currentFocus || '—'}`,
          `- Aktueller nächster Schritt: ${project.nextStep || '—'}`,
          '',
          '## Geplante Features',
          '### Gerade aktive Features',
          featureLines(activeFeaturesForPrompt, 8),
          '',
          '### Top-Kandidaten',
          featureLines(candidateFeaturesForPrompt, 10),
          '',
          '### Blockierte Features',
          featureLines(blockedFeaturesForPrompt, 6),
          '',
          '### Zurückgestellte Features',
          featureLines(deferredFeaturesForPrompt, 5),
          '',
          '## Offene Notizen zur Verarbeitung',
          noteLines(openNotesForPrompt, 12),
          '',
          '## Aufgabe',
          '1. Werte die offenen Notizen aus.',
          '   - Entscheide, welche Notizen für den aktuellen Projektfokus relevant sind.',
          '   - Erkenne, ob eine Notiz eher Kontext, Problem, Feature-Idee, offene Frage, Entscheidung oder veralteter Rest ist.',
          '   - Extrahiere verwertbare Hinweise für Fokus und nächsten Schritt.',
          '   - Erfinde keine neuen Features, aber benenne klar, wenn aus einer Notiz ein Feature-Kandidat entstehen sollte.',
          '',
          '2. Vergleiche die Notizen mit den geplanten Features.',
          '   - Welche Features werden durch Notizen bestätigt?',
          '   - Welche Features wirken jetzt wichtiger?',
          '   - Welche Features können warten?',
          '   - Gibt es Widersprüche oder offene Klärungen?',
          '',
          '3. Leite daraus den nächsten konkreten Projektschritt ab.',
          '   - Wähle höchstens 1–2 nächste Aktionen.',
          '   - Formuliere sie so konkret, dass ich direkt damit weiterarbeiten kann.',
          '   - Vermeide große Architekturentscheidungen, wenn ein kleiner nächster Schritt reicht.',
          '',
          '## Ausgabeformat',
          'Bitte antworte in dieser Reihenfolge:',
          '',
          '### 1. Kurzdiagnose',
          '2–5 Sätze: Was ist gerade der eigentliche Engpass / nächste Hebel?',
          '',
          '### 2. Verarbeitung der offenen Notizen',
          'Liste die relevanten Notizen mit ID und Entscheidung:',
          '- nutzen für Fokus',
          '- in Feature-Kandidat überführen',
          '- als offene Frage behalten',
          '- später prüfen',
          '- vermutlich veraltet / ignorieren',
          '',
          '### 3. Feature-Einschätzung',
          'Welche 1–3 Features sind jetzt am wichtigsten und warum?',
          '',
          '### 4. Empfohlene nächste Aktionen',
          'Höchstens 1–2 Aktionen.',
          '',
          '### 5. Roadtrip-JSON',
          'Gib am Ende genau ein JSON-Objekt aus.',
          'Mindestens diese Felder:',
          '{',
          '  "currentFocus": "...",',
          '  "nextStep": "..."',
          '}',
          '',
          'currentFocus und nextStep sollen kurz und konkret sein, damit sie direkt in Roadtrip-Feldern funktionieren.',
          '',
          'Optional darfst du zusätzlich diese Felder ergänzen:',
          '{',
          '  "noteProcessing": [',
          '    {',
          '      "noteId": "...",',
          '      "decision": "use-for-focus|feature-candidate|open-question|later|ignore",',
          '      "reason": "...",',
          '      "suggestedAction": "..."',
          '    }',
          '  ],',
          '  "featurePriorities": [',
          '    {',
          '      "featureId": "...",',
          '      "reason": "..."',
          '    }',
          '  ],',
          '  "openQuestions": ["..."]',
          '}'
        ].join('\n');
      }

                      <div class="stack-row" style="margin-top:6px;">
                        <button class="btn btn-secondary" id="btnChatWorkflowImportHandoff" ${isArchivedProject ? 'disabled' : ''}>Sprint-Handoff importieren</button>

            </div>

              <label for="quickNote">Rohe Notiz</label>
              <div class="mini" style="margin-bottom:6px;">Rohnotizen sind Vorstufen. Aus ihnen können später kontrolliert geplante Features erzeugt werden.</div>
              <textarea id="quickNote" placeholder="Notiz, Idee, Bug, Prompt-Hinweis ..."></textarea>
            </div>

      function renderLearningWorkspace() {
        const tracker = ui.learningTracker || { projectId: 'all', scope: 'completed', filter: 'open', search: '' };
        const activeProjects = (S.projects || []).filter(p => p && p.status !== 'archiviert');
        const allChats = getLearningTrackerChats();
        const totalOpen = allChats.reduce((sum, c) => sum + getChatLearningOpenCount(c), 0);
        const learningsOpen = allChats.filter(c => !getChatLearningMeta(c).learningsExtracted).length;
        const ankiOpen = allChats.filter(c => !getChatLearningMeta(c).ankiCreated).length;
        const devDbOpen = allChats.filter(c => !getChatLearningMeta(c).notionDevDbUpdated).length;
        const reviewedDone = allChats.filter(c => getChatLearningMeta(c).reviewed).length;
        const renderType = (type) => `<span class="pill" style="border-color:${({ 'project-main':'var(--accent)','sprint':'var(--blue)','execution':'var(--green)','branch':'var(--yellow)' }[type]||'var(--border)')};color:${({ 'project-main':'var(--accent)','sprint':'var(--blue)','execution':'var(--green)','branch':'var(--yellow)' }[type]||'var(--ink-dim)')}">${escapeHtml(type||'—')}</span>`;
        const renderStatus = (status) => `<span class="pill" style="color:${({ 'aktiv':'var(--green)','pausiert':'var(--yellow)','abgeschlossen':'var(--ink-dim)','referenz':'var(--blue)' }[status]||'var(--ink-dim)')}">${escapeHtml(status||'—')}</span>`;
        return `
          ${renderContextBanner()}
          <div class="panel">
            <div class="panel-title"><h3>Learning Tracker</h3></div>
            <div class="notice">Abgeschlossene Chats/Sprints nachbereiten: Learnings, Anki, Dev-/Notion-DB.</div>
            <div class="stack-row" style="margin-top:10px;">
              <span class="pill">Offene Nachbereitungen: ${totalOpen}</span>
              <span class="pill">Learnings offen: ${learningsOpen}</span>
              <span class="pill">Anki offen: ${ankiOpen}</span>
              <span class="pill">Dev-/Notion-DB offen: ${devDbOpen}</span>
              <span class="pill pill-success">Review erledigt: ${reviewedDone}</span>
            </div>
            <div class="stack-row" style="margin-top:10px;">
              <select id="learningProjectFilter">
                <option value="all" ${tracker.projectId==='all'?'selected':''}>Alle Projekte</option>
                ${activeProjects.map(p => `<option value="${escapeAttr(p.id)}" ${tracker.projectId===p.id?'selected':''}>${escapeHtml(p.title)}</option>`).join('')}
              </select>
              <select id="learningScopeFilter">
                <option value="completed" ${tracker.scope==='completed'?'selected':''}>Nur abgeschlossene</option>
                <option value="all" ${tracker.scope==='all'?'selected':''}>Alle Chats</option>
              </select>
              <select id="learningStatusFilter">
                <option value="open" ${tracker.filter==='open'?'selected':''}>Offen</option>
                <option value="learnings-open" ${tracker.filter==='learnings-open'?'selected':''}>Learnings offen</option>
                <option value="anki-open" ${tracker.filter==='anki-open'?'selected':''}>Anki offen</option>
                <option value="devdb-open" ${tracker.filter==='devdb-open'?'selected':''}>Dev-DB offen</option>
                <option value="done" ${tracker.filter==='done'?'selected':''}>Erledigt</option>
                <option value="all" ${tracker.filter==='all'?'selected':''}>Alle</option>
              </select>
              <input id="learningSearch" value="${escapeAttr(tracker.search || '')}" placeholder="Suche über Projekt, Titel, Summary" />
            </div>
            <div class="list" style="margin-top:10px;">
              ${allChats.map(c => {
                const p = S.projects.find(x => x.id === c.projectId) || null;
                const meta = getChatLearningMeta(c);
                const prompt = (ui.learningPromptByChatId || {})[c.id] || '';
                return `<div class="item">
                  <div class="row-top">
                    <strong>${escapeHtml(c.title || 'Ohne Titel')}</strong>
                    <div class="stack-row" style="gap:4px;">${renderType(c.type)}${renderStatus(c.status)}</div>
                  </div>
                  <div class="mini">${escapeHtml((p && p.title) || 'Ohne Projekt')}</div>
                  <div class="stack-row">
                    ${c.url ? `<a href="${escapeAttr(c.url)}" target="_blank" rel="noopener" class="btn">URL öffnen</a>` : ''}
                    ${p ? `<button class="btn" data-open-learning-project="${p.id}">Projekt öffnen</button>` : ''}
                    <span class="pill">${isChatLearningDone(c) ? 'Learning erledigt' : `Learning offen (${getChatLearningOpenCount(c)})`}</span>
                  </div>
                  <div class="mini">Abgeschlossen: ${escapeHtml(c.completedAt || c.handoffImportedAt || '')} · Updated: ${escapeHtml(c.updatedAt || '')}</div>
                  ${c.summary ? `<div class="item-desc">${escapeHtml(c.summary)}</div>` : ''}
                  ${c.nextStep ? `<div class="mini">Next Step: ${escapeHtml(c.nextStep)}</div>` : ''}
                  ${c.rawReportText ? `<div class="pill">Raw Report vorhanden</div>` : ''}
                  <div class="stack-row" style="margin-top:8px;">
                    <label class="pill"><input type="checkbox" data-learning-toggle="${c.id}|learningsExtracted" ${meta.learningsExtracted ? 'checked' : ''}/> Learnings extrahiert</label>
                    <label class="pill"><input type="checkbox" data-learning-toggle="${c.id}|ankiCreated" ${meta.ankiCreated ? 'checked' : ''}/> Anki erstellt</label>
                    <label class="pill"><input type="checkbox" data-learning-toggle="${c.id}|notionDevDbUpdated" ${meta.notionDevDbUpdated ? 'checked' : ''}/> Dev-/Notion-DB gepflegt</label>
                    <label class="pill"><input type="checkbox" data-learning-toggle="${c.id}|reviewed" ${meta.reviewed ? 'checked' : ''}/> Review erledigt</label>
                  </div>
                  <div class="field" style="margin-top:8px;">
                    <label>Learning-Notizen</label>
                    <textarea data-learning-notes="${c.id}" placeholder="Optionale Learning-Notizen">${escapeHtml(meta.notes || '')}</textarea>
                  </div>
                  <div class="stack-row">
                    <button class="btn" data-build-learning-prompt="${c.id}">Learning-Prompt bauen</button>
                    ${prompt ? `<button class="btn" data-copy-learning-prompt="${c.id}">Prompt kopieren</button>` : ''}
                  </div>
                  ${prompt ? `<textarea id="learningPromptOutput-${c.id}" style="margin-top:8px;min-height:180px;">${escapeHtml(prompt)}</textarea>` : ''}
                </div>`;
              }).join('') || '<div class="notice">Keine Chats für den gewählten Filter gefunden.</div>'}
            </div>
          </div>
        `;
      }

        return `
          ${renderContextBanner()}
          <div class="panel-title"><h3>Import</h3></div>

            Import in Projekt: <strong>${contextProject ? escapeHtml(contextProject.title) : '— kein Projekt gewählt —'}</strong>

          <div class="field">

          <div class="field"><label for="htmlTextarea">Code / Repository-Auszug Paste</label><textarea id="htmlTextarea" style="min-height:170px">${escapeHtml(ui.importDraft.html || '')}</textarea></div>
          <div class="stack-row">
            <button class="btn btn-primary" id="btnAnalyzeHtml">HTML lokal analysieren</button>
            <button class="btn" id="btnBuildHtmlPrompt">KI-Prompt erzeugen</button>

      function getProjectImportVersions(projectId) {

      function renderProjectImportHistory(imports) {
        if (!imports.length) {
          return `
            <details style="margin-bottom:12px;">
              <summary style="font-weight:700;">Importe / Versionen (0)</summary>
              <div class="notice" style="margin-top:10px;">Noch keine Import-Versionen gespeichert.</div>
            </details>
          `;
        }
        return `
          <details style="margin-bottom:12px;" open>
            <summary style="font-weight:700;">Importe / Versionen (${imports.length})</summary>
            <div class="list" style="margin-top:10px;">
              ${imports.slice(0, 10).map(v => {
                const cmp = v.comparisonToPrevious || {};
                const added = Array.isArray(cmp.addedFeatures) ? cmp.addedFeatures.length : 0;
                const updated = Array.isArray(cmp.updatedFeatures) ? cmp.updatedFeatures.length : 0;
                const unchanged = Array.isArray(cmp.unchangedFeatures) ? cmp.unchangedFeatures.length : 0;
                const missing = Array.isArray(cmp.missingFromNewVersion) ? cmp.missingFromNewVersion.length : 0;
                const summary = v.parsedSummary || {};
                return `
                  <details class="item">
                    <summary style="cursor:pointer;">
                      <div class="row-top">
                        <strong>${formatDateTime(v.createdAt)}</strong>
                        <span class="pill">${escapeHtml(v.sourceType || 'import')}</span>
                      </div>
                      <div class="mini">${escapeHtml(v.sourceName || 'Analyse-Import')} · ${escapeHtml(summary.projectSummary || 'ohne Summary')}</div>
                      <div class="mini">+${added} neu · ~${updated} geändert · =${unchanged} gleich · -${missing} fehlen</div>
                    </summary>
                    <div style="margin-top:10px;">
                      ${added ? `<div class="mini"><strong>Neu:</strong> ${escapeHtml(cmp.addedFeatures.map(x => x.title || x).join(', '))}</div>` : ''}
                      ${updated ? `<div class="mini"><strong>Geändert:</strong> ${escapeHtml(cmp.updatedFeatures.map(x => x.title || x).join(', '))}</div>` : ''}
                      ${missing ? `<div class="mini"><strong>Fehlt in neuer Version:</strong> ${escapeHtml(cmp.missingFromNewVersion.map(x => x.title || x).join(', '))}</div>` : ''}
                      ${(cmp.possibleRelevantNotes || []).length ? `<div class="mini"><strong>Mögliche Notizen:</strong> ${escapeHtml(cmp.possibleRelevantNotes.map(n => shorten(n.text || '', 80)).join(' | '))}</div>` : ''}
                    </div>
                  </details>
                `;
              }).join('')}
            </div>
          </details>
        `;
      }

      function renderNotesWorkspace() {
        const st = ui.notesWorkspace || { projectId: 'all', status: 'open', type: 'all', search: '', editingNoteId: '' };
        const projectOptions = [
          '<option value="all" ' + (st.projectId === 'all' ? 'selected' : '') + '>Alle Projekte</option>',
          '<option value="none" ' + (st.projectId === 'none' ? 'selected' : '') + '>Ohne Projekt</option>'
        ].concat((S.projects || []).map(project => `<option value="${escapeAttr(project.id)}" ${st.projectId === project.id ? 'selected' : ''}>${escapeHtml(project.title || 'Ohne Titel')}</option>`)).join('');
        const typeOptions = ['all'].concat(NOTE_TYPES).map(type => `<option value="${escapeAttr(type)}" ${st.type === type ? 'selected' : ''}>${type === 'all' ? 'alle' : escapeHtml(type)}</option>`).join('');
        const statusOptions = ['open', 'processed', 'archived', 'all'].map(status => `<option value="${escapeAttr(status)}" ${st.status === status ? 'selected' : ''}>${escapeHtml(status)}</option>`).join('');
        const search = normalizeText(st.search || '');
        const notes = (S.notes || [])
          .filter(note => {
            const projectId = String(note.projectId || '');
            if (st.projectId === 'none' && projectId) return false;
            if (st.projectId && st.projectId !== 'all' && st.projectId !== 'none' && projectId !== st.projectId) return false;
            if (st.status && st.status !== 'all' && getNoteStatus(note) !== st.status) return false;
            if (st.type && st.type !== 'all' && getNoteType(note) !== st.type) return false;
            if (search) {
              const haystack = normalizeText([getNoteText(note), note.title, note.sourceType, note.processedIntoFeatureId, getProjectTitle(projectId)].filter(Boolean).join(' '));
              if (!haystack.includes(search)) return false;
            }
            return true;
          })
          .sort((a, b) => String(b.updatedAt || b.createdAt || '').localeCompare(String(a.updatedAt || a.createdAt || '')));
        const activeProjectId = st.projectId && st.projectId !== 'all' && st.projectId !== 'none' ? st.projectId : '';
        return `
          <div class="panel-title"><h3>Notes Workspace</h3><div class="mini">Zentraler Workspace für rohe Projekt-Notizen aus S.notes.</div></div>
          <div class="field">
            <label for="notesWorkspaceText">Neue Notiz</label>

            <div class="field" style="min-width:180px;"><label for="notesWorkspaceType">Typ</label><select id="notesWorkspaceType">${NOTE_TYPES.map(type => `<option value="${escapeAttr(type)}">${escapeHtml(type)}</option>`).join('')}</select></div>
            <button class="btn btn-primary" id="btnAddNotesWorkspaceNote">Notiz hinzufügen</button>
          </div>
          <div class="toolbar" style="margin-bottom:12px;">
            <div class="field" style="min-width:220px;"><label for="notesWorkspaceProjectFilter">Projektfilter</label><select id="notesWorkspaceProjectFilter">${projectOptions}</select></div>
            <div class="field"><label for="notesWorkspaceStatusFilter">Status</label><select id="notesWorkspaceStatusFilter">${statusOptions}</select></div>
            <div class="field"><label for="notesWorkspaceTypeFilter">Typ</label><select id="notesWorkspaceTypeFilter">${typeOptions}</select></div>
            <div class="field" style="min-width:240px;"><label for="notesWorkspaceSearch">Suche</label><input id="notesWorkspaceSearch" value="${escapeAttr(st.search || '')}" placeholder="Text, Projekt, Quelle ..." /></div>
          </div>
          ${activeProjectId ? `<div class="notice" style="margin-bottom:12px;">Batch-Pipeline für dieses Projekt bleibt im Project View: <button class="btn btn-secondary" data-open-notes-project="${escapeAttr(activeProjectId)}">Projekt öffnen</button></div>` : ''}
          <div class="list">
            ${notes.map(note => renderNotesWorkspaceItem(note)).join('') || '<div class="notice">Keine passenden Notizen.</div>'}
          </div>
        `;
      }

      function renderNotesWorkspaceItem(note) {
        const status = getNoteStatus(note);
        const type = getNoteType(note);
        const projectId = String(note.projectId || '');
        const projectName = getProjectTitle(projectId) || 'Ohne Projekt';
        const text = getNoteText(note);
        const isEditing = ui.notesWorkspace && ui.notesWorkspace.editingNoteId === note.id;
        const featureHint = note.processedIntoFeatureId ? `<span class="pill pill-success">Feature: ${escapeHtml(note.processedIntoFeatureId)}</span>` : '';
        const sourceHint = note.sourceType ? `<span class="pill">Quelle: ${escapeHtml(note.sourceType)}</span>` : '';
        if (isEditing) {
          return `
            <div class="item">
              <div class="field"><label>Inhalt</label><textarea data-note-edit-text="${escapeAttr(note.id)}">${escapeHtml(text)}</textarea></div>
              <div class="toolbar">
                <div class="field" style="min-width:220px;"><label>Projekt</label><select data-note-edit-project="${escapeAttr(note.id)}"><option value="">— Kein Projekt —</option>${(S.projects || []).map(project => `<option value="${escapeAttr(project.id)}" ${projectId === project.id ? 'selected' : ''}>${escapeHtml(project.title || 'Ohne Titel')}</option>`).join('')}</select></div>
                <div class="field"><label>Typ</label><select data-note-edit-type="${escapeAttr(note.id)}">${NOTE_TYPES.map(t => `<option value="${escapeAttr(t)}" ${type === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}</select></div>
                <button class="btn btn-primary" data-save-note-edit="${escapeAttr(note.id)}">Speichern</button>

              ${note.updatedAt ? `<span class="pill">Aktualisiert: ${escapeHtml(formatDateTime(note.updatedAt))}</span>` : ''}

              ${status === 'open' ? `<button class="btn" data-mark-note="${escapeAttr(note.id)}">Verarbeitet</button>` : `<button class="btn" data-open-note="${escapeAttr(note.id)}">Wieder offen</button>`}
              ${status !== 'archived' ? `<button class="btn" data-archive-note="${escapeAttr(note.id)}">Archivieren</button>` : ''}

      function renderInbox(notes) {
        return `

                <div class="item-desc">${escapeHtml(getNoteText(n))}</div>
                <div class="meta">

                </div>
                <div class="stack-row">
                  <button class="btn" data-build-note-prompt="${n.id}">Aus Notiz Feature-Vorschläge ableiten</button>
                  <button class="btn" data-add-feature-from-note="${n.id}">Als geplantes Feature übernehmen</button>

                <div class="item-desc">${escapeHtml(p.summary || '')}</div>
                <div class="meta">
                  <span class="pill">${escapeHtml(p.type || '—')}</span>
                  <span class="pill">${getVisibleFeatures(S.features).filter(f => f.projectId === p.id).length} Features</span>
