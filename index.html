<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roadtrip</title>
  <style>
    :root {
      --bg: #12151c;
      --bg-mid: #171b23;
      --surface: #1d2330;
      --surface-2: #222a38;
      --surface-3: #2a3445;
      --border: #39465c;
      --border-light: #586a87;
      --ink: #eef2f7;
      --ink-light: #b8c3d4;
      --ink-dim: #7f8da3;
      --accent: #b8a06e;
      --accent-2: #8ea6d9;
      --green: #7db88f;
      --yellow: #c5ab63;
      --red: #c57b7b;
      --blue: #7ea2d1;
      --radius: 14px;
      --shadow: 0 12px 30px rgba(0,0,0,.25);
      --font-ui: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
      --font-mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
      --touch: 42px;
    }

    body.theme-light {
      --bg: #f4f5f7;
      --bg-mid: #eceef1;
      --surface: #ffffff;
      --surface-2: #f8f9fb;
      --surface-3: #eef1f5;
      --border: #d5dbe5;
      --border-light: #bcc7d6;
      --ink: #18202b;
      --ink-light: #4d5c70;
      --ink-dim: #788699;
      --accent: #8b6c2f;
      --accent-2: #46679f;
      --shadow: 0 8px 22px rgba(10,15,20,.08);
    }

    body.theme-eink {
      --bg: #f7f7f2;
      --bg-mid: #efefe9;
      --surface: #ffffff;
      --surface-2: #f8f8f4;
      --surface-3: #f1f1eb;
      --border: #979797;
      --border-light: #666666;
      --ink: #111111;
      --ink-light: #333333;
      --ink-dim: #666666;
      --accent: #111111;
      --accent-2: #111111;
      --green: #111111;
      --yellow: #333333;
      --red: #111111;
      --blue: #111111;
      --shadow: none;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-ui);
      line-height: 1.4;
    }
    body.font-serif { font-family: var(--font-serif); }

    .app {
      max-width: 1480px;
      margin: 0 auto;
      padding: 14px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1.25fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .hero, .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .eyebrow {
      color: var(--ink-dim);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: .14em;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -.02em;
    }

    .subline {
      color: var(--ink-light);
      max-width: 80ch;
    }

    .hero-actions, .toolbar, .segmented, .stack-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .panel { padding: 14px; }
    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .panel-title h2,
    .panel-title h3,
    .section h2,
    .section h3 { margin: 0; font-size: 15px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .stat {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .stat .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--ink-dim);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .stat .value {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0,1fr);
      gap: 12px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .main {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .btn, button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--ink);
      border-radius: 12px;
      min-height: var(--touch);
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      transition: .14s ease;
    }

    .btn:hover, button:hover { border-color: var(--border-light); transform: translateY(-1px); }
    .btn:active, button:active { transform: translateY(0); }

    .btn-primary { background: var(--accent); color: #111; border-color: transparent; font-weight: 700; }
    body.theme-eink .btn-primary { color: #fff; }
    .btn-soft { background: var(--surface-2); }
    .btn-danger { background: var(--red); color: #fff; border-color: transparent; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--ink-light);
      font-size: 12px;
      white-space: nowrap;
    }

    .segmented .seg {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      min-height: 36px;
      color: var(--ink-light);
    }
    .segmented .seg.active { background: var(--surface-3); color: var(--ink); border-color: var(--border-light); font-weight: 700; }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--ink);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
    }

    textarea { min-height: 100px; resize: vertical; }
    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--ink-dim);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .field { margin-bottom: 10px; }

    .mini {
      color: var(--ink-dim);
      font-size: 12px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item .row-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
    }

    .item-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
    }

    .item-desc {
      color: var(--ink-light);
      font-size: 14px;
      white-space: pre-wrap;
    }

    .meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .grid-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .kanban {
      display: grid;
      grid-template-columns: repeat(6, minmax(220px, 1fr));
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px;
      min-height: 300px;
    }

    .column h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--ink-light);
      margin: 0 0 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    th { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-dim); }

    details {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
    }

    summary {
      cursor: pointer;
      font-weight: 700;
    }

    .hidden { display: none !important; }

    .notice {
      background: var(--surface-2);
      border: 1px dashed var(--border-light);
      border-radius: 12px;
      padding: 10px 12px;
      color: var(--ink-light);
      font-size: 14px;
    }

    .dropzone {
      border: 1px dashed var(--border-light);
      border-radius: 14px;
      padding: 12px;
      background: var(--surface-2);
    }

    .footer-note { color: var(--ink-dim); font-size: 12px; }

    @media (max-width: 1080px) {
      .topbar, .layout { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 680px) {
      .app { padding: 10px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .kanban { grid-template-columns: repeat(6, 260px); }
      h1 { font-size: 24px; }
    }

    .workspace {
      max-width: 100%;
      padding: 20px;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 16px;
      min-height: 100vh;
      background: var(--bg);
    }
    .workspace-sidebar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      position: sticky;
      top: 16px;
      height: calc(100vh - 40px);
    }
    .workspace-main { display:flex; flex-direction:column; gap:16px; min-width:0; }
    .sidebar-project {
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 14px;
    }
    .sidebar-project.active { background: var(--surface-3); border-color: var(--border-light); }
    .db-toolbar { display:grid; grid-template-columns:2fr repeat(3, minmax(130px,1fr)) auto; gap:8px; margin-bottom:12px; }
    @media (max-width: 1080px) {
      .workspace { grid-template-columns: 1fr; }
      .workspace-sidebar { position: static; height: auto; }
      .db-toolbar { grid-template-columns:1fr; }
    }
  </style>
</head>
<body class="theme-light">
  <div class="app workspace" id="app">
    <aside class="workspace-sidebar panel">
      <h1 style="font-size:20px;margin:0 0 12px;">Roadtrip</h1>
      <div class="segmented" id="navTabs"></div>
      <div class="panel" style="margin-top:16px; box-shadow:none;">
        <div class="panel-title"><h3>Projects</h3></div>
        <div class="list" id="sidebarProjects"></div>
      </div>
      <div class="stack-row" style="margin-top:auto;">
        <button class="btn" id="btnSeed">Demo</button>
        <button class="btn" id="btnExport">Export</button>
        <button class="btn" id="btnBackupRaw">Raw Backup</button>
        <label class="btn" for="importJsonInput">Import</label>
      </div>
      <input id="importJsonInput" type="file" accept="application/json" class="hidden" />
    </aside>
    <main class="workspace-main">
      <section class="panel">
        <div class="panel-title">
          <h2 id="viewTitle">Database</h2>
          <div class="mini" id="lastSavedLabel">—</div>
        </div>
        <div class="stats" id="stats"></div>
      </section>
      <section class="panel" id="viewContainer"></section>
    </main>
  </div>

  <script>
    (function() {
      const LKEY = 'roadtrip_v0_1';
      const CONFIG_KEY = 'roadtrip_v0_1_config';
      const ALL_PROJECTS_KEY = 'all';
      const VIEWS = ['database', 'project', 'import', 'settings'];
      const APP_TYPES = ['Daily Log', 'Braindump', 'Review', 'Tracker', 'Writing', 'Learning', 'Meta-App', 'Sonstiges'];
      const PROJECT_STATUS = ['aktiv', 'pausiert', 'archiviert'];
      const FEATURE_STATUS = ['Idee', 'geprüft', 'geplant', 'in Arbeit', 'teilweise umgesetzt', 'umgesetzt'];
      const FEATURE_CATEGORIES = ['UI', 'Workflow', 'Sync', 'KI', 'Import/Export', 'Darstellung', 'Datenmodell', 'Ansicht', 'Sonstiges'];
      const PRIORITIES = ['niedrig', 'mittel', 'hoch', 'kritisch'];
      const FEATURE_COLUMNS = FEATURE_STATUS;
      const TRELLO_LABEL_PREFIX = { project: 'P: ', category: 'C: ', priority: 'Prio: ' };
      const TRELLO_SYNC_START = '--- ROADTRIP_SYNC ---';
      const TRELLO_SYNC_END = '--- /ROADTRIP_SYNC ---';
      const CHAT_TYPES = ['project-main', 'sprint', 'execution', 'branch'];
      const CHAT_STATUS = ['aktiv', 'pausiert', 'abgeschlossen', 'referenz'];

      let S = defaultState();
      let C = defaultConfig();
      let ui = {
        view: 'database',
        editingProjectId: null,
        analysisDraftFeatures: [],
        activeProjectId: ALL_PROJECTS_KEY,
        filters: { status: 'alle', category: 'alle', search: '' },
        showKanban: false,
        showAllProjects: false,
        projectEditMode: false,
        importDraft: { html: '', prompt: '', analysisPrompt: '', cleanupPrompt: '', projectId: '' },
        chatWorkflow: { projectId: '', sourceChatId: '', sprintGoal: '', prompt: '', mode: '' },
        noteReview: { proposals: [], projectId: '', rawText: '', visible: false },
        cleanupReview: { proposals: [], projectId: '', incomingFeatures: [], rawAnalysisJson: '', mode: '', summary: '', visible: false, versionLogged: false }
      };

      const $ = (id) => document.getElementById(id);
      const q = (sel, el = document) => el.querySelector(sel);
      const qq = (sel, el = document) => Array.from(el.querySelectorAll(sel));

      init();

      function defaultState() {
        return {
          version: 1,
          createdAt: new Date().toISOString(),
          _lastLocalSaveAt: '',
          _lastExported: '',
          _lastGistPushAt: '',
          _lastGistPullAt: '',
          projects: [],
          features: [],
          notes: [],
          analyses: [],
          chats: [],
          importVersions: []
        };
      }

      function defaultConfig() {
        return {
          theme: 'theme-dark',
          font: 'ui',
          gistId: '',
          gistToken: '',
          rawGistId: '',
          rawGistToken: '',
          openAiModel: 'gpt-5.4',
          trelloKey: '',
          trelloToken: '',
          trelloBoardId: ''
        };
      }

      function init() {
        load();
        wireBasics();
        renderAll();
      }

      function load() {
        try {
          const raw = localStorage.getItem(LKEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            const parsedState = parsed && parsed.state && typeof parsed.state === 'object' ? parsed.state : parsed;
            if (parsedState && typeof parsedState === 'object' && !Array.isArray(parsedState)) {
              S = Object.assign(defaultState(), parsedState);
            } else {
              console.warn('[load] Unexpected state shape, using defaults');
            }
          }
        } catch (e) { console.warn('[load] State load failed, using defaults:', e); }
        try {
          const raw = localStorage.getItem(CONFIG_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            if (parsed && typeof parsed === 'object') {
              C = Object.assign(defaultConfig(), parsed);
            }
          }
        } catch (e) { console.warn('[load] Config load failed, using defaults:', e); }
        ensureDefaults();
      }

      function ensureDefaults() {
        if (!Array.isArray(S.projects)) S.projects = [];
        if (!Array.isArray(S.features)) S.features = [];
        if (!Array.isArray(S.notes)) S.notes = [];
        if (!Array.isArray(S.analyses)) S.analyses = [];
        if (!Array.isArray(S.chats)) S.chats = [];
        if (!Array.isArray(S.importVersions)) S.importVersions = [];
        if (!S._lastLocalSaveAt && S._lastExported) S._lastLocalSaveAt = S._lastExported;
        if (!S._lastGistPushAt && S._lastExported) S._lastGistPushAt = S._lastExported;
        S.projects = S.projects.map(ensureProjectDefaults);
        S.features = S.features.map(ensureFeatureDefaults);
        S.chats = S.chats.map(ensureChatDefaults);
      }

      function save() {
        S._lastLocalSaveAt = new Date().toISOString();
        ensureDefaults();
        try {
          const payload = JSON.stringify(S);
          if (!payload || payload.length < 10) throw new Error('suspiciously small payload');
          localStorage.setItem(LKEY, payload);
          const verifyRaw = localStorage.getItem(LKEY);
          if (!verifyRaw) throw new Error('localStorage write verification failed');
          JSON.parse(verifyRaw);
        } catch (e) {
          console.error('[save] State save failed:', e);
          alert('Warnung: Lokales Speichern fehlgeschlagen. ' + e.message);
        }
        try {
          localStorage.setItem(CONFIG_KEY, JSON.stringify(C));
        } catch (e) {
          console.error('[save] Config save failed:', e);
        }
        const lbl = $('lastSavedLabel');
        if (lbl) lbl.textContent = 'Gespeichert: ' + formatDateTime(S._lastLocalSaveAt);
        renderStats();
        renderSidebarProjects();
      }

      function wireBasics() {
        renderNav();
        $('btnSeed').addEventListener('click', seedDemo);
        $('btnExport').addEventListener('click', exportJson);
        $('btnBackupRaw').addEventListener('click', exportRawNotes);
        $('importJsonInput').addEventListener('change', importJson);
      }

      function renderAll() {
        applyTheme();
        if (!ui.activeProjectId) ui.activeProjectId = ALL_PROJECTS_KEY;
        // Auto-select first project if still on ALL_PROJECTS_KEY and projects exist
        if (ui.activeProjectId === ALL_PROJECTS_KEY && S.projects.length > 0) {
          ui.activeProjectId = S.projects[0].id;
        }
        renderNav();
        renderSidebarProjects();
        renderProjectSelects();
        renderStats();
        renderView();
        $('lastSavedLabel').textContent = 'Gespeichert: ' + formatDateTime(S._lastLocalSaveAt);
      }

      function applyTheme() {
        document.body.className = C.theme + (C.font === 'serif' ? ' font-serif' : '');
      }

      function renderNav() {
        const wrap = $('navTabs');
        wrap.innerHTML = '';
        VIEWS.forEach(v => {
          const b = document.createElement('button');
          b.className = 'seg' + (ui.view === v ? ' active' : '');
          b.textContent = ({database:'Database',project:'Project',import:'Import',settings:'Settings'})[v];
          b.addEventListener('click', () => { ui.view = v; renderNav(); renderView(); });
          wrap.appendChild(b);
        });
      }

      function renderStats() {
        const visibleFeatures = getVisibleFeatures(S.features);
        const stats = {
          Projekte: S.projects.filter(p => p.status !== 'archiviert').length,
          Features: visibleFeatures.length,
          Offene: visibleFeatures.filter(f => ['Idee','geprüft','geplant','in Arbeit','teilweise umgesetzt'].includes(f.status)).length,
          Chats: (S.chats || []).filter(c => c.status === 'aktiv').length
        };
        const el = $('stats');
        el.innerHTML = Object.entries(stats).map(([k,v]) => `
          <div class="stat">
            <div class="label">${escapeHtml(k)}</div>
            <div class="value">${v}</div>
          </div>
        `).join('');
      }

      function renderProjectSelects() {
        const options = [{value:'', label:'— Kein Projekt —'}].concat(S.projects.map(p => ({ value:p.id, label:p.title })));
        fillSelect($('htmlProjectSelect'), options, true);
        fillSelect($('projectType'), APP_TYPES);
        fillSelect($('projectStatus'), PROJECT_STATUS);
        // Sync import dropdown to active project context
        const importTarget = ui.activeProjectId !== ALL_PROJECTS_KEY
          ? ui.activeProjectId
          : (ui.importDraft.projectId || '');
        if ($('htmlProjectSelect')) {
          $('htmlProjectSelect').value = importTarget;
          if ($('htmlProjectSelect').value !== importTarget) $('htmlProjectSelect').value = '';
          ui.importDraft.projectId = $('htmlProjectSelect').value;
        }
        const typeCurrent = $('projectType')?.dataset.currentValue || APP_TYPES[0];
        const statusCurrent = $('projectStatus')?.dataset.currentValue || PROJECT_STATUS[0];
        if ($('projectType')) $('projectType').value = typeCurrent;
        if ($('projectStatus')) $('projectStatus').value = statusCurrent;
      }

      function renderView() {
        const c = $('viewContainer');
        if (ui.view === 'database') c.innerHTML = renderDatabaseView();
        if (ui.view === 'project') c.innerHTML = renderProjectWorkspace();
        if (ui.view === 'import') c.innerHTML = renderImportWorkspace();
        if (ui.view === 'settings') c.innerHTML = renderSettingsWorkspace();
        renderProjectSelects();
        if ($('themeSelect')) $('themeSelect').value = C.theme;
        if ($('fontSelect')) $('fontSelect').value = C.font;
        $('viewTitle').textContent = ({database:'Database',project:'Project',import:'Import',settings:'Settings'})[ui.view];
        wireDynamicView();
      }

      function wireDynamicView() {
        // data-open-project is wired inside renderSidebarProjects()
        const statusFilter = $('filterStatus');
        const catFilter = $('filterCategory');
        const search = $('filterSearch');
        const kanbanToggle = $('toggleKanban');
        const allProjectsToggle = $('toggleAllProjects');
        if (statusFilter) statusFilter.addEventListener('change', e => { ui.filters.status = e.target.value; renderView(); });
        if (catFilter) catFilter.addEventListener('change', e => { ui.filters.category = e.target.value; renderView(); });
        if (search) search.addEventListener('input', e => { ui.filters.search = e.target.value; renderView(); });
        if (kanbanToggle) kanbanToggle.addEventListener('change', e => { ui.showKanban = e.target.checked; renderView(); });
        if (allProjectsToggle) allProjectsToggle.addEventListener('change', e => { ui.showAllProjects = e.target.checked; renderView(); });

        if ($('themeSelect')) $('themeSelect').addEventListener('change', e => { C.theme = e.target.value; applyTheme(); save(); });
        if ($('fontSelect')) $('fontSelect').addEventListener('change', e => { C.font = e.target.value; applyTheme(); save(); });
        if ($('gistId')) $('gistId').addEventListener('input', e => { C.gistId = e.target.value; save(); });
        if ($('gistToken')) $('gistToken').addEventListener('input', e => { C.gistToken = e.target.value; save(); });
        if ($('rawGistId')) $('rawGistId').addEventListener('input', e => { C.rawGistId = e.target.value; save(); });
        if ($('rawGistToken')) $('rawGistToken').addEventListener('input', e => { C.rawGistToken = e.target.value; save(); });
        if ($('btnGistPush')) $('btnGistPush').addEventListener('click', gistPush);
        if ($('btnGistPull')) $('btnGistPull').addEventListener('click', gistPull);
        if ($('btnGistRawBackup')) $('btnGistRawBackup').addEventListener('click', gistRawBackup);
        updateGistStatusUI();
        if ($('openAiModel')) $('openAiModel').addEventListener('input', e => { C.openAiModel = e.target.value; save(); });

      function renderSidebarProjects() {
        const wrap = $('sidebarProjects');
        const isAll = ui.activeProjectId === ALL_PROJECTS_KEY;
        const featureCountByProjectId = getVisibleFeatures(S.features).reduce((acc, f) => {
          const pid = f.projectId || '';
          acc[pid] = (acc[pid] || 0) + 1;
          return acc;
        }, {});
        const allBtn = `
          <button class="sidebar-project ${isAll ? 'active' : ''}" data-open-project="${ALL_PROJECTS_KEY}" style="${isAll ? 'border-left:3px solid var(--accent-2);' : ''}">⊕ Alle Projekte</button>
        `;
        wrap.innerHTML = allBtn + S.projects.filter(p => p.status !== 'archiviert').map(p => {
          const isActive = ui.activeProjectId === p.id;
          const featureCount = featureCountByProjectId[p.id] || 0;
          const updatedAt = p.updatedAt || p.lastAnalyzedAt || p.lastHtmlImportedAt || p.createdAt || '';
          const updatedLabel = `aktualisiert: ${updatedAt ? formatDateTime(updatedAt) : '—'}`;
          const emptyHint = featureCount === 0 ? ' · noch keine Features' : '';
          return `<button class="sidebar-project ${isActive ? 'active' : ''}" data-open-project="${p.id}" style="${isActive ? 'border-left:3px solid var(--accent);font-weight:700;' : ''}text-align:left;">
            <div>${escapeHtml(p.title)} (${featureCount})${p.status === 'archiviert' ? '<span class="mini"> (arch.)</span>' : ''}</div>
            <div class="mini">${escapeHtml(updatedLabel + emptyHint)}</div>
          </button>`;
        }).join('');
        // Re-wire after DOM update
        qq('[data-open-project]', wrap).forEach(btn => btn.addEventListener('click', () => {
          const pid = btn.dataset.openProject;
          ui.activeProjectId = pid;
          ui.projectEditMode = false;
          ui.editingProjectId = pid === ALL_PROJECTS_KEY ? null : pid;
          // Sync import draft project
          if (pid !== ALL_PROJECTS_KEY) ui.importDraft.projectId = pid;
          if (ui.view === 'database' || ui.view === 'project') {
            // Stay in current view but re-render with new context
          } else {
            ui.view = 'project';
          }
          renderNav();
          renderSidebarProjects();
          renderView();
        }));
      }

      function getProjectChats(projectId) {
        if (!projectId) return [];
        return (S.chats || [])
          .filter(c => c && c.projectId === projectId)
          .map(ensureChatDefaults)
          .sort((a, b) => String(b.updatedAt || b.startedAt || '').localeCompare(String(a.updatedAt || a.startedAt || '')));
      }

      function getProjectMainChat(projectId) {
        if (!projectId) return null;
        const project = S.projects.find(x => x.id === projectId);
        if (!project || !project.mainChatId) return null;
        const mainChat = (S.chats || []).find(c => c && c.id === project.mainChatId && c.projectId === projectId);
        if (!mainChat) return null;
        return ensureChatDefaults(mainChat);
      }

      function getProjectSourceChats(projectId) {
        return getProjectChats(projectId).filter(c => ['sprint', 'execution', 'branch'].includes(String(c.type || '')));
      }

      function getChatWorkflowState(projectId) {
        if (!projectId || projectId === ALL_PROJECTS_KEY) {
          ui.chatWorkflow = { projectId: projectId || '', sourceChatId: '', sprintGoal: '', prompt: '', mode: '' };
          return ui.chatWorkflow;
        }
        if (!ui.chatWorkflow) ui.chatWorkflow = { projectId: '', sourceChatId: '', sprintGoal: '', prompt: '', mode: '' };
        if (ui.chatWorkflow.projectId !== projectId) {
          ui.chatWorkflow = { projectId, sourceChatId: '', sprintGoal: '', prompt: '', mode: '' };
        }
        const sourceChats = getProjectSourceChats(projectId);
        if (!ui.chatWorkflow.sourceChatId || !sourceChats.some(c => c.id === ui.chatWorkflow.sourceChatId)) {
          ui.chatWorkflow.sourceChatId = (sourceChats[0] || {}).id || '';
        }
        return ui.chatWorkflow;
      }

      function setChatWorkflowSource(projectId, sourceChatId) {
        const st = getChatWorkflowState(projectId);
        st.sourceChatId = sourceChatId || '';
      }

      function clearProjectMainChat(projectId) {
        if (!projectId) return;
        const project = S.projects.find(x => x.id === projectId);
        if (project) {
          project.mainChatId = '';
          project.mainChatUrl = '';
          project.updatedAt = new Date().toISOString();
        }
        (S.chats || []).forEach(c => {
          if (!c || c.projectId !== projectId) return;
          c.mainChatId = '';
        });
      }

      function setProjectMainChat(projectId, chatId) {
        const project = S.projects.find(x => x.id === projectId);
        const chat = S.chats.find(x => x.id === chatId && x.projectId === projectId);
        if (!project || !chat) return false;
        project.mainChatId = chat.id;
        project.mainChatUrl = '';
        if (chat.url && chat.url.trim()) project.mainChatUrl = chat.url.trim();
        (S.chats || []).forEach(c => {
          if (!c || c.projectId !== projectId) return;
          c.mainChatId = chat.id;
        });
        project.updatedAt = new Date().toISOString();
        return true;
      }

      function setSelectedChatAsMain(chatId) {
        const chat = S.chats.find(c => c && c.id === chatId);
        if (!chat) return alert('Chat nicht gefunden.');
        const project = S.projects.find(p => p.id === chat.projectId);
        if (!project) return alert('Projekt zum Chat nicht gefunden.');
        if (project.status === 'archiviert') return alert('Archivierte Projekte können nicht im Chat-Workflow geändert werden.');
        const needsTypeUpgrade = chat.type !== 'project-main';
        if (needsTypeUpgrade) {
          const ok = confirm('Dieser Chat ist kein "project-main". Soll der Typ auf "project-main" geändert werden?');
          if (!ok) return;
          chat.type = 'project-main';
        }
        if (!setProjectMainChat(project.id, chat.id)) return alert('Hauptchat konnte nicht gesetzt werden.');
        chat.mainChatId = chat.id;
        chat.updatedAt = new Date().toISOString();
        save();
        renderView();
      }

      function getRelevantFeatureTitles(projectId, maxItems) {
        const projectFeatures = getVisibleFeatures(S.features).filter(f => f.projectId === projectId);
        const openStatuses = ['Idee', 'geprüft', 'geplant', 'in Arbeit', 'teilweise umgesetzt'];
        const sorted = projectFeatures.slice().sort((a, b) => {
          const aOpen = openStatuses.includes(a.status) ? 1 : 0;
          const bOpen = openStatuses.includes(b.status) ? 1 : 0;
          if (aOpen !== bOpen) return bOpen - aOpen;
          return String(b.updatedAt || '').localeCompare(String(a.updatedAt || ''));
        });
        return sorted.slice(0, Math.max(1, maxItems || 8)).map(f => `- ${f.title} (${f.status})`);
      }

      function getRelevantUnprocessedNotes(projectId, maxItems) {
        return (S.notes || [])
          .filter(n => n && n.projectId === projectId && !n.processed && String(n.text || '').trim())
          .sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')))
          .slice(0, Math.max(0, maxItems || 5))
          .map(n => '- ' + shorten(String(n.text || '').trim(), 160));
      }

      function buildReturnToMainChatPrompt(projectId, sourceChatId) {
        const project = S.projects.find(p => p.id === projectId);

        const noteLines = getRelevantUnprocessedNotes(projectId, 5);
        return [
          'Bitte hilf mir, den Kontext sauber in den Hauptchat zurückzuführen.',
          '',
          '## Projektkontext',
          `- Projekttitel: ${project.title || '—'}`,

          `- Aktueller Fokus: ${project.currentFocus || '—'}`,
          `- Nächster Schritt (Projekt): ${project.nextStep || '—'}`,
          `- Hauptchat: ${mainChat.title || '—'}${mainChat.url ? ' (' + mainChat.url + ')' : ''}`,
          '',
          '## Was im Sprintchat passiert ist',
          `- Ausgangschat: ${sourceChat.title || '—'}`,
          `- Typ/Status: ${sourceChat.type || '—'} / ${sourceChat.status || '—'}`,
          `- URL: ${sourceChat.url || '—'}`,
          `- Zusammenfassung: ${sourceChat.summary || '—'}`,
          `- Nächster Schritt aus dem Ausgangschat: ${sourceChat.nextStep || '—'}`,
          sourceChat.rawReportText ? `- Raw Report:\n${sourceChat.rawReportText}` : '- Raw Report: —',
          '',
          '## Offene Punkte',
          ...(featureLines.length ? featureLines : ['- Keine offenen Features hinterlegt.']),
          ...(noteLines.length ? ['', '## Relevante unverarbeitete Notizen', ...noteLines] : []),

          '## Was jetzt im Hauptchat geklärt/entschieden werden soll',
          '- Bitte fasse die wichtigsten Ergebnisse knapp zusammen.',
          '- Bitte markiere offene Risiken/Abhängigkeiten.',
          '- Bitte formuliere einen klaren, priorisierten nächsten Arbeitsfokus.',
          '- Bitte gib mir zum Schluss 3 konkrete nächste Schritte, die ich direkt ausführen kann.'
        ].join('\n');
      }

      function buildMainChatBootstrapPrompt(projectId, sourceChatId) {
        const project = S.projects.find(p => p.id === projectId);

          `- Next Step im Ausgangschat: ${sourceChat.nextStep || '—'}`,

          '## Auftrag',

          '- Halte offene Entscheidungen und Annahmen sichtbar fest.',

      function buildSprintPromptFromMainChat(projectId, sprintGoal) {
        const project = S.projects.find(p => p.id === projectId);

        if (ui.activeProjectId === ALL_PROJECTS_KEY || !S.projects.length) {
          return `
            <div class="panel-title"><h3>Project View</h3></div>
            <div class="notice">Kein Projekt ausgewählt. Wähle links ein Projekt oder lege ein neues an.</div>
            <div class="stack-row" style="margin-top:10px;">
              <button class="btn btn-primary" id="btnStartNewProject">+ Neues Projekt</button>
            </div>
          `;
        }

        const p = S.projects.find(x => x.id === ui.activeProjectId) || S.projects[0];
        if (!p) return '<div class="notice">Projekt nicht gefunden.</div>';

        // Always sync editingProjectId to activeProjectId when not in create mode
        if (!ui.projectEditMode || ui.editingProjectId === p.id) {
          ui.editingProjectId = p.id;
        }

        const projectFeatures = getVisibleFeatures(S.features).filter(f => f.projectId === p.id);
        const trashedFeatures = getTrashedFeaturesForProject(p.id);
        const projectNotes = S.notes.filter(n => n.projectId === p.id).sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
        const projectChats = getProjectChats(p.id);
        const projectMainChat = getProjectMainChat(p.id);
        const sourceChats = getProjectSourceChats(p.id);
        const chatWorkflow = getChatWorkflowState(p.id);
        const chatWorkflowSource = sourceChats.find(c => c.id === chatWorkflow.sourceChatId) || null;
        const isArchivedProject = p.status === 'archiviert';
        const latestAnalysis = S.analyses.filter(a => a.projectId === p.id).sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''))[0];
        const projectImports = getProjectImportVersions(p.id);

        function renderChatTypeBadge(type) {
          const colors = { 'project-main': 'var(--accent)', 'sprint': 'var(--blue)', 'execution': 'var(--green)', 'branch': 'var(--yellow)' };
          return `<span class="pill" style="border-color:${colors[type]||'var(--border)'};color:${colors[type]||'var(--ink-dim)'}">${escapeHtml(type||'—')}</span>`;
        }
        function renderChatStatusBadge(status) {
          const colors = { 'aktiv': 'var(--green)', 'pausiert': 'var(--yellow)', 'abgeschlossen': 'var(--ink-dim)', 'referenz': 'var(--blue)' };
          return `<span class="pill" style="color:${colors[status]||'var(--ink-dim)'}">${escapeHtml(status||'—')}</span>`;
        }

        // ── EDIT MODE (form) ──────────────────────────────────────────────────
        if (ui.projectEditMode) {
          const isCreate = !ui.editingProjectId || !S.projects.find(x => x.id === ui.editingProjectId);
          const ep = isCreate ? null : S.projects.find(x => x.id === ui.editingProjectId);
          return `
            ${renderContextBanner()}
            <div class="panel-title">
              <h3>${isCreate ? 'Neues Projekt' : 'Projekt bearbeiten: ' + escapeHtml(ep ? ep.title : '')}</h3>
              <button class="btn" id="btnResetProjectForm">← Zurück zum Dashboard</button>
            </div>
            <div class="stack-row">
              <div class="field" style="flex:2"><label for="projectTitle">Titel</label><input id="projectTitle" value="${escapeAttr(ep ? ep.title : '')}" /></div>
              <div class="field" style="flex:1"><label for="projectType">Typ</label><select id="projectType" data-current-value="${escapeAttr(ep ? (ep.type||APP_TYPES[0]) : APP_TYPES[0])}"></select></div>
              <div class="field" style="flex:1"><label for="projectStatus">Status</label><select id="projectStatus" data-current-value="${escapeAttr(ep ? (ep.status||PROJECT_STATUS[0]) : PROJECT_STATUS[0])}"></select></div>
            </div>
            <div class="field"><label for="projectSummary">Summary</label><textarea id="projectSummary">${escapeHtml(ep ? (ep.summary||'') : '')}</textarea></div>
            <div class="field"><label for="projectTags">Tags</label><input id="projectTags" value="${escapeAttr(ep ? (ep.tags||[]).join(', ') : '')}" /></div>
            <details style="margin-bottom:10px;" open>
              <summary>Links &amp; Fokus</summary>
              <div style="margin-top:8px;">
                <div class="field"><label for="projectMainChatUrl">Hauptchat URL</label><input id="projectMainChatUrl" type="url" placeholder="https://..." value="${escapeAttr(ep ? (ep.mainChatUrl||'') : '')}" /></div>
                <div class="field"><label for="projectDriveUrl">Google Drive URL</label><input id="projectDriveUrl" type="url" placeholder="https://drive.google.com/..." value="${escapeAttr(ep ? (ep.driveUrl||'') : '')}" /></div>
                <div class="field"><label for="projectObsidianUrl">Obsidian URL</label><input id="projectObsidianUrl" type="url" placeholder="obsidian://..." value="${escapeAttr(ep ? (ep.obsidianUrl||'') : '')}" /></div>
                <div class="field"><label for="projectCurrentFocus">Aktueller Fokus</label><input id="projectCurrentFocus" placeholder="Was ist gerade das Hauptziel?" value="${escapeAttr(ep ? (ep.currentFocus||'') : '')}" /></div>
                <div class="field"><label for="projectNextStep">Nächster Schritt</label><input id="projectNextStep" placeholder="Was kommt als nächstes?" value="${escapeAttr(ep ? (ep.nextStep||'') : '')}" /></div>
              </div>
            </details>
            <div class="stack-row">
              <button class="btn btn-primary" id="btnSaveProject">${isCreate ? 'Projekt erstellen' : 'Projekt speichern'}</button>
              ${!isCreate ? '<button class="btn btn-danger" id="btnDeleteProject">Projekt löschen</button>' : ''}
              ${!isCreate ? '<button class="btn" id="btnSyncProjectTrello">Nach Trello</button>' : ''}
              ${!isCreate ? '<button class="btn" id="btnPullProjectTrello">Von Trello</button>' : ''}
            </div>
          `;
        }

        // ── DASHBOARD MODE (default) ──────────────────────────────────────────
        const mainChatUrl = (p.mainChatUrl || '').trim();
        const driveUrl = (p.driveUrl || '').trim();
        const obsidianUrl = (p.obsidianUrl || '').trim();
        const hasLinks = mainChatUrl || driveUrl || obsidianUrl;

        return `
          ${renderContextBanner()}
          <div class="panel-title">
            <h3>${escapeHtml(p.title)}</h3>
            <div class="stack-row" style="gap:6px;">
              <span class="pill">${escapeHtml(p.status)}</span>
              <button class="btn" id="btnStartNewProject">+ Neues Projekt</button>
              <button class="btn" id="btnEditActiveProject">✏ Bearbeiten</button>
            </div>
          </div>

          ${p.summary ? `<div class="notice" style="margin-bottom:10px;">${escapeHtml(p.summary)}</div>` : ''}

          ${p.currentFocus || p.nextStep ? `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
              ${p.currentFocus ? `<div style="background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:10px;padding:10px 12px;">
                <div class="eyebrow" style="margin-bottom:4px;">Fokus</div>
                <div>${escapeHtml(p.currentFocus)}</div>
              </div>` : ''}
              ${p.nextStep ? `<div style="background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:10px;padding:10px 12px;">
                <div class="eyebrow" style="margin-bottom:4px;">Nächster Schritt</div>
                <div>${escapeHtml(p.nextStep)}</div>
              </div>` : ''}
            </div>
          ` : ''}

          <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:14px;">
            <div class="row-top" style="margin-bottom:8px;">
              <strong>Ressourcen</strong>
              ${hasLinks ? `<button class="btn" style="padding:4px 8px;font-size:12px;" onclick="ui.projectEditMode=true;renderView();">Bearbeiten</button>` : ''}
            </div>
            ${hasLinks ? `
              <div class="stack-row">
                ${mainChatUrl ? `<a href="${escapeAttr(mainChatUrl)}" target="_blank" rel="noopener" class="btn">💬 Hauptchat</a>` : `<button class="btn" onclick="ui.projectEditMode=true;renderView();">+ Hauptchat hinzufügen</button>`}
                ${driveUrl ? `<a href="${escapeAttr(driveUrl)}" target="_blank" rel="noopener" class="btn">📂 Drive</a>` : `<button class="btn" onclick="ui.projectEditMode=true;renderView();">+ Drive hinzufügen</button>`}
                ${obsidianUrl ? `<a href="${escapeAttr(obsidianUrl)}" target="_blank" rel="noopener" class="btn">🔮 Obsidian</a>` : `<button class="btn" onclick="ui.projectEditMode=true;renderView();">+ Obsidian hinzufügen</button>`}
              </div>
            ` : `
              <div class="notice" style="margin:0 0 8px 0;">Noch keine Ressourcen verlinkt</div>
              <button class="btn btn-primary" onclick="ui.projectEditMode=true;renderView();">+ Links hinzufügen</button>
            `}
          </div>

          <details style="margin-bottom:12px;" ${projectChats.length ? 'open' : ''}>
            <summary style="font-weight:700;">Chats &amp; Sprints (${projectChats.length})</summary>
            <div style="margin-top:10px;" class="list">
              ${projectChats.map(c => `
                <div class="item" style="border-left:3px solid ${c.type==='project-main'?'var(--accent)':c.type==='sprint'?'var(--blue)':c.type==='execution'?'var(--green)':'var(--yellow)'}">
                  <div class="row-top">
                    <strong>${escapeHtml(c.title||'Ohne Titel')} ${p.mainChatId === c.id ? '⭐' : ''}</strong>
                    <div class="stack-row" style="gap:4px;">${renderChatTypeBadge(c.type)}${renderChatStatusBadge(c.status)}</div>
                  </div>
                  ${c.summary ? `<div class="item-desc">${escapeHtml(c.summary)}</div>` : ''}
                  ${c.nextStep ? `<div class="mini" style="color:var(--accent)">→ ${escapeHtml(c.nextStep)}</div>` : ''}
                  <div class="stack-row">
                    ${c.url && c.url.trim() ? `<a href="${escapeAttr(c.url.trim())}" target="_blank" rel="noopener" class="btn">Öffnen</a>` : ''}
                    ${p.mainChatId !== c.id ? `<button class="btn" data-set-chat-main="${c.id}" ${isArchivedProject ? 'disabled' : ''}>Als Hauptchat setzen</button>` : '<span class="pill">Kanonischer Hauptchat</span>'}
                    <button class="btn" data-use-chat-source="${c.id}" data-project-id="${p.id}" ${isArchivedProject ? 'disabled' : ''}>Als Ausgangschat nutzen</button>
                    <button class="btn" data-edit-chat="${c.id}">Bearbeiten</button>
                    <button class="btn btn-danger" data-delete-chat="${c.id}">×</button>
                  </div>
                  <div class="mini">${formatDateTime(c.updatedAt||c.startedAt)}</div>
                </div>
              `).join('') || '<div class="notice">Noch keine Chat-Einträge.</div>'}
            </div>
            <div style="margin-top:8px;">
              <button class="btn btn-primary" data-new-chat="${p.id}">+ Chat / Sprint anlegen</button>
            </div>
          </details>

          <details style="margin-bottom:12px;" open>
            <summary style="font-weight:700;">Chat-Workflow</summary>
            <div style="margin-top:10px;">
              ${isArchivedProject ? '<div class="notice" style="margin-bottom:8px;">Projekt ist archiviert. Chat-Workflow-Aktionen sind deaktiviert.</div>' : ''}
              <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px;">
                <div class="eyebrow" style="margin-bottom:6px;">Hauptchat-Status</div>
                ${projectMainChat ? `
                  <div class="row-top">
                    <strong>${escapeHtml(projectMainChat.title || 'Ohne Titel')}</strong>
                    <div class="stack-row" style="gap:4px;">${renderChatTypeBadge(projectMainChat.type)}${renderChatStatusBadge(projectMainChat.status)}</div>
                  </div>
                  <div class="stack-row" style="margin-top:6px;">
                    ${projectMainChat.url ? `<a href="${escapeAttr(projectMainChat.url)}" target="_blank" rel="noopener" class="btn">Öffnen</a>` : ''}
                    <button class="btn" data-edit-chat="${projectMainChat.id}">Bearbeiten</button>
                  </div>
                ` : `<div class="notice" style="margin:0;">Noch kein Hauptchat gesetzt.</div>`}
              </div>
              <div class="field">
                <label for="chatWorkflowSourceChat">Ausgangschat</label>
                <select id="chatWorkflowSourceChat">
                  ${sourceChats.length ? sourceChats.map(c => `<option value="${escapeAttr(c.id)}" ${chatWorkflow.sourceChatId === c.id ? 'selected' : ''}>${escapeHtml(c.title || 'Ohne Titel')} · ${escapeHtml(c.type)} · ${escapeHtml(c.status || '—')}</option>`).join('') : '<option value="">— Keine Sprint-/Execution-/Branch-Chats vorhanden —</option>'}
                </select>
                ${chatWorkflowSource && chatWorkflowSource.url ? `<div class="mini" style="margin-top:4px;">Ausgewählt: <a href="${escapeAttr(chatWorkflowSource.url)}" target="_blank" rel="noopener">${escapeHtml(chatWorkflowSource.url)}</a></div>` : ''}
              </div>
              <div class="field">
                <label for="chatWorkflowSprintGoal">Neues Sprint-Ziel / Anliegen (optional)</label>
                <textarea id="chatWorkflowSprintGoal" style="min-height:70px;" placeholder="z.B. Checkout-Flow stabilisieren und offene Fehler beheben">${escapeHtml(chatWorkflow.sprintGoal || '')}</textarea>
              </div>
              <div class="stack-row" style="margin-bottom:8px;">
                <button class="btn" id="btnChatWorkflowSetMain" ${isArchivedProject || !chatWorkflow.sourceChatId ? 'disabled' : ''}>Als Hauptchat setzen</button>
                <button class="btn" id="btnChatWorkflowBuildReturn" ${isArchivedProject || !chatWorkflow.sourceChatId || !projectMainChat ? 'disabled' : ''}>Prompt: In Hauptchat zurückkehren</button>
                <button class="btn" id="btnChatWorkflowBuildBootstrap" ${isArchivedProject || !chatWorkflow.sourceChatId ? 'disabled' : ''}>Prompt: Hauptchat neu anlegen</button>
                <button class="btn btn-primary" id="btnChatWorkflowBuildSprint" ${isArchivedProject || !projectMainChat ? 'disabled' : ''}>Prompt: Nächsten Sprintchat starten</button>
              </div>
              <div class="field">
                <label for="chatWorkflowPromptOutput">Chat-Workflow Prompt-Ausgabe</label>
                <textarea id="chatWorkflowPromptOutput" style="min-height:220px;font-family:var(--font-mono);font-size:12px;">${escapeHtml(chatWorkflow.prompt || '')}</textarea>
                <div class="stack-row" style="margin-top:6px;">
                  <button class="btn" id="btnCopyChatWorkflowPrompt">Copy</button>
                </div>
              </div>
            </div>
          </details>

          <details style="margin-bottom:12px;" open>
            <summary style="font-weight:700;">Quick Add / Raw Notes</summary>
            <div class="field" style="margin-top:8px;">
              <label for="quickProject">Projekt</label>
              <select id="quickProject"><option value="${escapeAttr(p.id)}" selected>${escapeHtml(p.title)}</option></select>
            </div>
            <div class="field">
              <label for="quickNote">Rohe Notiz</label>
              <textarea id="quickNote" placeholder="Notiz, Idee, Bug, Prompt-Hinweis ..."></textarea>
            </div>
            <div class="stack-row">
              <button class="btn btn-primary" id="btnAddNote">Notiz speichern</button>
              <button class="btn" id="btnAnalyzeNote">Prompt bauen</button>
              <button class="btn" id="btnBuildReviewPrompt">Review-Prompt bauen</button>
            </div>
          </details>

          ${renderNoteReviewSection()}
          <details style="margin-bottom:12px;" open>
            <summary style="font-weight:700;">Feature-Bereinigung</summary>
            <div class="mini" style="margin:8px 0;">
              Nutze das, wenn dieses Projekt bereits doppelte oder ähnliche Features enthält. Es wird kein neuer Code benötigt.
            </div>
            <div class="stack-row">
              <button class="btn" id="btnBuildProjectDedupePrompt">Bestehende Features auf Dubletten prüfen</button>
            </div>
          </details>
          <details style="margin-bottom:12px;" ${trashedFeatures.length ? 'open' : ''}>
            <summary style="font-weight:700;">Papierkorb (${trashedFeatures.length})</summary>
            <div style="margin-top:10px;" class="list">
              ${trashedFeatures.length ? trashedFeatures.map(tf => {
                const mergeTarget = tf.mergedIntoFeatureId ? S.features.find(x => x.id === tf.mergedIntoFeatureId) : null;
                return `
                  <div class="item" style="border-left:3px solid var(--yellow);">
                    <div class="row-top">
                      <strong>${escapeHtml(tf.title || 'Ohne Titel')}</strong>
                      <span class="pill">im Papierkorb</span>
                    </div>
                    <div class="mini">Grund: ${escapeHtml(tf.trashReason || '—')} · Workflow: ${escapeHtml(tf.trashedByWorkflow || '—')}</div>
                    <div class="mini">Gelöscht am: ${escapeHtml(formatDateTime(tf.trashedAt))}</div>
                    ${tf.mergedIntoFeatureId ? `<div class="mini">Zusammengeführt mit: ${escapeHtml(mergeTarget ? mergeTarget.title : tf.mergedIntoFeatureId)}</div>` : ''}
                    <div class="stack-row">
                      <button class="btn" data-restore-feature="${tf.id}">Wiederherstellen</button>
                    </div>
                  </div>
                `;
              }).join('') : '<div class="notice">Keine Features im Papierkorb.</div>'}
            </div>
          </details>
          ${renderCleanupReviewSection()}

          <details style="margin-bottom:12px;" ${projectNotes.length ? 'open' : ''}>
            <summary style="font-weight:700;">Inbox / Notes (${projectNotes.length})</summary>
            <div style="margin-top:10px;">${renderInbox(projectNotes)}</div>
          </details>

          ${renderProjectImportHistory(projectImports)}

          <div class="mini" style="margin-bottom:6px;color:var(--ink-dim);">
            Features: ${projectFeatures.length} | Letzte Analyse: ${latestAnalysis ? formatDateTime(latestAnalysis.createdAt) : '—'}
          </div>
          ${renderTable(projectFeatures)}
        `;
      }

      function renderImportWorkspace() {
        // Auto-sync import project to active project when a concrete project is selected
        const contextProjectId = ui.activeProjectId !== ALL_PROJECTS_KEY ? ui.activeProjectId : (ui.importDraft.projectId || '');
        const contextProject = contextProjectId ? S.projects.find(x => x.id === contextProjectId) : null;
        return `
          ${renderContextBanner()}
          <div class="panel-title"><h3>Import</h3></div>
          <div class="notice" style="margin-bottom:10px;">
            Import in Projekt: <strong>${contextProject ? escapeHtml(contextProject.title) : '— kein Projekt gewählt —'}</strong>
          </div>
          <div class="field">
            <label for="htmlProjectSelect">Projekt wechseln</label>
            <div class="stack-row">
              <select id="htmlProjectSelect"></select>
              <button class="btn" id="btnStartNewProjectImport">Neues Projekt</button>
            </div>
          </div>
          <div class="field"><label for="htmlFileInput">HTML Upload</label><input id="htmlFileInput" type="file" accept=".html,text/html" /></div>
          <div class="field"><label for="htmlTextarea">HTML Paste</label><textarea id="htmlTextarea" style="min-height:170px">${escapeHtml(ui.importDraft.html || '')}</textarea></div>
          <div class="stack-row">
            <button class="btn btn-primary" id="btnAnalyzeHtml">HTML lokal analysieren</button>
            <button class="btn" id="btnBuildHtmlPrompt">KI-Prompt erzeugen</button>
          </div>
          <div class="field" style="margin-top:12px;">
            <label for="analysisPromptOutput">Analyse-Prompt Ausgabe</label>
            <textarea id="analysisPromptOutput" style="min-height:180px;font-family:var(--font-mono);font-size:12px;">${escapeHtml(ui.importDraft.analysisPrompt || '')}</textarea>
            <div class="stack-row" style="margin-top:6px;">
              <button class="btn" id="btnCopyAnalysisPrompt">Copy</button>
            </div>
          </div>
          <div class="field">
            <label for="promptOutput">Analyse-JSON Eingabe</label>
            <div class="mini" style="margin-bottom:6px;">Füge hier das KI-Analyse-JSON ein. Dieses Feld bleibt beim Erzeugen von Cleanup-/Dedupe-Prompts unverändert.</div>
            <textarea id="promptOutput" style="min-height:220px">${escapeHtml(ui.importDraft.prompt || '')}</textarea>
          </div>
          <div class="stack-row">
            <button class="btn btn-primary" id="btnImportJsonResult">Analyse-JSON abgleichen</button>
            <button class="btn" id="btnBuildCleanupPrompt">Cleanup-Prompt bauen</button>
            <button class="btn" id="btnFeatureFromPrompt">Fallback: Zeilen importieren</button>
          </div>
          <div class="mini" style="margin-top:6px;">Nutze das, wenn du ein neues Analyse-JSON aus neuem Code hast.</div>
          <div class="field" style="margin-top:12px;">
            <label for="cleanupPromptOutput">Cleanup-Prompt Ausgabe</label>
            <textarea id="cleanupPromptOutput" style="min-height:180px;font-family:var(--font-mono);font-size:12px;">${escapeHtml(ui.importDraft.cleanupPrompt || '')}</textarea>
            <div class="stack-row" style="margin-top:6px;">
              <button class="btn" id="btnCopyCleanupPrompt">Copy</button>
            </div>
          </div>
          ${renderCleanupReviewSection()}
        `;
      }

      function getProjectImportVersions(projectId) {
        return (S.importVersions || [])
          .filter(v => v && v.projectId === projectId)
          .sort((a,b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
      }

      function renderProjectImportHistory(imports) {
        if (!imports.length) {
          return `
            <details style="margin-bottom:12px;">
              <summary style="font-weight:700;">Importe / Versionen (0)</summary>
              <div class="notice" style="margin-top:10px;">Noch keine Import-Versionen gespeichert.</div>
            </details>
          `;
        }
        return `
          <details style="margin-bottom:12px;" open>
            <summary style="font-weight:700;">Importe / Versionen (${imports.length})</summary>
            <div class="list" style="margin-top:10px;">
              ${imports.slice(0, 10).map(v => {
                const cmp = v.comparisonToPrevious || {};
                const added = Array.isArray(cmp.addedFeatures) ? cmp.addedFeatures.length : 0;
                const updated = Array.isArray(cmp.updatedFeatures) ? cmp.updatedFeatures.length : 0;
                const unchanged = Array.isArray(cmp.unchangedFeatures) ? cmp.unchangedFeatures.length : 0;
                const missing = Array.isArray(cmp.missingFromNewVersion) ? cmp.missingFromNewVersion.length : 0;
                const summary = v.parsedSummary || {};
                return `
                  <details class="item">
                    <summary style="cursor:pointer;">
                      <div class="row-top">
                        <strong>${formatDateTime(v.createdAt)}</strong>
                        <span class="pill">${escapeHtml(v.sourceType || 'import')}</span>
                      </div>
                      <div class="mini">${escapeHtml(v.sourceName || 'Analyse-Import')} · ${escapeHtml(summary.projectSummary || 'ohne Summary')}</div>
                      <div class="mini">+${added} neu · ~${updated} geändert · =${unchanged} gleich · -${missing} fehlen</div>
                    </summary>
                    <div style="margin-top:10px;">
                      ${added ? `<div class="mini"><strong>Neu:</strong> ${escapeHtml(cmp.addedFeatures.map(x => x.title || x).join(', '))}</div>` : ''}
                      ${updated ? `<div class="mini"><strong>Geändert:</strong> ${escapeHtml(cmp.updatedFeatures.map(x => x.title || x).join(', '))}</div>` : ''}
                      ${missing ? `<div class="mini"><strong>Fehlt in neuer Version:</strong> ${escapeHtml(cmp.missingFromNewVersion.map(x => x.title || x).join(', '))}</div>` : ''}
                      ${(cmp.possibleRelevantNotes || []).length ? `<div class="mini"><strong>Mögliche Notizen:</strong> ${escapeHtml(cmp.possibleRelevantNotes.map(n => shorten(n.text || '', 80)).join(' | '))}</div>` : ''}
                    </div>
                  </details>
                `;
              }).join('')}
            </div>
          </details>
        `;
      }

      function renderSettingsWorkspace() {
        return `
          <div class="panel-title"><h3>Settings</h3></div>
          <div class="field"><label for="themeSelect">Theme</label><select id="themeSelect"><option value="theme-dark">Dark</option><option value="theme-light">Light</option><option value="theme-eink">E-Ink</option></select></div>
          <div class="field"><label for="fontSelect">Font</label><select id="fontSelect"><option value="ui">UI</option><option value="serif">Serif</option></select></div>
          <hr style="border:none;border-top:1px solid var(--border);margin:12px 0;">
          <div class="panel-title" style="margin-top:8px;"><h3>GitHub Gist Sync</h3><div class="mini">Manueller Cloud-Backup</div></div>
          <div class="field"><label for="gistId">Gist ID</label><input id="gistId" type="text" value="${escapeAttr(C.gistId || '')}" /></div>
          <div class="field"><label for="gistToken">GitHub Token</label><input id="gistToken" type="password" value="${escapeAttr(C.gistToken || '')}" /></div>
          <div class="stack-row" style="margin-bottom:8px;">

      function renderDashboard(projects, features, notes) {
        const recentProjects = projects.slice().sort((a,b) => (b.updatedAt||'').localeCompare(a.updatedAt||'')).slice(0,4);

            <div class="card">

              <h3>Nächste gute Kandidaten</h3>

      function projectCardMini(p) {
        return `<div class="item"><div class="row-top"><strong>${escapeHtml(p.title)}</strong><span class="pill">${escapeHtml(p.status)}</span></div><div class="mini">${escapeHtml(p.summary || '')}</div></div>`;

      function featureCardMini(f) {

      }

      function fillSelect(el, values, objectsMode) {
        if (!el) return;
        let items = values;
        if (!objectsMode) items = values.map(v => ({ value:v, label:v }));
        el.innerHTML = items.map(item => `<option value="${escapeAttr(item.value)}">${escapeHtml(item.label)}</option>`).join('');
      }

      function getFilteredFeatures() {
        const p = ui.activeProjectId || ALL_PROJECTS_KEY;
        const st = ui.filters.status || 'alle';
        const cat = ui.filters.category || 'alle';
        const term = (ui.filters.search || '').trim().toLowerCase();
        return getVisibleFeatures(S.features).filter(f => {
          if (!ui.showAllProjects && p !== ALL_PROJECTS_KEY && f.projectId !== p) return false;
          if (st !== 'alle' && f.status !== st) return false;
          if (cat !== 'alle' && f.category !== cat) return false;
          if (term) {
            const blob = [f.title, f.description, f.category, f.priority, getProjectTitle(f.projectId)].join(' ').toLowerCase();
            if (!blob.includes(term)) return false;
          }
          return true;
        }).sort((a,b) => (b.updatedAt||'').localeCompare(a.updatedAt||''));
      }

      function getFilteredNotes() {
        const p = ui.activeProjectId || ALL_PROJECTS_KEY;
        const term = (ui.filters.search || '').trim().toLowerCase();
        return S.notes.filter(n => {
          if (!ui.showAllProjects && p !== ALL_PROJECTS_KEY && n.projectId !== p) return false;
          if (term) {
            const blob = [n.text, getProjectTitle(n.projectId)].join(' ').toLowerCase();
            if (!blob.includes(term)) return false;
          }
          return true;
        }).sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
      }

      function saveProjectFromForm() {
        const title = $('projectTitle').value.trim();
        if (!title) return alert('Bitte einen Projekttitel eintragen.');
        const data = {
          title,
          type: $('projectType').value,
          status: $('projectStatus').value,
          summary: $('projectSummary').value.trim(),
          tags: splitTags($('projectTags').value),
          mainChatUrl: ($('projectMainChatUrl') ? $('projectMainChatUrl').value.trim() : ''),
          driveUrl: ($('projectDriveUrl') ? $('projectDriveUrl').value.trim() : ''),
          obsidianUrl: ($('projectObsidianUrl') ? $('projectObsidianUrl').value.trim() : ''),
          currentFocus: ($('projectCurrentFocus') ? $('projectCurrentFocus').value.trim() : ''),
          nextStep: ($('projectNextStep') ? $('projectNextStep').value.trim() : '')
        };
        let savedProjectId = ui.editingProjectId || '';
        if (ui.editingProjectId) {
          const now = new Date().toISOString();
          const p = S.projects.find(x => x.id === ui.editingProjectId);
          if (!p) return;
          Object.assign(p, data, { updatedAt: now });
        } else {
          const created = createProjectFromData(data);
          savedProjectId = created.id;
        }
        ui.activeProjectId = savedProjectId;
        ui.editingProjectId = savedProjectId;
        ui.importDraft.projectId = savedProjectId;
        ui.projectEditMode = false;
        save();
        renderSidebarProjects();
        renderProjectSelects();
        renderView();
      }

      function createProjectFromData(data) {
        const now = new Date().toISOString();
        const created = ensureProjectDefaults(Object.assign({ id: uid('p'), createdAt: now, lastHtmlImportedAt: '', lastAnalyzedAt: '' }, data, { updatedAt: now }));
        S.projects.push(created);
        return created;
      }

      function editProject(id) {
        const p = S.projects.find(x => x.id === id);
        if (!p) return;
        ui.editingProjectId = id;
        $('projectTitle').value = p.title || '';
        $('projectType').value = p.type || APP_TYPES[0];
        $('projectStatus').value = p.status || PROJECT_STATUS[0];
        $('projectSummary').value = p.summary || '';
        $('projectTags').value = (p.tags || []).join(', ');
        if ($('projectMainChatUrl')) $('projectMainChatUrl').value = p.mainChatUrl || '';
        if ($('projectDriveUrl')) $('projectDriveUrl').value = p.driveUrl || '';
        if ($('projectObsidianUrl')) $('projectObsidianUrl').value = p.obsidianUrl || '';
        if ($('projectCurrentFocus')) $('projectCurrentFocus').value = p.currentFocus || '';
        if ($('projectNextStep')) $('projectNextStep').value = p.nextStep || '';
      }

      function resetProjectForm() {
        ui.editingProjectId = null;
        $('projectTitle').value = '';
        $('projectType').value = APP_TYPES[0];
        $('projectStatus').value = PROJECT_STATUS[0];
        $('projectSummary').value = '';
        $('projectTags').value = '';
      }

      function startNewProjectCreation() {
        if (ui.activeProjectId === ALL_PROJECTS_KEY) {
          ui.activeProjectId = (S.projects[0] || {}).id || '';
        }
        ui.editingProjectId = null;
        renderView();
      }

      function startNewProjectFromProjectView() {
        ui.projectEditMode = true;
        ui.editingProjectId = null;
        ui.view = 'project';
        renderNav();
        renderView();
      }

      function startNewProjectFromImportView() {
        const title = prompt('Titel für neues Projekt:');
        if (title === null) return;
        const cleanTitle = title.trim();
        if (!cleanTitle) return alert('Bitte einen Projekttitel eintragen.');
        const created = createProjectFromData({
          title: cleanTitle,
          type: APP_TYPES[0],
          status: PROJECT_STATUS[0],
          summary: '',
          tags: []
        });
        ui.activeProjectId = created.id;
        ui.editingProjectId = created.id;
        ui.importDraft.projectId = created.id;
        save();
        renderSidebarProjects();
        renderView();
      }

      function deleteProjectFromForm() {
        if (!ui.editingProjectId) return alert('Kein Projekt zum Löschen ausgewählt.');
        deleteProject(ui.editingProjectId);
      }

      function deleteProject(id) {
        const p = S.projects.find(x => x.id === id);
        if (!p) return;
        if (!confirm(`Projekt "${p.title}" wirklich löschen? Zugehörige Features und Projekt-Notizen werden ebenfalls gelöscht.`)) return;
        S.projects = S.projects.filter(x => x.id !== id);
        S.features = S.features.filter(f => f.projectId !== id);
        S.notes = S.notes.filter(n => n.projectId !== id);
        S.chats = S.chats.filter(c => c.projectId !== id);
        S.importVersions = (S.importVersions || []).filter(v => v.projectId !== id);
        ui.projectEditMode = false;
        ui.editingProjectId = null;
        ui.activeProjectId = S.projects.length ? S.projects[0].id : ALL_PROJECTS_KEY;
        save();
        renderProjectSelects();
        renderView();
      }

        const text = $('quickNote').value.trim();
        if (!text) return alert('Bitte erst eine Notiz schreiben.');
        S.notes.push({
          id: uid('n'),
          projectId: $('quickProject').value || '',
          text,
          processed: false,
          createdAt: new Date().toISOString()
        });
        $('quickNote').value = '';
        save();
        renderView();
      }

      function deleteNote(id) {
        S.notes = S.notes.filter(n => n.id !== id);
        save();
        renderView();

      function markNoteProcessed(id) {
        const n = S.notes.find(x => x.id === id);
        if (!n) return;
        n.processed = true;
        n.processedAt = new Date().toISOString();
        save();
        renderView();
      }

      function promoteNoteToFeature(id) {
        const n = S.notes.find(x => x.id === id);
        if (!n) return;
        const title = prompt('Feature-Titel:', guessFeatureTitle(n.text));
        if (!title) return;
        S.features.push(ensureFeatureDefaults({
          id: uid('f'),

          description: n.text,
          status: 'Idee',
          priority: 'mittel',
          category: 'Workflow',
          sourceType: 'note-analysis',
          sourceNoteIds: [n.id],
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        }));
        n.processed = true;
        n.processedAt = new Date().toISOString();
        save();
        renderView();

      function updateFeatureStatus(id, status) {
        const f = S.features.find(x => x.id === id);
        if (!f) return;
        ensureFeatureDefaults(f);
        f.status = status;
        f.updatedAt = new Date().toISOString();
        markFeatureDirtyRoadtrip(f);
        save();
        renderView();
      }

      function updateFeaturePriority(id, priority) {
        const f = S.features.find(x => x.id === id);
        if (!f) return;
        ensureFeatureDefaults(f);
        f.priority = priority;
        f.updatedAt = new Date().toISOString();
        markFeatureDirtyRoadtrip(f);
        save();

      function quickCreateFeature(projectId) {
        const title = prompt('Feature-Titel:');
        if (!title) return;
        const description = prompt('Kurzbeschreibung:', '');
        S.features.push(ensureFeatureDefaults({
          id: uid('f'),
          projectId,
          title: title.trim(),
          description: (description || '').trim(),
          status: 'Idee',
          priority: 'mittel',
          category: 'Sonstiges',
          sourceType: 'manual',
          sourceNoteIds: [],
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        }));
        save();
        renderView();

      function onHtmlFilePicked(e) {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          const value = String(reader.result || '');
          $('htmlTextarea').value = value;
          ui.importDraft.html = value;
        };
        reader.readAsText(file, 'utf-8');
      }

      function analyzeHtmlLocal() {
        const html = $('htmlTextarea').value.trim();
        const projectId = $('htmlProjectSelect').value;
        ui.importDraft.html = $('htmlTextarea').value;
        ui.importDraft.projectId = projectId;
        if (!projectId) return alert('Bitte ein Projekt auswählen.');
        if (!html) return alert('Bitte HTML hochladen oder einfügen.');
        const result = heuristicsFromHtml(html);
        const p = S.projects.find(x => x.id === projectId);
        if (!p) return;
        p.summary = result.projectSummary || p.summary;
        p.type = result.appType || p.type;
        p.lastHtmlImportedAt = new Date().toISOString();
        p.lastAnalyzedAt = new Date().toISOString();
        p.updatedAt = new Date().toISOString();

        ui.analysisDraftFeatures = result.features.map(title => ({
          title,
          description: 'Heuristisch aus aktueller HTML-Datei erkannt.',
          category: guessCategory(title),
          projectId
        }));

        const analysisText = [
          'LOKALE HTML-ANALYSE',
          '',
          'App-Typ: ' + result.appType,
          'Projektbeschreibung:',
          result.projectSummary,
          '',
          'Erkannte Features:',
          ...result.features.map(f => '- ' + f)
        ].join('\n');
        if ($('analysisPromptOutput')) $('analysisPromptOutput').value = analysisText;
        ui.importDraft.analysisPrompt = analysisText;

        S.analyses.push({
          id: uid('a'),
          type: 'html-project-analysis',
          projectId,
          createdAt: new Date().toISOString(),
          resultRaw: analysisText,
          resultParsed: result
        });

        save();
        renderProjectSelects();
        renderView();
      }

      function heuristicsFromHtml(html) {
        const lower = html.toLowerCase();
        const title = matchGroup(html, /<title>(.*?)<\/title>/i) || 'Unbekannte App';
        const featureSet = new Set();

        const rules = [
          ['dark mode', 'Dark Mode'],
          ['light mode', 'Light Mode'],
          ['e-ink', 'E-Ink Modus'],
          ['eink', 'E-Ink Modus'],
          ['gist', 'GitHub Gist Synchronisation'],
          ['localstorage', 'Lokaler Datenspeicher'],
          ['csv', 'CSV Export/Import'],
          ['json', 'JSON Export/Import'],
          ['canvas', 'Canvas / Kartenansicht'],
          ['kanban', 'Kanban-Ansicht'],
          ['table', 'Tabellenansicht'],
          ['card', 'Kartenansicht'],
          ['prompt', 'Prompt-Weitergabe / Prompt-Builder'],

      function loadNoteReviewProposals() {
        const raw = $('noteReviewJsonInput') ? $('noteReviewJsonInput').value.trim() : '';

        let parsed;

        const proposals = Array.isArray(parsed.proposals) ? parsed.proposals : [];

          _idx: i,
          type: validTypes.includes(p.type) ? p.type : 'unclear',
          targetFeatureId: String(p.targetFeatureId || '').trim(),
          targetFeatureTitle: String(p.targetFeatureTitle || '').trim(),
          suggestedTitle: String(p.suggestedTitle || '').trim(),
          suggestedDescription: String(p.suggestedDescription || '').trim(),
          suggestedCategory: FEATURE_CATEGORIES.includes(p.suggestedCategory) ? p.suggestedCategory : 'Sonstiges',
          suggestedStatus: FEATURE_STATUS.includes(p.suggestedStatus) ? p.suggestedStatus : 'Idee',
          rationale: String(p.rationale || '').trim(),
          _done: false
        }));

      function acceptNoteProposalAsNew(idx) {
        const proposal = ui.noteReview.proposals.find(p => p._idx === idx);
        if (!proposal || proposal._done) return;
        const projectId = ui.noteReview.projectId || '';
        if (!proposal.suggestedTitle) return alert('Kein Titel im Vorschlag vorhanden.');
        S.features.push(ensureFeatureDefaults({
          id: uid('f'),
          projectId,
          title: proposal.suggestedTitle,
          description: proposal.suggestedDescription || '',
          category: proposal.suggestedCategory || 'Sonstiges',
          status: proposal.suggestedStatus || 'Idee',
          priority: 'mittel',
          sourceType: 'note-review',
          sourceNoteIds: [],
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        }));
        proposal._done = true;
        save();
        renderView();
      }

      function acceptNoteProposalAsUpdate(idx) {
        const proposal = ui.noteReview.proposals.find(p => p._idx === idx);
        if (!proposal || proposal._done) return;
        const targetId = proposal.targetFeatureId;
        const feature = targetId ? S.features.find(x => x.id === targetId) : null;
        if (!feature) return alert('Ziel-Feature nicht gefunden. Bitte manuell zuordnen.');
        // Defensive: only update if value is non-empty and meaningfully different
        if (proposal.suggestedTitle && proposal.suggestedTitle !== feature.title) {
          if (confirm('Titel ändern von:\n"' + feature.title + '"\nauf:\n"' + proposal.suggestedTitle + '"?')) {
            feature.title = proposal.suggestedTitle;
          }
        }
        if (proposal.suggestedDescription) {
          const existingDesc = String(feature.description || '').trim();
          if (!existingDesc || isGenericFeatureDescription(existingDesc)) {
            feature.description = proposal.suggestedDescription;
          } else if (existingDesc !== proposal.suggestedDescription) {
            if (confirm('Beschreibung ersetzen?\nAlt: ' + shorten(existingDesc, 80) + '\nNeu: ' + shorten(proposal.suggestedDescription, 80))) {
              feature.description = proposal.suggestedDescription;
            }
          }
        }
        if (proposal.suggestedCategory && proposal.suggestedCategory !== 'Sonstiges' && feature.category === 'Sonstiges') {
          feature.category = proposal.suggestedCategory;
        }
        if (proposal.suggestedStatus && FEATURE_STATUS.includes(proposal.suggestedStatus)) {
          if (getFeatureStatusRank(proposal.suggestedStatus) > getFeatureStatusRank(feature.status)) {
            if (confirm('Status anheben auf "' + proposal.suggestedStatus + '"?')) {
              feature.status = proposal.suggestedStatus;
            }
          }
        }
        feature.updatedAt = new Date().toISOString();
        proposal._done = true;
        save();
        renderView();
      }

      function parseAnalysisJsonForCleanup(text, projectId) {
        let parsed;
        try {
          parsed = JSON.parse(String(text || '{}'));
        } catch (err) {
          throw new Error('invalid-analysis-json');
        }
        if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) throw new Error('unsupported-top-level-structure');
        const p = S.projects.find(x => x.id === projectId);
        if (!p) throw new Error('project-not-found');
        const featureSource = Array.isArray(parsed.features) ? parsed.features
          : Array.isArray(parsed.featureCandidates) ? parsed.featureCandidates
          : Array.isArray(parsed.detectedFeatures) ? parsed.detectedFeatures
          : null;
        const hasFeatureKey = Object.prototype.hasOwnProperty.call(parsed, 'features')
          || Object.prototype.hasOwnProperty.call(parsed, 'featureCandidates')
          || Object.prototype.hasOwnProperty.call(parsed, 'detectedFeatures');
        if (!hasFeatureKey || !featureSource) throw new Error('missing-features-array');
        if (featureSource.length === 0) throw new Error('empty-features-array');
        const parsedFeatures = featureSource.map(normalizeImportedFeature).filter(Boolean);
        if (!parsedFeatures.length) throw new Error('empty-features-array');
        return { parsed, parsedFeatures };
      }
