      function backfillMissingProjectSummariesFromImportHistory() {
        const projects = Array.isArray(S.projects) ? S.projects : [];
        const importVersions = Array.isArray(S.importVersions) ? S.importVersions : [];
        const stats = { checkedProjects: 0, summaryFilled: 0, typeFilled: 0, unresolved: 0 };
        let changedAny = false;

        projects.forEach(project => {
          const existingSummary = String(project.summary || '').trim();
          if (existingSummary) return;
          stats.checkedProjects++;
          const projectImports = importVersions
            .filter(v => v && v.projectId === project.id)
            .sort((a, b) => (String(b.createdAt || '')).localeCompare(String(a.createdAt || '')));
          let resolved = false;
          for (const entry of projectImports) {
            let parsed = null;
            if (entry && entry.parsedSummary && typeof entry.parsedSummary === 'object') {
              parsed = {
                projectSummary: entry.parsedSummary.projectSummary,
                appType: entry.parsedSummary.appType
              };
            }
            if ((!parsed || !String(parsed.projectSummary || '').trim()) && entry && entry.rawAnalysisText) {
              parsed = tryParseAnalysisJsonLoose(entry.rawAnalysisText);
            }
            const applyResult = applyProjectMetadataFromAnalysis(project.id, parsed);
            if (applyResult.summaryChanged) stats.summaryFilled++;
            if (applyResult.typeChanged) stats.typeFilled++;
            if (applyResult.changed) changedAny = true;
            if (applyResult.summaryChanged || String(project.summary || '').trim()) {
              resolved = true;
              break;
            }
          }
          if (!resolved && !String(project.summary || '').trim()) stats.unresolved++;
        });

        if (changedAny) save();
        return stats;
      }

      function reconcileImportedFeature(existing, imported, nowIso) {
        const importedStatus = mapJsonAnalysisStatus(imported.status);
        const importedDescription = String(imported.description || '').trim();
        const importedCategory = FEATURE_CATEGORIES.includes(imported.category) ? imported.category : 'Sonstiges';
        const changes = [];
        applyFeatureDefaults(existing);
        if (existing.pool !== 'implemented') {
          existing.pool = 'implemented';
          changes.push('pool');
        }
        if (existing.reviewStatus !== 'needs-review') {
          existing.reviewStatus = 'needs-review';
          changes.push('reviewStatus');
        }

        if (importedStatus === 'confirmed') {
          const nextStatus = 'confirmed';
          if (getFeatureStatusRank(existing.status, existing.pool) < getFeatureStatusRank(nextStatus, existing.pool)) {
            existing.status = nextStatus;
            changes.push('status');
          }
        } else if (importedStatus === 'detected') {
          const nextStatus = 'detected';
          if (getFeatureStatusRank(existing.status, existing.pool) < getFeatureStatusRank(nextStatus, existing.pool)) {
            existing.status = nextStatus;
            changes.push('status');
          }
        }

        const existingDescription = String(existing.description || '').trim();
        const allowDescriptionUpdate = importedDescription && (!existingDescription || isGenericFeatureDescription(existingDescription));
        if (allowDescriptionUpdate && existingDescription !== importedDescription) {
          existing.description = importedDescription;
          changes.push('description');
        }

        if (importedCategory !== 'Sonstiges' && existing.category === 'Sonstiges' && existing.category !== importedCategory) {
          existing.category = importedCategory;
          changes.push('category');
        }

        if (changes.length) existing.updatedAt = nowIso;
        return changes;
      }

      function reconcileImportedFeaturesForProject(projectId, featureSource, nowIso) {
        const report = {
          created: [],
          updated: [],
          unchanged: [],
          possibleStaleFeatures: []
        };
        const matchedFeatureIds = new Set();

        featureSource.forEach(item => {
          if (!item || typeof item !== 'object') return;
          const title = String(item.title || '').trim();
          if (!title) return;

          const existing = getMatchingProjectFeature(projectId, title);
          if (existing) {
            matchedFeatureIds.add(existing.id);
            const changes = reconcileImportedFeature(existing, item, nowIso);
            if (changes.length) {
              report.updated.push({ id: existing.id, title: existing.title, changes });
            } else {
              report.unchanged.push({ id: existing.id, title: existing.title });
            }
            return;
          }

          const description = String(item.description || '').trim() || 'Aus Analyse-JSON übernommen.';
          const category = FEATURE_CATEGORIES.includes(item.category) ? item.category : 'Sonstiges';
          const created = ensureFeatureDefaults({
            id: uid('f'),
            projectId,
            title,
            description,
            category,
            pool: 'implemented',
            reviewStatus: 'needs-review',
            status: mapJsonAnalysisStatus(item.status),
            priority: 'mittel',
            sourceType: 'html-analysis',
            sourceNoteIds: [],
            createdAt: nowIso,
            updatedAt: nowIso
          });
          S.features.push(created);
          matchedFeatureIds.add(created.id);
          report.created.push({ id: created.id, title: created.title });
        });

        report.possibleStaleFeatures = S.features
          .filter(f => f.projectId === projectId && !matchedFeatureIds.has(f.id))
          .map(f => ({ id: f.id, title: f.title, status: f.status }));

        return report;
      }

      function extractJsonObjectFromText(text) {
        const source = String(text || '').trim();
        if (!source) throw new Error('invalid-json-not-found');

        const unfenced = source
          .replace(/^```(?:json)?\s*/i, '')
          .replace(/\s*```$/i, '')
          .trim();

        const starts = [];
        for (let i = 0; i < unfenced.length; i++) {
          if (unfenced[i] === '{') starts.push(i);
        }
        if (!starts.length) throw new Error('invalid-json-not-found');

        for (const start of starts) {
          let depth = 0;
          let inString = false;
          let escaped = false;
          for (let i = start; i < unfenced.length; i++) {
            const ch = unfenced[i];
            if (inString) {
              if (escaped) {
                escaped = false;
              } else if (ch === '\\') {
                escaped = true;
              } else if (ch === '"') {
                inString = false;
              }
              continue;
            }
            if (ch === '"') {
              inString = true;
              continue;
            }
            if (ch === '{') depth++;
            if (ch === '}') {
              depth--;
              if (depth === 0) {
                const candidate = unfenced.slice(start, i + 1).trim();
                try {
                  JSON.parse(candidate);
                  return candidate;
                } catch (err) {
                  break;
                }
              }
            }
          }
        }

        throw new Error('invalid-json-not-found');
      }

      function importJsonAnalysisFromPrompt(text, projectId) {
        let parsed;
        try {
          parsed = JSON.parse(String(text || '{}'));
        } catch (err) {
          throw new Error('invalid-analysis-json');
        }
        if (!parsed || typeof parsed !== 'object') throw new Error('unsupported-top-level-structure');
        if (Array.isArray(parsed)) throw new Error('unsupported-top-level-structure');
        const p = S.projects.find(x => x.id === projectId);
        if (!p) throw new Error('project-not-found');

        const now = new Date().toISOString();
        applyProjectMetadataFromAnalysis(projectId, parsed, { allowOverwrite: false });
        markProjectCodeAnalysisCompleted(projectId, now);

        const featureSource = Array.isArray(parsed.features) ? parsed.features
          : Array.isArray(parsed.featureCandidates) ? parsed.featureCandidates
          : Array.isArray(parsed.detectedFeatures) ? parsed.detectedFeatures
          : null;
        const hasFeatureKey = Object.prototype.hasOwnProperty.call(parsed, 'features')
          || Object.prototype.hasOwnProperty.call(parsed, 'featureCandidates')
          || Object.prototype.hasOwnProperty.call(parsed, 'detectedFeatures');
        if (!hasFeatureKey || !featureSource) throw new Error('missing-features-array');
        if (featureSource.length === 0) throw new Error('empty-features-array');
        const parsedFeatures = featureSource.map(normalizeImportedFeature).filter(Boolean);
        const comparisonToPrevious = compareFeaturesToPreviousVersion(projectId, parsedFeatures);
        const reconciliation = reconcileImportedFeaturesForProject(projectId, featureSource, now);

        const views = Array.isArray(parsed.views) ? parsed.views.map(x => String(x || '').trim()).filter(Boolean) : [];
        const technicalNotes = Array.isArray(parsed.technicalNotes) ? parsed.technicalNotes.map(x => String(x || '').trim()).filter(Boolean) : [];
        const unclearPoints = Array.isArray(parsed.unclearPoints) ? parsed.unclearPoints.map(x => String(x || '').trim()).filter(Boolean) : [];
        const hasStructuredAnalysis = views.length || technicalNotes.length || unclearPoints.length;
        const hasReconciliationResults = reconciliation.created.length || reconciliation.updated.length || reconciliation.unchanged.length || reconciliation.possibleStaleFeatures.length;
        if (hasStructuredAnalysis || hasReconciliationResults) {
          S.analyses.push({
            id: uid('a'),
            type: 'html-project-analysis',
            projectId,
            createdAt: now,
            resultRaw: text,

              appType: typeof parsed.appType === 'string' ? parsed.appType : '',
              projectSummary: typeof parsed.projectSummary === 'string' ? parsed.projectSummary : '',
              views,
              technicalNotes,
              unclearPoints,
              reconciliation: hasReconciliationResults ? reconciliation : undefined
            }
          });
        }

        const importVersion = createImportVersionEntry(
          projectId,
          'analysis-json',
          'JSON Result Import',
          text,
          parsed,
          parsedFeatures,
          comparisonToPrevious
        );
        S.importVersions.push(importVersion);

        return { reconciliation, comparisonToPrevious };
      }

      // ─── GITHUB GIST SYNC ────────────────────────────────────────────────────

      const GIST_FILE = 'roadtrip_data.json';
      const ROADTRIP_GIST_ENCRYPTION_FORMAT = 'roadtrip-encrypted-v1';
      const ROADTRIP_GIST_KDF_ITERATIONS = 250000;
      let _gistPassphraseSession = '';
      let _gistRememberPassphraseForSession = false;
      let _gistStatus = { lastPush: '', lastPull: '', lastError: '' };


      function roadtripBytesToBase64(bytes) {
        const arr = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes || []);
        let bin = '';
        for (let i = 0; i < arr.length; i++) bin += String.fromCharCode(arr[i]);
        return btoa(bin);
      }

      function roadtripBase64ToBytes(base64) {
        const bin = atob(String(base64 || ''));
        const out = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
        return out;
      }

      async function deriveRoadtripGistKey(passphrase, salt) {
        const passphraseBytes = new TextEncoder().encode(String(passphrase || ''));
        const keyMaterial = await crypto.subtle.importKey('raw', passphraseBytes, 'PBKDF2', false, ['deriveKey']);
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', hash: 'SHA-256', salt, iterations: ROADTRIP_GIST_KDF_ITERATIONS },
          keyMaterial,
          { name: 'AES-GCM', length: 256 },
          false,
          ['encrypt', 'decrypt']
        );
      }

      async function encryptRoadtripGistPayload(plainObject, passphrase) {
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveRoadtripGistKey(passphrase, salt);
        const plaintext = new TextEncoder().encode(JSON.stringify(plainObject));
        const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, plaintext);
        return {
          format: ROADTRIP_GIST_ENCRYPTION_FORMAT,
          app: 'Roadtrip',
          kdf: 'PBKDF2-SHA256',
          cipher: 'AES-GCM',
          iterations: ROADTRIP_GIST_KDF_ITERATIONS,
          salt: roadtripBytesToBase64(salt),
          iv: roadtripBytesToBase64(iv),
          ciphertext: roadtripBytesToBase64(new Uint8Array(ciphertext)),
          createdAt: new Date().toISOString()
        };
      }

      async function decryptRoadtripGistPayload(envelope, passphrase) {
        const salt = roadtripBase64ToBytes(envelope.salt);
        const iv = roadtripBase64ToBytes(envelope.iv);
        const ciphertext = roadtripBase64ToBytes(envelope.ciphertext);
        const key = await deriveRoadtripGistKey(passphrase, salt);
        const plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
        return JSON.parse(new TextDecoder().decode(new Uint8Array(plaintext)));
      }

      function isRoadtripEncryptedGistPayload(value) {
        return !!(value && typeof value === 'object' && !Array.isArray(value)
          && value.format === ROADTRIP_GIST_ENCRYPTION_FORMAT
          && typeof value.ciphertext === 'string' && value.ciphertext
          && typeof value.salt === 'string' && value.salt
          && typeof value.iv === 'string' && value.iv);
      }

      function hasRoadtripStateShape(obj) {
        if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return false;
        const arrayKeys = ['projects', 'features', 'notes', 'chats', 'analyses', 'importVersions', 'unmatchedNotes'];
        const hasArrays = arrayKeys.some(k => Array.isArray(obj[k]));
        const hasDeletedIds = obj.deletedIds && typeof obj.deletedIds === 'object' && !Array.isArray(obj.deletedIds);
        return !!(hasArrays || hasDeletedIds);
      }

      function isLegacyPlainRoadtripGistPayload(value) {
        if (!value || typeof value !== 'object' || Array.isArray(value)) return false;
        if (isRoadtripEncryptedGistPayload(value)) return false;
        const stateObj = value.state && typeof value.state === 'object' && !Array.isArray(value.state) ? value.state : null;
        if (stateObj && hasRoadtripStateShape(stateObj)) return true;
        if (hasRoadtripStateShape(value)) return true;
        if (stateObj && (typeof value.version === 'number' || typeof value.exported === 'string')) return true;
        return false;
      }

      function getRoadtripGistPassphrase() {
        if (_gistRememberPassphraseForSession && _gistPassphraseSession) return _gistPassphraseSession;
        const input = $('gistPassphrase');
        const passphrase = input ? String(input.value || '') : '';
        if (_gistRememberPassphraseForSession) _gistPassphraseSession = passphrase;
        return passphrase;
      }

      function setRoadtripGistSessionPassphraseFromUi() {
        const rememberEl = $('gistRememberPassphraseSession');
        const passEl = $('gistPassphrase');
        _gistRememberPassphraseForSession = !!(rememberEl && rememberEl.checked);
        if (_gistRememberPassphraseForSession) _gistPassphraseSession = passEl ? String(passEl.value || '') : '';
        else _gistPassphraseSession = '';
      }

      function githubHeaders(token, includeContentType) {
        const h = {
          'Authorization': 'token ' + token,
          'Accept': 'application/vnd.github+json'
        };
        if (includeContentType) h['Content-Type'] = 'application/json';
        return h;
      }

      function buildGistPayload() {
        return { version: 1, exported: new Date().toISOString(), state: S };
      }

      function getGistPayloadState(raw) {
        const candidate = (raw && typeof raw === 'object' && !Array.isArray(raw) && raw.state && typeof raw.state === 'object' && !Array.isArray(raw.state))
          ? raw.state
          : raw;
        if (!candidate || typeof candidate !== 'object' || Array.isArray(candidate)) return null;
        return candidate;
      }

      function getPayloadTimestamp(payload, state) {
        const candidates = [
          payload && payload.exported,
          state && state._lastGistPushAt,
          state && state._lastExported,
          state && state._lastLocalSaveAt
        ];
        for (const ts of candidates) {
          if (typeof ts === 'string' && Number.isFinite(Date.parse(ts))) return ts;
        }
        return '';
      }

      function getStateLatestEntityTimestamp(state) {
        const st = (state && typeof state === 'object' && !Array.isArray(state)) ? state : {};
        const arrays = ['projects', 'features', 'notes', 'chats', 'importVersions', 'analyses', 'unmatchedNotes'];
        const fields = ['updatedAt', 'createdAt', 'importedAt', 'completedAt'];
        let newestMs = Number.NEGATIVE_INFINITY;
        arrays.forEach(key => {
          const list = Array.isArray(st[key]) ? st[key] : [];
          list.forEach(item => {
            if (!item || typeof item !== 'object') return;
            fields.forEach(f => {
              const ms = Date.parse(item[f]);
              if (Number.isFinite(ms) && ms > newestMs) newestMs = ms;
            });
          });
        });
        const deletedIds = st.deletedIds && typeof st.deletedIds === 'object' && !Array.isArray(st.deletedIds) ? st.deletedIds : {};
        Object.keys(deletedIds).forEach(id => {
          const ms = Date.parse(deletedIds[id]);
          if (Number.isFinite(ms) && ms > newestMs) newestMs = ms;
        });
        return Number.isFinite(newestMs) ? new Date(newestMs).toISOString() : '';
      }

      function hasRoadtripUserData(state) {
        if (!state || typeof state !== 'object' || Array.isArray(state)) return false;
        const arrays = ['projects', 'features', 'notes', 'chats', 'importVersions', 'analyses', 'unmatchedNotes'];
        const hasEntityData = arrays.some(k => Array.isArray(state[k]) && state[k].some(item => item && typeof item === 'object'));
        const deletedIds = state.deletedIds && typeof state.deletedIds === 'object' && !Array.isArray(state.deletedIds) ? state.deletedIds : {};
        const hasTombstones = Object.keys(deletedIds).some(id => !!deletedIds[id]);
        return hasEntityData || hasTombstones;
      }

      function isRoadtripStateEffectivelyEmpty(state) {
        return !hasRoadtripUserData(state);
      }

      function normalizeStateForSyncCompare(state) {
        const source = (state && typeof state === 'object' && !Array.isArray(state)) ? state : {};
        const normalized = {};
        const arrayKeys = ['projects', 'features', 'notes', 'chats', 'analyses', 'importVersions', 'unmatchedNotes'];
        const normalizeValue = (value) => {
          if (Array.isArray(value)) return value.map(normalizeValue);
          if (value && typeof value === 'object') {
            const obj = {};
            Object.keys(value).sort().forEach(key => { obj[key] = normalizeValue(value[key]); });
            return obj;
          }
          return value;
        };
        normalized.version = source.version || 1;
        arrayKeys.forEach(key => {
          const list = Array.isArray(source[key]) ? source[key].filter(item => item && typeof item === 'object') : [];
          normalized[key] = list.map(normalizeValue).sort((a, b) => String(a.id || '').localeCompare(String(b.id || '')) || JSON.stringify(a).localeCompare(JSON.stringify(b)));
        });
        const deletedIds = source.deletedIds && typeof source.deletedIds === 'object' && !Array.isArray(source.deletedIds) ? source.deletedIds : {};
        normalized.deletedIds = normalizeValue(deletedIds);
        return normalized;
      }

      function createGistSyncFingerprint(state) {
        return JSON.stringify(normalizeStateForSyncCompare(state));
      }

      function rememberSuccessfulGistSyncFingerprint(state) {
        storageMeta.lastGistSyncFingerprint = createGistSyncFingerprint(state || S || {});
        persistStorageMeta();
      }

      function isLocalDirtySinceLastGistSync(localState, remoteState) {
        if (!hasRoadtripUserData(localState)) return false;
        if (isRoadtripStateEffectivelyEmpty(remoteState)) return true;
        const currentFingerprint = createGistSyncFingerprint(localState);
        if (storageMeta.lastGistSyncFingerprint) return currentFingerprint !== storageMeta.lastGistSyncFingerprint;
        const lastSyncCandidates = [
          localState && localState._lastGistPushAt,
          localState && localState._lastGistPullAt,
          storageMeta && storageMeta.lastGistSyncAt
        ];
        let lastSyncMs = Number.NEGATIVE_INFINITY;
        lastSyncCandidates.forEach(ts => {
          const ms = Date.parse(ts);
          if (Number.isFinite(ms) && ms > lastSyncMs) lastSyncMs = ms;
        });
        if (!Number.isFinite(lastSyncMs)) return true;
        const latestUserMs = Date.parse(getStateLatestEntityTimestamp(localState));
        return Number.isFinite(latestUserMs) && latestUserMs > lastSyncMs;
      }

      function areStatesSyncEquivalent(localState, remoteState) {
        return createGistSyncFingerprint(localState) === createGistSyncFingerprint(remoteState);
      }

      function mergeRemoteStateForGistPull(localState, remoteState, options) {
        const opts = options && typeof options === 'object' ? options : {};
        const localBase = Object.assign(defaultState(), localState || {});
        const remoteBase = Object.assign(defaultState(), remoteState || {});
        const merged = JSON.parse(JSON.stringify(opts.preferRemoteWhenLocalClean ? remoteBase : localBase));
        merged.deletedIds = mergeDeletedIds(localBase.deletedIds || {}, remoteBase.deletedIds || {});
        if (opts.preferRemoteWhenLocalClean) {
          ['projects', 'features', 'notes', 'chats', 'importVersions', 'analyses', 'unmatchedNotes'].forEach(entityType => {
            const list = Array.isArray(merged[entityType]) ? merged[entityType] : [];
            merged[entityType] = list.filter(item => item && item.id && !merged.deletedIds[item.id]);
          });
          return merged;
        }

        const tsFor = (item) => {
          if (!item || typeof item !== 'object') return NaN;
          for (const key of ['updatedAt', 'createdAt', 'importedAt', 'completedAt']) {
            const ms = Date.parse(item[key]);
            if (Number.isFinite(ms)) return ms;
          }
          return NaN;
        };
        const shouldPreferRemote = (localItem, remoteItem, entityType) => {
          const localMs = tsFor(localItem);
          const remoteMs = tsFor(remoteItem);
          if (!Number.isFinite(localMs) || !Number.isFinite(remoteMs)) return false;
          if (entityType === 'chats' && String(localItem.status || '').toLowerCase() === 'abgeschlossen' && String(remoteItem.status || '').toLowerCase() !== 'abgeschlossen') {
            return remoteMs > localMs;
          }
          if (entityType === 'features' && (localItem.pool || localItem.status) && remoteMs <= localMs) return false;
          return remoteMs > localMs;
        };
        const mergeEntityArray = (entityType) => {
          const localList = Array.isArray(localBase[entityType]) ? localBase[entityType] : [];
          const remoteList = Array.isArray(remoteBase[entityType]) ? remoteBase[entityType] : [];
          const byId = new Map();
          localList.forEach(item => {
            if (!item || typeof item !== 'object' || !item.id) return;
            byId.set(item.id, item);
          });
          remoteList.forEach(item => {
            if (!item || typeof item !== 'object' || !item.id) return;
            if (merged.deletedIds[item.id]) return;
            const localItem = byId.get(item.id);
            if (!localItem) {
              byId.set(item.id, item);
              return;
            }
            if (shouldPreferRemote(localItem, item, entityType)) byId.set(item.id, item);
          });
          merged[entityType] = Array.from(byId.values()).filter(item => item && item.id && !merged.deletedIds[item.id]);
        };

        ['projects', 'features', 'notes', 'chats', 'importVersions', 'analyses', 'unmatchedNotes'].forEach(mergeEntityArray);
        return merged;
      }

      function updateGistStatusUI() {
        const el = $('gistStatusInfo');
        if (!el) return;
        let txt = '';
        if (S._lastLocalSaveAt) txt += 'Lokal gespeichert: ' + formatDateTime(S._lastLocalSaveAt) + ' ';
        const lastPush = _gistStatus.lastPush || S._lastGistPushAt;
        const lastPull = _gistStatus.lastPull || S._lastGistPullAt;
        if (lastPush) txt += '| Gist Push: ' + formatDateTime(lastPush) + ' ';
        if (lastPull) txt += '| Gist Pull: ' + formatDateTime(lastPull) + ' ';
        if (_gistStatus.lastError) txt += '| Fehler: ' + _gistStatus.lastError;
        el.textContent = txt || 'Noch kein Sync durchgeführt.';
      }

      async function readGistFileJson(gist, preferredFileName) {
        const fileObj = gist.files && (gist.files[preferredFileName] || Object.values(gist.files)[0]);
        if (!fileObj) throw new Error('Keine Datei im Gist gefunden.');
        let content = fileObj.content;
        if ((!content || fileObj.truncated) && fileObj.raw_url) {
          const rawResp = await fetch(fileObj.raw_url, { headers: { 'Accept': 'application/json,text/plain,*/*' } });
          if (!rawResp.ok) throw new Error('Raw-Datei nicht lesbar (HTTP ' + rawResp.status + ')');
          content = await rawResp.text();
        }
        if (!content || !String(content).trim()) throw new Error('Gist-Datei ist leer.');
        try {
          return JSON.parse(content);
        } catch (e) {
          throw new Error('Gist-Inhalt ist kein gültiges JSON.');
        }
      }

      async function gistPush() {
        if (!C.gistId || !C.gistToken) {
          return alert('Bitte zuerst Gist ID und GitHub Token in den Settings eintragen.');
        }
        const proceed = confirm('Riskante Aktion: Diese Aktion überschreibt den Remote-Gist mit dem aktuellen lokalen Stand. Wenn auf einem anderen Gerät neuere Daten liegen, können diese verloren gehen. Vorher ZIP-Backup oder JSON-Export erstellen. Fortfahren?');
        if (!proceed) return;
        let prevLastExported = '';
        let prevLastGistPushAt = '';
        try {
          prevLastExported = S._lastExported || '';
          prevLastGistPushAt = S._lastGistPushAt || '';
          const passphrase = getRoadtripGistPassphrase();
          if (!passphrase) {
            alert('Push ohne Passphrase nicht möglich. Gist-Sync ist verschlüsselt. Bitte Passphrase eingeben oder stattdessen ZIP-Backup/JSON-Export nutzen.');
            return;
          }
          const syncTs = new Date().toISOString();
          S._lastExported = syncTs;
          S._lastGistPushAt = syncTs;
          const payload = buildGistPayload();
          payload.exported = syncTs;
          const envelope = await encryptRoadtripGistPayload(payload, passphrase);
          const r = await fetch('https://api.github.com/gists/' + C.gistId, {
            method: 'PATCH',
            headers: githubHeaders(C.gistToken, true),
            body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(envelope, null, 2) } } })
          });
          if (!r.ok) {
            const errText = await r.text().catch(() => '');
            throw new Error('HTTP ' + r.status + (errText ? ': ' + errText.slice(0, 120) : ''));
          }
          const body = await r.json().catch(() => null);
          if (!body || !body.files || !body.files[GIST_FILE]) throw new Error('Antwort ohne erwartete Gist-Datei.');
          _gistStatus.lastPush = syncTs;
          _gistStatus.lastError = '';
          rememberSuccessfulGistSyncFingerprint(S);
          save();
          updateGistStatusUI();
          alert('Remote-Gist wurde verschlüsselt mit lokalem Stand überschrieben: ' + formatDateTime(syncTs));
        } catch (e) {
          S._lastExported = prevLastExported;
          S._lastGistPushAt = prevLastGistPushAt;
          _gistStatus.lastError = e.message.slice(0, 80);
          updateGistStatusUI();
          alert('Gist-Push fehlgeschlagen: ' + e.message + ' Bitte ZIP-Backup oder JSON-Export als Recovery nutzen.');
        }
      }

      async function gistSync() {
        if (!C.gistId || !C.gistToken) {
          return alert('Bitte zuerst Gist ID und GitHub Token in den Settings eintragen.');
        }
        const passphrase = getRoadtripGistPassphrase();
        if (!passphrase) {
          alert('Passphrase erforderlich. Ohne Passphrase kann der verschlüsselte Gist-Sync nicht ausgeführt werden.');
          return;
        }
        const prevLastExported = S._lastExported || '';
        const prevLastGistPushAt = S._lastGistPushAt || '';
        const prevLastGistPullAt = S._lastGistPullAt || '';
        const prevStateSnapshot = JSON.parse(JSON.stringify(S || {}));
        try {
          const r = await fetch('https://api.github.com/gists/' + C.gistId, {
            headers: githubHeaders(C.gistToken, false)
          });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          const gist = await r.json();
          const remoteRaw = await readGistFileJson(gist, GIST_FILE);
          let remotePayload = null;
          let pulledLegacyPlain = false;
          if (isRoadtripEncryptedGistPayload(remoteRaw)) {
            try {
              remotePayload = await decryptRoadtripGistPayload(remoteRaw, passphrase);
            } catch (err) {
              _gistStatus.lastError = 'wrong-passphrase-or-invalid-gist';
              updateGistStatusUI();
              alert('Falsche Passphrase oder beschädigter Gist.');
              return;
            }
          } else if (isLegacyPlainRoadtripGistPayload(remoteRaw)) {
            const proceedLegacy = confirm('Legacy-Klartext-Gist erkannt. Dieser Gist ist unverschlüsselt. Vor Migration ZIP-Backup empfohlen. Klartext-Gist einmalig lesen und danach verschlüsselt neu pushen?');
            if (!proceedLegacy) return;
            remotePayload = remoteRaw;
            pulledLegacyPlain = true;
          } else {
            alert('Unbekanntes Gist-Format. Kein Pull/Merge durchgeführt.');
            return;
          }
          const remoteState = getGistPayloadState(remotePayload);
          if (!remoteState) throw new Error('Ungültiger Gist-State.');
          const localStateSnapshot = JSON.parse(JSON.stringify(S || {}));
          const statesEqual = areStatesSyncEquivalent(localStateSnapshot, remoteState);
          if (statesEqual && !pulledLegacyPlain) {
            const pullTs = new Date().toISOString();
            S._lastGistPullAt = pullTs;
            _gistStatus.lastPull = pullTs;
            _gistStatus.lastError = '';
            rememberSuccessfulGistSyncFingerprint(S);
            save();
            updateGistStatusUI();
            alert('Gist und lokaler Stand sind bereits synchron.');
            return;
          }

          const localHasUserData = hasRoadtripUserData(localStateSnapshot);
          const remoteHasUserData = hasRoadtripUserData(remoteState);
          const localHasUnsyncedUserChanges = isLocalDirtySinceLastGistSync(localStateSnapshot, remoteState);
          const shouldPreferRemote = !localHasUnsyncedUserChanges && remoteHasUserData && !pulledLegacyPlain;
          const mergedState = mergeRemoteStateForGistPull(localStateSnapshot, remoteState, { preferRemoteWhenLocalClean: shouldPreferRemote });
          const localEqualsMerged = areStatesSyncEquivalent(localStateSnapshot, mergedState);
          const remoteEqualsMerged = areStatesSyncEquivalent(remoteState, mergedState);
          const didChange = !localEqualsMerged;
          const initialRemoteAdopted = didChange && !localHasUserData && remoteHasUserData && remoteEqualsMerged;
          const localWinsWithoutMerge = !didChange && !remoteEqualsMerged && localHasUnsyncedUserChanges;
          const tombstoneCorrectionPush = shouldPreferRemote && !remoteEqualsMerged;
          const needsPush = pulledLegacyPlain || localWinsWithoutMerge || (localHasUnsyncedUserChanges && !remoteEqualsMerged) || tombstoneCorrectionPush;
          let syncOutcome = 'merged-and-pushed';
          if (!didChange && !needsPush) syncOutcome = 'already-synced';
          else if (pulledLegacyPlain) syncOutcome = 'legacy-migrated';
          else if (initialRemoteAdopted) syncOutcome = 'initial-remote-adopted';
          else if (didChange && !needsPush) syncOutcome = 'remote-adopted';
          else if (localWinsWithoutMerge) syncOutcome = 'local-pushed';

          if (didChange) S = mergedState;
          ensureDefaults();
          pruneDeletedIds();
          S.projects = (S.projects || []).filter(p => !isDeleted(p.id));
          S.features = (S.features || []).filter(f => !isDeleted(f.id));
          S.notes = (S.notes || []).filter(n => !isDeleted(n.id));
          S.analyses = (S.analyses || []).filter(a => !isDeleted(a.id));
          S.chats = (S.chats || []).filter(c => !isDeleted(c.id));
          S.importVersions = (S.importVersions || []).filter(v => !isDeleted(v.id));
          S.unmatchedNotes = (S.unmatchedNotes || []).filter(n => !isDeleted(n.id));
          const pullTs = new Date().toISOString();
          S._lastGistPullAt = pullTs;
          _gistStatus.lastPull = pullTs;
          _gistStatus.lastError = '';

          if (needsPush) {
            const syncTs = new Date().toISOString();
            S._lastExported = syncTs;
            S._lastGistPushAt = syncTs;
            const payload = buildGistPayload();
            payload.exported = syncTs;
            const envelope = await encryptRoadtripGistPayload(payload, passphrase);
            const w = await fetch('https://api.github.com/gists/' + C.gistId, {
              method: 'PATCH',
              headers: githubHeaders(C.gistToken, true),
              body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(envelope, null, 2) } } })
            });
            if (!w.ok) {
              const errText = await w.text().catch(() => '');
              throw new Error('cloud-write: HTTP ' + w.status + (errText ? ': ' + errText.slice(0, 120) : ''));
            }
            _gistStatus.lastPush = syncTs;
          }

          rememberSuccessfulGistSyncFingerprint(S);
          if (didChange || needsPush) save();
          renderAll();
          updateGistStatusUI();
          if (syncOutcome === 'already-synced') alert('Gist und lokaler Stand sind bereits synchron.');
          else if (syncOutcome === 'initial-remote-adopted') alert('Erster Sync auf diesem Gerät abgeschlossen. Remote-Stand wurde lokal übernommen.');
          else if (syncOutcome === 'remote-adopted') alert('Remote-Stand wurde lokal übernommen.');
          else if (syncOutcome === 'local-pushed') alert('Lokaler Stand war neuer und wurde verschlüsselt in den Gist synchronisiert.');
          else if (syncOutcome === 'legacy-migrated') alert('Legacy-Klartext-Gist wurde übernommen und verschlüsselt migriert.');
          else alert('Lokale und Remote-Änderungen wurden gemergt und verschlüsselt synchronisiert.');
        } catch (e) {
          if (String(e.message || '').startsWith('cloud-write:')) {
            S = Object.assign(defaultState(), JSON.parse(JSON.stringify(prevStateSnapshot || {})));
            ensureDefaults();
          }
          S._lastExported = prevLastExported;
          S._lastGistPushAt = prevLastGistPushAt;
          S._lastGistPullAt = prevLastGistPullAt;
          _gistStatus.lastError = e.message.slice(0, 80);
          updateGistStatusUI();
          if (String(e.message || '').startsWith('cloud-write:')) alert('Cloud-Schreibfehler: Lokaler Runtime-State wurde auf den vorherigen Stand zurückgesetzt.');
          else alert('Sync fehlgeschlagen beim Abrufen des Gist.');
        }
      }

      async function gistPull() { return gistSync(); }

      async function gistRawBackup() {
        const id = C.rawGistId || C.gistId;
        const token = C.rawGistToken || C.gistToken;
        if (!id || !token) {
          return alert('Bitte Backup Gist ID und Token in den Settings eintragen.');
        }
        try {
          const backupFile = 'roadtrip_raw_notes.json';
          const payload = { exported: new Date().toISOString(), notes: S.notes, analyses: S.analyses };
          const r = await fetch('https://api.github.com/gists/' + id, {
            method: 'PATCH',
            headers: githubHeaders(token, true),
            body: JSON.stringify({ files: { [backupFile]: { content: JSON.stringify(payload, null, 2) } } })
          });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          alert('Raw-Backup gespeichert (' + S.notes.length + ' Notizen, ' + S.analyses.length + ' Analysen).');
        } catch (e) {
          alert('Raw-Backup fehlgeschlagen: ' + e.message);
        }
      }

      // ─── MERGE IMPORT LOGIC ──────────────────────────────────────────────────

      let _importDraftData = null;

      function recordDeletion(id) {
        if (!id) return;
        if (!S.deletedIds || typeof S.deletedIds !== 'object' || Array.isArray(S.deletedIds)) S.deletedIds = {};
        S.deletedIds[id] = new Date().toISOString();
      }

      function isDeleted(id) {
        if (!id) return false;
        return !!(S && S.deletedIds && typeof S.deletedIds === 'object' && !Array.isArray(S.deletedIds) && S.deletedIds[id]);
      }

      function mergeDeletedIds(local, remote) {
        const normalizedLocal = (local && typeof local === 'object' && !Array.isArray(local)) ? local : {};
        const normalizedRemote = (remote && typeof remote === 'object' && !Array.isArray(remote)) ? remote : {};
        const merged = {};
        const allIds = new Set([...Object.keys(normalizedLocal), ...Object.keys(normalizedRemote)]);
        allIds.forEach(id => {
          if (!id) return;
          const localTs = normalizedLocal[id];
          const remoteTs = normalizedRemote[id];
          const localMs = Date.parse(localTs);
          const remoteMs = Date.parse(remoteTs);
          const localValid = Number.isFinite(localMs);
          const remoteValid = Number.isFinite(remoteMs);
          if (localValid && remoteValid) merged[id] = localMs >= remoteMs ? localTs : remoteTs;
          else if (localValid) merged[id] = localTs;
          else if (remoteValid) merged[id] = remoteTs;
          else if (typeof localTs === 'string' && localTs.trim()) merged[id] = localTs;
          else if (typeof remoteTs === 'string' && remoteTs.trim()) merged[id] = remoteTs;
        });
        return merged;
      }

      function pruneDeletedIds() {
        if (!S.deletedIds || typeof S.deletedIds !== 'object' || Array.isArray(S.deletedIds)) {
          S.deletedIds = {};
          return;
        }
        const cutoffMs = Date.now() - (90 * 24 * 60 * 60 * 1000);
        Object.keys(S.deletedIds).forEach(id => {
          const ms = Date.parse(S.deletedIds[id]);
          if (Number.isFinite(ms) && ms < cutoffMs) delete S.deletedIds[id];
        });
      }

      function mergeArrayById(local, incoming, idKey, titleKey) {
        const localList = Array.isArray(local) ? local : [];
        const incomingList = Array.isArray(incoming) ? incoming : [];
        // Merge incoming into local: add new items, keep existing items (by id or title)
        const result = localList.filter(item => item && typeof item === 'object').slice();
        const localIds = new Set(result.map(x => x[idKey]));
        const localTitles = titleKey ? new Set(result.map(x => normalizeText(x[titleKey] || ''))) : null;
        incomingList.forEach(item => {
          if (!item) return;
          if (isDeleted(item[idKey])) return;
          if (item[idKey] && localIds.has(item[idKey])) return; // id collision → skip
          if (titleKey && localTitles && localTitles.has(normalizeText(item[titleKey] || ''))) return; // title collision → skip
          result.push(item);
          if (item[idKey]) localIds.add(item[idKey]);
          if (titleKey && localTitles) localTitles.add(normalizeText(item[titleKey] || ''));
        });
        return result.filter(item => item && !isDeleted(item[idKey]));
      }

      function mergeFeaturesByProjectAndTitle(local, incoming) {
        const localList = Array.isArray(local) ? local : [];
        const incomingList = Array.isArray(incoming) ? incoming : [];
        const result = localList.filter(item => item && typeof item === 'object').slice();
        const localIds = new Set(result.map(f => f.id));
        const localKeys = new Set(result.map(f => f.projectId + '||' + normalizeText(f.title)));
        incomingList.forEach(f => {
          if (!f) return;
          if (isDeleted(f.id)) return;
          if (f.id && localIds.has(f.id)) return;
          const key = (f.projectId || '') + '||' + normalizeText(f.title || '');
          if (localKeys.has(key)) return;
          result.push(f);
          if (f.id) localIds.add(f.id);
          localKeys.add(key);
        });
        return result.filter(f => f && !isDeleted(f.id));
      }

      function applySelectiveMerge(incomingState, selections) {
        S.deletedIds = mergeDeletedIds(S.deletedIds || {}, (incomingState || {}).deletedIds || {});
        pruneDeletedIds();
        if (selections.projects) {
          S.projects = mergeArrayById(S.projects, incomingState.projects || [], 'id', 'title');
        }
        if (selections.features) {
          S.features = mergeFeaturesByProjectAndTitle(S.features, incomingState.features || []);
          S.features = S.features.map(ensureFeatureDefaults);
        }
        if (selections.notes) {
          S.notes = mergeArrayById(S.notes, incomingState.notes || [], 'id', null);
        }
        if (selections.analyses) {
          S.analyses = mergeArrayById(S.analyses, incomingState.analyses || [], 'id', null);
        }
        if (selections.chats) {
          S.chats = mergeArrayById(S.chats, incomingState.chats || [], 'id', null);
        }
        if (selections.importVersions) {
          S.importVersions = mergeArrayById(S.importVersions || [], incomingState.importVersions || [], 'id', null);
        }
        S.projects = (S.projects || []).filter(p => !isDeleted(p.id));
        S.features = (S.features || []).filter(f => !isDeleted(f.id));
        S.notes = (S.notes || []).filter(n => !isDeleted(n.id));
        S.analyses = (S.analyses || []).filter(a => !isDeleted(a.id));
        S.chats = (S.chats || []).filter(c => !isDeleted(c.id));
        S.importVersions = (S.importVersions || []).filter(v => !isDeleted(v.id));
        ensureDefaults();
        save();
        renderAll();
      }

      function detectImportedState(raw) {
        if (!raw || typeof raw !== 'object' || Array.isArray(raw)) return null;
        const isPlainObject = (value) => value && typeof value === 'object' && !Array.isArray(value);
        const labelWrappedExport = (wrapper) => (wrapper.compacted || String(wrapper.version || '').includes('compact')) ? 'Compact Export' : 'Emergency Export';

        if (isPlainObject(raw.S)) return { candidate: raw.S, format: labelWrappedExport(raw) };
        if (isPlainObject(raw.state) && isPlainObject(raw.state.S)) return { candidate: raw.state.S, format: labelWrappedExport(raw.state) };
        if (isPlainObject(raw.state)) return { candidate: raw.state, format: 'Roadtrip State' };
        return { candidate: raw, format: 'Roadtrip State' };
      }

      function normalizeImportedState(raw) {
        const detected = detectImportedState(raw);
        if (!detected) return null;
        const normalized = Object.assign(defaultState(), detected.candidate);
        if (!Array.isArray(normalized.projects) || !Array.isArray(normalized.features) || !Array.isArray(normalized.notes) || !Array.isArray(normalized.analyses)) {
          return null;
        }
        if (!Array.isArray(normalized.chats)) normalized.chats = [];
        if (!Array.isArray(normalized.importVersions)) normalized.importVersions = [];
        if (!normalized.deletedIds || typeof normalized.deletedIds !== 'object' || Array.isArray(normalized.deletedIds)) normalized.deletedIds = {};
        normalized.features = normalized.features.map(ensureFeatureDefaults);
        return normalized;
      }

      async function ensureJSZipLoaded() {
        if (window.JSZip) return window.JSZip;
        if (window.__roadtripJsZipLoadingPromise) return window.__roadtripJsZipLoadingPromise;
        window.__roadtripJsZipLoadingPromise = new Promise((resolve, reject) => {
          const existing = document.querySelector('script[data-roadtrip-jszip="1"]');
          if (existing) {
            existing.addEventListener('load', () => window.JSZip ? resolve(window.JSZip) : reject(new Error('JSZip konnte nicht geladen werden.')));
            existing.addEventListener('error', () => reject(new Error('JSZip konnte nicht geladen werden.')));
            return;
          }
          const script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
          script.async = true;
          script.dataset.roadtripJszip = '1';
          script.onload = () => window.JSZip ? resolve(window.JSZip) : reject(new Error('JSZip konnte nicht geladen werden.'));
          script.onerror = () => reject(new Error('JSZip konnte nicht geladen werden.'));
          document.head.appendChild(script);
        }).finally(() => {
          if (!window.JSZip) window.__roadtripJsZipLoadingPromise = null;
        });
        return window.__roadtripJsZipLoadingPromise;
      }

      function prepareChatsForZip(chats) {
        const rawKeys = ['rawReportText', 'rawHandoffText', 'rawPrompt', 'rawResponse'];
        const clean = [];
        const raw = {};
        (Array.isArray(chats) ? chats : []).forEach(item => {
          const clone = Object.assign({}, item || {});
          const chatId = String(clone.id || '');
          const rawEntry = {};
          rawKeys.forEach(key => {
            if (typeof clone[key] === 'string' && clone[key]) {
              rawEntry[key] = clone[key];
              delete clone[key];
            }
          });
          if (chatId && Object.keys(rawEntry).length) raw[chatId] = rawEntry;
          clean.push(clone);
        });
        return { clean, raw };
      }

      function prepareImportVersionsForZip(importVersions) {
        const rawKeys = ['rawAnalysisText', 'rawHtml', 'sourceHtml', 'fullHtml', 'rawCode', 'sourceCode'];
        const clean = [];
        const raw = {};
        (Array.isArray(importVersions) ? importVersions : []).forEach(item => {
          const clone = Object.assign({}, item || {});
          const versionId = String(clone.id || '');
          const rawEntry = {};
          rawKeys.forEach(key => {
            if (typeof clone[key] === 'string' && clone[key]) {
              rawEntry[key] = clone[key];
              delete clone[key];
            }
          });
          if (versionId && Object.keys(rawEntry).length) raw[versionId] = rawEntry;
          clean.push(clone);
        });
        return { clean, raw };
      }

      function getRoadtripEntityCounts(stateLike) {
        const source = stateLike || {};
        return {
          projectCount: Array.isArray(source.projects) ? source.projects.length : 0,
          featureCount: Array.isArray(source.features) ? source.features.length : 0,
          noteCount: Array.isArray(source.notes) ? source.notes.length : 0,
          unmatchedNoteCount: Array.isArray(source.unmatchedNotes) ? source.unmatchedNotes.length : 0,
          chatCount: Array.isArray(source.chats) ? source.chats.length : 0,
          analysisCount: Array.isArray(source.analyses) ? source.analyses.length : 0,
          importVersionCount: Array.isArray(source.importVersions) ? source.importVersions.length : 0,
          deletedIdCount: source.deletedIds && typeof source.deletedIds === 'object' && !Array.isArray(source.deletedIds) ? Object.keys(source.deletedIds).length : 0
        };
      }

      async function exportRoadtripZipBackup() {
        try {
          const JSZip = await ensureJSZipLoaded();
          const zip = new JSZip();
          const nowIso = new Date().toISOString();
          const preparedChats = prepareChatsForZip(S.chats);
          const preparedImportVersions = prepareImportVersionsForZip(S.importVersions);
          const exportData = {
            projects: Array.isArray(S.projects) ? S.projects : [],
            features: Array.isArray(S.features) ? S.features : [],
            notes: Array.isArray(S.notes) ? S.notes : [],
            unmatchedNotes: Array.isArray(S.unmatchedNotes) ? S.unmatchedNotes : [],
            chats: preparedChats.clean,
            analyses: Array.isArray(S.analyses) ? S.analyses : [],
            importVersions: preparedImportVersions.clean,
            deletedIds: S.deletedIds && typeof S.deletedIds === 'object' && !Array.isArray(S.deletedIds) ? S.deletedIds : {}
          };
          const counts = getRoadtripEntityCounts(exportData);
          const manifest = {
            exportFormat: 'roadtrip-zip-v1',
            exportedAt: nowIso,
            app: 'Roadtrip',
            version: S.version || 1,
            counts,
            sectionSummary: {
              projects: 'projects.json',
              features: 'features.json',
              notes: 'notes.json',
              unmatchedNotes: 'unmatchedNotes.json',
              chats: 'chats.json',
              analyses: 'analyses.json',
              importVersions: 'importVersions.json',
              deletedIds: 'deletedIds.json'
            }
          };
          const meta = {
            version: S.version || 1,
            createdAt: S.createdAt || '',
            _lastExported: S._lastExported || '',
            _lastGistPushAt: S._lastGistPushAt || '',
            _lastGistPullAt: S._lastGistPullAt || '',
            _lastLocalSaveAt: S._lastLocalSaveAt || ''
          };
          zip.file('manifest.json', JSON.stringify(manifest, null, 2));
          zip.file('meta.json', JSON.stringify(meta, null, 2));
          Object.keys(exportData).forEach(key => zip.file(`${key}.json`, JSON.stringify(exportData[key], null, 2)));
          zip.file('raw/chats_raw.json', JSON.stringify(preparedChats.raw, null, 2));
          zip.file('raw/importVersions_raw.json', JSON.stringify(preparedImportVersions.raw, null, 2));
          const blob = await zip.generateAsync({ type: 'blob' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `roadtrip-export-${dateStamp()}.zip`;
          document.body.appendChild(a);
          a.click();
          setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 0);
        } catch (err) {
          alert(err && err.message ? err.message : 'ZIP-Export fehlgeschlagen.');
        }
      }

      async function parseZipJsonFile(zip, path, fallbackValue, required) {
        const entry = zip.file(path);
        if (!entry) {
          if (required) throw new Error(`Datei fehlt im ZIP: ${path}`);
          return fallbackValue;
        }
        try {
          const txt = await entry.async('string');
          return JSON.parse(txt);
        } catch (_err) {
          throw new Error(`Beschädigte JSON-Datei im ZIP: ${path}`);
        }
      }

      function applyRoadtripZipMeta(reconstructedS, meta) {
        if (!reconstructedS || typeof reconstructedS !== 'object' || !meta || typeof meta !== 'object' || Array.isArray(meta)) return;
        const blockedKeys = new Set(['gistToken', 'rawGistToken', 'trelloToken', 'token', 'apiKey', 'key', 'password', 'secret']);
        const allowedStringKeys = ['createdAt', '_lastExported', '_lastGistPushAt', '_lastGistPullAt', '_lastLocalSaveAt'];
        if (blockedKeys.has('version')) return;
        const rawVersion = meta.version;
        if (typeof rawVersion === 'number' && Number.isFinite(rawVersion)) {
          reconstructedS.version = rawVersion;
        } else if (typeof rawVersion === 'string') {
          const trimmed = rawVersion.trim();
          if (trimmed) {
            const maybeNum = Number(trimmed);
            reconstructedS.version = Number.isFinite(maybeNum) ? maybeNum : trimmed;
          }
        }
        allowedStringKeys.forEach(key => {
          if (blockedKeys.has(key)) return;
          if (typeof meta[key] === 'string') reconstructedS[key] = meta[key];
        });
      }

      async function analyzeRoadtripZipBackupFile(file) {
        const JSZip = await ensureJSZipLoaded();
        const zip = await JSZip.loadAsync(file);
        const manifest = await parseZipJsonFile(zip, 'manifest.json', null, true);
        if (!manifest || manifest.exportFormat !== 'roadtrip-zip-v1') throw new Error('Ungültiges ZIP-Format: manifest.json exportFormat muss roadtrip-zip-v1 sein.');
        const meta = await parseZipJsonFile(zip, 'meta.json', {}, true);
        const reconstructedS = Object.assign(defaultState(), {
          projects: await parseZipJsonFile(zip, 'projects.json', [], true),
          features: await parseZipJsonFile(zip, 'features.json', [], true),
          notes: await parseZipJsonFile(zip, 'notes.json', [], true),
          unmatchedNotes: await parseZipJsonFile(zip, 'unmatchedNotes.json', [], true),
          chats: await parseZipJsonFile(zip, 'chats.json', [], true),
          analyses: await parseZipJsonFile(zip, 'analyses.json', [], true),
          importVersions: await parseZipJsonFile(zip, 'importVersions.json', [], true),
          deletedIds: await parseZipJsonFile(zip, 'deletedIds.json', {}, true)
        });
        applyRoadtripZipMeta(reconstructedS, meta);
        const chatRaw = await parseZipJsonFile(zip, 'raw/chats_raw.json', {}, false);
        const importVersionsRaw = await parseZipJsonFile(zip, 'raw/importVersions_raw.json', {}, false);
        const chatMap = new Map((reconstructedS.chats || []).map(ch => [String(ch.id || ''), ch]));
        Object.keys(chatRaw || {}).forEach(id => { if (chatMap.has(id)) Object.assign(chatMap.get(id), chatRaw[id] || {}); });
        const importVersionMap = new Map((reconstructedS.importVersions || []).map(v => [String(v.id || ''), v]));
        Object.keys(importVersionsRaw || {}).forEach(id => { if (importVersionMap.has(id)) Object.assign(importVersionMap.get(id), importVersionsRaw[id] || {}); });
        const counts = getRoadtripEntityCounts(reconstructedS);
        const localCounts = getRoadtripEntityCounts(S);
        const warnings = [];
        const manifestCounts = manifest && manifest.counts ? manifest.counts : {};
        Object.keys(counts).forEach(key => {
          if (typeof manifestCounts[key] === 'number' && manifestCounts[key] !== counts[key]) {
            warnings.push(`Count-Mismatch bei ${key}: Manifest ${manifestCounts[key]} vs ZIP ${counts[key]}`);
          }
        });
        return { manifest, meta, reconstructedS, counts, localCounts, warnings };
      }

      function compactCloneData(target) {
        const maxRawFieldChars = 100 * 1024;
        const minKnownRawChars = 2000;
        const keysToTrim = new Set(['rawHtml', 'fullHtml', 'sourceHtml', 'html', 'rawCode', 'sourceCode', 'rawPrompt', 'rawResponse', 'responseText', 'rawAnalysis', 'analysisText', 'largeText', 'fullText']);
        const maybeLargeKeys = new Set(['code', 'prompt']);
        const stats = { fieldsTouched: 0 };
        const walk = (node) => {
          if (!node || typeof node !== 'object') return;
          if (Array.isArray(node)) return node.forEach(walk);
          Object.keys(node).forEach(key => {
            const val = node[key];
            if (Array.isArray(val) || (val && typeof val === 'object')) walk(val);
            if (typeof val !== 'string') return;
            const isKnownRaw = keysToTrim.has(key) && val.length > minKnownRawChars;
            const isLikelyRaw = maybeLargeKeys.has(key) && val.length > 8000;
            if (isKnownRaw || isLikelyRaw) {
              node[key] = `[komprimiert am ${new Date().toISOString()} — ursprüngliche Länge: ${val.length} Zeichen]`;
              stats.fieldsTouched += 1;
            }
            if ((key === 'rawReportText' || key === 'rawHandoffText') && val.length > maxRawFieldChars) {
              node[key] = `[komprimiert am ${new Date().toISOString()} — ursprüngliche Länge: ${val.length} Zeichen]`;
              stats.fieldsTouched += 1;
            }
          });
          if (Array.isArray(node.handoffHistory) && node.handoffHistory.length > 3) {
            node.handoffHistory = node.handoffHistory.slice(node.handoffHistory.length - 3);
            stats.fieldsTouched += 1;
          }
        };
        walk(target);
        return stats;
      }

      function exportCompactJson() {
        const cloned = JSON.parse(JSON.stringify(S));
        compactCloneData(cloned);
        downloadJson(`roadtrip-compact-${dateStamp()}.json`, {
          version: 'roadtrip-compact-v1',
          exportedAt: new Date().toISOString(),
          compacted: true,
          S: cloned
        });
      }

      function compactRoadtripRawData() {
        const before = getRoadtripStorageReport(S);
        const preview = JSON.parse(JSON.stringify(S));
        const previewStats = compactCloneData(preview);
        const after = getRoadtripStorageReport(preview);
        const savedBytes = before.totalBytes - after.totalBytes;
        if (savedBytes <= 0 || previewStats.fieldsTouched <= 0) return alert('Keine großen Rohdaten gefunden.');
        const msg = `Rohdaten komprimieren?\n\nVorher: ${before.totalMb.toFixed(2)} MB\nNachher: ${after.totalMb.toFixed(2)} MB\nErsparnis: ${(savedBytes / 1024).toFixed(1)} KB\nBetroffene Felder: ${previewStats.fieldsTouched}`;
        if (!confirm(msg)) return;
        compactCloneData(S);
        const saved = save();
        updateStorageDisplay();
        if (saved) {
          if (storageMeta.storageMode === 'indexedDB') {
            alert(`✓ Rohdaten komprimiert. Speicherung wurde angestoßen. Ersparnis: ${(savedBytes / 1024).toFixed(1)} KB. Bitte nach kurzem Moment neu laden und prüfen.`);
          } else {
            alert(`✓ Rohdaten komprimiert und gespeichert. Ersparnis: ${(savedBytes / 1024).toFixed(1)} KB.`);
          }
        } else {
          const recentSaveAlert = window.__roadtripSaveAlertState && (Date.now() - Number(window.__roadtripSaveAlertState.lastAt || 0) < 12000);
          if (!recentSaveAlert) {
            alert('⚠ Rohdaten wurden im aktuellen Arbeitsspeicher komprimiert, aber noch nicht erfolgreich gespeichert. Bitte sofort vollständigen Notfall-Export erstellen und nicht neu laden.');
            const shouldExport = confirm('Soll jetzt ein vollständiger Notfall-Export aus dem aktuellen Arbeitsspeicher erstellt werden?');
            if (shouldExport) exportFullEmergencyJson();
          }
        }
      }

      function showRoadtripZipImportPreview(analysis) {
        if (!analysis || !analysis.reconstructedS) return;

      function parseRoadtripSyncBlock(desc) {
        const source = String(desc || '');
        const start = source.indexOf(TRELLO_SYNC_START);
        const end = source.indexOf(TRELLO_SYNC_END);
        if (start === -1 || end === -1 || end < start) {
          return { meta: null, body: source.trim() };
        }
        const block = source.slice(start + TRELLO_SYNC_START.length, end).trim();
        const body = source.slice(end + TRELLO_SYNC_END.length).replace(/^\s+/, '');
        const meta = {};
        block.split(/\n+/).forEach(line => {
          const idx = line.indexOf(':');
          if (idx === -1) return;
          const key = line.slice(0, idx).trim();
          const value = line.slice(idx + 1).trim();
          if (key) meta[key] = value;
        });
        return { meta, body };
      }

      async function trelloRequest(path, options) {
        validateTrelloConfig();
        const method = (options && options.method) || 'GET';
        const params = new URLSearchParams({
          key: C.trelloKey,
          token: C.trelloToken
        });
        const rawQuery = options && options.query ? options.query : {};
        Object.keys(rawQuery).forEach(key => {
          const value = rawQuery[key];
          if (value === undefined || value === null || value === '') return;
          params.set(key, value);
        });

        const url = 'https://api.trello.com/1' + path + '?' + params.toString();
        const fetchOptions = { method, headers: {} };
        if (options && options.body) {
          fetchOptions.headers['Content-Type'] = 'application/json';
          fetchOptions.body = JSON.stringify(options.body);
        }
        const res = await fetch(url, fetchOptions);
        const text = await res.text();
        let data = null;
        try { data = text ? JSON.parse(text) : null; } catch (e) { data = text; }
        if (!res.ok) {
          const msg = data && data.message ? data.message : (typeof data === 'string' ? data : ('HTTP ' + res.status));
          throw new Error(msg);
        }
        return data;
      }

      function parseTrelloLabels(idLabels, allLabels) {
        // Returns { project: [...], category: [...], priority: [...], other: [] }
        const result = { project: [], category: [], priority: [], other: [] };
        (idLabels || []).forEach(id => {
          const label = (allLabels || []).find(l => l.id === id);
          if (!label || !label.name) return;
          const name = label.name;
          if (name.startsWith(TRELLO_LABEL_PREFIX.project)) {
            result.project.push(name.slice(TRELLO_LABEL_PREFIX.project.length).trim());
          } else if (name.startsWith(TRELLO_LABEL_PREFIX.category)) {
            result.category.push(name.slice(TRELLO_LABEL_PREFIX.category.length).trim());
          } else if (name.startsWith(TRELLO_LABEL_PREFIX.priority)) {
            result.priority.push(name.slice(TRELLO_LABEL_PREFIX.priority.length).trim());
          } else {
            result.other.push(name);
          }
        });
        return result;
      }

      function mergeTrelloIntoFeature(feature, card, allLabels, allLists) {
        // Returns { changed: boolean, conflicts: string[] }
        const snap = feature.trello.lastSyncedSnapshot || {};
        const changed = [];
        const conflicts = [];

        const parsed = parseRoadtripSyncBlock(card.desc || '');
        if (!parsed.meta) {
          feature.trello.syncState = 'conflict';
          feature.trello.syncBlockedReason = 'invalid-sync-block';
          return { changed: false, conflicts: ['invalid-sync-block'] };
        }

        // Validate feature ID in block
        if (parsed.meta.roadtripFeatureId && parsed.meta.roadtripFeatureId !== feature.id) {
          feature.trello.syncState = 'conflict';
          feature.trello.syncBlockedReason = 'feature-id-mismatch';
          return { changed: false, conflicts: ['feature-id-mismatch'] };
        }

        const trelloTitle = (card.name || '').trim();
        const trelloDesc = (parsed.body || '').trim();

        // Resolve list name → status
        const list = (allLists || []).find(l => l.id === card.idList);
        const trelloStatus = list ? list.name.trim() : '';

        // Parse labels
        const labelGroups = parseTrelloLabels(card.idLabels || [], allLabels);

        const localTitle = String(feature.title || '').trim();
        const snapTitle = String(snap.title || '').trim();
        const localDesc = String(feature.description || '').trim();
        const snapDesc = String(snap.description || '').trim();
        const localStatus = String(feature.status || '').trim();
        const snapStatus = String(snap.status || '').trim();
        const localPriority = String(feature.priority || '').trim();
        const snapPriority = String(snap.priority || '').trim();
        const localCategory = String(feature.category || '').trim();
        const snapCategory = String(snap.category || '').trim();

        // ── title ──
        const titleChangedTrello = trelloTitle !== snapTitle;
        const titleChangedLocal = localTitle !== snapTitle;
        if (titleChangedTrello && !titleChangedLocal) {
          feature.title = trelloTitle;
          changed.push('title');
        } else if (titleChangedTrello && titleChangedLocal) {
          conflicts.push('title');
        }

        // ── description ──
        const descChangedTrello = trelloDesc !== snapDesc;
        const descChangedLocal = localDesc !== snapDesc;
        if (descChangedTrello && !descChangedLocal) {
          feature.description = trelloDesc;
          changed.push('description');
        } else if (descChangedTrello && descChangedLocal) {
          conflicts.push('description');
        }

        // ── status: Trello wins when changed ──
        const resolvedTrelloStatus = resolveStatusForPool(trelloStatus, feature.pool || 'planned');
        if (resolvedTrelloStatus && resolvedTrelloStatus !== snapStatus) {
          feature.status = resolvedTrelloStatus;
          changed.push('status');
        }

        // ── priority: same 3-way logic as title/description ──
        if (labelGroups.priority.length > 1) {
          conflicts.push('priority-multiple-labels');
        } else if (labelGroups.priority.length === 1) {
          const tp = labelGroups.priority[0];
          if (PRIORITIES.includes(tp)) {
            const prioChangedTrello = tp !== snapPriority;
            const prioChangedLocal = localPriority !== snapPriority;
            if (prioChangedTrello && !prioChangedLocal) {
              feature.priority = tp;
              changed.push('priority');
            } else if (prioChangedTrello && prioChangedLocal) {
              conflicts.push('priority');
            }
          }
        }

        // ── category: same 3-way logic as title/description ──
        if (labelGroups.category.length > 1) {
          conflicts.push('category-multiple-labels');
        } else if (labelGroups.category.length === 1) {
          const tc = labelGroups.category[0];
          if (FEATURE_CATEGORIES.includes(tc)) {
            const catChangedTrello = tc !== snapCategory;
            const catChangedLocal = localCategory !== snapCategory;
            if (catChangedTrello && !catChangedLocal) {
              feature.category = tc;
              changed.push('category');
            } else if (catChangedTrello && catChangedLocal) {
              conflicts.push('category');
            }
          }
        }

        // ── project: never overwritten, validate only ──
        if (labelGroups.project.length > 1) {
          conflicts.push('project-multiple-labels');
        } else if (labelGroups.project.length === 1) {
          const expectedProjectTitle = String(getProjectTitle(feature.projectId) || '').trim();
          if (normalizeText(labelGroups.project[0]) !== normalizeText(expectedProjectTitle)) {
            conflicts.push('project-label-mismatch');
          }
        }

        return { changed: changed.length > 0, changedFields: changed, conflicts };
      }

      async function pullFeatureFromTrello(featureId, options) {
        const silent = !!(options && options.silent);
        const feature = S.features.find(x => x.id === featureId);
        if (!feature) return { ok: false, error: 'feature-not-found', featureId };
        applyFeatureDefaults(feature);

        if (!feature.trello || !feature.trello.cardId) {
          if (!silent) alert('Dieses Feature hat noch keine Trello-Verknüpfung. Erst nach Trello pushen.');
          return { ok: false, error: 'not-linked', featureId };
        }

        try {
          validateTrelloConfig();
          const [card, allLabels, allLists] = await Promise.all([
            trelloRequest('/cards/' + encodeURIComponent(feature.trello.cardId), {
              query: { fields: 'id,name,desc,idList,idLabels,url,shortUrl' }
            }),
            getBoardLabels(),
            getBoardLists()
          ]);

          const mergeResult = mergeTrelloIntoFeature(feature, card, allLabels, allLists);
          const hardFail = mergeResult.conflicts.length > 0 &&
            (mergeResult.conflicts[0] === 'invalid-sync-block' || mergeResult.conflicts[0] === 'feature-id-mismatch');

          const now = new Date().toISOString();

          if (hardFail) {
            // syncState already set inside mergeTrelloIntoFeature, timestamps NOT updated
            save();
            renderView();
            if (!silent) alert('Pull abgebrochen: ' + mergeResult.conflicts[0]);
            return { ok: false, error: mergeResult.conflicts[0], featureId };
          }

          if (mergeResult.conflicts.length > 0) {
            // Soft conflicts: state is conflict, but no timestamps (not a successful sync)
            feature.trello.syncState = 'conflict';
            feature.trello.syncBlockedReason = 'merge-conflicts: ' + mergeResult.conflicts.join(', ');
            save();
            renderView();
            if (!silent) alert('Pull mit Konflikten:\n' + mergeResult.conflicts.join('\n') + '\nBitte manuell prüfen.');
            return { ok: 'conflict', conflicts: mergeResult.conflicts, featureId };
          }

          // Clean pull/merge — set timestamps only now
          feature.trello.lastPulledAt = now;
          feature.trello.lastSyncedAt = now;
          feature.trello.syncState = 'linked';
          feature.trello.syncBlockedReason = '';
          feature.trello.lastSyncDirection = mergeResult.changed ? 'merge' : 'pull';
          feature.trello.lastSyncedSnapshot = getFeatureSnapshot(feature);
          if (mergeResult.changed) feature.updatedAt = now;

          save();
          renderView();

          if (!silent) {
            if (mergeResult.changed) {
              alert('Pull erfolgreich. Geänderte Felder: ' + (mergeResult.changedFields || []).join(', '));
            } else {
              alert('Pull erfolgreich. Keine Änderungen.');
            }
          }
          return { ok: true, changed: mergeResult.changed, changedFields: mergeResult.changedFields, featureId };

        } catch (err) {
          feature.trello.syncState = 'conflict';
          feature.trello.lastSyncError = err.message;
          feature.trello.syncBlockedReason = 'pull-failed';
          save();
          renderView();
          if (!silent) alert('Trello-Pull fehlgeschlagen: ' + err.message);
          return { ok: false, error: err.message, featureId };
        }
      }

      async function pullActiveProjectFromTrello() {
        const projectId = ui.editingProjectId || ui.activeProjectId;
        if (!projectId || projectId === ALL_PROJECTS_KEY) return alert('Kein konkretes Projekt ausgewählt.');
        const features = S.features.filter(f => f.projectId === projectId && f.trello && f.trello.cardId);
        if (!features.length) return alert('Keine verknüpften Trello-Karten in diesem Projekt.');
        if (!confirm(features.length + ' Trello-Karten pullen?')) return;
        let countOk = 0, countConflict = 0;
        const failed = [];
        for (const feature of features) {
          const result = await pullFeatureFromTrello(feature.id, { silent: true });
          if (!result || result.ok === false) {
            failed.push(feature.title);
          } else if (result.ok === 'conflict') {
            countConflict++;
          } else {
            countOk++;
          }
        }
        const parts = ['Projekt-Pull abgeschlossen.', 'Erfolgreich: ' + countOk];
        if (countConflict) parts.push('Mit Konflikten: ' + countConflict);
        if (failed.length) parts.push('Fehlgeschlagen: ' + failed.join(', '));
        alert(parts.join('\n'));
      }

      // ─────────────────────────────────────────────────────────────────────────

      async function syncFeatureToTrello(featureId, options) {
        const silent = !!(options && options.silent);
        const feature = S.features.find(x => x.id === featureId);
        if (!feature) return;
        applyFeatureDefaults(feature);

        try {
          validateTrelloConfig();
          const projectTitle = getProjectTitle(feature.projectId);
          const [list, projectLabel, categoryLabel, priorityLabel] = await Promise.all([
            ensureTrelloListByName(feature.status || 'idea'),
            ensureTrelloLabelByName(getProjectLabelName(projectTitle), 'blue'),
            ensureTrelloLabelByName(getCategoryLabelName(feature.category), 'green'),
            ensureTrelloLabelByName(getPriorityLabelName(feature.priority), 'red')
          ]);

          feature.trello.boardId = C.trelloBoardId;
          feature.trello.listId = list.id;
          feature.trello.projectLabelId = projectLabel.id;
          feature.trello.categoryLabelId = categoryLabel.id;
          feature.trello.priorityLabelId = priorityLabel.id;
          feature.trello.enabled = true;
          feature.trello.lastSyncError = '';
          feature.trello.syncBlockedReason = '';
          feature.trello.syncState = feature.trello.cardId ? 'dirty-roadtrip' : 'unlinked';

          const desc = buildTrelloCardDescription(feature);
          let card = null;

          if (feature.trello.cardId) {
            card = await trelloRequest('/cards/' + encodeURIComponent(feature.trello.cardId), {
              method: 'PUT',
              query: {
                name: feature.title,
                desc: desc,
                idList: list.id,
                pos: 'bottom'
              }
            });
          } else {
            card = await trelloRequest('/cards', {
              method: 'POST',
              query: {
                idList: list.id,
                name: feature.title,
                desc: desc,
                pos: 'bottom'
              }
            });
          }

          feature.trello.cardId = card.id;
          feature.trello.cardUrl = card.url || card.shortUrl || feature.trello.cardUrl || '';
          feature.trello.listId = list.id;

          await assignLabelsToCard(card.id, [projectLabel.id, categoryLabel.id, priorityLabel.id]);
          if (!feature.trello.cardUrl) {
            const freshCard = await fetchTrelloCard(card.id);
            feature.trello.cardUrl = freshCard && (freshCard.url || freshCard.shortUrl) || '';
          }

          const now = new Date().toISOString();
          feature.trello.syncState = 'linked';
          feature.trello.lastSyncDirection = 'push';
          feature.trello.lastSyncedAt = now;
          feature.trello.lastPushedAt = now;
          feature.trello.lastSyncedSnapshot = getFeatureSnapshot(feature);
          feature.updatedAt = now;

          save();
          renderView();
          if (!silent) alert('Feature nach Trello synchronisiert: ' + feature.title);
        } catch (err) {
          feature.trello.syncState = 'conflict';
          feature.trello.lastSyncError = err.message;
          feature.trello.syncBlockedReason = 'push-failed';
          save();
          renderView();
          if (!silent) alert('Trello-Sync fehlgeschlagen: ' + err.message);
          throw err;
        }
      }

      async function syncActiveProjectToTrello() {
        const projectId = ui.editingProjectId || ui.activeProjectId;
        if (!projectId || projectId === ALL_PROJECTS_KEY) return alert('Kein konkretes Projekt ausgewählt.');
        const features = getVisibleFeatures(S.features).filter(f => f.projectId === projectId);
        if (!features.length) return alert('Dieses Projekt hat keine Features.');
        if (!confirm(features.length + ' Features nach Trello synchronisieren?')) return;
        let ok = 0;
        const failed = [];
        for (const feature of features) {
          try {
            await syncFeatureToTrello(feature.id, { silent: true });
            ok++;
          } catch (err) {
            failed.push(feature.title);
          }
        }
        if (failed.length) {
          alert('Projekt-Sync abgeschlossen. Erfolgreich: ' + ok + '\nFehlgeschlagen: ' + failed.join(', '));
        } else {
          alert('Projekt-Sync abgeschlossen. Erfolgreich: ' + ok);
        }
      }

      function openTrelloCard(featureId) {
        const feature = S.features.find(x => x.id === featureId);
        if (!feature || !feature.trello || !feature.trello.cardId) return;
        const url = feature.trello.cardUrl || getTrelloCardUrl(feature.trello.cardId);
        if (url) window.open(url, '_blank', 'noopener');
      }

      function uid(prefix) {
        return prefix + '_' + Math.random().toString(36).slice(2, 10);
      }

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }
      function escapeAttr(s) { return escapeHtml(s); }

      function normalizeText(s) {
        return String(s || '').toLowerCase().replace(/\s+/g, ' ').trim();
      }

      function matchGroup(text, re) {
        const m = text.match(re);
        return m && m[1] ? m[1].trim() : '';
      }

      function formatDateTime(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        if (isNaN(d)) return iso;
        return d.toLocaleString('de-DE', { dateStyle:'short', timeStyle:'short' });
      }

      function shorten(s, n) {
        s = String(s || '');
        return s.length > n ? s.slice(0, n - 1) + '…' : s;
      }

      function downloadJson(filename, data) {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 800);
      }
    })();
  </script>
