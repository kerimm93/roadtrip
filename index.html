      function projectCardMini(p) {
        return `<div class="item"><div class="row-top"><strong>${escapeHtml(p.title)}</strong><span class="pill">${escapeHtml(p.status)}</span></div><div class="mini">${escapeHtml(p.summary || '')}</div></div>`;
      }
      function featureCardMini(f) {
        return `<div class="item"><strong>${escapeHtml(f.title)}</strong><div class="mini">${escapeHtml(getProjectTitle(f.projectId))} · ${escapeHtml(getFeatureStatusLabel(f.status))}</div></div>`;
      }
      function noteCardMini(n) {
        return `<div class="item"><strong>${escapeHtml(shorten(n.text, 70))}</strong><div class="mini">${escapeHtml(getProjectTitle(n.projectId) || 'Ohne Projekt')}</div></div>`;
      }

      function fillSelect(el, values, objectsMode) {
        if (!el) return;
        let items = values;
        if (!objectsMode) items = values.map(v => ({ value:v, label:v }));
        el.innerHTML = items.map(item => `<option value="${escapeAttr(item.value)}">${escapeHtml(item.label)}</option>`).join('');
      }

      function getFilteredFeatures() {
        const p = ui.activeProjectId || ALL_PROJECTS_KEY;
        const pool = ui.filters.pool || 'alle';
        const st = ui.filters.status || 'alle';
        const cat = ui.filters.category || 'alle';
        const term = (ui.filters.search || '').trim().toLowerCase();
        return getVisibleFeatures(S.features).filter(f => {
          applyFeatureDefaults(f);
          if (!ui.showAllProjects && p !== ALL_PROJECTS_KEY && f.projectId !== p) return false;
          if (pool !== 'alle' && normalizeFeaturePool(f.pool) !== pool) return false;
          if (st !== 'alle') {
            const normalizedFilterStatus = resolveStatusForPool(st, f.pool);
            if (!normalizedFilterStatus || f.status !== normalizedFilterStatus) return false;
          }
          if (cat !== 'alle' && f.category !== cat) return false;
          if (term) {
            const blob = [f.title, f.description, f.category, f.priority, getProjectTitle(f.projectId)].join(' ').toLowerCase();
            if (!blob.includes(term)) return false;
          }
          return true;
        }).sort((a,b) => (b.updatedAt||'').localeCompare(a.updatedAt||''));
      }

      function getFilteredNotes() {
        const p = ui.activeProjectId || ALL_PROJECTS_KEY;
        const term = (ui.filters.search || '').trim().toLowerCase();
        return S.notes.filter(n => {
          if (!ui.showAllProjects && p !== ALL_PROJECTS_KEY && n.projectId !== p) return false;
          if (term) {
            const blob = [n.text, getProjectTitle(n.projectId)].join(' ').toLowerCase();
            if (!blob.includes(term)) return false;
          }
          return true;
        }).sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
      }

      function saveProjectFromForm() {
        const title = $('projectTitle').value.trim();
        if (!title) return alert('Bitte einen Projekttitel eintragen.');
        const data = {
          title,
          type: $('projectType').value,
          status: $('projectStatus').value,
          summary: $('projectSummary').value.trim(),
          tags: splitTags($('projectTags').value),
          mainChatUrl: ($('projectMainChatUrl') ? $('projectMainChatUrl').value.trim() : ''),
          driveUrl: ($('projectDriveUrl') ? $('projectDriveUrl').value.trim() : ''),
          obsidianUrl: ($('projectObsidianUrl') ? $('projectObsidianUrl').value.trim() : ''),
          currentFocus: ($('projectCurrentFocus') ? $('projectCurrentFocus').value.trim() : ''),
          nextStep: ($('projectNextStep') ? $('projectNextStep').value.trim() : '')
        };
        let savedProjectId = ui.editingProjectId || '';
        if (ui.editingProjectId) {
          const now = new Date().toISOString();
          const p = S.projects.find(x => x.id === ui.editingProjectId);
          if (!p) return;
          Object.assign(p, data, { updatedAt: now });
        } else {
          const created = createProjectFromData(data);
          savedProjectId = created.id;
        }
        ui.activeProjectId = savedProjectId;
        ui.editingProjectId = savedProjectId;
        ui.importDraft.projectId = savedProjectId;
        ui.projectEditMode = false;
        save();
        renderSidebarProjects();
        renderProjectSelects();
        renderView();
      }

      function createProjectFromData(data) {
        const now = new Date().toISOString();
        const created = ensureProjectDefaults(Object.assign({ id: uid('p'), createdAt: now, lastHtmlImportedAt: '', lastAnalyzedAt: '' }, data, { updatedAt: now }));
        S.projects.push(created);
        return created;
      }

      function editProject(id) {
        const p = S.projects.find(x => x.id === id);
        if (!p) return;
        ui.editingProjectId = id;
        $('projectTitle').value = p.title || '';
        $('projectType').value = p.type || APP_TYPES[0];
        $('projectStatus').value = p.status || PROJECT_STATUS[0];
        $('projectSummary').value = p.summary || '';
        $('projectTags').value = (p.tags || []).join(', ');
        if ($('projectMainChatUrl')) $('projectMainChatUrl').value = p.mainChatUrl || '';
        if ($('projectDriveUrl')) $('projectDriveUrl').value = p.driveUrl || '';
        if ($('projectObsidianUrl')) $('projectObsidianUrl').value = p.obsidianUrl || '';
        if ($('projectCurrentFocus')) $('projectCurrentFocus').value = p.currentFocus || '';
        if ($('projectNextStep')) $('projectNextStep').value = p.nextStep || '';
      }

      function resetProjectForm() {
        ui.editingProjectId = null;
        $('projectTitle').value = '';
        $('projectType').value = APP_TYPES[0];
        $('projectStatus').value = PROJECT_STATUS[0];
        $('projectSummary').value = '';
        $('projectTags').value = '';
      }

      function startNewProjectCreation() {
        if (ui.activeProjectId === ALL_PROJECTS_KEY) {
          ui.activeProjectId = (S.projects[0] || {}).id || '';

        renderView();

        ui.projectEditMode = true;
        ui.editingProjectId = null;
        ui.view = 'project';

        renderView();
      }

      function startNewProjectFromImportView() {
        const title = prompt('Titel für neues Projekt:');
        if (title === null) return;
        const cleanTitle = title.trim();
        if (!cleanTitle) return alert('Bitte einen Projekttitel eintragen.');

          status: PROJECT_STATUS[0],

          tags: []
        });
        ui.activeProjectId = created.id;
        ui.editingProjectId = created.id;

      function deleteProjectFromForm() {
        if (!ui.editingProjectId) return alert('Kein Projekt zum Löschen ausgewählt.');
        deleteProject(ui.editingProjectId);
      }

      function deleteProject(id) {
        const p = S.projects.find(x => x.id === id);
        if (!p) return;
        if (!confirm(`Projekt "${p.title}" wirklich löschen? Zugehörige Features und Projekt-Notizen werden ebenfalls gelöscht.`)) return;
        const deletedProjectIds = new Set();
        if (id) deletedProjectIds.add(id);
        (S.features || []).forEach(f => { if (f && f.projectId === id && f.id) deletedProjectIds.add(f.id); });
        (S.notes || []).forEach(n => { if (n && n.projectId === id && n.id) deletedProjectIds.add(n.id); });
        (S.chats || []).forEach(c => { if (c && c.projectId === id && c.id) deletedProjectIds.add(c.id); });
        (S.importVersions || []).forEach(v => { if (v && v.projectId === id && v.id) deletedProjectIds.add(v.id); });
        (S.analyses || []).forEach(a => { if (a && a.projectId === id && a.id) deletedProjectIds.add(a.id); });
        deletedProjectIds.forEach(recordDeletion);
        S.projects = S.projects.filter(x => x.id !== id);
        S.features = S.features.filter(f => f.projectId !== id);
        S.notes = S.notes.filter(n => n.projectId !== id);
        S.chats = S.chats.filter(c => c.projectId !== id);
        S.importVersions = (S.importVersions || []).filter(v => v.projectId !== id);
        S.analyses = (S.analyses || []).filter(a => a.projectId !== id);
        ui.projectEditMode = false;
        ui.editingProjectId = null;
        ui.activeProjectId = S.projects.length ? S.projects[0].id : ALL_PROJECTS_KEY;
        save();
        renderProjectSelects();
        renderView();
      }

      function createRawNote(projectId, text, options) {
        const now = new Date().toISOString();
        const opts = options || {};
        const note = ensureNoteDefaults({
          id: uid('n'),
          projectId: projectId || '',
          text: String(text || '').trim(),
          type: NOTE_TYPES.includes(opts.type) ? opts.type : 'note',
          status: 'open',
          sourceType: opts.sourceType || 'quick-note',
          processed: false,
          createdAt: now,
          updatedAt: now
        });
        S.notes.push(note);
        const project = S.projects.find(p => p.id === (projectId || ''));
        if (project) project.updatedAt = now;
        return note;
      }

      function addNotesWorkspaceNote() {
        const text = String(($('notesWorkspaceText') && $('notesWorkspaceText').value) || '').trim();
        if (!text) return alert('Bitte erst eine Notiz schreiben.');
        createRawNote(($('notesWorkspaceProject') && $('notesWorkspaceProject').value) || '', text, {
          type: ($('notesWorkspaceType') && $('notesWorkspaceType').value) || 'note',
          sourceType: 'notes-workspace'
        });
        if ($('notesWorkspaceText')) $('notesWorkspaceText').value = '';
        save();
        renderView();
      }

      function updateNotesWorkspaceNote(id) {
        const note = S.notes.find(x => x.id === id);
        if (!note) return;
        const textEl = qq('[data-note-edit-text]').find(el => el.dataset.noteEditText === id);
        const projectEl = qq('[data-note-edit-project]').find(el => el.dataset.noteEditProject === id);
        const typeEl = qq('[data-note-edit-type]').find(el => el.dataset.noteEditType === id);
        const text = String((textEl && textEl.value) || '').trim();
        if (!text) return alert('Bitte eine Notiz eintragen.');
        note.text = text;
        note.projectId = (projectEl && projectEl.value) || '';
        note.type = getNoteType({ type: (typeEl && typeEl.value) || note.type });
        note.updatedAt = new Date().toISOString();
        ui.notesWorkspace.editingNoteId = '';
        save();
        renderView();
      }

      function markNoteOpen(id) {
        const n = S.notes.find(x => x.id === id);
        if (!n) return;
        setNoteStatus(n, 'open');
        save();
        renderView();
      }

      function archiveNote(id) {
        const n = S.notes.find(x => x.id === id);
        if (!n) return;
        setNoteStatus(n, 'archived');
        save();
        renderView();
      }

      function addQuickNote() {
        const text = $('quickNote').value.trim();
        if (!text) return alert('Bitte erst eine Notiz schreiben.');
        createRawNote($('quickProject').value || '', text, { sourceType: 'project-quick-note' });
        $('quickNote').value = '';
        save();
        renderView();
      }

      function deleteNote(id) {
        if (!confirm('Notiz löschen?')) return;
        recordDeletion(id);
        S.notes = S.notes.filter(n => n.id !== id);
        save();
        renderView();
      }

      function markNoteProcessed(id) {
        const n = S.notes.find(x => x.id === id);
        if (!n) return;
        setNoteStatus(n, 'processed');
        n.processedAt = n.processedAt || new Date().toISOString();
        save();
        renderView();
      }

      function getFirstMeaningfulNoteLine(text) {
        const lines = String(text || '').split('\n').map(x => x.trim()).filter(Boolean);
        return lines.find(line => normalizeText(line) !== 'ohne titel') || '';
      }

      function getNoteFeaturePipelineState(projectId) {
        const pid = String(projectId || '');
        if (!ui.noteFeaturePipelineByProject || typeof ui.noteFeaturePipelineByProject !== 'object') ui.noteFeaturePipelineByProject = {};
        if (!ui.noteFeaturePipelineByProject[pid]) {
          ui.noteFeaturePipelineByProject[pid] = { prompt: '', resultJson: '', proposals: [], notesToMarkProcessed: [], visible: false, summary: '' };
        }
        return ui.noteFeaturePipelineByProject[pid];
      }

      function promoteNoteToFeature(id) {
        const n = S.notes.find(x => x.id === id);
        if (!n) return;
        if (!n.projectId) return alert('Bitte der Notiz zuerst ein Projekt zuweisen.');
        const now = new Date().toISOString();
        const suggested = getFirstMeaningfulNoteLine(n.text);
        let title = suggested;
        if (!title || title.length > 80) title = prompt('Feature-Titel bestätigen oder eingeben:', title || '');
        if (!title || !title.trim()) title = prompt('Bitte Feature-Titel eingeben (Pflicht):', '');
        if (!title || !title.trim()) return;
        title = title.trim();
        const normalizedTitle = normalizeText(title);
        const hasDup = getVisibleFeatures(S.features).some(f => f.projectId === (n.projectId || '') && isPlannedFeature(f) && normalizeText(f.title || '') === normalizedTitle);
        if (hasDup && !confirm('Ähnliches geplantes Feature existiert bereits. Trotzdem übernehmen?')) return;
        const featureId = uid('f');
        S.features.push(ensureFeatureDefaults({
          id: featureId,
          projectId: n.projectId || '',
          title,
          description: n.text,
          pool: 'planned',
          reviewStatus: 'needs-review',
          status: 'idea',
          priority: 'mittel',
          category: 'Workflow',
          sourceType: 'raw-note',
          sourceNoteIds: [n.id],
          createdAt: now,
          updatedAt: now
        }));
        setNoteStatus(n, 'processed');
        n.processedAt = now;
        n.processedIntoFeatureId = featureId;
        n.updatedAt = now;
        const project = S.projects.find(p => p.id === (n.projectId || ''));
        if (project) project.updatedAt = now;
        alert('Feature wurde als geplantes Feature erstellt.\nIn Database sichtbar unter: Geplante Features');
        save();
        renderView();
      }

      function buildNotesToFeaturesPrompt(projectId) {
        const project = S.projects.find(p => p.id === projectId);
        if (!project) return '';
        const planned = getVisibleFeatures(S.features).filter(f => f.projectId === projectId && isPlannedFeature(f));
        const implemented = getVisibleFeatures(S.features).filter(f => f.projectId === projectId && isImplementedFeature(f)).slice(0, 10);
        const notes = (S.notes || []).filter(n => n && n.projectId === projectId && isOpenNote(n) && String(n.text || '').trim());
        return `# Roadtrip Raw Notes -> Planned Features\nProjekt: ${project.title || '—'}\nSummary: ${project.summary || '—'}\nCurrent Focus: ${project.currentFocus || '—'}\nNext Step: ${project.nextStep || '—'}\n\nBestehende planned Features:\n${planned.map(f => `- ${f.id} | ${f.title} | ${f.status}`).join('\n') || '- —'}\n\nBestehende implemented Features (gekürzt):\n${implemented.map(f => `- ${f.id} | ${f.title} | ${f.status}`).join('\n') || '- —'}\n\nOffene Raw Notes:\n${notes.map(n => `- ID: ${n.id} | createdAt: ${n.createdAt || '—'} | sourceType: ${n.sourceType || 'note'} | Text: ${shorten(String(n.text || '').trim(), 800)}`).join('\n') || '- —'}\n\nRegeln:\n- Raw Notes sind noch keine Features.\n- Nur echte Feature-Ideen in proposedFeatures.\n- Keine bestehenden Features doppeln.\n- Keine implemented Features neu als planned anlegen.\n- Wenn unklar, rationale erklären und lieber keinen Vorschlag machen.\n\nGib ausschließlich JSON zurück:\n{\n  \"proposedFeatures\": [{\"title\":\"...\",\"description\":\"...\",\"sourceNoteIds\":[\"n_...\"],\"rationale\":\"...\",\"suggestedPriority\":\"niedrig|mittel|hoch|kritisch\",\"suggestedCategory\":\"UI|Workflow|Sync|KI|Import/Export|Darstellung|Datenmodell|Ansicht|Sonstiges\",\"suggestedStatus\":\"idea|planned\"}],\n  \"notesToMarkProcessed\": [\"n_...\"],\n  \"summary\": \"...\"\n}`;
      }

      function updateFeatureStatus(id, status) {
        const f = S.features.find(x => x.id === id);
        if (!f) return;
        applyFeatureDefaults(f);
        f.status = normalizeFeatureStatus(status, f.pool);
        f.updatedAt = new Date().toISOString();
        markFeatureDirtyRoadtrip(f);
        save();
        renderView();
      }

      function updateFeaturePool(id, pool) {
        const f = S.features.find(x => x.id === id);
        if (!f) return;
        applyFeatureDefaults(f);
        f.pool = normalizeFeaturePool(pool);
        const normalizedStatus = resolveStatusForPool(f.status, f.pool);
        if (normalizedStatus) {
          f.status = normalizedStatus;
        } else {
          f.status = f.pool === 'implemented' ? 'detected' : 'planned';
        }
        f.reviewStatus = FEATURE_REVIEW_STATUS.includes(f.reviewStatus) ? f.reviewStatus : 'needs-review';
        if (f.pool === 'implemented' || f.pool === 'planned') f.reviewStatus = 'needs-review';
        f.updatedAt = new Date().toISOString();
        markFeatureDirtyRoadtrip(f);
        save();
        renderView();
      }

      function updateFeaturePriority(id, priority) {
        const f = S.features.find(x => x.id === id);
        if (!f) return;
        applyFeatureDefaults(f);
        f.priority = priority;
        f.updatedAt = new Date().toISOString();
        markFeatureDirtyRoadtrip(f);
        save();
      }

      function quickCreateFeature(projectId) {
        const title = prompt('Feature-Titel:');
        if (!title) return;
        const description = prompt('Kurzbeschreibung:', '');
        S.features.push(ensureFeatureDefaults({
          id: uid('f'),
          projectId,
          title: title.trim(),
          description: (description || '').trim(),
          pool: 'planned',
          reviewStatus: 'needs-review',
          status: 'idea',
          priority: 'mittel',
          category: 'Sonstiges',
          sourceType: 'manual',
          sourceNoteIds: [],
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        }));
        save();
        renderView();
      }

      function onHtmlFilePicked(e) {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          const value = String(reader.result || '');
          $('htmlTextarea').value = value;
          ui.importDraft.html = value;
        };
        reader.readAsText(file, 'utf-8');
      }

      function analyzeHtmlLocal() {
        const html = $('htmlTextarea').value.trim();
        const projectId = $('htmlProjectSelect').value;
        ui.importDraft.html = $('htmlTextarea').value;
        ui.importDraft.projectId = projectId;
        if (!projectId) return alert('Bitte ein Projekt auswählen.');
        if (!html) return alert('Bitte Code, Projektdatei oder Repository-Auszug hochladen/einfügen.');
        const result = heuristicsFromHtml(html);
        const p = S.projects.find(x => x.id === projectId);
        if (!p) return;
        p.summary = result.projectSummary || p.summary;
        p.type = result.appType || p.type;
        const now = new Date().toISOString();
        p.lastHtmlImportedAt = now;
        markProjectCodeAnalysisCompleted(projectId, now);

        ui.analysisDraftFeatures = result.features.map(title => ({
          title,
          description: 'Heuristisch aus aktueller HTML-Datei erkannt.',
          category: guessCategory(title),
          projectId
        }));

        const analysisText = [
          'LOKALE HTML-ANALYSE',
          '',
          'App-Typ: ' + result.appType,
          'Projektbeschreibung:',
          result.projectSummary,
          '',
          'Erkannte Features:',
          ...result.features.map(f => '- ' + f)
        ].join('\n');
        if ($('analysisPromptOutput')) $('analysisPromptOutput').value = analysisText;
        ui.importDraft.analysisPrompt = analysisText;

        S.analyses.push({
          id: uid('a'),
          type: 'html-project-analysis',
          projectId,
          createdAt: new Date().toISOString(),
          resultRaw: analysisText,
          resultParsed: result
        });

      function heuristicsFromHtml(html) {
        const lower = html.toLowerCase();
        const title = matchGroup(html, /<title>(.*?)<\/title>/i) || 'Unbekannte App';
        const featureSet = new Set();

        const rules = [
          ['dark mode', 'Dark Mode'],
          ['light mode', 'Light Mode'],
          ['e-ink', 'E-Ink Modus'],
          ['eink', 'E-Ink Modus'],
          ['gist', 'GitHub Gist Synchronisation'],
          ['localstorage', 'Lokaler Datenspeicher'],
          ['csv', 'CSV Export/Import'],
          ['json', 'JSON Export/Import'],
          ['canvas', 'Canvas / Kartenansicht'],
          ['kanban', 'Kanban-Ansicht'],
          ['table', 'Tabellenansicht'],
          ['card', 'Kartenansicht'],
          ['prompt', 'Prompt-Weitergabe / Prompt-Builder'],
          ['openai', 'OpenAI API Integration'],
          ['fetch(', 'Externe Requests / Sync oder API'],
          ['serviceworker', 'PWA / Offline-Komponente'],
          ['manifest', 'PWA Manifest-Unterstützung'],
          ['textarea', 'Freitext- / Eingabefeld'],
          ['filereader', 'Dateiimport'],
          ['drag', 'Drag & Drop / direkte Interaktion'],
          ['theme', 'Theme-Umschaltung']
        ];
        rules.forEach(([needle, feature]) => { if (lower.includes(needle)) featureSet.add(feature); });

        const appType = (() => {
          if (lower.includes('daily') || lower.includes('journal')) return 'Daily Log';
          if (lower.includes('brain') || lower.includes('braindump')) return 'Braindump';
          if (lower.includes('review')) return 'Review';
          if (lower.includes('track')) return 'Tracker';
          if (lower.includes('story') || lower.includes('prosa')) return 'Writing';
          return 'Meta-App';
        })();

        const projectSummary = `${title} wirkt wie eine ${appType}-App. Lokal erkannt wurden ${featureSet.size ? Array.from(featureSet).slice(0,6).join(', ') : 'noch keine klaren Module'}. Diese Erstfassung ist heuristisch und sollte mit einer KI-Analyse gegen die echte HTML-Struktur geprüft werden.`;
        return { appType, projectSummary, features: Array.from(featureSet) };
      }

      function loadMultiProjectReviewProposals() {
        const raw = $('multiProjectResultJsonInput') ? $('multiProjectResultJsonInput').value.trim() : '';
        if (!raw) return alert('Bitte JSON-Ergebnis einfügen.');
        let parsed;
        try { parsed = JSON.parse(extractJsonObjectFromText(raw)); } catch (e) { return alert('Kein gültiges JSON erkannt: ' + e.message); }
        if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) return alert('Top-Level muss ein JSON-Objekt sein.');
        const incomingUpdates = Array.isArray(parsed.projectUpdates) ? parsed.projectUpdates : null;
        if (!incomingUpdates) return alert('projectUpdates muss ein Array sein (darf leer sein).');
        const activeProjects = (S.projects || []).filter(p => p && p.status !== 'archiviert');
        const confidenceValues = ['hoch', 'mittel', 'niedrig'];
        const noteTypes = ['note', 'idea', 'bug', 'decision', 'open-question'];
        const normalizedUpdates = [];
        const unmatched = Array.isArray(parsed.unmatchedNotes) ? parsed.unmatchedNotes.map(item => ({
          text: String(item && item.text || '').trim(),
          reason: String(item && item.reason || '').trim()
        })).filter(x => x.text) : [];
        incomingUpdates.forEach((item, idx) => {
          const projectIdRaw = String(item && item.projectId || '').trim();
          const projectTitle = String(item && item.projectTitle || '').trim();
          let project = projectIdRaw ? activeProjects.find(p => p.id === projectIdRaw) : null;
          if (!project && projectTitle) {
            const normTitle = normalizeText(projectTitle);
            project = activeProjects.find(p => normalizeText(p.title) === normTitle) || null;
          }
          const notes = Array.isArray(item && item.notes) ? item.notes.map((n, noteIdx) => {
            const text = String(n && n.text || '').trim();
            if (!text) return null;
            return { _idx: noteIdx, text, type: noteTypes.includes(n.type) ? n.type : 'note', confidence: confidenceValues.includes(n.confidence) ? n.confidence : 'mittel', _done: false, _ignored: false };
          }).filter(Boolean) : [];
          const proposedFeatures = Array.isArray(item && item.proposedFeatures) ? item.proposedFeatures.map((f, featureIdx) => {
            const title = String(f && f.title || '').trim();
            const description = String(f && f.description || '').trim();
            if (!title) return null;
            const normalizedStatus = String(f && f.status || '').trim().toLowerCase();
            return { _idx: featureIdx, title, description, category: FEATURE_CATEGORIES.includes(f.category) ? f.category : 'Sonstiges', priority: PRIORITIES.includes(f.priority) ? f.priority : 'mittel', status: (normalizedStatus === 'planned' || normalizedStatus === 'idea') ? normalizedStatus : 'idea', _done: false, _ignored: false };
          }).filter(Boolean) : [];
          const update = {
            _idx: idx,
            _projectId: project ? project.id : '',
            _projectTitle: project ? project.title : (projectTitle || 'Unbekanntes Projekt'),
            projectTitle,
            projectId: projectIdRaw,
            confidence: confidenceValues.includes(item && item.confidence) ? item.confidence : 'mittel',
            focusUpdate: String(item && item.focusUpdate || '').trim(),
            nextStep: String((item && (item.nextStep || item.nextStepUpdate)) || '').trim(),
            notes,
            proposedFeatures,
            _focusDone: false,
            _nextStepDone: false,
            _focusIgnored: false,
            _nextStepIgnored: false
          };
          normalizedUpdates.push(update);
          if (!project) unmatched.push({ text: `${projectTitle || projectIdRaw || 'Unbekannt'}: keine aktive Projektzuordnung`, reason: 'Projekt nicht gefunden oder archiviert' });
        });
        ui.multiProjectImport.updates = normalizedUpdates;
        ui.multiProjectImport.unmatchedNotes = unmatched;
        ui.multiProjectImport.summary = typeof parsed.summary === 'string' ? parsed.summary.trim() : '';
        ui.multiProjectImport.visible = true;
        renderView();
      }

        const update = (ui.multiProjectImport.updates || []).find(x => x._idx === updateIdx);

          if (update._focusDone || update._focusIgnored) return;

        if (kind === 'next-step') {
          if (update._nextStepDone || update._nextStepIgnored) return;
          update._nextStepIgnored = true;
        }
        if (kind === 'note') {
          const note = (update.notes || []).find(n => n._idx === itemIdx);
          if (!note || note._done || note._ignored) return;
          note._ignored = true;
        }
        if (kind === 'feature') {
          const feature = (update.proposedFeatures || []).find(f => f._idx === itemIdx);

          feature._ignored = true;

          suggestedTitle: String(p.suggestedTitle || '').trim(),
          suggestedDescription: String(p.suggestedDescription || '').trim(),
          suggestedCategory: FEATURE_CATEGORIES.includes(p.suggestedCategory) ? p.suggestedCategory : 'Sonstiges',
          suggestedStatus: normalizeFeatureStatus(p.suggestedStatus, 'planned'),
          rationale: String(p.rationale || '').trim(),
          _done: false
        }));
        renderView();
      }

      function acceptNoteProposalAsNew(idx) {
        const proposal = ui.noteReview.proposals.find(p => p._idx === idx);
        if (!proposal || proposal._done) return;
        const projectId = ui.noteReview.projectId || '';
        if (!proposal.suggestedTitle) return alert('Kein Titel im Vorschlag vorhanden.');
        S.features.push(ensureFeatureDefaults({
          id: uid('f'),
          projectId,
          title: proposal.suggestedTitle,
          description: proposal.suggestedDescription || '',
          category: proposal.suggestedCategory || 'Sonstiges',
          pool: 'planned',
          reviewStatus: 'needs-review',
          status: proposal.suggestedStatus || 'idea',
          priority: 'mittel',
          sourceType: 'note-review',
          sourceNoteIds: [],
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        }));
        proposal._done = true;
        save();
        renderView();
      }

      function acceptNoteProposalAsUpdate(idx) {
        const proposal = ui.noteReview.proposals.find(p => p._idx === idx);
        if (!proposal || proposal._done) return;
        const targetId = proposal.targetFeatureId;
        const feature = targetId ? S.features.find(x => x.id === targetId) : null;
        if (!feature) return alert('Ziel-Feature nicht gefunden. Bitte manuell zuordnen.');
        // Defensive: only update if value is non-empty and meaningfully different
        if (proposal.suggestedTitle && proposal.suggestedTitle !== feature.title) {
          if (confirm('Titel ändern von:\n"' + feature.title + '"\nauf:\n"' + proposal.suggestedTitle + '"?')) {
            feature.title = proposal.suggestedTitle;
          }
        }
        if (proposal.suggestedDescription) {
          const existingDesc = String(feature.description || '').trim();
          if (!existingDesc || isGenericFeatureDescription(existingDesc)) {
            feature.description = proposal.suggestedDescription;
          } else if (existingDesc !== proposal.suggestedDescription) {
            if (confirm('Beschreibung ersetzen?\nAlt: ' + shorten(existingDesc, 80) + '\nNeu: ' + shorten(proposal.suggestedDescription, 80))) {
              feature.description = proposal.suggestedDescription;
            }
          }
        }
        if (proposal.suggestedCategory && proposal.suggestedCategory !== 'Sonstiges' && feature.category === 'Sonstiges') {
          feature.category = proposal.suggestedCategory;
        }
        const proposedStatus = resolveStatusForPool(proposal.suggestedStatus, feature.pool || 'planned');
        if (proposedStatus && isValidFeatureStatus(proposedStatus, feature.pool || 'planned')) {
          if (getFeatureStatusRank(proposedStatus, feature.pool) > getFeatureStatusRank(feature.status, feature.pool)) {
            if (confirm('Status anheben auf "' + proposedStatus + '"?')) {
              feature.status = proposedStatus;
            }
          }
        }
        feature.updatedAt = new Date().toISOString();
        proposal._done = true;
        save();
        renderView();
      }

      function ignoreNoteProposal(idx) {
        const proposal = ui.noteReview.proposals.find(p => p._idx === idx);
        if (!proposal) return;
        proposal._done = true;
        renderView();
      }

      function clearNoteReview() {
        ui.noteReview = { proposals: [], projectId: '', rawText: '', visible: false };
        renderView();
      }

      function acceptNoteFeaturePipelineProposal(projectId, idx) {
        const st = getNoteFeaturePipelineState(projectId);
        const proposal = (st.proposals || []).find(p => p._idx === idx);
        if (!proposal || proposal._done || proposal._ignored) return;
        const normalizedTitle = normalizeText(proposal.title || '');
        if (normalizedTitle) {
          const hasDup = getVisibleFeatures(S.features).some(f =>
            f.projectId === projectId &&
            isPlannedFeature(f) &&
            normalizeText(f.title || '') === normalizedTitle
          );
          if (hasDup && !confirm('Ähnliches geplantes Feature existiert bereits. Trotzdem übernehmen?')) return;
        }
        const now = new Date().toISOString();
        const featureId = uid('f');
        S.features.push(ensureFeatureDefaults({
          id: featureId, projectId, title: proposal.title, description: proposal.description || '',
          pool: 'planned', status: proposal.suggestedStatus === 'planned' ? 'planned' : 'idea', reviewStatus: 'needs-review',
          sourceType: 'raw-note-batch', sourceNoteIds: proposal.sourceNoteIds || [], priority: PRIORITIES.includes(proposal.suggestedPriority) ? proposal.suggestedPriority : 'mittel',
          category: FEATURE_CATEGORIES.includes(proposal.suggestedCategory) ? proposal.suggestedCategory : 'Workflow',
          createdAt: now, updatedAt: now
        }));
        (proposal.sourceNoteIds || []).forEach(noteId => {
          const note = (S.notes || []).find(n => n && n.id === noteId && n.projectId === projectId);
          if (!note) return;
          setNoteStatus(note, 'processed');
          note.processedAt = now;
          note.processedIntoFeatureId = featureId;
          note.updatedAt = now;
        });
        const project = (S.projects || []).find(p => p && p.id === projectId);
        if (project) project.updatedAt = now;
        proposal._done = true;
        proposal.createdFeatureId = featureId;
        alert('Feature wurde als geplantes Feature erstellt.\nIn Database sichtbar unter: Geplante Features');
        save(); renderView();
      }

      function ignoreNoteFeaturePipelineProposal(projectId, idx) {
        const st = getNoteFeaturePipelineState(projectId);
        const proposal = (st.proposals || []).find(p => p._idx === idx);
        if (!proposal || proposal._done || proposal._ignored) return;
        proposal._ignored = true;
        renderView();
      }

      function renderNoteFeaturePipelineSection(projectId, options) {

        </details>`;
      }

      function renderNoteReviewSection() {
        if (!ui.noteReview.visible) return '';

                        ${p.type === 'update-feature' || p.type === 'already-implemented' ? `<button class="btn" data-review-accept-update="${p._idx}">Feature aktualisieren</button>` : ''}

      // ─────────────────────────────────────────────────────────────────────────

      function parseAnalysisJsonForCleanup(text, projectId) {
        let parsed;
        try {
          parsed = JSON.parse(String(text || '{}'));
        } catch (err) {
          throw new Error('invalid-analysis-json');
        }
        if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) throw new Error('unsupported-top-level-structure');
        const p = S.projects.find(x => x.id === projectId);
        if (!p) throw new Error('project-not-found');
        const featureSource = Array.isArray(parsed.features) ? parsed.features
          : Array.isArray(parsed.featureCandidates) ? parsed.featureCandidates
          : Array.isArray(parsed.detectedFeatures) ? parsed.detectedFeatures
          : null;
        const hasFeatureKey = Object.prototype.hasOwnProperty.call(parsed, 'features')
          || Object.prototype.hasOwnProperty.call(parsed, 'featureCandidates')
          || Object.prototype.hasOwnProperty.call(parsed, 'detectedFeatures');
        if (!hasFeatureKey || !featureSource) throw new Error('missing-features-array');
        if (featureSource.length === 0) throw new Error('empty-features-array');
        const parsedFeatures = featureSource.map(normalizeImportedFeature).filter(Boolean);
        if (!parsedFeatures.length) throw new Error('empty-features-array');
        return { parsed, parsedFeatures };
      }

      function isGenericProjectType(typeValue) {
        const normalized = String(typeValue || '').trim();
        return !normalized || normalized === 'Sonstiges';
      }

      function applyProjectMetadataFromAnalysis(projectId, parsed, options) {
        const result = {
          changed: false,
          summaryChanged: false,
          typeChanged: false,
          skippedSummary: false,
          skippedType: false
        };
        if (!projectId || !parsed || typeof parsed !== 'object' || Array.isArray(parsed)) return result;
        const project = S.projects.find(x => x.id === projectId);
        if (!project) return result;
        const opts = options && typeof options === 'object' ? options : {};

        const incomingSummary = typeof parsed.projectSummary === 'string' ? parsed.projectSummary.trim() : '';
        const existingSummary = String(project.summary || '').trim();
        if (incomingSummary) {
          if (!existingSummary) {
            project.summary = incomingSummary;
            result.summaryChanged = true;
          } else if (opts.allowOverwrite === true && incomingSummary !== existingSummary && confirm('Bestehende Projekt-Summary überschreiben?')) {
            project.summary = incomingSummary;
            result.summaryChanged = true;
          } else {
            result.skippedSummary = true;
          }
        }

        const incomingType = typeof parsed.appType === 'string' ? parsed.appType.trim() : '';
        const validIncomingType = incomingType && APP_TYPES.includes(incomingType);
        if (validIncomingType) {
          const existingType = String(project.type || '').trim();
          if (isGenericProjectType(existingType) && existingType !== incomingType) {
            project.type = incomingType;
            result.typeChanged = true;
          } else if (!isGenericProjectType(existingType)) {
            result.skippedType = true;
          }
        } else if (incomingType) {
          result.skippedType = true;
        }

        if (result.summaryChanged || result.typeChanged) {
          project.updatedAt = new Date().toISOString();
          result.changed = true;
        }
        return result;
      }

      function buildFeatureListForCleanupPrompt(projectId) {
        return getVisibleFeatures(S.features)
          .filter(f => f.projectId === projectId)
          .map(f => `- [${f.id}] ${f.title} | ${f.status} | ${f.category} | ${shorten(f.description || '', 180)}`)
          .join('\n') || '- keine';
      }

      function buildIncomingListForCleanupPrompt(incomingFeatures) {
        return incomingFeatures
          .map((f, idx) => `- [IN-${idx + 1}] ${f.title} | ${f.status} | ${f.category} | ${shorten(f.description || '', 180)}`)
          .join('\n') || '- keine';
      }

      function buildCleanupPrompt(projectId, incomingFeatures, mode) {
        const projectTitle = getProjectTitle(projectId) || 'Unbekanntes Projekt';
        const existingFeatures = buildFeatureListForCleanupPrompt(projectId);
        if (mode === 'project-dedupe') {
          return [
            'AUFGABE',

            'Alle Einträge stammen bereits aus dem Projekt.',
            'Ziel ist Aufräumen per Vorschlägen, nicht Neu-Anlage.',
            'Nichts automatisch löschen.',
            'Gib ausschließlich gültiges JSON zurück (kein Markdown, kein Zusatztext).',
            '',
            'PROJEKT',
            '- projectId: ' + projectId,
            '- projectTitle: ' + projectTitle,
            '',
            'BESTEHENDE FEATURES (ID | Titel | Status | Kategorie | Beschreibung)',
            existingFeatures,
            '',
            'ANWEISUNGEN',
            '- Erzeuge nur Vorschläge, keine endgültigen Löschungen.',
            '- type soll primär sein: "duplicate-of" | "update-existing" | "probably-stale".',
            '- "new-feature" möglichst nicht verwenden.',
            '- targetFeatureId ist das Feature, das behalten werden soll.',
            '- duplicateFeatureId ist das Feature, das in den Papierkorb verschoben werden soll.',
            '- Bei "duplicate-of" müssen targetFeatureId und duplicateFeatureId gesetzt sein, wenn es eine echte Dublette ist.',
            '- Verwende "duplicate-of" ohne duplicateFeatureId nur bei Unsicherheit; dann confidence auf "niedrig".',
            '- resolvedStatus darf nur sein: idea|planned|selected-for-sprint|in-progress|blocked|deferred',
            '- resolvedCategory darf nur sein: UI|Workflow|Sync|KI|Import/Export|Darstellung|Datenmodell|Ansicht|Sonstiges',
            '- confidence darf nur sein: hoch|mittel|niedrig',
            '- rationale: kurzer nachvollziehbarer Grund.',
            '',
            'AUSGABEFORMAT JSON',
            '{',
            '  "proposals": [',
            '    {',
            '      "type": "duplicate-of|update-existing|probably-stale",',
            '      "targetFeatureId": "",',
            '      "duplicateFeatureId": "",',
            '      "incomingTitle": "",',
            '      "resolvedTitle": "",',
            '      "resolvedDescription": "",',
            '      "resolvedCategory": "",',
            '      "resolvedStatus": "",',
            '      "confidence": "hoch|mittel|niedrig",',
            '      "rationale": ""',
            '    }',
            '  ],',
            '  "summary": ""',
            '}'
          ].join('\n');
        }
        const incomingList = buildIncomingListForCleanupPrompt(incomingFeatures);
        return [
          'AUFGABE',
          'Führe ein defensives Feature-Cleanup durch. Gib ausschließlich gültiges JSON zurück (kein Markdown, kein Zusatztext).',
          'Ziel ist Import-Cleanup: bestehende Features aktualisieren statt unnötig neu anzulegen.',
          '',
          'PROJEKT',
          '- projectId: ' + projectId,
          '- projectTitle: ' + projectTitle,
          '',
          'BESTEHENDE FEATURES (ID | Titel | Status | Kategorie | Beschreibung)',
          existingFeatures,
          '',
          'NEU ERKANNTE FEATURES AUS IMPORT',
          incomingList,
          '',
          'ANWEISUNGEN',
          '- Erzeuge nur Vorschläge, keine endgültigen Löschungen.',
          '- Erzeuge keine neuen planned Features.',
          '- type darf nur sein: "match-existing" | "update-existing" | "new-implemented-feature" | "duplicate-of" | "probably-stale".',
          '- Nutze new-implemented-feature nur, wenn das Feature wirklich neu im Code/Import erkannt wurde und kein passender Eintrag existiert.',
          '- Nutze match-existing bei unverändert/bereits vorhanden.',
          '- Nutze update-existing nur bei echter Änderung oder wenn ein planned Feature durch Codeanalyse auf umgesetzt gehoben werden soll.',
          '- Schlage keine Updates bei identischer oder nur minimal anders formulierter Beschreibung vor.',
          '- Bei match-existing / update-existing / duplicate-of / probably-stale muss targetFeatureId gesetzt werden, wenn möglich.',
          '- duplicate-of darf nur Vorschlag sein; nichts direkt löschen.',
          '- resolvedStatus darf nur sein: detected|confirmed',
          '- resolvedCategory darf nur sein: UI|Workflow|Sync|KI|Import/Export|Darstellung|Datenmodell|Ansicht|Sonstiges',
          '- confidence darf nur sein: hoch|mittel|niedrig',
          '- rationale: kurzer nachvollziehbarer Grund.',
          '',
          'AUSGABEFORMAT JSON',
          '{',
          '  "proposals": [',
          '    {',
          '      "type": "match-existing|update-existing|new-implemented-feature|duplicate-of|probably-stale",',
          '      "targetFeatureId": "",',
          '      "incomingTitle": "",',
          '      "resolvedTitle": "",',
          '      "resolvedDescription": "",',
          '      "resolvedCategory": "",',
          '      "resolvedStatus": "detected|confirmed",',
          '      "changeSummary": "kurz: neu / unverändert / aktualisiert / Dublette / veraltet",',
          '      "confidence": "hoch|mittel|niedrig",',
          '      "rationale": ""',
          '    }',
          '  ],',
          '  "summary": ""',
          '}'
        ].join('\n');
      }

      function startCleanupReview(projectId, incomingFeatures, rawAnalysisJson, mode) {
        const prompt = buildCleanupPrompt(projectId, incomingFeatures, mode);
        ui.cleanupReview.projectId = projectId;
        ui.cleanupReview.incomingFeatures = incomingFeatures.slice();
        ui.cleanupReview.rawAnalysisJson = rawAnalysisJson || '';
        ui.cleanupReview.mode = mode || 'import-cleanup';
        ui.cleanupReview.summary = '';
        ui.cleanupReview.proposals = [];
        ui.cleanupReview.visible = true;
        ui.cleanupReview.versionLogged = false;
        ui.importDraft.projectId = projectId;
        ui.importDraft.cleanupPrompt = prompt;
        if ($('cleanupPromptOutput')) $('cleanupPromptOutput').value = prompt;
        renderView();
        navigator.clipboard.writeText(prompt)
          .then(() => alert('Cleanup-Prompt erzeugt und in Zwischenablage kopiert.\nJSON mit Vorschlägen einfügen und "Cleanup-Vorschläge laden" klicken.'))
          .catch(() => alert('Cleanup-Prompt erzeugt.\nJSON mit Vorschlägen einfügen und "Cleanup-Vorschläge laden" klicken.'));
      }

      function buildCleanupPromptFromPromptOutput() {
        const text = $('promptOutput') ? $('promptOutput').value.trim() : '';
        if (!text) return alert('Kein JSON/Prompt-Text vorhanden.');
        const projectId = getImportTargetProjectId();
        if (!projectId) return alert('Bitte zuerst ein Projekt auswählen.');
        let extractedJson = null;
        try { extractedJson = extractJsonObjectFromText(text); } catch (err) { extractedJson = null; }
        if (!extractedJson) return alert('Kein Analyse-JSON erkannt. Für Cleanup wird ein JSON mit Features benötigt.');
        try {
          const prepared = parseAnalysisJsonForCleanup(extractedJson, projectId);
          applyProjectMetadataFromAnalysis(projectId, prepared.parsed);
          markProjectCodeAnalysisCompleted(projectId, new Date().toISOString());
          save();
          startCleanupReview(projectId, prepared.parsedFeatures, extractedJson, 'import-cleanup');
        } catch (err) {
          if (err && err.message === 'missing-features-array') return alert("Analyse-JSON erkannt, aber es enthält kein 'features'-Array.");
          if (err && err.message === 'empty-features-array') return alert("Analyse-JSON erkannt, aber es wurden keine Features zurückgegeben.");
          if (err && err.message === 'unsupported-top-level-structure') return alert('Analyse-JSON erkannt, aber die Top-Level-Struktur wird nicht unterstützt.');
          if (err && err.message === 'invalid-analysis-json') return alert('Kein gültiges Analyse-JSON erkannt.');
          throw err;
        }
      }

      function buildProjectDedupePrompt() {
        const projectId = ui.activeProjectId !== ALL_PROJECTS_KEY ? ui.activeProjectId : (ui.importDraft.projectId || '');
        if (!projectId) return alert('Bitte ein konkretes Projekt auswählen.');
        const currentFeatures = getVisibleFeatures(S.features)
          .filter(f => f.projectId === projectId)
          .map(f => normalizeImportedFeature(f))
          .filter(Boolean);
        if (!currentFeatures.length) return alert('Dieses Projekt hat noch keine Features für Dedupe.');
        startCleanupReview(projectId, currentFeatures, '', 'project-dedupe');
      }

      function startImportCleanupFromPrompt() {
        const text = $('promptOutput').value.trim();
        if (!text) return alert('Kein Text vorhanden.');
        const projectId = getImportTargetProjectId();
        if (!projectId) return alert('Bitte zuerst ein Projekt auswählen (HTML-Analyse oder Quick-Notiz).');
        let extractedJson = null;
        try { extractedJson = extractJsonObjectFromText(text); } catch (err) { extractedJson = null; }
        if (!extractedJson) return alert('Kein Analyse-JSON erkannt. Für direkten Import nutze bei Bedarf den Fallback-Button.');
        try {
          const prepared = parseAnalysisJsonForCleanup(extractedJson, projectId);
          applyProjectMetadataFromAnalysis(projectId, prepared.parsed);
          markProjectCodeAnalysisCompleted(projectId, new Date().toISOString());
          save();
          startCleanupReview(projectId, prepared.parsedFeatures, extractedJson, 'import-cleanup');
        } catch (err) {
          if (err && err.message === 'missing-features-array') return alert("Analyse-JSON erkannt, aber es enthält kein 'features'-Array.");
          if (err && err.message === 'empty-features-array') return alert("Analyse-JSON erkannt, aber es wurden keine Features zurückgegeben.");
          if (err && err.message === 'unsupported-top-level-structure') return alert('Analyse-JSON erkannt, aber die Top-Level-Struktur wird nicht unterstützt.');
          if (err && err.message === 'invalid-analysis-json') return alert('Kein gültiges Analyse-JSON erkannt.');
          throw err;
        }
      }

      function importProjectSummaryOnlyJson() {
        const raw = $('promptOutput') ? $('promptOutput').value.trim() : '';
        if (!raw) return alert('Bitte Summary-JSON einfügen.');
        const projectId = getImportTargetProjectId();
        if (!projectId) return alert('Bitte zuerst ein Projekt auswählen.');

        let extractedJson = null;
        try { extractedJson = extractJsonObjectFromText(raw); } catch (err) { extractedJson = null; }
        if (!extractedJson) return alert('Kein gültiges JSON erkannt.');

        let parsed;
        try { parsed = JSON.parse(extractedJson); } catch (err) { return alert('Kein gültiges JSON erkannt: ' + err.message); }
        if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) return alert('Ungültige JSON-Struktur.');

        const project = S.projects.find(x => x.id === projectId);
        if (!project) return alert('Projekt konnte nicht gefunden werden.');

        const hadSummary = String(project.summary || '').trim();
        const result = applyProjectMetadataFromAnalysis(projectId, parsed, { allowOverwrite: true });
        const incomingSummary = typeof parsed.projectSummary === 'string' ? parsed.projectSummary.trim() : '';
        const incomingType = typeof parsed.appType === 'string' ? parsed.appType.trim() : '';
        const validIncomingType = incomingType && APP_TYPES.includes(incomingType);

        if (result.changed) {
          project.updatedAt = new Date().toISOString();
          save();
        }
        renderView();

        const messages = [];
        if (result.summaryChanged) {
          messages.push(hadSummary ? 'Summary überschrieben.' : 'Summary gesetzt.');
        } else if (!incomingSummary) {
          messages.push('Summary nicht übernommen (leer).');
        } else {
          messages.push('Summary nicht übernommen.');
        }
        if (result.typeChanged) messages.push('appType übernommen.');
        else if (incomingType && !validIncomingType) messages.push('appType ignoriert (nicht in APP_TYPES).');
        else if (incomingType) messages.push('appType nicht übernommen (Projekt-Typ bereits spezifisch).');
        else messages.push('Kein appType im JSON.');
        alert(messages.join('\n'));
      }

      function runImportHistoryMetadataBackfill() {
        const stats = backfillMissingProjectSummariesFromImportHistory();
        alert(
          'Backfill abgeschlossen.\n'
          + '- Projekte geprüft: ' + stats.checkedProjects + '\n'
          + '- Summary ergänzt: ' + stats.summaryFilled + '\n'
          + '- Typ ergänzt: ' + stats.typeFilled + '\n'
          + '- Ohne verwertbare Analyse: ' + stats.unresolved
        );
        renderView();
      }

      function loadCleanupReviewProposals() {
        const raw = $('cleanupReviewJsonInput') ? $('cleanupReviewJsonInput').value.trim() : '';
        if (!raw) return alert('Bitte Cleanup-JSON einfügen.');
        let parsed;
        try { parsed = JSON.parse(extractJsonObjectFromText(raw)); } catch (e) {
          return alert('Kein gültiges JSON erkannt: ' + e.message);
        }
        const proposals = Array.isArray(parsed.proposals) ? parsed.proposals : [];
        if (!proposals.length) return alert('Keine Vorschläge im JSON gefunden (Schlüssel: "proposals").');
        const validTypes = ['match-existing', 'update-existing', 'new-implemented-feature', 'new-feature', 'duplicate-of', 'probably-stale'];
        const validConfidence = ['hoch', 'mittel', 'niedrig'];
        const fallbackType = ui.cleanupReview.mode === 'project-dedupe' ? 'update-existing' : 'new-implemented-feature';
        ui.cleanupReview.proposals = proposals.map((p, i) => ({
          _idx: i,
          type: normalizeCleanupProposalType(validTypes.includes(p.type) ? p.type : fallbackType, ui.cleanupReview.mode),
          targetFeatureId: String(p.targetFeatureId || '').trim(),
          duplicateFeatureId: String(p.duplicateFeatureId || '').trim(),
          incomingTitle: String(p.incomingTitle || '').trim(),
          resolvedTitle: String(p.resolvedTitle || '').trim(),
          resolvedDescription: String(p.resolvedDescription || '').trim(),
          resolvedCategory: FEATURE_CATEGORIES.includes(p.resolvedCategory) ? p.resolvedCategory : 'Sonstiges',
          resolvedStatus: normalizeCleanupProposalStatus(p.resolvedStatus, ui.cleanupReview.mode),
          confidence: validConfidence.includes(String(p.confidence || '').trim()) ? String(p.confidence || '').trim() : 'mittel',
          rationale: String(p.rationale || '').trim(),
          changeSummary: String(p.changeSummary || '').trim(),
          _done: false
        }));
        ui.cleanupReview.summary = String(parsed.summary || '').trim();
        ui.cleanupReview.visible = true;
        if (
          !ui.cleanupReview.versionLogged &&
          ui.cleanupReview.mode === 'import-cleanup' &&
          ui.cleanupReview.projectId &&
          ui.cleanupReview.rawAnalysisJson &&
          ui.cleanupReview.proposals.length
        ) {
          try {
            const parsedAnalysis = JSON.parse(ui.cleanupReview.rawAnalysisJson);
            applyProjectMetadataFromAnalysis(ui.cleanupReview.projectId, parsedAnalysis);
            const comparisonToPrevious = compareFeaturesToPreviousVersion(ui.cleanupReview.projectId, ui.cleanupReview.incomingFeatures || []);
            S.importVersions.push(createImportVersionEntry(
              ui.cleanupReview.projectId,
              'analysis-json-cleanup',
              'Cleanup Review gestartet',
              ui.cleanupReview.rawAnalysisJson,
              parsedAnalysis,
              ui.cleanupReview.incomingFeatures || [],
              comparisonToPrevious
            ));
            ui.cleanupReview.versionLogged = true;
            save();
          } catch (err) {
            console.warn('Import-Version für Cleanup konnte nicht gespeichert werden:', err);
          }
        }
        renderView();
      }

      function normalizeCleanupProposalType(type, mode) {
        const raw = String(type || '').trim();
        if (mode === 'import-cleanup') {
          if (raw === 'new-feature') return 'new-implemented-feature';
          if (['match-existing', 'update-existing', 'new-implemented-feature', 'duplicate-of', 'probably-stale'].includes(raw)) return raw;
          return 'new-implemented-feature';
        }
        if (raw === 'new-implemented-feature') return 'new-feature';
        if (['match-existing', 'update-existing', 'new-feature', 'duplicate-of', 'probably-stale'].includes(raw)) return raw;
        return 'update-existing';
      }

      function normalizeCleanupProposalStatus(status, mode) {
        if (mode === 'import-cleanup') {
          const raw = normalizeText(status || '');
          if (['umgesetzt', 'implemented', 'confirmed'].includes(raw)) return 'confirmed';
          if (['teilweise umgesetzt', 'vorbereitet', 'detected'].includes(raw)) return 'detected';
          return 'detected';
        }
        return normalizeFeatureStatus(status, 'planned');
      }

      function resolveCleanupTargetFeature(proposal) {
        if (!proposal) return null;
        const pid = ui.cleanupReview.projectId || '';
        if (proposal.targetFeatureId) {
          const byId = S.features.find(x => x.id === proposal.targetFeatureId && (!pid || x.projectId === pid));
          if (byId) return byId;
        }
        if (proposal.resolvedTitle) {
          return getMatchingProjectFeature(pid, proposal.resolvedTitle);
        }
        if (proposal.incomingTitle) {
          return getMatchingProjectFeature(pid, proposal.incomingTitle);
        }
        return null;
      }

      function applyCleanupProposalToFeature(feature, proposal) {
        const changes = [];
        const mode = ui.cleanupReview.mode || 'import-cleanup';
        if (mode === 'import-cleanup' && feature.pool !== 'implemented') {
          feature.pool = 'implemented';
          changes.push('pool');
        }
        if (mode === 'import-cleanup' && feature.reviewStatus !== 'needs-review') {
          feature.reviewStatus = 'needs-review';
          changes.push('reviewStatus');
        }
        const nextTitle = proposal.resolvedTitle || proposal.incomingTitle;
        if (nextTitle && nextTitle !== feature.title) {
          if (confirm('Titel ändern von:\n"' + feature.title + '"\nauf:\n"' + nextTitle + '"?')) {
            feature.title = nextTitle;
            changes.push('title');
          }
        }
        const nextDescription = String(proposal.resolvedDescription || '').trim();
        const existingDescription = String(feature.description || '').trim();
        if (nextDescription && nextDescription !== existingDescription) {
          if (confirm('Beschreibung ersetzen?\nAlt: ' + shorten(existingDescription || '—', 120) + '\nNeu: ' + shorten(nextDescription, 120))) {
            feature.description = nextDescription;
            changes.push('description');
          }
        }
        const nextCategory = proposal.resolvedCategory;
        if (nextCategory && FEATURE_CATEGORIES.includes(nextCategory) && nextCategory !== feature.category) {
          if (confirm('Kategorie ändern von "' + feature.category + '" auf "' + nextCategory + '"?')) {
            feature.category = nextCategory;
            changes.push('category');
          }
        }
        const nextStatus = mode === 'import-cleanup'
          ? normalizeCleanupProposalStatus(proposal.resolvedStatus, mode)
          : resolveStatusForPool(proposal.resolvedStatus, feature.pool || 'planned');
        if (nextStatus && isValidFeatureStatus(nextStatus, feature.pool || 'planned') && nextStatus !== feature.status) {
          if (confirm('Status ändern von "' + feature.status + '" auf "' + nextStatus + '"?')) {
            feature.status = nextStatus;
            changes.push('status');
          }
        }
        if (changes.length) feature.updatedAt = new Date().toISOString();
        return changes;
      }

      function acceptCleanupProposalAsUpdate(idx) {
        const proposal = ui.cleanupReview.proposals.find(p => p._idx === idx);
        if (!proposal || proposal._done) return;
        const feature = resolveCleanupTargetFeature(proposal);
        if (!feature) return alert('Ziel-Feature nicht gefunden. Bitte als "neu" übernehmen oder ignorieren.');
        applyCleanupProposalToFeature(feature, proposal);
        proposal._done = true;
        save();
        renderView();
      }

      function acceptCleanupProposalAsNew(idx) {
        const proposal = ui.cleanupReview.proposals.find(p => p._idx === idx);
        if (!proposal || proposal._done) return;
        const projectId = ui.cleanupReview.projectId || '';
        const title = proposal.resolvedTitle || proposal.incomingTitle;
        if (!title) return alert('Kein Titel vorhanden.');
        S.features.push(ensureFeatureDefaults({
          id: uid('f'),
          projectId,
          title,
          description: proposal.resolvedDescription || 'Aus Cleanup-Review übernommen.',
          category: proposal.resolvedCategory || 'Sonstiges',
          pool: ui.cleanupReview.mode === 'import-cleanup' ? 'implemented' : 'planned',
          reviewStatus: 'needs-review',
          status: ui.cleanupReview.mode === 'import-cleanup'
            ? normalizeCleanupProposalStatus(proposal.resolvedStatus || 'detected', 'import-cleanup')
            : normalizeCleanupProposalStatus(proposal.resolvedStatus || 'planned', 'project-dedupe'),
          priority: 'mittel',
          sourceType: ui.cleanupReview.mode === 'import-cleanup' ? 'html-analysis' : 'cleanup-review',
          sourceNoteIds: [],
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        }));
        proposal._done = true;
        save();
        renderView();
      }

      function markCleanupProposalAsDuplicate(idx) {
        const proposal = ui.cleanupReview.proposals.find(p => p._idx === idx);
        if (!proposal || proposal._done) return;
        const targetFeature = resolveCleanupTargetFeature(proposal);
        const duplicateFeatureId = String(proposal.duplicateFeatureId || '').trim();
        const duplicateFeature = duplicateFeatureId ? S.features.find(f => f.id === duplicateFeatureId) : null;
        if (duplicateFeature) {
          const keepTitle = targetFeature ? targetFeature.title : (proposal.targetFeatureId || '—');
          const duplicateTitle = duplicateFeature.title || duplicateFeature.id;
          const ok = confirm(
            'Feature als Dublette in den Papierkorb verschieben?\n' +
            'Behalten: ' + keepTitle + '\n' +
            'Verschieben: ' + duplicateTitle
          );
          if (!ok) return;
          moveFeatureToTrash(duplicateFeature.id, {
            reason: proposal.rationale || 'Als Dublette markiert',
            workflow: ui.cleanupReview.mode || 'cleanup-review',
            mergedIntoFeatureId: proposal.targetFeatureId || ''
          });
        } else {
          alert('Keine konkrete Dublette gefunden. Es wurde nichts verschoben.');
          return;
        }
        proposal._done = true;
        save();
        renderView();
      }

      function markCleanupProposalAsReviewed(idx) {
        const proposal = ui.cleanupReview.proposals.find(p => p._idx === idx);
        if (!proposal || proposal._done) return;
        proposal._done = true;
        proposal._reviewedOnly = true;
        save();
        renderView();
      }

      function ignoreCleanupProposal(idx) {
        const proposal = ui.cleanupReview.proposals.find(p => p._idx === idx);
        if (!proposal) return;
        proposal._done = true;
        proposal._ignored = true;
        save();
        renderView();
      }

      function clearCleanupReview() {
        ui.cleanupReview = { proposals: [], projectId: '', incomingFeatures: [], rawAnalysisJson: '', mode: '', summary: '', visible: false, versionLogged: false };
        renderView();

                    ${p.duplicateFeatureId ? `<div class="mini">Duplikat-ID: ${escapeHtml(p.duplicateFeatureId)}</div>` : ''}
                    ${p.duplicateFeatureId ? `<div class="mini">Duplikat-Titel: ${escapeHtml(((S.features.find(f => f.id === p.duplicateFeatureId) || {}).title) || '—')}</div>` : ''}

                    ${normalizedType === 'duplicate-of' && !hasDuplicate ? '<div class="mini" style="color:var(--ink-dim)">Keine konkrete Dublette zugeordnet.</div>' : ''}
                    ${p._done ? `<div class="mini"><span class="pill ${(p._ignored || p._reviewedOnly) ? '' : 'pill-success'}">${p._ignored ? 'ignoriert' : (p._reviewedOnly ? 'geprüft' : 'übernommen')}</span></div>` : `
                      <div class="stack-row">

                        ${normalizedType === 'new-implemented-feature' && !hasTarget ? `<button class="btn btn-primary" data-cleanup-accept-new="${p._idx}">Als neues umgesetztes Feature ergänzen</button>` : ''}
                        ${normalizedType === 'new-implemented-feature' && hasTarget ? `<button class="btn btn-secondary" data-cleanup-accept-new="${p._idx}">Trotzdem als neues umgesetztes Feature ergänzen</button>` : ''}
                        ${normalizedType === 'match-existing' ? `<button class="btn btn-secondary" data-cleanup-review-only="${p._idx}">Als geprüft abhaken</button>` : ''}
                        ${normalizedType === 'probably-stale' ? `<button class="btn btn-secondary" data-cleanup-review-only="${p._idx}">Als geprüft abhaken</button>` : ''}
                        ${normalizedType === 'duplicate-of' && hasDuplicate ? `<button class="btn btn-danger" data-cleanup-mark-duplicate="${p._idx}">Dublette in Papierkorb verschieben</button>` : ''}

      function importProjectMomentumResult(projectId, rawText) {
        const p = S.projects.find(x => x.id === projectId);
        if (!p) return alert('Projekt nicht gefunden.');
        if (!String(rawText || '').trim()) return alert('Bitte Ergebnis-JSON einfügen.');

        let parsed;
        try {
          parsed = JSON.parse(extractJsonObjectFromText(rawText));
        } catch (e) {
          return alert('Kein gültiges JSON erkannt: ' + e.message);
        }

        const nextFocus = String(parsed.currentFocus || '').trim();
        const nextStep = String(parsed.nextStep || '').trim();
        const summary = String(parsed.summary || '').trim();

        if (!nextFocus && !nextStep && !summary) {
          return alert('JSON enthält keine verwertbaren Felder: currentFocus, nextStep oder summary.');
        }

        if (nextFocus) p.currentFocus = nextFocus;
        if (nextStep) p.nextStep = nextStep;
        if (summary && !String(p.summary || '').trim()) p.summary = summary;
        p.updatedAt = new Date().toISOString();

        alert('Projekt-Momentum übernommen.');

        if (!field) return;
        const text = field.value;
        if (!text.trim()) return;
        if (textareaId === 'analysisPromptOutput') ui.importDraft.analysisPrompt = text;
        else if (textareaId === 'cleanupPromptOutput') ui.importDraft.cleanupPrompt = text;
        else if (textareaId === 'projectMomentumPromptOutput') {
          const projectId = ui.activeProjectId && ui.activeProjectId !== ALL_PROJECTS_KEY ? ui.activeProjectId : '';
          if (projectId) getProjectMomentumPromptState(projectId).prompt = text;
        }
        else if (textareaId === 'chatWorkflowPromptOutput') {

          if (projectId) getChatWorkflowState(projectId).prompt = text;
        }
        else if (textareaId === 'sprintCycleStartPromptOutput') {

          if (projectId) getChatWorkflowState(projectId).sprintStartPrompt = text;
        }

      function getImportTargetProjectId() {
        const htmlSelect = $('htmlProjectSelect');
        const quickSelect = $('quickProject');
        return (htmlSelect && htmlSelect.value) || (quickSelect && quickSelect.value) || '';
      }

      function mapJsonAnalysisStatus(status) {
        const mapped = resolveLegacyImplementedStatus(status);
        return mapped || 'detected';
      }

      function getFeatureStatusRank(status, pool) {
        const safePool = normalizeFeaturePool(pool);
        const order = safePool === 'implemented'
          ? ['detected', 'needs-review', 'manually-added', 'confirmed', 'obsolete']
          : ['idea', 'planned', 'selected-for-sprint', 'in-progress', 'blocked', 'deferred'];
        const idx = order.indexOf(status);
        return idx === -1 ? 0 : idx;
      }

      function isGenericFeatureDescription(description) {
        const normalized = normalizeText(description);
        if (!normalized) return true;
        const generic = [
          'aus analyse-json übernommen.',
          'aus prompt-/analyseblock übernommen.',
          'aus analyse json übernommen.',
          'aus analyse übernommen.'
        ];
        return generic.includes(normalized);
      }

      function getMatchingProjectFeature(projectId, title) {
        const normalizedTitle = normalizeText(title);
        if (!normalizedTitle) return null;
        return S.features.find(x => x.projectId === projectId && normalizeText(x.title) === normalizedTitle) || null;
      }

      function normalizeImportedFeature(item) {
        if (!item || typeof item !== 'object') return null;
        const title = String(item.title || '').trim();
        if (!title) return null;
        const description = String(item.description || '').trim();
        const category = FEATURE_CATEGORIES.includes(item.category) ? item.category : 'Sonstiges';
        const status = mapJsonAnalysisStatus(item.status);
        return { title, description, category, status, pool: 'implemented', reviewStatus: 'needs-review' };
      }

      function featureVersionSignature(featureLike) {
        const normalized = normalizeImportedFeature(featureLike);
        if (!normalized) return '';
        return [
          normalizeText(normalized.description),
          normalizeText(normalized.category),
          normalizeText(normalized.status)
        ].join('||');
      }

      function findPossibleRelevantNotes(projectId, changedTitles) {
        const relevant = [];
        const seen = new Set();
        const titleTokens = changedTitles
          .map(t => normalizeText(t).split(/\s+/).filter(Boolean))
          .flat()
          .filter(tok => tok.length >= 4);

        S.notes
          .filter(n => n.projectId === projectId && isOpenNote(n))
          .forEach(note => {
            const textNorm = normalizeText(note.text || '');
            if (!textNorm) return;
            const hitsTitle = changedTitles.some(t => normalizeText(t) && textNorm.includes(normalizeText(t)));
            const hitsToken = titleTokens.some(tok => textNorm.includes(tok));
            if (!hitsTitle && !hitsToken) return;
            if (seen.has(note.id)) return;
            seen.add(note.id);
            relevant.push({ id: note.id, text: note.text, createdAt: note.createdAt || '' });
          });

        return relevant.slice(0, 5);
      }

      function compareFeaturesToPreviousVersion(projectId, parsedFeatures) {
        const previous = getProjectImportVersions(projectId)[0] || null;
        const previousFeatures = Array.isArray(previous && previous.parsedFeatures) ? previous.parsedFeatures : [];
        const prevByTitle = new Map();
        previousFeatures.forEach(item => {
          const normalized = normalizeImportedFeature(item);
          if (!normalized) return;
          prevByTitle.set(normalizeText(normalized.title), normalized);
        });

        const newByTitle = new Map();
        parsedFeatures.forEach(item => {
          const normalized = normalizeImportedFeature(item);
          if (!normalized) return;
          newByTitle.set(normalizeText(normalized.title), normalized);
        });

        const addedFeatures = [];
        const updatedFeatures = [];
        const unchangedFeatures = [];
        const missingFromNewVersion = [];

        newByTitle.forEach((current, key) => {
          const prev = prevByTitle.get(key);
          if (!prev) {
            addedFeatures.push({ title: current.title });
            return;
          }
          if (featureVersionSignature(prev) === featureVersionSignature(current)) {
            unchangedFeatures.push({ title: current.title });
          } else {
            updatedFeatures.push({ title: current.title });
          }
        });

        prevByTitle.forEach((prev, key) => {
          if (newByTitle.has(key)) return;
          missingFromNewVersion.push({ title: prev.title });
        });

        const noteRefs = findPossibleRelevantNotes(
          projectId,
          addedFeatures.concat(updatedFeatures, missingFromNewVersion).map(x => x.title)
        );

        return {
          previousImportId: previous ? previous.id : null,
          addedFeatures,
          updatedFeatures,
          unchangedFeatures,
          missingFromNewVersion,
          possibleRelevantNotes: noteRefs
        };
      }
